// =============================================
// GIS PARCEL FETCHING (from CALVEY FORM 01_SITE)
// =============================================

const PARCEL_SVC = {
  MA: { name: "MA — MassGIS L3", layerUrl: "https://services1.arcgis.com/hGdibHYSPO59RG1h/ArcGIS/rest/services/L3_TAXPAR_POLY_ASSESS_gdb/FeatureServer/0" },
  NY: { name: "NY — NYS Tax Parcels", layerUrl: "https://gisservices.its.ny.gov/arcgis/rest/services/NYS_Tax_Parcels_Public/FeatureServer/1" },
};
const ESRI_USA_FALLBACK = "https://services.arcgis.com/P3ePLMYs2RVChkJx/ArcGIS/rest/services/USA_Parcels/FeatureServer/0";

async function nominatimGeocode(q) {
  const url = new URL("https://nominatim.openstreetmap.org/search");
  url.searchParams.set("q", q); url.searchParams.set("format", "json");
  url.searchParams.set("addressdetails", "1"); url.searchParams.set("limit", "1");
  const r = await fetch(url.toString(), { headers: { "Accept": "application/json" } });
  if (!r.ok) throw new Error("Geocode failed: " + r.status);
  const j = await r.json();
  if (!j || !j.length) throw new Error("No results found.");
  return j[0];
}

function pickStateCode(g) {
  const a = g?.address || {};
  const code = String(a.state_code || "").toUpperCase().trim();
  if (code) return code;
  const st = String(a.state || "").toUpperCase();
  if (st.includes("MASSACHUSETTS")) return "MA";
  if (st.includes("NEW YORK")) return "NY";
  return null;
}

function esriRingsToGeoJSON(rings) {
  return { type: "Feature", properties: {}, geometry: { type: "Polygon", coordinates: rings.map(r => r.map(pt => [pt[0], pt[1]])) } };
}

function pickBestParcel(features, lat, lon) {
  if (!features || !features.length) return null;
  const pt = turf.point([lon, lat]);
  const containing = features.filter(f => { try { return turf.booleanPointInPolygon(pt, f); } catch (e) { return false; } });
  if (containing.length) {
    return containing.reduce((best, f) => turf.area(f) < turf.area(best) ? f : best);
  }
  return features.reduce((best, f) => turf.area(f) < turf.area(best) ? f : best);
}

async function arcgisQueryParcel(layerUrl, lat, lon) {
  const u = new URL(layerUrl + "/query");
  u.searchParams.set("f", "geojson"); u.searchParams.set("geometry", lon + "," + lat);
  u.searchParams.set("geometryType", "esriGeometryPoint"); u.searchParams.set("inSR", "4326");
  u.searchParams.set("spatialRel", "esriSpatialRelIntersects"); u.searchParams.set("outFields", "*");
  u.searchParams.set("returnGeometry", "true"); u.searchParams.set("outSR", "4326");
  u.searchParams.set("resultRecordCount", "10");
  try {
    const r = await fetch(u.toString(), { headers: { "Accept": "application/geo+json, application/json" } });
    if (r.ok) {
      const gj = await r.json();
      const feats = (gj && gj.features) ? gj.features : [];
      const best = pickBestParcel(feats, lat, lon);
      if (best) return best;
    }
  } catch (e) {}
  // ESRI JSON fallback
  const u2 = new URL(layerUrl + "/query");
  u2.searchParams.set("f", "json"); u2.searchParams.set("geometry", lon + "," + lat);
  u2.searchParams.set("geometryType", "esriGeometryPoint"); u2.searchParams.set("inSR", "4326");
  u2.searchParams.set("spatialRel", "esriSpatialRelIntersects"); u2.searchParams.set("outFields", "*");
  u2.searchParams.set("returnGeometry", "true"); u2.searchParams.set("outSR", "4326");
  u2.searchParams.set("resultRecordCount", "10");
  try {
    const r = await fetch(u2.toString()); if (!r.ok) return null;
    const j = await r.json(); if (!j?.features?.length) return null;
    const feats = j.features.filter(f => f?.geometry?.rings).map(f => { const feat = esriRingsToGeoJSON(f.geometry.rings); feat.properties = f.attributes || {}; return feat; });
    return pickBestParcel(feats, lat, lon);
  } catch (e) { return null; }
}

async function fetchParcel(address) {
  const g = await nominatimGeocode(address);
  const lat = parseFloat(g.lat), lon = parseFloat(g.lon);
  const stateCode = pickStateCode(g);
  const svc = PARCEL_SVC[stateCode];
  let parcel = null;
  if (svc) { parcel = await arcgisQueryParcel(svc.layerUrl, lat, lon); }
  if (!parcel) { parcel = await arcgisQueryParcel(ESRI_USA_FALLBACK, lat, lon); }
  if (!parcel) throw new Error("No parcel found. Try a different address.");
  // Convert parcel to feet centered at origin
  const coords = parcel.geometry.coordinates[0];
  const ftPerDegLon = Math.cos(lat * Math.PI / 180) * 364567.2;
  const ftPerDegLat = 364567.2;
  const parcelFt = coords.map(([plon, plat]) => [(plon - lon) * ftPerDegLon, -(plat - lat) * ftPerDegLat]);
  // Compute bounding box in feet
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  parcelFt.forEach(([x, y]) => { minX = Math.min(minX, x); maxX = Math.max(maxX, x); minY = Math.min(minY, y); maxY = Math.max(maxY, y); });
  return { parcelFt, lat, lon, stateCode, widthFt: maxX - minX, depthFt: maxY - minY, minX, minY, maxX, maxY, address, raw: parcel };
}

// Cache for embedded font data
let _cormorantFontBase64 = null;

async function loadCormorantFont() {
  if (_cormorantFontBase64) return _cormorantFontBase64;
  try {
    // Fetch Google Fonts CSS with user-agent that triggers TTF format
    const cssResp = await fetch(
      "https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&display=swap",
      { headers: { "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" } }
    );
    const css = await cssResp.text();
    const urlMatch = css.match(/url\(([^)]+)\)/);
    if (!urlMatch) throw new Error("Font URL not found");
    const fontUrl = urlMatch[1].replace(/['"]/g, "");
    const fontResp = await fetch(fontUrl);
    const buf = await fontResp.arrayBuffer();
    const bytes = new Uint8Array(buf);
    let binary = "";
    for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
    _cormorantFontBase64 = btoa(binary);
    return _cormorantFontBase64;
  } catch (e) {
    console.warn("Could not load Cormorant Garamond for PDF:", e);
    return null;
  }
}

async function exportPDF(rooms, planMeta, sf, type, cFt, parcelData, corrSegs) {
  const fontData = await loadCormorantFont();
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: "landscape", unit: "pt", format: "letter" });
  const W = doc.internal.pageSize.getWidth();
  const H = doc.internal.pageSize.getHeight();
  const margin = 40;
  const FT_TO_M = 0.3048;
  const fHead = "helvetica";
  const fMono = "courier";
  const fSerif = "CormorantGaramond";

  // Embed Cormorant Garamond if loaded
  let hasSerif = false;
  if (fontData) {
    try {
      doc.addFileToVFS("CormorantGaramond-Light.ttf", fontData);
      doc.addFont("CormorantGaramond-Light.ttf", fSerif, "normal");
      hasSerif = true;
    } catch (e) { console.warn("Font embed failed:", e); }
  }

  // Background
  doc.setFillColor(250, 250, 248);
  doc.rect(0, 0, W, H, "F");

  // Grid background
  doc.setDrawColor(240, 237, 232); doc.setLineWidth(0.25);
  for (let gx = 0; gx < W; gx += 18) doc.line(gx, 0, gx, H);
  for (let gy = 0; gy < H; gy += 18) doc.line(0, gy, W, gy);

  // Header — "CALVEY PARTI" in Cormorant Garamond above title
  if (hasSerif) {
    doc.setFont(fSerif, "normal"); doc.setFontSize(14); doc.setTextColor(26, 26, 26);
  } else {
    doc.setFont(fHead, "normal"); doc.setFontSize(14); doc.setTextColor(26, 26, 26);
  }
  doc.text("CALVEY  PARTI", margin, 28, { charSpace: 4.5 });

  doc.setFont(fMono); doc.setFontSize(7); doc.setTextColor(136, 136, 136);
  doc.text(new Date().toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" }).toUpperCase(), W - margin, 28, { align: "right" });

  doc.setFont(fHead, "normal"); doc.setFontSize(22); doc.setTextColor(26, 26, 26);
  doc.text(type.toUpperCase(), margin, 52);
  doc.setFontSize(11); doc.setTextColor(85, 85, 85);
  doc.text(sf.toLocaleString() + " SF  (" + Math.round(sf * FT_TO_M * FT_TO_M).toLocaleString() + " m\u00B2)", margin, 68);

  const progRooms = rooms.filter(r => !r.fixed && r.zone !== "corridor");
  const adjMet = planMeta ? planMeta.adjE.filter(e => e.met).length : 0;
  const adjTotal = planMeta ? planMeta.adjE.length : 0;
  doc.setFont(fMono); doc.setFontSize(7); doc.setTextColor(106, 156, 196);
  doc.text("ROOMS " + progRooms.length + "   \u00B7   ADJ " + adjMet + "/" + adjTotal + "   \u00B7   " + (planMeta?.typology || "\u2014").toUpperCase(), margin, 82);

  doc.setDrawColor(221, 221, 221); doc.setLineWidth(0.5);
  doc.line(margin, 90, W - margin, 90);

  // Plan area
  const planY = 100, planH = H - planY - 60, planW = (W - margin * 2) * 0.58;
  let maxRx = 1, maxRy = 1;
  rooms.forEach(r => { maxRx = Math.max(maxRx, r.x + r.w); maxRy = Math.max(maxRy, r.y + r.h); });
  const sc = Math.min(planW / maxRx, planH / maxRy) * 0.9;
  const ox = margin + (planW - maxRx * sc) / 2;
  const oy = planY + (planH - maxRy * sc) / 2;

  // Parcel boundary
  if (parcelData) {
    doc.setDrawColor(201, 169, 89); doc.setLineWidth(1.2);
    doc.setLineDashPattern([6, 4], 0);
    const pts = parcelData.parcelFt;
    for (let i = 0; i < pts.length; i++) {
      const ni = (i + 1) % pts.length;
      doc.line(ox + pts[i][0] / cFt * sc, oy + pts[i][1] / cFt * sc, ox + pts[ni][0] / cFt * sc, oy + pts[ni][1] / cFt * sc);
    }
    doc.setLineDashPattern([], 0);
  }

  // Corridor cells
  rooms.filter(r => r.zone === "corridor").forEach(r => {
    doc.setFillColor(96, 112, 128);
    doc.setGState(new doc.GState({ opacity: 0.15 }));
    doc.rect(ox + r.x * sc, oy + r.y * sc, r.w * sc, r.h * sc, "F");
  });
  doc.setGState(new doc.GState({ opacity: 1.0 }));

  // Room blocks with rounded corners
  const allRooms = rooms.filter(r => r.zone !== "corridor");
  allRooms.forEach(r => {
    const hex = r.color || "#6B6B6B";
    const R = parseInt(hex.slice(1, 3), 16), G2 = parseInt(hex.slice(3, 5), 16), B = parseInt(hex.slice(5, 7), 16);
    const rx = ox + r.x * sc, ry = oy + r.y * sc, rw = r.w * sc, rh = r.h * sc;
    const rad = Math.min(3, rw * 0.06, rh * 0.06);

    doc.setGState(new doc.GState({ opacity: r.zone === "core" ? 0.45 : 0.32 }));
    doc.setFillColor(R, G2, B);
    doc.roundedRect(rx, ry, rw, rh, rad, rad, "F");

    doc.setGState(new doc.GState({ opacity: 0.55 }));
    doc.setDrawColor(R, G2, B); doc.setLineWidth(0.5);
    doc.roundedRect(rx, ry, rw, rh, rad, rad, "S");
    doc.setGState(new doc.GState({ opacity: 1.0 }));

    if (rw > 28 && rh > 14) {
      doc.setFont(fMono); doc.setFontSize(4.5); doc.setTextColor(R, G2, B);
      const label = r.name.length > Math.floor(rw / 4) ? r.name.slice(0, Math.floor(rw / 4) - 1) + "\u2026" : r.name;
      doc.text(label.toUpperCase(), rx + 3, ry + 8);
    }
    if (rw > 36 && rh > 22) {
      const areaSf = Math.round(r.area * cFt * cFt);
      const dimW = Math.round(r.w * cFt), dimH = Math.round(r.h * cFt);
      doc.setFontSize(3.5); doc.setTextColor(180, 180, 180);
      doc.text(dimW + "'\u00D7" + dimH + "'  \u00B7  " + areaSf.toLocaleString() + " SF", rx + 3, ry + 14);
    }
  });

  // Scale bar
  const scaleBarFt = 50;
  const scaleBarPx = scaleBarFt / cFt * sc;
  const sbx = margin, sby = H - 52;
  doc.setDrawColor(26, 26, 26); doc.setLineWidth(1);
  doc.line(sbx, sby, sbx + scaleBarPx, sby);
  doc.line(sbx, sby - 3, sbx, sby + 3);
  doc.line(sbx + scaleBarPx, sby - 3, sbx + scaleBarPx, sby + 3);
  doc.setFont(fMono); doc.setFontSize(6); doc.setTextColor(26, 26, 26);
  doc.text("0", sbx, sby + 10);
  doc.text(scaleBarFt + "' (" + Math.round(scaleBarFt * FT_TO_M) + "m)", sbx + scaleBarPx, sby + 10, { align: "right" });
  doc.setFontSize(5); doc.setTextColor(136, 136, 136);
  doc.text("1 cell = " + Math.round(cFt) + "' (" + (cFt * FT_TO_M).toFixed(1) + "m)", sbx, sby + 18);

  // Room schedule
  const tableX = margin + planW + 24;
  const tableW = W - tableX - margin;
  let ty = planY;
  doc.setFont(fMono); doc.setFontSize(7); doc.setTextColor(106, 156, 196);
  doc.text("ROOM SCHEDULE", tableX, ty); ty += 12;
  doc.setDrawColor(221, 221, 221); doc.setLineWidth(0.5);
  doc.line(tableX, ty, tableX + tableW, ty); ty += 10;

  const depts = {};
  progRooms.forEach(r => { if (!depts[r.dept]) depts[r.dept] = []; depts[r.dept].push(r); });
  let totalArea = 0;

  for (const [dept, dRooms] of Object.entries(depts)) {
    if (ty > H - 80) break;
    const deptArea = dRooms.reduce((s, r) => s + r.area * cFt * cFt, 0);
    totalArea += deptArea;
    const dHex = dRooms[0]?.color || "#6B6B6B";
    doc.setFillColor(parseInt(dHex.slice(1,3),16), parseInt(dHex.slice(3,5),16), parseInt(dHex.slice(5,7),16));
    doc.roundedRect(tableX, ty - 5, 5, 5, 1, 1, "F");
    doc.setFont(fMono); doc.setFontSize(6); doc.setTextColor(85, 85, 85);
    doc.text(dept.toUpperCase(), tableX + 8, ty);
    doc.setTextColor(136, 136, 136);
    doc.text(Math.round(deptArea).toLocaleString() + " SF", tableX + tableW, ty, { align: "right" });
    ty += 10;
    dRooms.forEach(r => {
      if (ty > H - 80) return;
      const areaSf = Math.round(r.area * cFt * cFt);
      const dimW = Math.round(r.w * cFt), dimH = Math.round(r.h * cFt);
      doc.setFont(fHead, "normal"); doc.setFontSize(6); doc.setTextColor(26, 26, 26);
      doc.text(r.name, tableX + 10, ty);
      doc.setFont(fMono); doc.setFontSize(5); doc.setTextColor(136, 136, 136);
      doc.text(dimW + "'\u00D7" + dimH + "'", tableX + tableW * 0.55, ty);
      doc.text(areaSf.toLocaleString() + " SF", tableX + tableW, ty, { align: "right" });
      ty += 8;
    });
    doc.setDrawColor(240, 237, 232); doc.setLineWidth(0.3);
    doc.line(tableX, ty, tableX + tableW, ty);
    ty += 6;
  }

  if (ty < H - 70) {
    doc.setDrawColor(106, 156, 196); doc.setLineWidth(0.5);
    doc.line(tableX, ty, tableX + tableW, ty); ty += 10;
    doc.setFont(fMono); doc.setFontSize(6); doc.setTextColor(106, 156, 196);
    doc.text("TOTAL PROGRAM", tableX, ty);
    doc.text(Math.round(totalArea).toLocaleString() + " SF (" + Math.round(totalArea * FT_TO_M * FT_TO_M).toLocaleString() + " m\u00B2)", tableX + tableW, ty, { align: "right" });
  }

  if (parcelData?.address) {
    doc.setFont(fMono); doc.setFontSize(5); doc.setTextColor(136, 136, 136);
    doc.text(parcelData.address.toUpperCase(), tableX, planY + planH - 4);
  }

  // Footer
  doc.setDrawColor(221, 221, 221); doc.setLineWidth(0.5);
  doc.line(margin, H - 32, W - margin, H - 32);
  doc.setFont(fMono); doc.setFontSize(6); doc.setTextColor(136, 136, 136);
  doc.text("CALVEY  \u00B7  " + new Date().getFullYear(), margin, H - 20);
  doc.text("CALVEY PARTI v8", W - margin, H - 20, { align: "right" });

  doc.save("CALVEY_PARTI_" + type.replace(/\s+/g, "_") + ".pdf");
}

function makeBoundary(sid, co, ro) { const s = new Set(); for (let r = 0; r < ro; r++) for (let c = 0; c < co; c++) { let ok = true; if (sid === "lshape") ok = r >= Math.floor(ro * 0.45) || c < Math.floor(co * 0.55); else if (sid === "corner") ok = r < Math.floor(ro * 0.55) || c < Math.floor(co * 0.55); else if (sid === "narrow") { const t = Math.floor(co * 0.2); ok = c >= t && c < co - t; } if (ok) s.add(c + "," + r); } return s; }

function buildField(sid, co, ro) { const ins = makeBoundary(sid, co, ro); const cells = []; for (let r = 0; r < ro; r++) for (let c = 0; c < co; c++) { if (!ins.has(c + "," + r)) continue; let p = false; for (const [nc, nr] of [[c-1,r],[c+1,r],[c,r-1],[c,r+1]]) { if (nc < 0 || nr < 0 || nc >= co || nr >= ro || !ins.has(nc + "," + nr)) { p = true; break; } } cells.push({ col: c, row: r, key: c + "," + r, perimeter: p, type: "open", roomId: null, deptId: null }); } return cells; }

function cellMap(cells) { const m = {}; cells.forEach(c => { m[c.key] = c; }); return m; }
function n4(c, r) { return [[c-1,r],[c+1,r],[c,r-1],[c,r+1]]; }

// Generate default corridor segments from typology
// totalProgramCells: total cells needed for all rooms (non-core) so corridor is right-sized
function defaultCorridorSegments(typ, co, ro, totalProgramCells) {
  const mr = Math.floor(ro / 2), mc = Math.floor(co / 2);
  let id = 1;
  const segs = [];
  if (typ === "double-loaded") {
    // Right-size corridor: rooms load on both sides, depth per side = floor((ro - 1) / 2)
    const depthPerSide = Math.floor((ro - 1) / 2);
    const neededLen = totalProgramCells > 0 && depthPerSide > 0
      ? Math.min(co, Math.max(6, Math.ceil(totalProgramCells / (2 * depthPerSide)) + 2))
      : co;
    const x0 = Math.max(0, Math.floor((co - neededLen) / 2));
    const x1 = Math.min(co - 1, x0 + neededLen - 1);
    segs.push({ id: id++, x1: x0, y1: mr, x2: x1, y2: mr, width: 1, nodeType1: "passage", nodeType2: "passage" });
  } else if (typ === "central-core") {
    const depthPerSide = Math.floor((ro - 1) / 2);
    const neededLen = totalProgramCells > 0 && depthPerSide > 0
      ? Math.min(co, Math.max(6, Math.ceil(totalProgramCells / (2 * depthPerSide)) + 2))
      : co;
    const x0 = Math.max(0, Math.floor((co - neededLen) / 2));
    const x1 = Math.min(co - 1, x0 + neededLen - 1);
    segs.push({ id: id++, x1: x0, y1: mr, x2: x1, y2: mr, width: 1, nodeType1: "passage", nodeType2: "passage" });
    const vLen = Math.min(ro, Math.max(4, Math.ceil(neededLen * 0.6)));
    const y0 = Math.max(0, Math.floor((ro - vLen) / 2));
    const y1v = Math.min(ro - 1, y0 + vLen - 1);
    segs.push({ id: id++, x1: mc, y1: y0, x2: mc, y2: y1v, width: 1, nodeType1: "passage", nodeType2: "passage" });
  }
  return segs;
}

// Get unique corridor nodes from segments
function getCorridorNodes(segs) {
  const nodeMap = {};
  segs.forEach(s => {
    const k1 = s.x1 + "," + s.y1;
    const k2 = s.x2 + "," + s.y2;
    if (!nodeMap[k1]) nodeMap[k1] = { x: s.x1, y: s.y1, type: s.nodeType1 || "passage", segIds: [] };
    if (!nodeMap[k2]) nodeMap[k2] = { x: s.x2, y: s.y2, type: s.nodeType2 || "passage", segIds: [] };
    nodeMap[k1].segIds.push(s.id);
    nodeMap[k2].segIds.push(s.id);
  });
  return Object.values(nodeMap);
}

// Paint corridor cells from segments
function layCorridorFromSegments(cells, segs) {
  for (const seg of segs) {
    const dx = seg.x2 - seg.x1;
    const dy = seg.y2 - seg.y1;
    const steps = Math.max(Math.abs(dx), Math.abs(dy));
    if (steps === 0) continue;
    const sx = dx / steps, sy = dy / steps;
    const hw = Math.floor((seg.width || 1) / 2);
    for (let i = 0; i <= steps; i++) {
      const cx = Math.round(seg.x1 + sx * i);
      const cy = Math.round(seg.y1 + sy * i);
      // Paint corridor cells with width
      for (let ow = -hw; ow <= hw; ow++) {
        for (const c of cells) {
          // For horizontal segments, widen vertically; for vertical, widen horizontally
          const isHoriz = Math.abs(dx) >= Math.abs(dy);
          const matchCol = isHoriz ? c.col === cx && c.row === cy + ow : c.col === cx + ow && c.row === cy;
          if (matchCol && c.type === "open") {
            c.type = "corridor";
          }
        }
      }
    }
    // Also widen at endpoints based on node type
    for (const [nx, ny, nt] of [[seg.x1, seg.y1, seg.nodeType1], [seg.x2, seg.y2, seg.nodeType2]]) {
      const extra = nt === "lobby" ? 1 : 0;
      if (extra > 0) {
        for (const c of cells) {
          if (Math.abs(c.col - nx) <= extra && Math.abs(c.row - ny) <= extra && c.type === "open") {
            c.type = "corridor";
          }
        }
      }
    }
  }
  return cells;
}

function layCorridor(cells, typ, co, ro, totalProgramCells) { const segs = defaultCorridorSegments(typ, co, ro, totalProgramCells); return layCorridorFromSegments(cells, segs); }

function findEntry(cells) { let mx = -1; for (const c of cells) if (c.type !== "corridor" && c.row > mx) mx = c.row; return mx; }

function placeCores(cells, coreRooms, co, ro) {
  const cc = cells.filter(c => c.type === "corridor");
  if (!cc.length) return cells;
  const cm = cellMap(cells);

  // Find corridor endpoints (leftmost + rightmost corridor cells) and midpoint
  const sorted = [...cc].sort((a, b) => a.col - b.col || a.row - b.row);
  const endL = sorted[0];
  const endR = sorted[sorted.length - 1];
  const midCol = Math.round((endL.col + endR.col) / 2);
  const midRow = Math.round((endL.row + endR.row) / 2);
  const midCell = cc.reduce((best, c) => {
    const d = Math.abs(c.col - midCol) + Math.abs(c.row - midRow);
    return d < best.d ? { c, d } : best;
  }, { c: cc[0], d: Infinity }).c;

  // Place a core block adjacent to an anchor corridor cell
  const placeAt = (anchor, room) => {
    const offsets = [
      [0, -1], [0, 1], [-1, 0], [1, 0],          // directly adjacent
      [0, -2], [0, 2], [-2, 0], [2, 0],           // one gap
      [1, -1], [-1, -1], [1, 1], [-1, 1],         // diagonal
    ];
    for (const [dc, dr] of offsets) {
      const k = (anchor.col + dc) + "," + (anchor.row + dr);

function engineToRooms(plan, prog, corrSegs) {

  const roomDB = {};
  prog.rooms.forEach(r => { roomDB[r.name] = r; });

function rectsOverlap(a, b) { return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y; }

function resolveCollisions(rooms, movedIdx) {
  let rs = rooms.map(r => ({ ...r }));
  for (let it = 0; it < 30; it++) {
    let any = false;
    for (let i = 0; i < rs.length; i++) for (let j = i + 1; j < rs.length; j++) {
      if (!rectsOverlap(rs[i], rs[j])) continue;
      any = true;
      const ox = Math.min(rs[i].x + rs[i].w, rs[j].x + rs[j].w) - Math.max(rs[i].x, rs[j].x);
      const oy = Math.min(rs[i].y + rs[i].h, rs[j].y + rs[j].h) - Math.max(rs[i].y, rs[j].y);
      const pu = i === movedIdx ? j : j === movedIdx ? i : j;
      const ot = pu === j ? i : j;
      if (rs[pu].fixed) continue;
      // Push exactly the overlap so rooms end up touching, not separated
      if (ox <= oy) {
        const d = (rs[pu].x + rs[pu].w / 2) >= (rs[ot].x + rs[ot].w / 2) ? 1 : -1;
        rs[pu] = { ...rs[pu], x: rs[pu].x + ox * d };
      } else {
        const d = (rs[pu].y + rs[pu].h / 2) >= (rs[ot].y + rs[ot].h / 2) ? 1 : -1;
        rs[pu] = { ...rs[pu], y: rs[pu].y + oy * d };

    }
    if (!any) break;
  }

function computeScatteredLayout(programKey, targetSF) {
  const pr = PROGRAMS[programKey];
  if (!pr) return { rooms: [], co: 20, ro: 16 };
  const depts = pr.deptOrder;
  const n = depts.length;

  // Estimate grid size based on target SF
  const tc = Math.round((targetSF * pr.grossing) / 350);
  const baseCo = Math.max(10, Math.round(Math.sqrt(tc * 1.5)));
  const baseRo = Math.max(8, Math.round(tc / baseCo));
  // Spread groups across a larger area
  const cx = baseCo * 0.9, cy = baseRo * 0.9;
  const groupR = Math.min(baseCo, baseRo) * 0.6;

  const angleStep = (2 * Math.PI) / n;
  const allRooms = [];

  depts.forEach((dept, di) => {
    const angle = di * angleStep - Math.PI / 2;
    const gcx = cx + Math.cos(angle) * groupR;
    const gcy = cy + Math.sin(angle) * groupR;
    const deptRooms = pr.rooms.filter(r => r.dept === dept.n);

    // Layout rooms in a loose cluster
    let ox = 0, oy = 0, rowH = 0;
    const maxW = Math.ceil(Math.sqrt(deptRooms.length)) * 5 + 4;

    deptRooms.forEach((room) => {
      const w = Math.max(room.minW || 2, Math.ceil(Math.sqrt(room.area)));
      const h = Math.max(room.minH || 2, Math.ceil(room.area / w));
      if (ox + w > maxW) { ox = 0; oy += rowH + 1; rowH = 0; }
      allRooms.push({
        name: room.name, dept: dept.n, color: dept.c,
        zone: room.zone, daylight: room.daylight || false,
        area: w * h, w, h,
        x: Math.round(gcx + ox - maxW / 2),
        y: Math.round(gcy + oy - 2),
        fixed: false,
      });
      ox += w + 1;
      rowH = Math.max(rowH, h);
    });
  });

  // Compute bounds
  let maxX = 0, maxY = 0;
  allRooms.forEach(r => { maxX = Math.max(maxX, r.x + r.w); maxY = Math.max(maxY, r.y + r.h); });
  return { rooms: allRooms, co: maxX + 4, ro: maxY + 4 };
}

  const zoomRef = useRef(1);
  const panRef = useRef({ x: 0, y: 0 });

  useEffect(() => { setMounted(true); }, []);
  const pr = PROGRAMS[type];
  const rng = pr ? pr.range : [10000, 200000];
  useEffect(() => { if (pr) setSf(pr.def); }, [type]);

  const openDd = () => {
    if (ddBtnRef.current) { const r = ddBtnRef.current.getBoundingClientRect(); setDdPos({ top: r.bottom + 4, left: r.left, width: r.width }); }
    setDdOpen(o => !o);
  };

  // Keep refs in sync with state
  useEffect(() => { zoomRef.current = zoom; }, [zoom]);
  useEffect(() => { panRef.current = pan; }, [pan]);

  // ─── PARCEL FETCH ───
  const doFetchParcel = async () => {
    if (!address.trim()) return;
    setParcelLoading(true); setParcelError(null);
    try {
      const data = await fetchParcel(address.trim());
      setParcelData(data);
    } catch (e) {
      setParcelError(e.message || "Parcel not found");
      setParcelData(null);
    }
    setParcelLoading(false);
  };

  // ─── PDF EXPORT ───
  const doExportPDF = () => {
    if (!rooms.length || !planMeta) return;
    exportPDF(rooms, planMeta, sf, type, cFt, parcelData, corrSegs);
  };

  const doShowProgram = () => {
    if (!type) return;
    const pr2 = PROGRAMS[type];
    const { rooms: scRooms, co, ro } = computeScatteredLayout(type, sf);
    setRooms(scRooms);
    setCorrSegs([]);

    // Compute adjacency edges from program data
    const adjEdges = [];
    const seen = new Set();
    pr2.rooms.forEach(room => {
      (room.adj || []).forEach(adjName => {
        const key = [room.name, adjName].sort().join("--");
        if (!seen.has(key)) { seen.add(key); adjEdges.push({ a: room.name, b: adjName, key, met: false }); }
      });
    });

    const cellFt = Math.sqrt((sf * pr2.grossing) / (co * ro));
    setPlanMeta({ adjE: adjEdges, score: 0, co, ro, typology: pr2.typology, cellFt });
    setReveal(0); setShowAdj(true);
    setAnimPhase("scattered");
    setScr("plan");
    setZoom(1); setPan({ x: 0, y: 0 });
    setCollapsed({}); setEditMode("rooms"); setActiveNode(null); setAddingSeg(null); setActive(null);

    // Staggered reveal
    scRooms.forEach((_, i) => setTimeout(() => setReveal(r => r + 1), 40 * i + 100));

    // Fit to scattered layout after reveal starts
    setTimeout(() => {
      const el = canvasRef.current;
      if (el) {
        const rect = el.getBoundingClientRect();
        const pw = (co + 2) * G, ph = (ro + 2) * G;
        const pad = 60;
        const zx = (rect.width - pad * 2) / pw;
        const zy = (rect.height - pad * 2) / ph;
        const nz = Math.min(zx, zy, 1.8);
        setPan({ x: (rect.width - pw * nz) / 2, y: (rect.height - ph * nz) / 2 });
        setZoom(nz);
      }
    }, 50);
  };

  const doGeneratePlan = () => {
    // Store scattered positions for animation
    const scattered = {};
    rooms.forEach(r => { scattered[r.name] = { x: r.x, y: r.y, w: r.w, h: r.h }; });
    scatteredRef.current = scattered;

    // Run engine
    const plan = generatePlan(type, site, sf, null);
    if (plan) {
      const usedSegs = plan.segs;
      setCorrSegs(usedSegs);
      setCorrNextId(Math.max(10, ...usedSegs.map(s => s.id)) + 1);
      const rms = engineToRooms(plan, PROGRAMS[type], usedSegs);
      setRooms(rms);
      const totalBoundaryCells = plan.cells.length;
      const cellSF = (sf * PROGRAMS[type].grossing) / totalBoundaryCells;
      const cellFt = Math.sqrt(cellSF);
      setPlanMeta({ adjE: plan.adjE, score: plan.planScore, co: plan.co, ro: plan.ro, typology: plan.typology, cellFt });
      setReveal(rms.length);
      setAnimPhase("assembling");
      setCollapsed({}); setEditMode("rooms"); setActiveNode(null); setAddingSeg(null);
    }
  };

  // Animation phase transitions: assembling → assembled → null
  useEffect(() => {
    if (animPhase === "assembling") {
      const raf = requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          // Zoom to fit plan during animation
          const el = canvasRef.current;
          if (el && planMeta) {
            const rect = el.getBoundingClientRect();
            const pw = (planMeta.co + 2) * G, ph = (planMeta.ro + 2) * G;
            const pad = 60;
            const zx = (rect.width - pad * 2) / pw;
            const zy = (rect.height - pad * 2) / ph;
            const nz = Math.min(zx, zy, 2);
            setPan({ x: (rect.width - pw * nz) / 2, y: (rect.height - ph * nz) / 2 });
            setZoom(nz);
          }
          setAnimPhase("assembled");
        });
      });
      return () => cancelAnimationFrame(raf);
    }
    if (animPhase === "assembled") {
      const timer = setTimeout(() => setAnimPhase(null), 1800);
      return () => clearTimeout(timer);
    }
  }, [animPhase]);

  const doGenerate = (useExistingCorr) => {
    if (!type) return;
    setScr("gen"); setProg(0);
    let s = 0;
    const iv = setInterval(() => {
      s++; setProg(s / 28);
      if (s >= 28) {
        clearInterval(iv);
        // Use existing corridor segments if regenerating, otherwise generate defaults
        const segsToUse = useExistingCorr && corrSegs.length > 0 ? corrSegs : null;
        const plan = generatePlan(type, site, sf, segsToUse);
        if (plan) {
          const usedSegs = plan.segs;
          setCorrSegs(usedSegs);
          setCorrNextId(Math.max(10, ...usedSegs.map(s => s.id)) + 1);
          const rms = engineToRooms(plan, PROGRAMS[type], usedSegs);
          setRooms(rms);
          const totalBoundaryCells = plan.cells.length;
          const cellSF = (sf * PROGRAMS[type].grossing) / totalBoundaryCells;
          const cellFt = Math.sqrt(cellSF);
          setPlanMeta({ adjE: plan.adjE, score: plan.planScore, co: plan.co, ro: plan.ro, typology: plan.typology, cellFt });
          setReveal(0); setScr("plan"); setZoom(1); setPan({ x: 0, y: 0 });
          setCollapsed({}); setEditMode("rooms"); setActiveNode(null); setAddingSeg(null);
          rms.forEach((_, i) => setTimeout(() => setReveal(r => r + 1), 50 * i + 100));
        }
      }
    }, 36);
  };

  // Regenerate rooms only (keep corridor, re-run engine)
  const regenWithCorridor = () => {
    if (!type || !planMeta) return;
    const plan = generatePlan(type, site, sf, corrSegs);
    if (plan) {
      const rms = engineToRooms(plan, PROGRAMS[type], corrSegs);
      setRooms(rms);
      const totalBoundaryCells = plan.cells.length;
      const cellSF = (sf * PROGRAMS[type].grossing) / totalBoundaryCells;
      const cellFt = Math.sqrt(cellSF);
      setPlanMeta({ adjE: plan.adjE, score: plan.planScore, co: planMeta.co, ro: planMeta.ro, typology: plan.typology, cellFt });
      setReveal(0); rms.forEach((_, i) => setTimeout(() => setReveal(r => r + 1), 30 * i + 50));
    }
  };

  // ─── DRAG / RESIZE HANDLERS ───
  const onBodyDown = (idx, e) => {
    if (rooms[idx].fixed) return;
    if (touchCountRef.current >= 2) return; // pinch in progress, don't drag
    e.preventDefault(); e.stopPropagation();
    e.target.setPointerCapture(e.pointerId);
    setActive(idx);
    modeRef.current = { type: "pending", idx, sx: e.clientX, sy: e.clientY, ox: rooms[idx].x, oy: rooms[idx].y };
  };

  const onHandleDown = (idx, corner, e) => {
    if (rooms[idx].fixed) return;
    if (touchCountRef.current >= 2) return; // pinch in progress, don't resize
    e.preventDefault(); e.stopPropagation();
    e.target.setPointerCapture(e.pointerId);
    const r = rooms[idx];
    modeRef.current = { type: "resize", idx, corner, sx: e.clientX, sy: e.clientY, ow: r.w, oh: r.h, area: r.area || r.w * r.h, ox: r.x, oy: r.y };
  };

  useEffect(() => {
    const onMove = (e) => {
      const m = modeRef.current;
      if (!m) return;
      // Cancel drag/resize if a second finger arrived (pinch-to-zoom)
      if (touchCountRef.current >= 2) {
        if (m.type === "pending" || m.type === "drag" || m.type === "resize") {
          // Restore original position if drag was in progress
          if (m.type === "drag") {
            setRooms(p => { const c = [...p]; c[m.idx] = { ...c[m.idx], x: m.ox, y: m.oy }; return c; });
          }
          modeRef.current = null;
        }
        return;
      }
      if (m.type === "pending") {
        if (Math.abs(e.clientX - m.sx) + Math.abs(e.clientY - m.sy) > 4) modeRef.current = { ...m, type: "drag" };
        else return;
      }
      const z = zoomRef.current;
      if (modeRef.current.type === "drag") {
        const dx = (e.clientX - m.sx) / (G * z), dy = (e.clientY - m.sy) / (G * z);
        setRooms(p => { const c = [...p]; c[m.idx] = { ...c[m.idx], x: Math.round(m.ox + dx), y: Math.round(m.oy + dy) }; return c; });
      }
      if (modeRef.current.type === "resize") {
        const dxC = (e.clientX - m.sx) / (G * z);
        // Allow approximate area-preserving shapes (within ±20%)
        const targetArea = m.area;
        const valid = [];
        for (let tw = 2; tw <= targetArea; tw++) {
          const th = Math.round(targetArea / tw);
          if (th < 2) continue;
          if (tw * th < targetArea * 0.8 || tw * th > targetArea * 1.2) continue;
          valid.push({ w: tw, h: th, a: tw * th });
        }
        if (!valid.length) return;
        let targetW = (m.corner === "br" || m.corner === "tr") ? m.ow + dxC : m.ow - dxC;
        let best = valid[0], bestD = Math.abs(targetW - best.w);
        for (const v of valid) { const d = Math.abs(targetW - v.w); if (d < bestD) { best = v; bestD = d; } }
        let nx, ny;
        if (m.corner === "br") { nx = m.ox; ny = m.oy; }
        else if (m.corner === "bl") { nx = m.ox + (m.ow - best.w); ny = m.oy; }
        else if (m.corner === "tr") { nx = m.ox; ny = m.oy + (m.oh - best.h); }
        else { nx = m.ox + (m.ow - best.w); ny = m.oy + (m.oh - best.h); }
        setRooms(p => { const c = [...p]; c[m.idx] = { ...c[m.idx], w: best.w, h: best.h, area: best.a, x: nx, y: ny }; return c; });
      }
    };
    const onUp = () => {
      const m = modeRef.current;
      if (m && (m.type === "drag" || m.type === "resize")) setRooms(p => resolveCollisions(p, m.idx));
      modeRef.current = null;
    };
    window.addEventListener("pointermove", onMove);
    window.addEventListener("pointerup", onUp);
    return () => { window.removeEventListener("pointermove", onMove); window.removeEventListener("pointerup", onUp); };
  }, []);

  // ─── CORRIDOR NODE DRAG ───
  useEffect(() => {
    const onCorrMove = (e) => {
      const m = corrNodeMode.current;
      if (!m) return;
      if (touchCountRef.current >= 2) { corrNodeMode.current = null; return; } // cancel during pinch
      const z = zoomRef.current;
      const dx = (e.clientX - m.sx) / (G * z);
      const dy = (e.clientY - m.sy) / (G * z);

      if (m.type === "pending") {
        if (Math.abs(dx) + Math.abs(dy) > 0.8) {
          corrNodeMode.current = { ...m, type: "drag" };
        } else return;
      }

      if (m.type === "drag") {
        const rawX = Math.round(m.ox + dx);
        const rawY = Math.round(m.oy + dy);
        setCorrSegs(prev => prev.map(s => {
          const ns = { ...s };
          if (s.x1 === m.lastX && s.y1 === m.lastY) { ns.x1 = rawX; ns.y1 = rawY; }
          if (s.x2 === m.lastX && s.y2 === m.lastY) { ns.x2 = rawX; ns.y2 = rawY; }
          return ns;
        }));
        corrNodeMode.current.lastX = rawX;
        corrNodeMode.current.lastY = rawY;
        setActiveNode(rawX + "," + rawY);
      }
    };

    const onCorrUp = () => {
      const m = corrNodeMode.current;
      if (m && m.type === "pending") setActiveNode(m.nk);
      corrNodeMode.current = null;
    };

    window.addEventListener("pointermove", onCorrMove);
    window.addEventListener("pointerup", onCorrUp);
    return () => { window.removeEventListener("pointermove", onCorrMove); window.removeEventListener("pointerup", onCorrUp); };
  }, []);

  // ─── ADD SEGMENT: double-click canvas in corridor mode from active node ───
  const handleCorrCanvasClick = useCallback((e) => {
    if (editMode !== "corridor" || !activeNode) return;
    if (e.detail !== 2) return; // only on double-click
    const rect = canvasRef.current.getBoundingClientRect();
    const z = zoomRef.current;
    const p = panRef.current;
    const rawX = (e.clientX - rect.left - p.x - 24) / (G * z);
    const rawY = (e.clientY - rect.top - p.y - 24) / (G * z);
    const gx = Math.round(rawX);
    const gy = Math.round(rawY);
    const [anx, any] = activeNode.split(",").map(Number);
    if (Math.abs(gx - anx) + Math.abs(gy - any) < 2) return;
    // Snap to H or V
    let tx, ty;
    if (Math.abs(gx - anx) >= Math.abs(gy - any)) { tx = gx; ty = any; }
    else { tx = anx; ty = gy; }
    const newId = corrNextId;
    setCorrNextId(newId + 1);
    setCorrSegs(prev => [...prev, { id: newId, x1: anx, y1: any, x2: tx, y2: ty, width: 1, nodeType1: "passage", nodeType2: "passage" }]);
    setActiveNode(tx + "," + ty);
  }, [editMode, activeNode, corrNextId]);
  const handleWheel = useCallback((e) => {
    e.preventDefault();
    // Pinch-zoom on trackpad fires with ctrlKey + small deltaY
    // Regular scroll wheel fires without ctrlKey + larger deltaY
    // We handle both the same way — deltaY controls zoom
    const rect = canvasRef.current.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const oldZ = zoomRef.current;
    const delta = e.ctrlKey ? e.deltaY * 0.01 : e.deltaY * 0.003;
    const newZ = Math.min(5, Math.max(0.2, oldZ - delta));
    // Zoom toward cursor position
    const scale = newZ / oldZ;
    const newPx = mx - (mx - panRef.current.x) * scale;
    const newPy = my - (my - panRef.current.y) * scale;
    setZoom(newZ);
    setPan({ x: newPx, y: newPy });
  }, []);

  // ─── PAN: click+drag on empty canvas, or two-finger drag on touch ───
  const handleCanvasPointerDown = useCallback((e) => {
    if (touchCountRef.current >= 2) return; // pinch in progress, don't start pan
    // Only start pan if clicking empty canvas (not a room)
    if (e.target === canvasRef.current || e.target.classList.contains("canvas-bg")) {
      setActive(null);
      // Start pan gesture
      gestureRef.current = { type: "pan", sx: e.clientX, sy: e.clientY, px: panRef.current.x, py: panRef.current.y };
      canvasRef.current.setPointerCapture(e.pointerId);
    }
  }, []);

  const handleCanvasPointerMove = useCallback((e) => {
    const g = gestureRef.current;
    if (!g || g.type !== "pan") return;
    if (touchCountRef.current >= 2) { gestureRef.current = null; return; } // cancel pan during pinch
    setPan({
      x: g.px + (e.clientX - g.sx),
      y: g.py + (e.clientY - g.sy),
    });
  }, []);

  const handleCanvasPointerUp = useCallback(() => {
    gestureRef.current = null;
  }, []);

  // ─── TOUCH: pinch-to-zoom (iPhone/iPad) ───
  useEffect(() => {
    const el = canvasRef.current;
    if (!el) return;

    let lastTouchDist = null;
    let lastTouchCenter = null;
    let lastZoom = null;
    let lastPan = null;

    const getTouchDist = (t) => {
      const dx = t[0].clientX - t[1].clientX;
      const dy = t[0].clientY - t[1].clientY;
      return Math.sqrt(dx * dx + dy * dy);
    };
    const getTouchCenter = (t) => ({
      x: (t[0].clientX + t[1].clientX) / 2,
      y: (t[0].clientY + t[1].clientY) / 2,
    });

    const onTouchStart = (e) => {
      touchCountRef.current = e.touches.length;
      if (e.touches.length === 2) {
        e.preventDefault();
        // Cancel any in-progress block drag/resize or canvas pan
        if (modeRef.current) {
          if (modeRef.current.type === "drag") {
            setRooms(p => { const c = [...p]; const m = modeRef.current; c[m.idx] = { ...c[m.idx], x: m.ox, y: m.oy }; return c; });
          }
          modeRef.current = null;
        }
        gestureRef.current = null;
        lastTouchDist = getTouchDist(e.touches);
        lastTouchCenter = getTouchCenter(e.touches);
        lastZoom = zoomRef.current;
        lastPan = { ...panRef.current };
      }
    };

    const onTouchMove = (e) => {
      touchCountRef.current = e.touches.length;
      if (e.touches.length === 2 && lastTouchDist !== null) {
        e.preventDefault();
        const dist = getTouchDist(e.touches);
        const center = getTouchCenter(e.touches);
        const rect = el.getBoundingClientRect();
        const mx = center.x - rect.left;
        const my = center.y - rect.top;

        // Zoom
        const scale = dist / lastTouchDist;
        const newZ = Math.min(5, Math.max(0.2, lastZoom * scale));
        const zScale = newZ / lastZoom;

        // Pan (zoom toward center + translate)
        const newPx = mx - (mx - lastPan.x) * zScale + (center.x - lastTouchCenter.x);
        const newPy = my - (my - lastPan.y) * zScale + (center.y - lastTouchCenter.y);

        setZoom(newZ);
        setPan({ x: newPx, y: newPy });
      }
    };

    const onTouchEnd = (e) => {
      touchCountRef.current = e.touches.length;
      lastTouchDist = null;
      lastTouchCenter = null;
      lastZoom = null;
      lastPan = null;
    };

    el.addEventListener("touchstart", onTouchStart, { passive: false });
    el.addEventListener("touchmove", onTouchMove, { passive: false });
    el.addEventListener("touchend", onTouchEnd);
    return () => {
      el.removeEventListener("touchstart", onTouchStart);
      el.removeEventListener("touchmove", onTouchMove);
      el.removeEventListener("touchend", onTouchEnd);
    };
  }, [scr]);

  // ─── BOTTOM BAR DRAG-TO-MINIMIZE ───
  useEffect(() => {
    const onMove = (e) => {
      const d = barDragRef.current;
      if (!d) return;
      const dy = d.sy - e.clientY; // dragging down = negative dy = shrink
      const newH = Math.max(36, Math.min(400, d.startH + dy));
      setBarH(newH);
      setBarMinimized(newH <= 44);
    };
    const onUp = () => { barDragRef.current = null; };
    window.addEventListener("pointermove", onMove);
    window.addEventListener("pointerup", onUp);
    return () => { window.removeEventListener("pointermove", onMove); window.removeEventListener("pointerup", onUp); };
  }, []);

  const onBarHandleDown = (e) => {
    e.preventDefault();
    barDragRef.current = { sy: e.clientY, startH: barH };
  };

  // ─── THEME ───
  const lbg = "#FAFAF8", lsf = "#FFFFFF", lbd = "#E0DDD8", lbd2 = "#F0EDE8";
  const lt1 = "#1A1A1A", lt2 = "#555555", lt3 = "#888888";
  const pct = sf > rng[0] ? ((sf - rng[0]) / (rng[1] - rng[0])) * 100 : 0;
  const sgrid = { backgroundImage: "linear-gradient(" + lbd2 + " 1px, transparent 1px), linear-gradient(90deg, " + lbd2 + " 1px, transparent 1px)", backgroundSize: "36px 36px" };
  const fontLink = <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Space+Mono&display=swap" rel="stylesheet" />;

  // ─── UNIT CONVERSION HELPERS ───
  const cFt = planMeta ? planMeta.cellFt : 18.7; // feet per cell side (fallback ~sqrt(350))
  const FT_TO_M = 0.3048;
  const fmtFt = (ft) => Math.round(ft).toLocaleString();
  const fmtM = (ft) => (ft * FT_TO_M).toFixed(1);
  const fmtSF = (sfVal) => Math.round(sfVal).toLocaleString();
  const fmtSM = (sfVal) => Math.round(sfVal * FT_TO_M * FT_TO_M).toLocaleString();
  const dimFt = (cells) => fmtFt(cells * cFt);
  const dimM = (cells) => fmtM(cells * cFt);
  const areaSF = (cellArea) => fmtSF(cellArea * cFt * cFt);
  const areaSM = (cellArea) => fmtSM(cellArea * cFt * cFt);

  // ═══ SETUP ═══
  if (scr === "setup") return (
    <div style={{ minHeight: "100vh", background: lbg, color: lt1, fontFamily: f1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 24, ...sgrid }} onClick={() => { if (ddOpen) setDdOpen(false); }}>
      {fontLink}
      <Fade i={0} show={mounted}><div style={{ textAlign: "center", marginBottom: 40 }}>
        <div style={{ fontFamily: f2, fontSize: 9, color: lt3, textTransform: "uppercase", letterSpacing: "0.25em", marginBottom: 10 }}>Build Your Plan</div>
        <h1 style={{ fontFamily: f1, fontWeight: 300, fontSize: 38, textTransform: "uppercase", letterSpacing: "0.08em", margin: 0 }}>CALVEY {"\u00B7"} PARTI</h1>
        <div style={{ width: 36, height: 1, background: ac, margin: "14px auto 0" }} />
      </div></Fade>
      <Fade i={1} show={mounted}><div style={{ width: "100%", maxWidth: 480, marginBottom: 32 }}>
        <div style={{ fontFamily: f2, fontSize: 9, color: ac, textTransform: "uppercase", letterSpacing: "0.15em", marginBottom: 10 }}>01 &nbsp;Building Type</div>
        <button ref={ddBtnRef} onClick={e => { e.stopPropagation(); openDd(); }} style={{ width: "100%", background: lsf, border: "1px solid " + (ddOpen ? ac : lbd), borderRadius: 10, padding: "12px 16px", color: type ? lt1 : lt3, fontFamily: f1, fontSize: 16, fontWeight: 300, cursor: "pointer", textAlign: "left", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <span>{type ? (pr.icon + "  " + type) : "Select building type..."}</span>
          <span style={{ fontSize: 10, color: lt3, transform: ddOpen ? "rotate(180deg)" : "", transition: "transform 0.25s", display: "inline-block" }}>{"\u25BC"}</span>
        </button>
      </div></Fade>
      <Fade i={2} show={mounted}><div style={{ width: "100%", maxWidth: 480, marginBottom: 40 }}>
        <div style={{ fontFamily: f2, fontSize: 9, color: ac, textTransform: "uppercase", letterSpacing: "0.15em", marginBottom: 10 }}>02 &nbsp;Building Size</div>
        <div style={{ background: lsf, border: "1px solid " + lbd, borderRadius: 10, padding: "16px 18px" }}>

            <div style={{ fontFamily: f1, fontSize: 28, fontWeight: 300 }}>{sf.toLocaleString()} SF</div>

            <div style={{ position: "absolute", left: pct + "%", width: 16, height: 16, borderRadius: "50%", background: ac, border: "2px solid " + lbg, transform: "translateX(-50%)", boxShadow: "0 0 10px " + ac + "55", pointerEvents: "none" }} />

          <div style={{ display: "flex", justifyContent: "space-between", marginTop: 8 }}>
            <span style={{ fontFamily: f2, fontSize: 7, color: lt3 }}>{rng[0].toLocaleString()} SF ({fmtSM(rng[0])} m{"\u00B2"})</span>
            <span style={{ fontFamily: f2, fontSize: 7, color: lt3 }}>{rng[1].toLocaleString()} SF ({fmtSM(rng[1])} m{"\u00B2"})</span>

      </div></Fade>
      <Fade i={3} show={mounted}>
        <button onClick={doShowProgram} disabled={!type} style={{ fontFamily: f2, fontSize: 10, textTransform: "uppercase", letterSpacing: "0.2em", background: type ? ac : lbd, color: type ? "#FAFAF8" : lt3, border: "none", borderRadius: 10, padding: "14px 44px", cursor: type ? "pointer" : "not-allowed", boxShadow: type ? "0 4px 20px " + ac + "44" : "none" }}>Generate</button>
      </Fade>
      {ddOpen && (<>
        <div onClick={() => setDdOpen(false)} style={{ position: "fixed", inset: 0, zIndex: 9998 }} />
        <div style={{ position: "fixed", top: ddPos.top, left: ddPos.left, width: ddPos.width, background: lsf, border: "1px solid " + lbd, borderRadius: 10, boxShadow: "0 12px 40px rgba(0,0,0,0.15)", overflow: "hidden", zIndex: 9999, maxHeight: 320, overflowY: "auto" }}>
          {Object.entries(PROGRAMS).map(([k, v], i) => (
            <button key={k} onClick={() => { setType(k); setDdOpen(false); }} style={{ width: "100%", background: "transparent", border: "none", borderBottom: i < Object.keys(PROGRAMS).length - 1 ? "1px solid " + lbd : "none", padding: "10px 16px", color: lt1, fontFamily: f1, fontSize: 15, fontWeight: 300, cursor: "pointer", textAlign: "left", display: "flex", alignItems: "center", gap: 10 }}
              onMouseEnter={e => { e.currentTarget.style.background = lbd2; }} onMouseLeave={e => { e.currentTarget.style.background = "transparent"; }}>
              <span style={{ fontSize: 18 }}>{v.icon}</span>
              <div><div>{k}</div><div style={{ fontFamily: f2, fontSize: 7, color: lt3 }}>{v.range[0].toLocaleString()} {"\u2013"} {v.range[1].toLocaleString()} SF ({fmtSM(v.range[0])} {"\u2013"} {fmtSM(v.range[1])} m{"\u00B2"}) {"\u00B7"} {v.typology}</div></div>
            </button>
          ))}
        </div>
      </>)}
    </div>
  );

  // ═══ GENERATING ═══
  if (scr === "gen") return (
    <div style={{ minHeight: "100vh", background: lbg, color: lt1, fontFamily: f1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", ...sgrid }}>
      {fontLink}
      <div style={{ width: 48, height: 48, borderRadius: "50%", border: "2px solid " + lbd, borderTopColor: ac, margin: "0 auto 20px", animation: "spin 0.8s linear infinite" }} />
      <div style={{ fontSize: 22, fontWeight: 300, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 8 }}>Generating Plan</div>
      <div style={{ fontFamily: f2, fontSize: 8, color: lt3, textTransform: "uppercase", letterSpacing: "0.15em", marginBottom: 20 }}>{type} {"\u00B7"} {sf.toLocaleString()} SF ({fmtSM(sf)} m{"\u00B2"})</div>
      <div style={{ width: 160, height: 3, background: lbd, borderRadius: 2, overflow: "hidden" }}><div style={{ width: (prog * 100) + "%", height: "100%", background: ac }} /></div>
      <style>{"@keyframes spin{to{transform:rotate(360deg)}}"}</style>
    </div>
  );

  // ═══ PLAN VIEW — v7c ═══
  const depts = pr ? pr.deptOrder : [];
  // Compute grid bounds from actual room positions (not just engine grid)
  // SVG size — large enough for rooms to move freely
  let maxX = 0, maxY = 0;
  rooms.forEach(r => { maxX = Math.max(maxX, r.x + r.w); maxY = Math.max(maxY, r.y + r.h); });
  const gridW = Math.max(planMeta ? planMeta.co + 4 : 34, maxX + 4);
  const gridH = Math.max(planMeta ? planMeta.ro + 4 : 26, maxY + 4);
  const adjMet = planMeta ? planMeta.adjE.filter(e => e.met).length : 0;
  const adjTotal = planMeta ? planMeta.adjE.length : 0;

  // Active room data for properties panel
  const activeRoom = active !== null && rooms[active] ? rooms[active] : null;
  const activeSpec = activeRoom && pr ? pr.rooms.find(r => r.name === activeRoom.name) : null;

  // Adjacency partners for active room
  const activeAdj = activeSpec ? (activeSpec.adj || []) : [];
  const activeAdjMet = activeAdj.filter(an => {
    if (!planMeta) return false;
    return planMeta.adjE.some(e => e.met && (e.a === activeRoom.name && e.b === an || e.b === activeRoom.name && e.a === an));
  });

  const toggleDept = (dn) => setCollapsed(c => ({ ...c, [dn]: !c[dn] }));

  return (
    <div style={{ minHeight: "100vh", background: lbg, color: lt1, fontFamily: f1, display: "flex", flexDirection: "column" }}>
      {fontLink}
      {/* Toolbar */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "10px 16px", borderBottom: "1px solid " + lbd, background: lsf + "ee", backdropFilter: "blur(10px)", position: "sticky", top: 0, zIndex: 30, flexWrap: "wrap", gap: 8, transform: animPhase ? "translateY(-100%)" : "translateY(0)", opacity: animPhase ? 0 : 1, transition: "transform 0.6s ease 0.3s, opacity 0.5s ease 0.3s" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <button onClick={() => { setScr("setup"); setRooms([]); setActive(null); }} style={{ background: "none", border: "1px solid " + lbd, borderRadius: 7, padding: "5px 12px", color: lt2, fontFamily: f2, fontSize: 8, textTransform: "uppercase", letterSpacing: "0.1em", cursor: "pointer" }}>{"\u2190"} Back</button>
          <div>
            <div style={{ fontFamily: f2, fontSize: 7, color: lt3, textTransform: "uppercase", letterSpacing: "0.15em" }}>CALVEY PARTI v8</div>
            <div style={{ fontFamily: f1, fontSize: 15, fontWeight: 300 }}>{type}</div>
          </div>
        </div>
        <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
          {/* Edit mode toggle */}
          <div style={{ display: "flex", borderRadius: 6, overflow: "hidden", border: "1px solid " + lbd }}>
            <button onClick={() => setEditMode("rooms")} style={{ background: editMode === "rooms" ? ac + "18" : "transparent", border: "none", padding: "4px 10px", cursor: "pointer", fontFamily: f2, fontSize: 7, textTransform: "uppercase", color: editMode === "rooms" ? ac : lt3 }}>Rooms</button>
            <button onClick={() => setEditMode("corridor")} style={{ background: editMode === "corridor" ? corrColor + "30" : "transparent", border: "none", borderLeft: "1px solid " + lbd, padding: "4px 10px", cursor: "pointer", fontFamily: f2, fontSize: 7, textTransform: "uppercase", color: editMode === "corridor" ? corrColor : lt3 }}>Corridor</button>
          </div>
          <div style={{ width: 1, height: 22, background: lbd }} />
          <div style={{ textAlign: "right" }}><div style={{ fontFamily: f2, fontSize: 7, color: lt3, textTransform: "uppercase" }}>Area</div><div style={{ fontSize: 15, fontWeight: 300 }}>{sf.toLocaleString()} SF</div><div style={{ fontFamily: f2, fontSize: 6, color: lt3 }}>({fmtSM(sf)} m{"\u00B2"})</div></div>
          <div style={{ width: 1, height: 22, background: lbd }} />
          <div style={{ textAlign: "right" }}><div style={{ fontFamily: f2, fontSize: 7, color: lt3, textTransform: "uppercase" }}>Rooms</div><div style={{ fontSize: 15, fontWeight: 300 }}>{rooms.filter(r => !r.fixed).length}</div></div>
          <div style={{ width: 1, height: 22, background: lbd }} />
          {planMeta && <div style={{ textAlign: "right" }}><div style={{ fontFamily: f2, fontSize: 7, color: lt3, textTransform: "uppercase" }}>Adj</div><div style={{ fontSize: 14, fontWeight: 300, color: adjMet === adjTotal ? "#4D8F4D" : "#B07D4A" }}>{adjMet}/{adjTotal}</div></div>}
          <div style={{ width: 1, height: 22, background: lbd }} />
          <button onClick={() => setShowAdj(v => !v)} style={{ background: showAdj ? ac + "18" : "transparent", border: "1px solid " + (showAdj ? ac : lbd), borderRadius: 6, padding: "4px 8px", cursor: "pointer", fontFamily: f2, fontSize: 7, textTransform: "uppercase", color: showAdj ? ac : lt3 }}>adj</button>
          <button onClick={() => doGenerate(true)} style={{ background: ac + "18", border: "1px solid " + ac, borderRadius: 6, padding: "4px 8px", cursor: "pointer", fontFamily: f2, fontSize: 7, textTransform: "uppercase", color: ac }}>{"\u21BB"} regen</button>
          <button onClick={doExportPDF} style={{ background: "#4D8F4D18", border: "1px solid #4D8F4D", borderRadius: 6, padding: "4px 8px", cursor: "pointer", fontFamily: f2, fontSize: 7, textTransform: "uppercase", color: "#4D8F4D" }}>{"\u2193"} PDF</button>
          {/* Zoom controls */}
          <div style={{ width: 1, height: 22, background: lbd }} />
          <button onClick={() => setZoom(z => Math.min(4, z + 0.2))} style={{ background: "transparent", border: "1px solid " + lbd, borderRadius: 6, padding: "4px 8px", cursor: "pointer", fontFamily: f2, fontSize: 9, color: lt2, lineHeight: 1 }}>+</button>
          <div style={{ fontFamily: f2, fontSize: 7, color: lt3, minWidth: 32, textAlign: "center" }}>{Math.round(zoom * 100)}%</div>
          <button onClick={() => setZoom(z => Math.max(0.3, z - 0.2))} style={{ background: "transparent", border: "1px solid " + lbd, borderRadius: 6, padding: "4px 8px", cursor: "pointer", fontFamily: f2, fontSize: 9, color: lt2, lineHeight: 1 }}>{"\u2013"}</button>
          <button onClick={() => { setZoom(1); setPan({ x: 0, y: 0 }); }} style={{ background: "transparent", border: "1px solid " + lbd, borderRadius: 6, padding: "4px 8px", cursor: "pointer", fontFamily: f2, fontSize: 7, textTransform: "uppercase", color: lt3 }}>fit</button>
        </div>
      </div>

      {/* Canvas — zoomable and pannable (full width above bottom bar) */}
      <div ref={canvasRef}
        style={{ flex: 1, overflow: "hidden", position: "relative", cursor: gestureRef.current ? "grabbing" : "default", touchAction: "none" }}
        onWheel={handleWheel}
        onPointerDown={handleCanvasPointerDown}
        onPointerMove={handleCanvasPointerMove}
        onPointerUp={handleCanvasPointerUp}
        onClick={handleCorrCanvasClick}>
        {/* Grid background (fixed) */}
        <div className="canvas-bg" style={{ position: "absolute", inset: 0, backgroundImage: "linear-gradient(" + lbd2 + " 1px, transparent 1px), linear-gradient(90deg, " + lbd2 + " 1px, transparent 1px)", backgroundSize: (G * zoom) + "px " + (G * zoom) + "px", backgroundPosition: pan.x + "px " + pan.y + "px", pointerEvents: "none" }} />

        {/* Zoom hint */}
        {(animPhase === "scattered" || !animPhase) && <div style={{ position: "absolute", bottom: animPhase === "scattered" ? 80 : 10, right: 14, fontFamily: f2, fontSize: 6.5, color: lt3, textTransform: "uppercase", letterSpacing: "0.06em", pointerEvents: "none", zIndex: 5, background: lsf + "cc", padding: "3px 8px", borderRadius: 4 }}>
          Scroll to zoom {"\u00B7"} Drag to pan {"\u00B7"} Pinch on mobile
        </div>}

        <div style={{ transform: `translate(${pan.x}px, ${pan.y}px) scale(${zoom})`, transformOrigin: "0 0", padding: 24, transition: animPhase === "assembled" ? "transform 1.4s cubic-bezier(.22,1,.36,1)" : "none" }}>
          <svg width={gridW * G} height={gridH * G} style={{ display: "block", touchAction: "none", overflow: "visible" }}>

            {/* Parcel boundary overlay */}
            {parcelData && !animPhase && (() => {
              const pts = parcelData.parcelFt.map(([fx, fy]) => (fx / cFt * G) + "," + (fy / cFt * G));
              return <polygon points={pts.join(" ")} fill="none" stroke="#c9a959" strokeWidth={2} strokeDasharray="8,6" opacity={0.7} style={{ pointerEvents: "none" }} />;
            })()}

            {/* Adjacency lines */}
            {showAdj && (animPhase === "scattered" || !animPhase) && planMeta && planMeta.adjE.map(e => {
              const ra = rooms.find(r => r.name === e.a);
              const rb = rooms.find(r => r.name === e.b);
              if (!ra || !rb) return null;
              const ax = (ra.x + ra.w / 2) * G, ay = (ra.y + ra.h / 2) * G;
              const bx = (rb.x + rb.w / 2) * G, by = (rb.y + rb.h / 2) * G;
              return <line key={e.key} x1={ax} y1={ay} x2={bx} y2={by}
                stroke={e.met ? "#4D8F4D" : "#C45C3E"} strokeWidth={e.met ? 1.5 : 1}
                strokeDasharray={e.met ? "none" : "4,4"} opacity={0.35} />;
            })}

            {/* Room boxes */}
            {rooms.map((r, i) => {
              const vis = i < reveal;
              const isH = hov === r.name;
              const isA = active === i;
              const act = isH || isA;
              const isCorridor = r.zone === "corridor";
              const isCore = r.zone === "core";

              if (isCorridor) {
                return (
                  <rect key={i} x={r.x * G} y={r.y * G} width={r.w * G} height={r.h * G}
                    fill={corrColor} fillOpacity={0.18} stroke="none"
                    style={{ pointerEvents: "none", opacity: animPhase ? 0 : (vis ? 1 : 0), transition: "opacity 0.8s ease" }} />
                );
              }

              const opacity = isCore ? 0.5 : act ? 0.55 : 0.38;
              const roomIdx = rooms.slice(0, i).filter(r2 => r2.zone !== "corridor").length;

              // Scattered-to-plan animation
              const sc = scatteredRef.current[r.name];
              const planCX = ((r.x + r.w / 2) * G);
              const planCY = ((r.y + r.h / 2) * G);
              let gStyle;
              if ((animPhase === "assembling" || animPhase === "assembled") && sc) {
                const scCX = (sc.x + sc.w / 2) * G;
                const scCY = (sc.y + sc.h / 2) * G;
                const dx = scCX - planCX;
                const dy = scCY - planCY;
                const sx = sc.w / Math.max(r.w, 0.5);
                const sy = sc.h / Math.max(r.h, 0.5);
                if (animPhase === "assembling") {
                  gStyle = {
                    opacity: 1,
                    transform: "translate(" + dx + "px," + dy + "px) scale(" + sx + "," + sy + ")",
                    transformOrigin: planCX + "px " + planCY + "px",
                  };
                } else {
                  gStyle = {
                    opacity: 1,
                    transform: "translate(0,0) scale(1)",
                    transformOrigin: planCX + "px " + planCY + "px",
                    transition: "transform 1.4s cubic-bezier(.22,1,.36,1) " + (roomIdx * 25) + "ms",
                  };
                }
              } else {
                gStyle = {
                  opacity: vis ? 1 : 0,
                  transform: vis ? "scale(1)" : "scale(0.85)",
                  transformOrigin: planCX + "px " + planCY + "px",
                  transition: "opacity 0.3s ease " + (roomIdx * 20) + "ms, transform 0.4s cubic-bezier(.34,1.4,.64,1) " + (roomIdx * 20) + "ms",
                };
              }

              return (
                <g key={i} style={gStyle}
                  onMouseEnter={() => setHov(r.name)}
                  onMouseLeave={() => setHov(null)}>

                  <rect x={r.x * G} y={r.y * G} width={r.w * G} height={r.h * G} rx={5}
                    fill={r.color} fillOpacity={opacity}
                    stroke={r.color + (isA ? "cc" : act ? "99" : "55")}
                    strokeWidth={isA ? 2 : act ? 1.5 : 1}
                    style={{ cursor: r.fixed ? "default" : "grab", touchAction: "none", transition: "fill-opacity 0.15s" }}
                    onPointerDown={e => { if (!r.fixed) onBodyDown(i, e); else { e.stopPropagation(); setActive(i); } }} />

                  {r.w * G > 40 && r.h * G > 24 && (
                    <text x={r.x * G + 7} y={r.y * G + 14} fill={act ? "#fff" : r.color + "dd"}
                      style={{ fontFamily: f2, fontSize: 7, textTransform: "uppercase", letterSpacing: "0.04em", pointerEvents: "none", userSelect: "none" }}>
                      {r.name.length > Math.floor(r.w * G / 7) ? r.name.slice(0, Math.floor(r.w * G / 7) - 1) + "\u2026" : r.name}
                    </text>
                  )}
                  {r.w * G > 40 && r.h * G > 36 && (
                    <text x={r.x * G + 7} y={r.y * G + 24} fill="#ffffffaa"
                      style={{ fontFamily: f2, fontSize: 6, pointerEvents: "none", userSelect: "none" }}>
                      {dimFt(r.w) + "'\u00D7" + dimFt(r.h) + "'" + " \u00B7 " + areaSF(r.area) + " SF"}
                    </text>
                  )}

                  {isA && !r.fixed && [
                    { hx: r.x, hy: r.y, co: "tl" },
                    { hx: r.x + r.w, hy: r.y, co: "tr" },
                    { hx: r.x, hy: r.y + r.h, co: "bl" },
                    { hx: r.x + r.w, hy: r.y + r.h, co: "br" },
                  ].map(h => (
                    <circle key={h.co} cx={h.hx * G} cy={h.hy * G} r={12} fill="transparent"
                      style={{ cursor: h.co === "tl" || h.co === "br" ? "nwse-resize" : "nesw-resize", touchAction: "none" }}
                      onPointerDown={e => onHandleDown(i, h.co, e)} />
                  ))}
                  {isA && !r.fixed && [
                    { hx: r.x, hy: r.y, co: "tl" },
                    { hx: r.x + r.w, hy: r.y, co: "tr" },
                    { hx: r.x, hy: r.y + r.h, co: "bl" },
                    { hx: r.x + r.w, hy: r.y + r.h, co: "br" },
                  ].map(h => (
                    <g key={h.co + "v"} style={{ pointerEvents: "none" }}>
                      <circle cx={h.hx * G} cy={h.hy * G} r={6} fill={lsf} stroke={r.color} strokeWidth={1.5} style={{ filter: "drop-shadow(0 1px 2px rgba(0,0,0,0.12))" }} />
                      <circle cx={h.hx * G} cy={h.hy * G} r={2.5} fill={r.color} />
                    </g>
                  ))}
                </g>
              );
            })}

            {editMode === "corridor" && corrSegs.map(seg => {
              const x1p = seg.x1 * G, y1p = seg.y1 * G, x2p = seg.x2 * G, y2p = seg.y2 * G;
              return (
                <line key={"cs" + seg.id} x1={x1p} y1={y1p} x2={x2p} y2={y2p}
                  stroke={corrColor} strokeWidth={Math.max(2, seg.width * 3)} strokeLinecap="round" opacity={0.5} style={{ pointerEvents: "none" }} />
              );
            })}
            {editMode === "corridor" && (() => {
              const nodes = getCorridorNodes(corrSegs);
              return nodes.map((nd, ni) => {
                const nk = nd.x + "," + nd.y;
                const isAct = activeNode === nk;
                const isLobby = nd.type === "lobby";
                return (
                  <g key={"cn" + ni}>
                    <circle cx={nd.x * G} cy={nd.y * G} r={16} fill="transparent"
                      style={{ cursor: "grab", touchAction: "none" }}
                      onPointerDown={e => {
                        e.preventDefault(); e.stopPropagation();
                        e.target.setPointerCapture(e.pointerId);
                        setActiveNode(nk);
                        corrNodeMode.current = { type: "pending", nk, sx: e.clientX, sy: e.clientY, ox: nd.x, oy: nd.y, lastX: nd.x, lastY: nd.y, segIds: nd.segIds };
                      }} />
                    <circle cx={nd.x * G} cy={nd.y * G} r={isLobby ? 10 : 7}
                      fill={isAct ? corrColor : lsf} stroke={corrColor} strokeWidth={isAct ? 2.5 : 1.5}
                      style={{ pointerEvents: "none", filter: "drop-shadow(0 1px 3px rgba(0,0,0,0.15))" }} />
                    {isLobby && <circle cx={nd.x * G} cy={nd.y * G} r={4} fill={corrColor} style={{ pointerEvents: "none" }} />}
                    {!isLobby && <circle cx={nd.x * G} cy={nd.y * G} r={3} fill={corrColor} style={{ pointerEvents: "none" }} />}
                  </g>
                );
              });
            })()}
            {addingSeg && (
              <line x1={addingSeg.fromX * G} y1={addingSeg.fromY * G}
                x2={addingSeg.toX * G} y2={addingSeg.toY * G}
                stroke={corrColor} strokeWidth={3} strokeDasharray="6,4" opacity={0.6} style={{ pointerEvents: "none" }} />
            )}
          </svg>
        </div>

        {/* Scattered phase overlays: back button + GENERATE PLAN button */}
        {animPhase === "scattered" && (
          <>
            <div style={{ position: "absolute", top: 16, left: 16, zIndex: 10, display: "flex", alignItems: "center", gap: 12 }}>
              <button onClick={() => { setScr("setup"); setRooms([]); setActive(null); setAnimPhase(null); setPlanMeta(null); }} style={{ background: lsf + "ee", backdropFilter: "blur(10px)", border: "1px solid " + lbd, borderRadius: 7, padding: "5px 12px", color: lt2, fontFamily: f2, fontSize: 8, textTransform: "uppercase", letterSpacing: "0.1em", cursor: "pointer" }}>{"\u2190"} Back</button>
              <div>
                <div style={{ fontFamily: f2, fontSize: 7, color: lt3, textTransform: "uppercase", letterSpacing: "0.15em" }}>{type} {"\u00B7"} {sf.toLocaleString()} SF</div>
                <div style={{ fontFamily: f1, fontWeight: 300, fontSize: 16, textTransform: "uppercase", letterSpacing: "0.06em" }}>Program</div>
              </div>
            </div>
            <div style={{ position: "absolute", bottom: 32, left: "50%", transform: "translateX(-50%)", zIndex: 10 }}>
              <button onClick={doGeneratePlan} style={{
                fontFamily: f2, fontSize: 10, textTransform: "uppercase", letterSpacing: "0.2em",
                background: ac, color: "#FAFAF8", border: "none", borderRadius: 10,
                padding: "14px 44px", cursor: "pointer",
                boxShadow: "0 4px 20px " + ac + "44",

                Generate Plan
              </button>
            </div>
          </>
        )}
      </div>

      {/* Bottom Bar — drag handle to minimize, horizontal scroll */}
      <div style={{ height: animPhase ? 0 : barH, borderTop: animPhase ? "none" : "1px solid " + lbd, background: lsf, flexShrink: 0, display: "flex", flexDirection: "column", overflow: "hidden", opacity: animPhase ? 0 : 1, transition: barDragRef.current ? "none" : "height 0.5s ease 0.3s, opacity 0.5s ease 0.3s" }}>
        {/* Drag handle */}
        <div onPointerDown={onBarHandleDown}
          style={{ height: 12, cursor: "ns-resize", display: "flex", alignItems: "center", justifyContent: "center", background: lbd2, flexShrink: 0, userSelect: "none", touchAction: "none" }}>
          <div style={{ width: 32, height: 3, borderRadius: 2, background: lbd }} />
        </div>

        {/* Bar content — horizontal layout: properties left, program scrolls right */}
        <div style={{ flex: 1, display: "flex", overflow: "hidden", minHeight: 0 }}>
          {/* Properties Panel — pinned left */}
          {!barMinimized && <div style={{ width: 240, borderRight: "1px solid " + lbd, padding: "10px 12px", flexShrink: 0, overflowY: "auto" }}>
            <div style={{ fontFamily: f2, fontSize: 7, color: editMode === "corridor" ? corrColor : ac, textTransform: "uppercase", letterSpacing: "0.15em", marginBottom: 8 }}>
              {editMode === "corridor" ? "Corridor" : "Properties"}
            </div>
            {editMode === "corridor" ? (
              <div>
                <div style={{ fontFamily: f1, fontSize: 14, fontWeight: 300, color: lt1, marginBottom: 6 }}>{corrSegs.length} segment{corrSegs.length !== 1 ? "s" : ""}</div>
                {corrSegs.map((seg, si) => {
                  const isHoriz = Math.abs(seg.x2 - seg.x1) >= Math.abs(seg.y2 - seg.y1);
                  const len = Math.max(Math.abs(seg.x2 - seg.x1), Math.abs(seg.y2 - seg.y1)) + 1;
                  const nk1 = seg.x1 + "," + seg.y1, nk2 = seg.x2 + "," + seg.y2;
                  const isActive = activeNode === nk1 || activeNode === nk2;
                  return (
                    <div key={seg.id} style={{ padding: "4px 0 4px 8px", borderLeft: "2px solid " + (isActive ? corrColor : "transparent"), marginBottom: 2, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <div>
                        <div style={{ fontFamily: f2, fontSize: 7, color: isActive ? lt1 : lt2 }}>{isHoriz ? "Horizontal" : "Vertical"} {"\u00B7"} {dimFt(len)}{"'"}</div>
                        <div style={{ fontFamily: f2, fontSize: 6, color: lt3 }}>w{seg.width} {"\u00B7"} {seg.nodeType1}/{seg.nodeType2}</div>
                      </div>
                      <button onClick={() => {
                        const ns = corrSegs.filter(s => s.id !== seg.id);
                        setCorrSegs(ns);
                      }} style={{ background: "none", border: "none", color: "#C45C3E", fontFamily: f2, fontSize: 8, cursor: "pointer", padding: "2px 4px" }}>{"\u2715"}</button>
                    </div>
                  );
                })}
                {activeNode && (() => {
                  const [anx, any] = activeNode.split(",").map(Number);
                  const touching = corrSegs.filter(s => (s.x1 === anx && s.y1 === any) || (s.x2 === anx && s.y2 === any));
                  if (!touching.length) return null;
                  const curType = touching[0].x1 === anx && touching[0].y1 === any ? touching[0].nodeType1 : touching[0].nodeType2;
                  return (
                    <div style={{ marginTop: 8, padding: "8px", background: lbd2, borderRadius: 6 }}>
                      <div style={{ fontFamily: f2, fontSize: 6.5, color: lt3, textTransform: "uppercase", marginBottom: 4 }}>Node at ({anx}, {any})</div>
                      <div style={{ display: "flex", gap: 4 }}>
                        {["passage", "lobby"].map(nt => (
                          <button key={nt} onClick={() => {
                            setCorrSegs(corrSegs.map(s => {
                              const ns = { ...s };
                              if (s.x1 === anx && s.y1 === any) ns.nodeType1 = nt;
                              if (s.x2 === anx && s.y2 === any) ns.nodeType2 = nt;
                              return ns;
                            }));
                          }} style={{ fontFamily: f2, fontSize: 7, textTransform: "uppercase", padding: "3px 8px", borderRadius: 4, border: "1px solid " + (curType === nt ? corrColor : lbd), background: curType === nt ? corrColor + "20" : "transparent", color: curType === nt ? corrColor : lt3, cursor: "pointer" }}>{nt}</button>
                        ))}
                      </div>
                    </div>
                  );
                })()}
                <div style={{ marginTop: 10, display: "flex", gap: 6 }}>
                  <button onClick={regenWithCorridor} style={{ flex: 1, fontFamily: f2, fontSize: 7, textTransform: "uppercase", padding: "6px 8px", borderRadius: 6, border: "1px solid " + ac, background: ac + "18", color: ac, cursor: "pointer" }}>Apply {"\u2192"} Regen Rooms</button>
                </div>
                <div style={{ fontFamily: f2, fontSize: 6.5, color: lt3, marginTop: 8, fontStyle: "italic" }}>Drag nodes to move {"\u00B7"} Drag from node to extend {"\u00B7"} Click node to select</div>
              </div>
            ) : activeRoom && !activeRoom.fixed ? (
              <div>
                <div style={{ fontFamily: f1, fontSize: 18, fontWeight: 300, color: lt1, marginBottom: 2 }}>{activeRoom.name}</div>
                <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 8 }}>
                  <div style={{ width: 8, height: 8, borderRadius: 2, background: activeRoom.color }} />
                  <span style={{ fontFamily: f2, fontSize: 7, color: lt2, textTransform: "uppercase" }}>{activeRoom.dept}</span>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "auto 1fr", gap: "3px 10px", marginBottom: 8 }}>
                  <span style={{ fontFamily: f2, fontSize: 6.5, color: lt3, textTransform: "uppercase" }}>Size</span>
                  <span style={{ fontFamily: f1, fontSize: 13, fontWeight: 300, color: lt1 }}>{dimFt(activeRoom.w)}{"'"} {"\u00D7"} {dimFt(activeRoom.h)}{"'"} <span style={{ fontFamily: f2, fontSize: 6, color: lt3 }}>({dimM(activeRoom.w)} {"\u00D7"} {dimM(activeRoom.h)} m)</span></span>
                  <span style={{ fontFamily: f2, fontSize: 6.5, color: lt3, textTransform: "uppercase" }}>Area</span>
                  <span style={{ fontFamily: f1, fontSize: 13, fontWeight: 300, color: lt1 }}>{areaSF(activeRoom.area)} SF <span style={{ fontFamily: f2, fontSize: 6, color: lt3 }}>({areaSM(activeRoom.area)} m{"\u00B2"})</span></span>
                  <span style={{ fontFamily: f2, fontSize: 6.5, color: lt3, textTransform: "uppercase" }}>Zone</span>
                  <span style={{ fontFamily: f1, fontSize: 13, fontWeight: 300, color: lt1 }}>{activeRoom.zone}</span>
                  <span style={{ fontFamily: f2, fontSize: 6.5, color: lt3, textTransform: "uppercase" }}>Daylight</span>
                  <span style={{ fontFamily: f1, fontSize: 13, fontWeight: 300, color: activeRoom.daylight ? "#4D8F4D" : lt3 }}>{activeRoom.daylight ? "Required" : "No"}</span>
                </div>
                {activeAdj.length > 0 && (
                  <div>
                    <div style={{ fontFamily: f2, fontSize: 6.5, color: lt3, textTransform: "uppercase", marginBottom: 3 }}>Adjacencies</div>
                    {activeAdj.map(an => {
                      const met = activeAdjMet.includes(an);
                      return <div key={an} style={{ fontFamily: f2, fontSize: 7, color: met ? "#4D8F4D" : "#C45C3E", padding: "1px 0", display: "flex", alignItems: "center", gap: 4 }}>
                        <span style={{ fontSize: 8 }}>{met ? "\u2713" : "\u2717"}</span> {an}
                      </div>;
                    })}
                  </div>
                )}
                <div style={{ fontFamily: f2, fontSize: 6.5, color: lt3, marginTop: 8, fontStyle: "italic" }}>Drag to move {"\u00B7"} Corners to reshape</div>
              </div>
            ) : activeRoom && activeRoom.fixed ? (
              <div>
                <div style={{ fontFamily: f1, fontSize: 16, fontWeight: 300, color: lt3 }}>{activeRoom.name}</div>
                <div style={{ fontFamily: f2, fontSize: 7, color: lt3, fontStyle: "italic", marginTop: 4 }}>Fixed element</div>
              </div>
            ) : (
              <div style={{ fontFamily: f1, fontSize: 13, fontWeight: 300, color: lt3 }}>{editMode === "corridor" ? "Edit corridor nodes" : "Click a room to inspect"}</div>
            )}
          </div>}

          {/* Room List — horizontal scroll with department columns */}
          {!barMinimized && <div style={{ flex: 1, overflowX: "auto", overflowY: "hidden", display: "flex", padding: "10px 12px", gap: 16 }}>
            {depts.map((d, di) => {
              const dRooms = rooms.filter(r => r.dept === d.n && !r.fixed);
              if (!dRooms.length) return null;
              const isOpen = !collapsed[d.n];
              const dArea = dRooms.reduce((s, r) => s + r.area, 0);
              return (
                <div key={di} style={{ minWidth: 160, flexShrink: 0 }}>
                  <button onClick={() => toggleDept(d.n)} style={{ display: "flex", alignItems: "center", gap: 6, width: "100%", background: "none", border: "none", padding: "4px 0", cursor: "pointer" }}>
                    <span style={{ fontSize: 7, color: lt3, display: "inline-block", transform: isOpen ? "rotate(90deg)" : "rotate(0)", transition: "transform 0.2s", width: 8, textAlign: "center" }}>{"\u25B6"}</span>
                    <div style={{ width: 8, height: 8, borderRadius: 2, background: d.c, flexShrink: 0 }} />
                    <span style={{ fontFamily: f2, fontSize: 7, color: lt2, textTransform: "uppercase", letterSpacing: "0.06em", whiteSpace: "nowrap" }}>{d.n}</span>
                    <span style={{ fontFamily: f2, fontSize: 6, color: lt3, marginLeft: "auto", whiteSpace: "nowrap" }}>{dRooms.length} rm {"\u00B7"} {areaSF(dArea)} SF</span>
                  </button>
                  {isOpen && <div style={{ overflowY: "auto", maxHeight: barH - 56 }}>
                    {dRooms.map((r, j) => {
                      const idx = rooms.indexOf(r);
                      const isA = active === idx;
                      return (
                        <div key={j} onMouseEnter={() => setHov(r.name)} onMouseLeave={() => setHov(null)}
                          onClick={e => { e.stopPropagation(); setActive(idx); }}
                          style={{ fontFamily: f1, fontSize: 12, fontWeight: 300, color: isA ? lt1 : hov === r.name ? lt1 : lt2, padding: "2px 0 2px 14px", cursor: "pointer", transition: "all 0.15s", borderLeft: isA ? "2px solid " + d.c : hov === r.name ? "2px solid " + d.c + "55" : "2px solid transparent", background: isA ? d.c + "10" : "transparent", display: "flex", justifyContent: "space-between", gap: 8, whiteSpace: "nowrap" }}>
                          <span>{r.name}</span>
                          <span style={{ fontFamily: f2, fontSize: 6, color: lt3 }}>{dimFt(r.w) + "'" + "\u00D7" + dimFt(r.h) + "'"}</span>
                        </div>
                      );
                    })}
                  </div>}
                </div>
              );
            })}
          </div>}

          {/* Minimized state */}
          {barMinimized && <div onClick={() => { setBarH(220); setBarMinimized(false); }}
            style={{ flex: 1, display: "flex", alignItems: "center", padding: "0 16px", cursor: "pointer", gap: 12 }}>
            <span style={{ fontFamily: f2, fontSize: 7, color: ac, textTransform: "uppercase", letterSpacing: "0.15em" }}>Program</span>
            <span style={{ fontFamily: f2, fontSize: 7, color: lt3 }}>{rooms.filter(r => !r.fixed).length} rooms {"\u00B7"} {sf.toLocaleString()} SF</span>
            <span style={{ fontFamily: f2, fontSize: 7, color: lt3, marginLeft: "auto" }}>Drag up to expand</span>
          </div>}
        </div>
      </div>

    </div>
  );
}


// =============================================
// MOUNT
// =============================================
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
