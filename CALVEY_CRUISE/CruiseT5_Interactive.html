// ── HELPERS ──
function initPositions(blocks) {
  return blocks.map(b => ({ left: b.pos[0], top: b.pos[1], width: b.pos[2], height: b.pos[3] }));
}

function overlaps(a, b) {
  return !(a.left + a.width <= b.left || b.left + b.width <= a.left ||
           a.top + a.height <= b.top || b.top + b.height <= a.top);
}

function hasAnyOverlap(positions, idx, pos) {
  for (let j = 0; j < positions.length; j++) {
    if (j === idx) continue;
    if (overlaps(pos, positions[j])) return true;
  }
  return false;
}

// Check if ANY pair of blocks in the set overlaps
function hasAnyPairOverlap(positions) {
  for (let i = 0; i < positions.length; i++) {
    for (let j = i + 1; j < positions.length; j++) {
      if (overlaps(positions[i], positions[j])) return true;
    }
  }
  return false;
}

function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

const MIN_DIM = 3;

// Default footprints (% of site frame) — encompass initial block layouts
const DEFAULT_L1_FP = { left: 5, top: 6, width: 76, height: 74 };
const DEFAULT_L2_FP = { left: 0, top: 8, width: 78, height: 54 };

// Pack blocks toward footprint top-left, respecting each other
function packIntoFootprint(positions, fp) {
  const r = positions.map(p => ({...p}));
  // Clamp far-outside blocks back into footprint
  for (let i = 0; i < r.length; i++) {
    if (r[i].left > fp.left + fp.width + 8)  r[i].left = fp.left + fp.width - r[i].width;
    if (r[i].top  > fp.top  + fp.height + 8)  r[i].top  = fp.top  + fp.height - r[i].height;
    if (r[i].left + r[i].width < fp.left - 8)  r[i].left = fp.left;
    if (r[i].top  + r[i].height < fp.top - 8)   r[i].top  = fp.top;
    r[i].left = clamp(r[i].left, fp.left, fp.left + fp.width  - r[i].width);
    r[i].top  = clamp(r[i].top,  fp.top,  fp.top  + fp.height - r[i].height);
  }
  // Compact: sort top→bottom, left→right, then slide each up and left as far as possible
  const sorted = [...r.keys()].sort((a, b) => r[a].top - r[b].top || r[a].left - r[b].left);
  for (const i of sorted) {
    // slide up
    let maxUp = r[i].top - fp.top;
    for (let j = 0; j < r.length; j++) {
      if (j === i) continue;
      const hOk = !(r[j].left + r[j].width <= r[i].left || r[i].left + r[i].width <= r[j].left);
      if (hOk && r[j].top + r[j].height <= r[i].top)
        maxUp = Math.min(maxUp, r[i].top - (r[j].top + r[j].height));
    }
    r[i].top = Math.max(fp.top, r[i].top - maxUp);
    // slide left
    let maxLeft = r[i].left - fp.left;
    for (let j = 0; j < r.length; j++) {
      if (j === i) continue;
      const vOk = !(r[j].top + r[j].height <= r[i].top || r[i].top + r[i].height <= r[j].top);
      if (vOk && r[j].left + r[j].width <= r[i].left)
        maxLeft = Math.min(maxLeft, r[i].left - (r[j].left + r[j].width));
    }
    r[i].left = Math.max(fp.left, r[i].left - maxLeft);
  }
  return r;
}

// Is block substantially outside the footprint?
function isDisconnected(pos, fp) {
  return pos.left > fp.left + fp.width + 4 ||
         pos.left + pos.width < fp.left - 4 ||
         pos.top  > fp.top  + fp.height + 4 ||
         pos.top  + pos.height < fp.top - 4;
}

const STORAGE_KEY = 'cruiseT5_savedLayout';

function saveLayout(L1pos, L2pos, L1fp, L2fp) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ L1pos, L2pos, L1fp, L2fp, savedAt: Date.now() }));
    return true;
  } catch { return false; }
}

function loadLayout() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    const data = JSON.parse(raw);
    if (data.L1pos && data.L2pos && data.L1fp && data.L2fp) return data;
    return null;
  } catch { return null; }
}

function hasSavedLayout() {
  return !!localStorage.getItem(STORAGE_KEY);
}

// ── FORM ALGORITHM ──
// Takes L1 and L2 positions, aligns edges across both levels, closes gaps,
// stretches blocks moderately to fill remaining thin gaps, and shrink-wraps footprints.
// Every step validates overlap-safety; reverts the step if overlaps are introduced.

function formLayout(l1Pos, l2Pos) {
  // Tolerance for "touching" vs "overlapping" — blocks within this are considered touching
  const EPS = 0.1;

  // Check if two rects overlap (with tolerance so touching edges don't count)
  function ov(a, b) {
    return !(a.left + a.width <= b.left + EPS || b.left + b.width <= a.left + EPS ||
             a.top + a.height <= b.top + EPS || b.top + b.height <= a.top + EPS);
  }
  function anyOv(positions) {
    for (let i = 0; i < positions.length; i++)
      for (let j = i + 1; j < positions.length; j++)
        if (ov(positions[i], positions[j])) return true;
    return false;
  }

  // --- Helper: collect edges ---
  function collectEdges(positions) {
    const xs = [], ys = [];
    for (const p of positions) {
      xs.push(p.left, p.left + p.width);
      ys.push(p.top, p.top + p.height);
    }
    return { xs, ys };
  }

  // --- Helper: cluster nearby values into alignment groups ---
  const CLUSTER_THRESH = 1.5;
  function clusterValues(values, thresh) {
    const sorted = [...new Set(values.map(v => Math.round(v * 100) / 100))].sort((a, b) => a - b);
    const clusters = [];
    let i = 0;
    while (i < sorted.length) {
      let sum = sorted[i], count = 1, j = i + 1;
      while (j < sorted.length && sorted[j] - sorted[j - 1] < thresh) {
        sum += sorted[j]; count++; j++;
      }
      clusters.push(sum / count);
      i = j;
    }
    return clusters;
  }
  function nearestGrid(val, grid) {
    let best = grid[0], bestD = Math.abs(val - grid[0]);
    for (let i = 1; i < grid.length; i++) {
      const d = Math.abs(val - grid[i]);
      if (d < bestD) { best = grid[i]; bestD = d; }
    }
    return best;
  }

  // --- Step 1: Build shared grid from both levels ---
  const e1 = collectEdges(l1Pos);
  const e2 = collectEdges(l2Pos);
  const gridX = clusterValues([...e1.xs, ...e2.xs], CLUSTER_THRESH);
  const gridY = clusterValues([...e1.ys, ...e2.ys], CLUSTER_THRESH);

  // --- Step 2: Snap edges to grid, one block at a time, skip if it creates overlap ---
  function snapToGrid(positions) {
    const r = positions.map(p => ({...p}));
    for (let i = 0; i < r.length; i++) {
      const p = r[i];
      const origAR = p.width / p.height;
      let l = nearestGrid(p.left, gridX);
      let rr = nearestGrid(p.left + p.width, gridX);
      let t = nearestGrid(p.top, gridY);
      let b = nearestGrid(p.top + p.height, gridY);
      let w = Math.max(rr - l, MIN_DIM);
      let h = Math.max(b - t, MIN_DIM);
      // Moderate flex: cap aspect ratio change at 2x
      const newAR = w / h;
      if (origAR > 0 && newAR > origAR * 2) h = w / (origAR * 2);
      else if (origAR > 0 && newAR < origAR / 2) w = h * (origAR / 2);
      const candidate = { left: l, top: t, width: w, height: h };
      // Only apply if it doesn't overlap any other block
      const saved = r[i];
      r[i] = candidate;
      if (anyOv(r)) r[i] = saved; // revert
    }
    return r;
  }

  let r1 = snapToGrid(l1Pos.map(p => ({...p})));
  let r2 = snapToGrid(l2Pos.map(p => ({...p})));

  // --- Step 3: Close gaps — slide each block up/left as far as possible ---
  function closeGaps(positions) {
    const r = positions.map(p => ({...p}));
    if (r.length === 0) return r;
    let minL = Infinity, minT = Infinity;
    for (const p of r) { minL = Math.min(minL, p.left); minT = Math.min(minT, p.top); }

    for (let pass = 0; pass < 10; pass++) {
      let moved = false;
      const order = [...r.keys()].sort((a, b) => r[a].top - r[b].top || r[a].left - r[b].left);
      for (const i of order) {
        // Slide up
        let maxUp = r[i].top - minT;
        for (let j = 0; j < r.length; j++) {
          if (j === i) continue;
          const hShare = !(r[j].left + r[j].width <= r[i].left + EPS || r[i].left + r[i].width <= r[j].left + EPS);
          if (hShare && r[j].top + r[j].height <= r[i].top + EPS) {
            maxUp = Math.min(maxUp, r[i].top - (r[j].top + r[j].height));
          }
        }
        if (maxUp > EPS) { r[i].top -= maxUp; moved = true; }

        // Slide left
        let maxLeft = r[i].left - minL;
        for (let j = 0; j < r.length; j++) {
          if (j === i) continue;
          const vShare = !(r[j].top + r[j].height <= r[i].top + EPS || r[i].top + r[i].height <= r[j].top + EPS);
          if (vShare && r[j].left + r[j].width <= r[i].left + EPS) {
            maxLeft = Math.min(maxLeft, r[i].left - (r[j].left + r[j].width));
          }
        }
        if (maxLeft > EPS) { r[i].left -= maxLeft; moved = true; }
      }
      if (!moved) break;
    }
    return r;
  }

  r1 = closeGaps(r1);
  r2 = closeGaps(r2);

  // --- Step 4: Fill thin gaps by stretching — validate each expansion ---
  function fillGaps(positions, origPositions) {
    const r = positions.map(p => ({...p}));
    const GAP_MAX = 3.0;

    for (let pass = 0; pass < 4; pass++) {
      let filled = false;
      for (let i = 0; i < r.length; i++) {
        for (let j = i + 1; j < r.length; j++) {
          const origAR_i = origPositions[i].width / origPositions[i].height;
          const origAR_j = origPositions[j].width / origPositions[j].height;

          // Horizontal gap between vertically-adjacent blocks
          const vAdj = !(r[j].top + r[j].height <= r[i].top + EPS || r[i].top + r[i].height <= r[j].top + EPS);
          if (vAdj) {
            const li = r[i].left < r[j].left ? i : j;
            const ri = li === i ? j : i;
            const gap = r[ri].left - (r[li].left + r[li].width);
            if (gap > EPS && gap < GAP_MAX) {
              const origAR_L = li === i ? origAR_i : origAR_j;
              const origAR_R = ri === i ? origAR_i : origAR_j;
              // Try splitting the gap
              const saved = [{ ...r[li] }, { ...r[ri] }];
              const half = gap / 2;
              r[li].width += half;
              r[ri].left -= half;
              r[ri].width += half;
              const newAR_L = r[li].width / r[li].height;
              const newAR_R = r[ri].width / r[ri].height;
              if ((newAR_L <= origAR_L * 2) && (newAR_R <= origAR_R * 2) && !anyOv(r)) {
                filled = true;
              } else {
                // Revert and try expanding just the left block
                r[li] = { ...saved[0] }; r[ri] = { ...saved[1] };
                r[li].width += gap;
                if ((r[li].width / r[li].height <= origAR_L * 2) && !anyOv(r)) {
                  filled = true;
                } else {
                  r[li] = { ...saved[0] };
                  // Try expanding just the right block
                  r[ri].left -= gap; r[ri].width += gap;
                  if ((r[ri].width / r[ri].height <= origAR_R * 2) && !anyOv(r)) {
                    filled = true;
                  } else {
                    r[ri] = { ...saved[1] }; // revert entirely
                  }
                }
              }
            }
          }

          // Vertical gap between horizontally-adjacent blocks
          const hAdj = !(r[j].left + r[j].width <= r[i].left + EPS || r[i].left + r[i].width <= r[j].left + EPS);
          if (hAdj) {
            const ti = r[i].top < r[j].top ? i : j;
            const bi = ti === i ? j : i;
            const gap = r[bi].top - (r[ti].top + r[ti].height);
            if (gap > EPS && gap < GAP_MAX) {
              const origAR_T = ti === i ? origAR_i : origAR_j;
              const origAR_B = bi === i ? origAR_i : origAR_j;
              const saved = [{ ...r[ti] }, { ...r[bi] }];
              const half = gap / 2;
              r[ti].height += half;
              r[bi].top -= half;
              r[bi].height += half;
              const newAR_T = r[ti].width / r[ti].height;
              const newAR_B = r[bi].width / r[bi].height;
              if ((newAR_T >= origAR_T / 2) && (newAR_B >= origAR_B / 2) && !anyOv(r)) {
                filled = true;
              } else {
                r[ti] = { ...saved[0] }; r[bi] = { ...saved[1] };
                r[ti].height += gap;
                if ((r[ti].width / r[ti].height >= origAR_T / 2) && !anyOv(r)) {
                  filled = true;
                } else {
                  r[ti] = { ...saved[0] };
                  r[bi].top -= gap; r[bi].height += gap;
                  if ((r[bi].width / r[bi].height >= origAR_B / 2) && !anyOv(r)) {
                    filled = true;
                  } else {
                    r[bi] = { ...saved[1] };
                  }
                }
              }
            }
          }
        }
      }
      if (!filled) break;
    }
    return r;
  }

  r1 = fillGaps(r1, l1Pos);
  r2 = fillGaps(r2, l2Pos);

  // Final compaction pass
  r1 = closeGaps(r1);
  r2 = closeGaps(r2);

  // --- Step 5: Compute shrink-wrap footprints ---
  function computeFP(positions) {
    if (positions.length === 0) return { left: 0, top: 0, width: 50, height: 50 };
    let minL = Infinity, minT = Infinity, maxR = -Infinity, maxB = -Infinity;
    for (const p of positions) {
      minL = Math.min(minL, p.left);
      minT = Math.min(minT, p.top);
      maxR = Math.max(maxR, p.left + p.width);
      maxB = Math.max(maxB, p.top + p.height);
    }
    return { left: minL, top: minT, width: maxR - minL, height: maxB - minT };
  }

  const fp1 = computeFP(r1);
  const fp2 = computeFP(r2);

  // --- Step 6: Final validation ---
  if (anyOv(r1) || anyOv(r2)) {
    return null;
  }

  return { L1pos: r1, L2pos: r2, L1fp: fp1, L2fp: fp2 };
}

const SNAP = 3.0; // % units — snap/magnet threshold

// Snap a position to nearby block edges, footprint edges, and frame edges
function snapPos(pos, positions, idx, fp) {
  let { left, top, width, height } = pos;
  let snapX = false, snapY = false;
  for (let i = 0; i < positions.length; i++) {
    if (i === idx) continue;
    const p = positions[i];
    if (!snapX) {
      if (Math.abs(left - (p.left + p.width)) < SNAP)           { left = p.left + p.width;         snapX = true; }
      else if (Math.abs(left + width - p.left) < SNAP)           { left = p.left - width;            snapX = true; }
      else if (Math.abs(left - p.left) < SNAP)                   { left = p.left;                    snapX = true; }
      else if (Math.abs(left + width - p.left - p.width) < SNAP) { left = p.left + p.width - width;  snapX = true; }
    }
    if (!snapY) {
      if (Math.abs(top - (p.top + p.height)) < SNAP)             { top = p.top + p.height;           snapY = true; }
      else if (Math.abs(top + height - p.top) < SNAP)             { top = p.top - height;             snapY = true; }
      else if (Math.abs(top - p.top) < SNAP)                     { top = p.top;                      snapY = true; }
      else if (Math.abs(top + height - p.top - p.height) < SNAP) { top = p.top + p.height - height;  snapY = true; }
    }
  }
  // Footprint edges (stronger magnet — slightly wider threshold)
  const FPS = SNAP * 1.4;
  if (fp) {
    if (!snapX) {
      if (Math.abs(left - fp.left) < FPS)                          { left = fp.left;                   snapX = true; }
      else if (Math.abs(left + width - (fp.left + fp.width)) < FPS){ left = fp.left + fp.width - width; snapX = true; }
    }
    if (!snapY) {
      if (Math.abs(top - fp.top) < FPS)                            { top = fp.top;                     snapY = true; }
      else if (Math.abs(top + height - (fp.top + fp.height)) < FPS){ top = fp.top + fp.height - height; snapY = true; }
    }
  }
  // Frame edges
  if (!snapX) {
    if (Math.abs(left) < SNAP) left = 0;
    else if (Math.abs(left + width - 100) < SNAP) left = 100 - width;
  }
  if (!snapY) {
    if (Math.abs(top) < SNAP) top = 0;
    else if (Math.abs(top + height - 100) < SNAP) top = 100 - height;
  }
  return { ...pos, left: clamp(left, 0, 100 - width), top: clamp(top, 0, 100 - height) };
}

// Push block `target` away from block `pusher` using minimum displacement
function pushAway(pusher, target) {
  const ol = pusher.left + pusher.width - target.left;
  const or_ = target.left + target.width - pusher.left;
  const ot = pusher.top + pusher.height - target.top;
  const ob = target.top + target.height - pusher.top;
  if (ol <= 0 || or_ <= 0 || ot <= 0 || ob <= 0) return target;
  const min = Math.min(ol, or_, ot, ob);
  if (min === ol)  return { ...target, left: clamp(pusher.left + pusher.width, 0, 100 - target.width) };
  if (min === or_) return { ...target, left: clamp(pusher.left - target.width, 0, 100 - target.width) };
  if (min === ot)  return { ...target, top:  clamp(pusher.top + pusher.height, 0, 100 - target.height) };
                   return { ...target, top:  clamp(pusher.top - target.height, 0, 100 - target.height) };
}

// Resolve all overlaps by cascading pushes outward from `anchorIdx`
function resolvePushes(positions, anchorIdx) {
  const result = positions.map(p => ({...p}));
  for (let pass = 0; pass < 30; pass++) {
    let moved = false;
    // Push blocks away from the anchor
    for (let i = 0; i < result.length; i++) {
      if (i === anchorIdx) continue;
      if (overlaps(result[anchorIdx], result[i])) {
        const pushed = pushAway(result[anchorIdx], result[i]);
        if (pushed.left !== result[i].left || pushed.top !== result[i].top) {
          result[i] = pushed; moved = true;
        }
      }
    }
    // Cascade: all non-anchor blocks push each other
    for (let i = 0; i < result.length; i++) {
      for (let j = i + 1; j < result.length; j++) {
        if (i === anchorIdx || j === anchorIdx) continue;
        if (overlaps(result[i], result[j])) {
          // Push the block that is further from anchor
          const di = Math.abs(result[i].left - result[anchorIdx].left) + Math.abs(result[i].top - result[anchorIdx].top);
          const dj = Math.abs(result[j].left - result[anchorIdx].left) + Math.abs(result[j].top - result[anchorIdx].top);
          if (dj >= di) {
            const pushed = pushAway(result[i], result[j]);
            if (pushed.left !== result[j].left || pushed.top !== result[j].top) { result[j] = pushed; moved = true; }
          } else {
            const pushed = pushAway(result[j], result[i]);
            if (pushed.left !== result[i].left || pushed.top !== result[i].top) { result[i] = pushed; moved = true; }
          }
        }
      }
    }
    if (!moved) break;
  }
  return result;
}

// ── BLOCK COMPONENT ──
function Block({ block, pos, index, level, onDragStart, onResizeStart, onSelect, isDragging, isResizing, fp }) {
  const disconnected = fp ? isDisconnected(pos, fp) : false;
  const area = pos.width * pos.height;
  const fs = area > 350 ? 9 : area > 100 ? 8 : area > 40 ? 7 : 6;
  const sfFs = area > 150 ? 8 : 6.5;
  const isCoreSpine = block.cls === 'core-spine';
  const isStair = block.cls === 'stair-feature';
  const isDeck = block.cls === 'outdoor-deck';

  let bg = block.color;
  if (isCoreSpine) bg = 'linear-gradient(180deg,#e8eaed,#dde0e4)';
  else if (isStair) bg = 'linear-gradient(135deg,rgba(201,169,89,0.15),rgba(245,245,245,0.9))';
  else if (isDeck) bg = 'repeating-linear-gradient(45deg,rgba(122,184,122,0.06),rgba(122,184,122,0.06) 4px,transparent 4px,transparent 8px)';

  let borderStyle = '1px solid rgba(255,255,255,0.3)';
  if (disconnected) borderStyle = '1.5px dashed rgba(180,80,60,0.55)';
  else if (isStair) borderStyle = '2px solid rgba(201,169,89,0.6)';
  else if (isDeck) borderStyle = '2px dashed rgba(122,184,122,0.5)';
  else if (isCoreSpine) borderStyle = '1px solid rgba(0,0,0,0.08)';

  const labelColor = isCoreSpine ? 'var(--text-dim)' : isStair ? 'var(--amber)' : '#fff';
  const labelShadow = isCoreSpine ? 'none' : isStair ? '0 1px 2px rgba(0,0,0,0.15)' : '0 1px 3px rgba(0,0,0,0.45)';
  const sfColor = isCoreSpine ? 'var(--text-muted)' : 'rgba(255,255,255,0.9)';
  const badgeClass = block.badge === 'FULL' ? '#7ab87a' : block.badge === 'PARTIAL' ? '#c9a959' : '#888';

  // Corner hit zones for resize — invisible, just change cursor
  const cornerZones = [
    { id:'tl', cursor:'nwse-resize', top:0,    left:0,  borderRadius:'3px 0 0 0' },
    { id:'tr', cursor:'nesw-resize', top:0,    right:0, borderRadius:'0 3px 0 0' },
    { id:'bl', cursor:'nesw-resize', bottom:0, left:0,  borderRadius:'0 0 0 3px' },
    { id:'br', cursor:'nwse-resize', bottom:0, right:0, borderRadius:'0 0 3px 0' },
  ];

  return (
    <div
      onPointerDown={(e) => {
        if (e.target.dataset.corner) return;
        e.preventDefault(); e.stopPropagation();
        onDragStart(e, index, level);
      }}
      onClick={(e) => { e.stopPropagation(); onSelect(index, level); }}
      style={{
        position: 'absolute',
        left: pos.left + '%', top: pos.top + '%',
        width: pos.width + '%', height: pos.height + '%',
        background: bg, border: borderStyle, borderRadius: 3,
        display: 'flex', flexDirection: 'column',
        justifyContent: 'center', alignItems: 'center',
        textAlign: 'center', padding: 2, cursor: 'grab',
        // Animate non-dragging blocks smoothly when pushed
        transition: isDragging ? 'none' : 'left 0.14s cubic-bezier(.25,.8,.25,1), top 0.14s cubic-bezier(.25,.8,.25,1), width 0.14s, height 0.14s, box-shadow 0.15s',
        overflow: 'hidden', touchAction: 'none', userSelect: 'none',
        opacity: isDragging ? 0.88 : 1,
        transform: isDragging ? 'scale(1.04)' : 'none',
        boxShadow: isDragging ? '0 10px 36px rgba(0,0,0,0.2)' : isStair ? '0 0 8px rgba(201,169,89,0.1)' : 'none',
        zIndex: isDragging ? 100 : isResizing ? 100 : 1,
        willChange: isDragging ? 'transform, left, top' : 'auto',
      }}
      className="interactive-block"
    >
      {block.badge && (
        <span style={{
          position: 'absolute', top: 1, right: 1, fontSize: 5.5,
          padding: '1px 3px', borderRadius: 2, fontWeight: 700,
          letterSpacing: 0.5, backgroundColor: badgeClass, color: '#fff',
          fontFamily: "'Space Mono',monospace",
        }}>{block.badge}</span>
      )}
      <span style={{
        fontFamily: "'Space Mono',monospace", fontWeight: isCoreSpine ? 400 : 700,
        color: labelColor, lineHeight: 1.12, textShadow: labelShadow, fontSize: fs,
        pointerEvents: 'none',
      }}>{block.label}</span>
      {block.sf && area > 25 && (
        <span style={{
          color: sfColor, fontWeight: 300,
          textShadow: isCoreSpine ? 'none' : '0 1px 2px rgba(0,0,0,0.35)',
          fontSize: sfFs, fontFamily: "'Cormorant Garamond',serif",
          pointerEvents: 'none',
        }}>{block.sf} SF</span>
      )}
      {/* Invisible corner hit zones — scale down for small blocks so drag still works */}
      {cornerZones.map(c => {
        // Limit corner zone to at most 30% of block dimension so center stays draggable
        const cornerSize = Math.min(18, Math.max(6, area > 80 ? 18 : area > 30 ? 12 : 8));
        return (
          <div
            key={c.id}
            data-corner={c.id}
            onPointerDown={(e) => {
              e.preventDefault(); e.stopPropagation();
              onResizeStart(e, index, level, c.id);
            }}
            style={{
              position: 'absolute', width: cornerSize, height: cornerSize,
              cursor: c.cursor, touchAction: 'none', zIndex: 4,
              background: 'transparent',
              top: c.top, left: c.left, right: c.right, bottom: c.bottom,
              borderRadius: c.borderRadius,
            }}
          />
        );
      })}
    </div>
  );
}

// ── FOOTPRINT ──
function FootprintEl({ fp, onMoveStart, onCornerStart, onEdgeStart }) {
  const corners = [
    { id:'tl', cursor:'nwse-resize', style:{ top:-5, left:-5 } },
    { id:'tr', cursor:'nesw-resize', style:{ top:-5, right:-5 } },
    { id:'bl', cursor:'nesw-resize', style:{ bottom:-5, left:-5 } },
    { id:'br', cursor:'nwse-resize', style:{ bottom:-5, right:-5 } },
  ];
  const edges = [
    { id:'t', cursor:'ns-resize',   style:{ top:-4, left:'20%', right:'20%', height:8 } },
    { id:'b', cursor:'ns-resize',   style:{ bottom:-4, left:'20%', right:'20%', height:8 } },
    { id:'l', cursor:'ew-resize',   style:{ left:-4, top:'20%', bottom:'20%', width:8 } },
    { id:'r', cursor:'ew-resize',   style:{ right:-4, top:'20%', bottom:'20%', width:8 } },
  ];
  return (
    <div
      onPointerDown={(e) => {
        if (e.target.dataset.fpc || e.target.dataset.fpe) return;
        e.preventDefault(); e.stopPropagation();
        onMoveStart(e);
      }}
      style={{
        position: 'absolute',
        left: fp.left + '%', top: fp.top + '%',
        width: fp.width + '%', height: fp.height + '%',
        border: '1.5px solid rgba(26,26,26,0.28)',
        borderRadius: 2,
        background: 'transparent',
        cursor: 'move',
        zIndex: 0,
        touchAction: 'none', userSelect: 'none',
        pointerEvents: 'all',
        transition: 'left 0.14s cubic-bezier(.25,.8,.25,1), top 0.14s, width 0.14s, height 0.14s',
      }}
    >
      {/* Label */}
      <div style={{
        position:'absolute', bottom:-16, left:'50%', transform:'translateX(-50%)',
        fontFamily:"'Space Mono',monospace", fontSize:6.5, color:'rgba(26,26,26,0.35)',
        letterSpacing:'0.12em', textTransform:'uppercase', whiteSpace:'nowrap', pointerEvents:'none',
      }}>Building Footprint</div>
      {/* Corner handles */}
      {corners.map(c => (
        <div key={c.id} data-fpc={c.id}
          onPointerDown={(e) => { e.preventDefault(); e.stopPropagation(); onCornerStart(e, c.id); }}
          style={{
            position:'absolute', width:10, height:10,
            background:'#fff', border:'1.5px solid rgba(26,26,26,0.45)',
            borderRadius:1, cursor:c.cursor, touchAction:'none', zIndex:20,
            ...c.style,
          }}
        />
      ))}
      {/* Edge handles */}
      {edges.map(edge => (
        <div key={edge.id} data-fpe={edge.id}
          onPointerDown={(e) => { e.preventDefault(); e.stopPropagation(); onEdgeStart(e, edge.id); }}
          style={{
            position:'absolute', cursor:edge.cursor, touchAction:'none', zIndex:15,
            background:'transparent',
            ...edge.style,
          }}
        />
      ))}
    </div>
  );
}

// ── TOOLTIP ──
function Tooltip({ block, pos, frameRef }) {
  if (!block) return null;
  const convColor = block.convert === 'full' ? '#7ab87a' : block.convert === 'partial' ? '#c9a959' : '#888';
  const convLabel = block.convert === 'full' ? 'Full' : block.convert === 'partial' ? 'Partial' : 'Fixed';

  return (
    <div style={{
      position: 'fixed', bottom: 16, left: '50%', transform: 'translateX(-50%)',
      background: '#fff', border: '1px solid var(--border)', borderRadius: 4,
      padding: '10px 14px', maxWidth: 320, zIndex: 1000,
      boxShadow: '0 4px 20px rgba(0,0,0,0.1)', pointerEvents: 'none',
    }}>
      <div style={{ fontFamily: "'Space Mono',monospace", fontSize: 10, fontWeight: 700, color: 'var(--text)', marginBottom: 3, letterSpacing: '0.04em' }}>
        {(block.id || '').replace('\u2192','').replace('\u2082','')} — {block.label}
      </div>
      {block.sf && <div style={{ fontFamily: "'Space Mono',monospace", fontSize: 10, color: 'var(--accent)', marginBottom: 4 }}>{block.sf} SF</div>}
      <div style={{ fontSize: 14, fontFamily: "'Cormorant Garamond',serif", color: 'var(--text-dim)', lineHeight: 1.5 }}>{block.desc}</div>
      {block.why && <div style={{ fontSize: 12, fontFamily: "'Cormorant Garamond',serif", color: 'var(--amber)', marginTop: 6, fontStyle: 'italic' }}>{'\u21B3'} {block.why}</div>}
      <div style={{ fontFamily: "'Space Mono',monospace", fontSize: 9, marginTop: 6, paddingTop: 6, borderTop: '1px solid var(--border)', color: convColor }}>
        {'\u25CF'} {convLabel}
      </div>
    </div>
  );
}

// ── PLAN VIEW ──
function PlanView({ title, blocks, positions, level, mode, fp, onDragStart, onResizeStart, onFpMoveStart, onFpCornerStart, onFpEdgeStart, selectedBlock, onSelect, draggingIdx, resizingIdx }) {
  return (
    <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', overflow: 'hidden' }}>
      <div style={{ padding: '10px 16px 8px', textAlign: 'center', borderBottom: '1px solid var(--border)' }}>
        <h2 style={{ fontFamily: "'Space Mono',monospace", fontSize: 10, fontWeight: 400, letterSpacing: '0.18em', textTransform: 'uppercase', color: 'var(--text-muted)' }}>
          {title}
        </h2>
      </div>
      <div style={{ position: 'relative', width: '100%', padding: 8 }}>
        <div
          data-level={level}
          style={{
            position: 'relative', width: '100%', aspectRatio: '0.82',
            border: '1px solid var(--border)', overflow: 'visible',
            background: '#fafbfc', touchAction: 'none',
          }}
          onClick={() => onSelect(null, null)}
        >
          <ContextOverlays mode={mode} />
          {/* Building footprint — rendered below blocks */}
          <FootprintEl
            fp={fp}
            onMoveStart={(e) => onFpMoveStart(e, level)}
            onCornerStart={(e, c) => onFpCornerStart(e, level, c)}
            onEdgeStart={(e, edge) => onFpEdgeStart(e, level, edge)}
          />
          {blocks.map((block, i) => (
            <Block
              key={i}
              block={block}
              pos={positions[i]}
              index={i}
              level={level}
              fp={fp}
              onDragStart={onDragStart}
              onResizeStart={onResizeStart}
              onSelect={onSelect}
              isSelected={selectedBlock && selectedBlock.level === level && selectedBlock.index === i}
              isDragging={draggingIdx && draggingIdx.level === level && draggingIdx.index === i}
              isResizing={resizingIdx && resizingIdx.level === level && resizingIdx.index === i}
            />
          ))}
        </div>
      </div>
    </div>
  );
}

// ── LEGEND ──
function Legend({ mode }) {
  const items = mode === 'cruise' ? cLeg : ncLeg;
  const title = mode === 'cruise' ? 'Cruise-Day Program' : 'Non-Cruise-Day Program';
  const color = mode === 'cruise' ? '#8fb5cc' : '#cc8878';

  const swatchStyle = (item) => {
    if (item.sw === 'sw-core') return { background: 'linear-gradient(180deg,#e8eaed,#dde0e4)', border: '1px solid rgba(0,0,0,0.08)' };
    if (item.sw === 'sw-stair') return { border: '1.5px solid rgba(201,169,89,0.5)', background: 'linear-gradient(135deg,rgba(201,169,89,0.2),#f5f5f5)' };
    if (item.sw === 'sw-deck') return { border: '1.5px dashed rgba(122,184,122,0.45)', background: 'repeating-linear-gradient(45deg,rgba(122,184,122,0.12),rgba(122,184,122,0.12) 2px,transparent 2px,transparent 4px)' };
    return { background: item.color, border: '1px solid rgba(0,0,0,0.08)' };

  return (
    <div style={{ maxWidth: '100%', margin: '0 auto 24px', padding: '0 16px' }}>
      <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', padding: 14 }}>
        <h3 style={{
          fontFamily: "'Space Mono',monospace", fontSize: 9, letterSpacing: '0.15em',
          textTransform: 'uppercase', marginBottom: 8, paddingBottom: 5,
          borderBottom: '1px solid var(--border)', fontWeight: 400, color,
        }}>{title}</h3>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(140px, 1fr))', gap: 4 }}>
          {items.map((item, i) => (
            <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
              <div style={{ width: 10, height: 10, borderRadius: 2, flexShrink: 0, ...swatchStyle(item) }} />
              <span style={{ fontFamily: "'Space Mono',monospace", fontSize: 9, color: 'var(--text-dim)' }}>{item.label}</span>
            </div>
          ))}
        </div>
        <div style={{ display: 'flex', justifyContent: 'center', gap: 16, marginTop: 10, paddingTop: 8, borderTop: '1px solid var(--border)' }}>
          {[{c:'rgba(122,184,122,0.9)',l:'Full'},{c:'rgba(201,169,89,0.9)',l:'Partial'},{c:'rgba(136,136,136,0.8)',l:'Fixed'}].map(({c,l}) => (
            <div key={l} style={{ display:'flex', alignItems:'center', gap:4, fontFamily:"'Space Mono',monospace", fontSize:9, color:'var(--text-muted)' }}>
              <div style={{ width:8, height:8, borderRadius:2, background:c }} /> {l}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── MAIN APP ──
function App() {
  const [mode, setMode] = useState('cruise');
  const [L1pos, setL1pos] = useState(() => initPositions(L1C));
  const [L2pos, setL2pos] = useState(() => initPositions(L2C));
  const [L1fp, setL1fp] = useState({...DEFAULT_L1_FP});
  const [L2fp, setL2fp] = useState({...DEFAULT_L2_FP});
  const [history, setHistory] = useState([]);
  const [selectedBlock, setSelectedBlock] = useState(null);
  const [dragging, setDragging] = useState(null);
  const [resizing, setResizing] = useState(null);

  const dragRef = useRef(null);
  const resizeRef = useRef(null);
  const fpDragRef = useRef(null);
  const fpResizeRef = useRef(null);

  const getFootprint = useCallback((level) => level === 'L1' ? L1fp : L2fp, [L1fp, L2fp]);
  const setFootprint = useCallback((level, fp) => {
    if (level === 'L1') setL1fp(fp); else setL2fp(fp);
  }, []);

  const pushHistory = useCallback(() => {
    setHistory(h => [...h.slice(-19), {
      L1: L1pos.map(p => ({...p})), L2: L2pos.map(p => ({...p})),
      L1fp: {...L1fp}, L2fp: {...L2fp},
    }]);
  }, [L1pos, L2pos, L1fp, L2fp]);

  const getPositions = useCallback((level) => level === 'L1' ? L1pos : L2pos, [L1pos, L2pos]);
  const setPositions = useCallback((level, pos) => {
    if (level === 'L1') setL1pos(pos);
    else setL2pos(pos);
  }, []);

  const getFrameRect = (level) => {
    const frame = document.querySelector(`[data-level="${level}"]`);
    return frame ? frame.getBoundingClientRect() : null;
  };

  // ── DRAG ──
  const handleDragStart = useCallback((e, index, level) => {
    const frameRect = getFrameRect(level);
    if (!frameRect) return;
    const positions = level === 'L1' ? L1pos : L2pos;
    const pos = positions[index];
    const clientX = e.clientX ?? e.touches?.[0]?.clientX;
    const clientY = e.clientY ?? e.touches?.[0]?.clientY;
    dragRef.current = {
      index, level, frameRect,
      startX: clientX, startY: clientY,
      origLeft: pos.left, origTop: pos.top,
      origPositions: positions.map(p => ({...p})),
    };
    setDragging({ index, level });
    pushHistory();
  }, [L1pos, L2pos, pushHistory]);

  const handleDragMove = useCallback((e) => {
    if (!dragRef.current) return;
    e.preventDefault();
    const { index, level, frameRect, startX, startY, origLeft, origTop, origPositions } = dragRef.current;
    const clientX = e.clientX ?? e.touches?.[0]?.clientX;
    const clientY = e.clientY ?? e.touches?.[0]?.clientY;
    const dx = ((clientX - startX) / frameRect.width) * 100;
    const dy = ((clientY - startY) / frameRect.height) * 100;

    const block = origPositions[index];
    const newLeft = clamp(origLeft + dx, 0, 100 - block.width);
    const newTop  = clamp(origTop  + dy, 0, 100 - block.height);

    // Place dragged block, then push other blocks out of the way
    const working = origPositions.map(p => ({...p}));
    working[index] = { ...block, left: newLeft, top: newTop };
    const resolved = resolvePushes(working, index);
    // Only apply if no overlaps remain; otherwise keep last valid state
    if (!hasAnyPairOverlap(resolved)) {
      dragRef.current.lastValid = resolved;
      setPositions(level, resolved);
    } else if (dragRef.current.lastValid) {
      setPositions(level, dragRef.current.lastValid);
    }
  }, [setPositions]);

  const handleDragEnd = useCallback(() => {
    if (!dragRef.current) return;
    const { index, level } = dragRef.current;
    const lastValid = dragRef.current.lastValid;
    dragRef.current = null;
    setDragging(null);
    const fp = level === 'L1' ? L1fp : L2fp;
    const curPos = level === 'L1' ? L1pos : L2pos;
    // Snap released block to nearby edges (incl. footprint)
    let snapped = curPos.map(p => ({...p}));
    snapped[index] = snapPos(snapped[index], snapped, index, fp);
    // If snap introduced overlaps, revert the snap
    if (hasAnyPairOverlap(snapped)) {
      snapped = curPos.map(p => ({...p}));
    }
    // If block ended up inside footprint, pack everything together
    if (!isDisconnected(snapped[index], fp)) {
      const packed = packIntoFootprint(snapped, fp);
      // Only apply pack if it doesn't introduce overlaps
      if (!hasAnyPairOverlap(packed)) {
        snapped = packed;
      }
    }
    // Final safety: if overlaps still exist, use last valid from drag
    if (hasAnyPairOverlap(snapped) && lastValid && !hasAnyPairOverlap(lastValid)) {
      snapped = lastValid;
    }
    setPositions(level, snapped);
  }, [L1pos, L2pos, L1fp, L2fp, setPositions]);

  // ── RESIZE ──
  const handleResizeStart = useCallback((e, index, level, corner) => {
    const frameRect = getFrameRect(level);
    if (!frameRect) return;
    const positions = level === 'L1' ? L1pos : L2pos;
    const pos = positions[index];
    const clientX = e.clientX ?? e.touches?.[0]?.clientX;
    const clientY = e.clientY ?? e.touches?.[0]?.clientY;

    resizeRef.current = {
      index, level, corner, frameRect,
      startX: clientX, startY: clientY,
      origLeft: pos.left, origTop: pos.top,
      origWidth: pos.width, origHeight: pos.height,
      origArea: pos.width * pos.height,
      origPositions: positions.map(p => ({...p})),
      lastValid: positions.map(p => ({...p})),
    };
    setResizing({ index, level });
    pushHistory();
  }, [L1pos, L2pos, pushHistory]);

  const handleResizeMove = useCallback((e) => {
    if (!resizeRef.current) return;
    e.preventDefault();
    const { index, level, corner, frameRect, startX, startY, origLeft, origTop, origWidth, origHeight, origArea, origPositions } = resizeRef.current;
    const clientX = e.clientX ?? e.touches?.[0]?.clientX;
    const clientY = e.clientY ?? e.touches?.[0]?.clientY;
    const dx = ((clientX - startX) / frameRect.width) * 100;
    const dy = ((clientY - startY) / frameRect.height) * 100;

    // Area-preserving resize: width from dx, height derived to keep area constant
    let newWidth, newHeight, newLeft, newTop;

    if (corner === 'br') {
      newWidth = clamp(origWidth + dx, MIN_DIM, 97);
    } else if (corner === 'bl') {
      newWidth = clamp(origWidth - dx, MIN_DIM, 97);
    } else if (corner === 'tr') {
      newWidth = clamp(origWidth + dx, MIN_DIM, 97);
    } else { // tl
      newWidth = clamp(origWidth - dx, MIN_DIM, 97);
    }

    newHeight = origArea / newWidth;
    if (newHeight < MIN_DIM) { newHeight = MIN_DIM; newWidth = origArea / newHeight; }

    // Anchor left/top based on corner
    if (corner === 'br' || corner === 'tr') {
      newLeft = origLeft;
    } else { // bl, tl — left edge moves
      newLeft = clamp(origLeft + (origWidth - newWidth), 0, 100 - newWidth);
    }
    if (corner === 'br' || corner === 'bl') {
      newTop = origTop;
    } else { // tr, tl — top edge moves
      newTop = clamp(origTop + (origHeight - newHeight), 0, 100 - newHeight);
    }

    // Clamp to frame
    newLeft = clamp(newLeft, 0, 100 - newWidth);
    newTop = clamp(newTop, 0, 100 - newHeight);

    const positions = origPositions.map(p => ({...p}));
    const candidate = { left: newLeft, top: newTop, width: newWidth, height: newHeight };
    if (!hasAnyOverlap(positions, index, candidate)) {
      positions[index] = candidate;
      resizeRef.current.lastValid = positions;
      setPositions(level, positions);
    } else if (resizeRef.current.lastValid) {
      setPositions(level, resizeRef.current.lastValid);
    }
  }, [setPositions]);

  const handleResizeEnd = useCallback(() => {
    if (!resizeRef.current) return;
    const { index, level } = resizeRef.current;
    resizeRef.current = null;
    setResizing(null);
    const fp = level === 'L1' ? L1fp : L2fp;
    const curPos = level === 'L1' ? L1pos : L2pos;
    const snapped = curPos.map(p => ({...p}));
    snapped[index] = snapPos(snapped[index], snapped, index, fp);
    // Only apply snap if it doesn't create overlaps
    if (!hasAnyPairOverlap(snapped)) {
      setPositions(level, snapped);
    }
    // else keep curPos as-is (already overlap-free from resize move checks)
  }, [L1pos, L2pos, L1fp, L2fp, setPositions]);

  // ── FOOTPRINT HANDLERS ──
  const handleFpMoveStart = useCallback((e, level) => {
    const frameRect = getFrameRect(level);
    if (!frameRect) return;
    const fp = level === 'L1' ? L1fp : L2fp;
    fpDragRef.current = {
      level, frameRect, fp: {...fp},
      startX: e.clientX, startY: e.clientY,
      origPositions: (level === 'L1' ? L1pos : L2pos).map(p => ({...p})),
    };
    pushHistory();
  }, [L1fp, L2fp, L1pos, L2pos, pushHistory]);

  const handleFpCornerStart = useCallback((e, level, corner) => {
    const frameRect = getFrameRect(level);
    if (!frameRect) return;
    const fp = level === 'L1' ? L1fp : L2fp;
    fpResizeRef.current = { level, frameRect, corner, fp: {...fp}, startX: e.clientX, startY: e.clientY };
    pushHistory();
  }, [L1fp, L2fp, pushHistory]);

  const handleFpEdgeStart = useCallback((e, level, edge) => {
    const frameRect = getFrameRect(level);
    if (!frameRect) return;
    const fp = level === 'L1' ? L1fp : L2fp;
    fpResizeRef.current = { level, frameRect, corner: edge, fp: {...fp}, startX: e.clientX, startY: e.clientY };
    pushHistory();
  }, [L1fp, L2fp, pushHistory]);

  const handleFpMove = useCallback((e) => {
    if (fpDragRef.current) {
      const { level, frameRect, fp, startX, startY, origPositions } = fpDragRef.current;
      const dx = ((e.clientX - startX) / frameRect.width) * 100;
      const dy = ((e.clientY - startY) / frameRect.height) * 100;
      const newFp = {
        ...fp,
        left: clamp(fp.left + dx, 0, 100 - fp.width),
        top:  clamp(fp.top  + dy, 0, 100 - fp.height),
      };
      // Move all blocks with the footprint
      const ddx = newFp.left - fp.left;
      const ddy = newFp.top  - fp.top;
      const moved = origPositions.map(p => ({
        ...p,
        left: clamp(p.left + ddx, 0, 100 - p.width),
        top:  clamp(p.top  + ddy, 0, 100 - p.height),
      }));
      setFootprint(level, newFp);
      setPositions(level, moved);
    }
    if (fpResizeRef.current) {
      const { level, frameRect, corner, fp, startX, startY } = fpResizeRef.current;
      const dx = ((e.clientX - startX) / frameRect.width) * 100;
      const dy = ((e.clientY - startY) / frameRect.height) * 100;
      let { left, top, width, height } = fp;
      if (corner === 'br') { width = clamp(width + dx, 8, 98 - left); height = clamp(height + dy, 8, 98 - top); }
      else if (corner === 'bl') { const nw = clamp(width - dx, 8, 98); left = clamp(fp.left + fp.width - nw, 0, 95); width = nw; height = clamp(height + dy, 8, 98 - top); }
      else if (corner === 'tr') { width = clamp(width + dx, 8, 98 - left); const nh = clamp(height - dy, 8, 98); top = clamp(fp.top + fp.height - nh, 0, 95); height = nh; }
      else if (corner === 'tl') { const nw = clamp(width - dx, 8, 98); left = clamp(fp.left + fp.width - nw, 0, 95); width = nw; const nh = clamp(height - dy, 8, 98); top = clamp(fp.top + fp.height - nh, 0, 95); height = nh; }
      else if (corner === 't') { const nh = clamp(height - dy, 8, 98); top = clamp(fp.top + fp.height - nh, 0, 95); height = nh; }
      else if (corner === 'b') { height = clamp(height + dy, 8, 98 - top); }
      else if (corner === 'l') { const nw = clamp(width - dx, 8, 98); left = clamp(fp.left + fp.width - nw, 0, 95); width = nw; }
      else if (corner === 'r') { width = clamp(width + dx, 8, 98 - left); }
      setFootprint(level, { left, top, width, height });
    }
  }, [setFootprint, setPositions]);

  const handleFpUp = useCallback(() => {
    if (fpDragRef.current) { fpDragRef.current = null; }
    if (fpResizeRef.current) {
      const { level } = fpResizeRef.current;
      fpResizeRef.current = null;
      const fp = level === 'L1' ? L1fp : L2fp;
      const curPos = level === 'L1' ? L1pos : L2pos;
      const packed = packIntoFootprint(curPos, fp);
      // Only apply pack if it doesn't introduce overlaps
      if (!hasAnyPairOverlap(packed)) {
        setPositions(level, packed);
      }
    }
  }, [L1fp, L2fp, L1pos, L2pos, setPositions]);

  // ── POINTER EVENTS ──
  useEffect(() => {
    const onMove = (e) => {
      if (dragRef.current) handleDragMove(e);
      if (resizeRef.current) handleResizeMove(e);
      if (fpDragRef.current || fpResizeRef.current) handleFpMove(e);
    };
    const onUp = () => {
      if (dragRef.current) handleDragEnd();
      if (resizeRef.current) handleResizeEnd();
      if (fpDragRef.current || fpResizeRef.current) handleFpUp();
    };
    window.addEventListener('pointermove', onMove, { passive: false });
    window.addEventListener('pointerup', onUp);
    window.addEventListener('pointercancel', onUp);
    return () => {
      window.removeEventListener('pointermove', onMove);
      window.removeEventListener('pointerup', onUp);
      window.removeEventListener('pointercancel', onUp);
    };
  }, [handleDragMove, handleDragEnd, handleResizeMove, handleResizeEnd, handleFpMove, handleFpUp]);

  const handleSelect = useCallback((index, level) => {
    if (index === null) { setSelectedBlock(null); return; }
    setSelectedBlock(prev => (prev && prev.index === index && prev.level === level) ? null : { index, level });
  }, []);

  const [saveStatus, setSaveStatus] = useState(null); // null | 'saved' | 'loaded'
  const [hasSaved, setHasSaved] = useState(() => hasSavedLayout());

  const handleSave = () => {
    if (saveLayout(L1pos, L2pos, L1fp, L2fp)) {
      setSaveStatus('saved');
      setHasSaved(true);
      setTimeout(() => setSaveStatus(null), 2000);
    }
  };

  const handleLoad = () => {
    const data = loadLayout();
    if (!data) return;
    pushHistory();
    setL1pos(data.L1pos);
    setL2pos(data.L2pos);
    setL1fp(data.L1fp);
    setL2fp(data.L2fp);
    setSelectedBlock(null);
    setSaveStatus('loaded');
    setTimeout(() => setSaveStatus(null), 2000);
  };

  const handleForm = () => {
    pushHistory();
    const result = formLayout(L1pos, L2pos);
    if (result) {
      setL1pos(result.L1pos);
      setL2pos(result.L2pos);
      setL1fp(result.L1fp);
      setL2fp(result.L2fp);
      setSelectedBlock(null);
    }
  };

  const handleReset = () => {
    pushHistory();
    const l1 = initPositions(L1C);
    const l2 = initPositions(L2C);
    const l1packed = packIntoFootprint(l1, DEFAULT_L1_FP);
    const l2packed = packIntoFootprint(l2, DEFAULT_L2_FP);
    // Use packed if overlap-free, otherwise use raw initial positions
    setL1pos(!hasAnyPairOverlap(l1packed) ? l1packed : l1);
    setL2pos(!hasAnyPairOverlap(l2packed) ? l2packed : l2);
    setL1fp({...DEFAULT_L1_FP});
    setL2fp({...DEFAULT_L2_FP});
    setSelectedBlock(null);
  };

  const handleUndo = () => {
    if (history.length === 0) return;
    const last = history[history.length - 1];
    setL1pos(last.L1); setL2pos(last.L2);
    if (last.L1fp) setL1fp(last.L1fp);
    if (last.L2fp) setL2fp(last.L2fp);
    setHistory(h => h.slice(0, -1));
  };

  const l1Blocks = mode === 'cruise' ? L1C : L1NC;
  const l2Blocks = mode === 'cruise' ? L2C : L2NC;

  const selectedData = selectedBlock ? (
    selectedBlock.level === 'L1' ? l1Blocks[selectedBlock.index] : l2Blocks[selectedBlock.index]
  ) : null;

  return (
    <div style={{ maxWidth: 1400, margin: '0 auto' }}>
      {/* Header */}
      <div style={{ textAlign: 'center', padding: '28px 20px 6px' }}>
        <h1 style={{
          fontFamily: "'Cormorant Garamond',serif", fontWeight: 300,
          fontSize: 'clamp(18px, 3vw, 32px)', letterSpacing: '0.12em',
          textTransform: 'uppercase', color: 'var(--text)',
        }}>Program Color Plans</h1>
        <div style={{
          fontFamily: "'Space Mono',monospace", fontSize: 10, color: 'var(--text-muted)',
          letterSpacing: '0.15em', textTransform: 'uppercase', marginTop: 4,
        }}>Port Tampa Bay · Cruise Terminal 5 · RFQ 006-26</div>
      </div>

      {/* Mode Tabs + Controls */}
      <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', gap: 12, margin: '18px auto 0', flexWrap: 'wrap', padding: '0 16px' }}>
        <div style={{ display: 'flex', gap: 3 }}>
          <button onClick={() => setMode('cruise')} style={{
            padding: '10px 32px', border: '1px solid ' + (mode === 'cruise' ? '#8fb5cc' : 'var(--border)'),
            background: mode === 'cruise' ? '#8fb5cc' : 'transparent',
            color: mode === 'cruise' ? '#fff' : 'var(--text-muted)',
            fontFamily: "'Space Mono',monospace", fontSize: 11, fontWeight: 400,
            cursor: 'pointer', letterSpacing: '0.12em', textTransform: 'uppercase',
            transition: 'all 0.2s',
          }}>Cruise Day</button>
          <button onClick={() => setMode('nc')} style={{
            padding: '10px 32px', border: '1px solid ' + (mode === 'nc' ? '#cc8878' : 'var(--border)'),
            background: mode === 'nc' ? '#cc8878' : 'transparent',
            color: mode === 'nc' ? '#fff' : 'var(--text-muted)',
            fontFamily: "'Space Mono',monospace", fontSize: 11, fontWeight: 400,
            cursor: 'pointer', letterSpacing: '0.12em', textTransform: 'uppercase',
            transition: 'all 0.2s',
          }}>Non-Cruise Day</button>
        </div>
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          <button onClick={handleSave} style={{
            padding: '6px 14px', border: '1px solid var(--green)', background: 'transparent',
            color: 'var(--green)', fontFamily: "'Space Mono',monospace", fontSize: 9,
            cursor: 'pointer', letterSpacing: '0.1em', textTransform: 'uppercase',
          }}>Save</button>
          <button onClick={handleLoad} disabled={!hasSaved} style={{
            padding: '6px 14px', border: '1px solid ' + (hasSaved ? 'var(--accent)' : 'var(--border)'), background: 'transparent',
            color: hasSaved ? 'var(--accent)' : 'var(--border)',
            fontFamily: "'Space Mono',monospace", fontSize: 9, cursor: hasSaved ? 'pointer' : 'default',
            letterSpacing: '0.1em', textTransform: 'uppercase',
          }}>Load</button>
          <button onClick={handleForm} style={{
            padding: '6px 14px', border: '1px solid var(--accent)', background: 'transparent',
            color: 'var(--accent)', fontFamily: "'Space Mono',monospace", fontSize: 9,
            cursor: 'pointer', letterSpacing: '0.1em', textTransform: 'uppercase', fontWeight: 700,
          }}>Form</button>
          <button onClick={handleUndo} disabled={history.length === 0} style={{
            padding: '6px 14px', border: '1px solid var(--border)', background: 'transparent',
            color: history.length ? 'var(--text-dim)' : 'var(--border)',
            fontFamily: "'Space Mono',monospace", fontSize: 9, cursor: history.length ? 'pointer' : 'default',
            letterSpacing: '0.1em', textTransform: 'uppercase',
          }}>Undo</button>
          <button onClick={handleReset} style={{
            padding: '6px 14px', border: '1px solid var(--border)', background: 'transparent',
            color: 'var(--text-dim)', fontFamily: "'Space Mono',monospace", fontSize: 9,
            cursor: 'pointer', letterSpacing: '0.1em', textTransform: 'uppercase',
          }}>Reset</button>
          {saveStatus && (
            <span style={{
              fontFamily: "'Space Mono',monospace", fontSize: 9, letterSpacing: '0.08em',
              color: saveStatus === 'saved' ? 'var(--green)' : 'var(--accent)',
              transition: 'opacity 0.3s', opacity: 1,
            }}>{saveStatus === 'saved' ? '\u2713 Saved' : '\u2713 Loaded'}</span>
          )}
        </div>
      </div>

      {/* Plans Grid */}
      <div className="plans-grid">
        <PlanView
          title="Level 1 — Grade"
          blocks={l1Blocks} positions={L1pos} level="L1" mode={mode} fp={L1fp}
          onDragStart={handleDragStart} onResizeStart={handleResizeStart}
          onFpMoveStart={handleFpMoveStart} onFpCornerStart={handleFpCornerStart} onFpEdgeStart={handleFpEdgeStart}
          selectedBlock={selectedBlock} onSelect={handleSelect}
          draggingIdx={dragging} resizingIdx={resizing}
        />
        <PlanView
          title="Level 2 — Upper"
          blocks={l2Blocks} positions={L2pos} level="L2" mode={mode} fp={L2fp}
          onDragStart={handleDragStart} onResizeStart={handleResizeStart}
          onFpMoveStart={handleFpMoveStart} onFpCornerStart={handleFpCornerStart} onFpEdgeStart={handleFpEdgeStart}
          selectedBlock={selectedBlock} onSelect={handleSelect}
          draggingIdx={dragging} resizingIdx={resizing}
        />
      </div>

      {/* Revenue Bar */}
      <div style={{ maxWidth: '100%', margin: '0 auto 12px', padding: '0 16px' }}>
        <div style={{
          background: 'var(--surface)', border: '1px solid var(--border)',
          padding: '10px 16px', display: 'flex', justifyContent: 'center', gap: 32, flexWrap: 'wrap',
        }}>
          {[
            { val: '$1.5M–$5M+', label: 'Event Venue' },
            { val: '$500K–$1M+', label: 'Parking' },
            { val: '$15K–$50K+', label: 'Per Event' },
            { val: '285–305', label: 'Non-Cruise Days' },
          ].map(r => (
            <div key={r.label} style={{ textAlign: 'center' }}>
              <div style={{ fontFamily: "'Cormorant Garamond',serif", fontSize: 18, fontWeight: 300, color: 'var(--accent)' }}>{r.val}</div>
              <div style={{ fontFamily: "'Space Mono',monospace", fontSize: 8, color: 'var(--text-muted)', letterSpacing: '0.1em', textTransform: 'uppercase', marginTop: 1 }}>{r.label}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Legend */}
      <Legend mode={mode} />

      {/* Tooltip for selected block */}
      {selectedData && <Tooltip block={selectedData} />}

      {/* Hover styles */}
      <style>{`
        .interactive-block:hover {
          transform: scale(1.03);
          z-index: 10 !important;
          border-color: rgba(0,0,0,0.2) !important;
          box-shadow: 0 4px 16px rgba(0,0,0,0.12) !important;
          opacity: 0.85 !important;
        }
      `}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
