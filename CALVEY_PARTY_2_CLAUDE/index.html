        setProject(p);
        setApplyError(null);
        setUploadError(null);
        setForceAdvanced(false);
      }

      function handleBlankStart() {
        // Escape hatch for power users who want to hand-edit JSON immediately.
        setForceAdvanced(true);
        setApplyError(null);
        setUploadError(null);
      }

      function handleUpload(ev) {
        const file = ev.target.files && ev.target.files[0];
        // reset input so the same file can be re-selected later
        ev.target.value = "";
        if (!file) return;
        uploadProjectFile(file)
          .then(p => {
            setProject(p);
            setUploadError(null);
          })
          .catch(err => {
            setUploadError(err && err.message ? err.message : String(err));
          });
      }

      function handleDownload() {
        downloadProjectFile(project);
      }

      function handleValidate() {
        setValidation(validateProject(project));
      }

      function handleApplyEdits() {
        let parsed;
        try {
          parsed = JSON.parse(textareaValue);
        } catch (e) {
          setApplyError("Could not parse JSON: " + e.message);
          return;
        }
        setApplyError(null);
        setProject(parsed);
      }

      function handleRevert() {
        setTextareaValue(JSON.stringify(project, null, 2));
        setApplyError(null);
      }

      const dbMessage = dbStatus.loaded
        ? ("PROGRAM DATABASE LOADED · " + dbStatus.count + " building types · " + (dbStatus.source || ""))
        : "PROGRAM DATABASE NOT PRESENT — copy CALVEY_PROGRAM/data into ./data/ and reload";

      const showOnboarding = !forceAdvanced && isFreshProject(project);

      if (showOnboarding) {
        return (
          <OnboardingView
            buildingTypes={dbStatus.types || []}
            dbLoaded={dbStatus.loaded}
            onStart={handleStartFromOnboarding}
            onUpload={handleUpload}
            onBlank={handleBlankStart}
            uploadError={uploadError}
          />
        );
      }

      return (
        <div className="app">
          <header className="section">
            <h1>CALVEY PARTY 2</h1>
            <div className="label">SANDBOX · STEP 01 · SCHEMA + PERSISTENCE SHELL</div>
          </header>

          <div className="section">
            <button onClick={handleNewProject}>Start Over</button>
            <label className="upload">
              Load .calvey-party.json
              <input type="file" accept=".json,application/json" onChange={handleUpload} />
            </label>
            <button onClick={handleDownload}>Download .calvey-party.json</button>
            <button onClick={handleValidate}>Validate</button>
          </div>

          {uploadError && (
            <div className="section">
              <span className="chip chip-error">UPLOAD FAILED: {uploadError}</span>
            </div>
          )}

          <ValidationChips validation={validation} />

          <FootprintCanvas project={project} setProject={setProject} programDb={dbStatus} />

          <div className="hairline"></div>

          <div className="section">
            <h3>METADATA</h3>
            <MetadataPanel project={project} />
          </div>

          <div className="section">
            <h3>PROGRAM DATABASE</h3>
            <div className="block-note">{dbMessage}</div>
          </div>

          <div className="hairline"></div>

          <div className="section">
            <h3>PROJECT JSON</h3>
            {applyError && (
              <div className="section">
                <span className="chip chip-error">{applyError}</span>
              </div>
            )}
            <textarea
              className="json-viewer"
              value={textareaValue}
              onChange={(e) => setTextareaValue(e.target.value)}
              spellCheck={false}
            />
            <div style={{ marginTop: 12 }}>
              <button onClick={handleApplyEdits}>Apply edits</button>
              <button onClick={handleRevert}>Revert</button>
            </div>
          </div>

          <footer>
            SCHEMA 2.1-PARTY · ENGINE 0.1.0-STEP01 · STEP 01 OF 09
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
