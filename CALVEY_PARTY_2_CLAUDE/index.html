        // Keep the starting midpoint under the starting screen midpoint.
        // Matches the worldToScreen invariant the mouse-wheel zoom already uses.
        const [sx0, sy0] = pinch.startMidScreen;
        const [mwx, mwy] = pinch.startMidWorld;
        const newPanX = mwx - (sx0 - vp.width / 2) / newZoom;
        const newPanY = mwy + (sy0 - vp.height / 2) / newZoom;
        setView({ zoom: newZoom, panX: newPanX, panY: newPanY });
        setGesture(g => (g.type === "pinching"
          ? { ...g, currentZoom: newZoom }
          : g));
      }

      function endPinch() {
        pinchRef.current = null;
        // If fingers are still down when pinch ends, mark them ignored so
        // they don't start a stray pan. They're cleared the next time each
        // one actually lifts.
        for (const id of activePointersRef.current.keys()) {
          ignoredPointersRef.current.add(id);
        }
        setGesture(g => (g.type === "pinching"
          ? { type: "idle", roomId: null, startBounds: null,
              ghostCells: null, dropValid: false,
              crossFloorTarget: null, crossFloorValid: false,
              pointerType: null, fingerScreen: null, fingerClient: null, currentZoom: null }
          : g));
      }

      function handlePointerDown(e) {
        // Right-click is handled by onContextMenu — ignore here so we don't
        // start a spurious pan.
        if (e.button === 2) return;

        // Step T1 — register this pointer in the active map before any
        // gesture-routing decisions. preventDefault on touch suppresses
        // Safari's long-press selection menu and double-tap zoom.
        activePointersRef.current.set(e.pointerId, {
          clientX: e.clientX, clientY: e.clientY, pointerType: e.pointerType
        });
        syncPointerCount();
        if (e.pointerType === "touch" && e.cancelable) {
          e.preventDefault();
        }

        // Step T1 — if a second pointer lands during a single-pointer
        // gesture, abort that gesture and start pinch. The second pointer
        // itself does not propagate further in this handler.
        if (activePointersRef.current.size === 2) {
          abortSinglePointerGesture();
          startPinch();
          return;
        }

        // Step T1 — pointers remaining after a pinch-end are "ignored" so
        // the user has to fully lift + re-press before a new gesture
        // starts. Avoids the jarring "pinch ended, remaining finger jumps
        // into a pan" surprise.
        if (ignoredPointersRef.current.has(e.pointerId)) return;
        if (activePointersRef.current.size > 2) return;

        const svg = svgRef.current;
        if (!svg) return;
        const rect = svg.getBoundingClientRect();
        const screenX = e.clientX - rect.left;
        const screenY = e.clientY - rect.top;

        // Close an open lock chip on any other pointerdown.
        if (lockChip) closeLockChip();

        // Step 06 — wall hit-test has priority over room hit-tests. A wall
        // lives on the boundary between two room hit-target rects; without
        // this branch the click would be routed to whichever room's rect
        // happened to be on top.
        // Step T2 — tighter radius at pointer-down than the 12 px T1
        // fat-finger preview radius: touch pointer-down uses 8 px so a
        // finger clearly inside a room falls through to room-drag instead
        // of hijacking into a wall scrub. Mouse stays at 4 px, matching
        // the existing hover preview.
        const vp = viewportRef.current;
        const view = viewRef.current;
        if (vp && view) {
          const [wx, wy] = screenToWorld(screenX, screenY, view, vp);
          const pxRadius = e.pointerType === "touch" ? 8 : 4;
          const hit = findHoverableWall(
            wallIndexRef.current || [],
            placedRoomsRef.current || [],
            wx, wy, view.zoom, pxRadius
          );
          if (hit && startReproportion(e, hit, screenX, screenY)) return;
        }

        const roomEl = e.target && e.target.closest &&
                       e.target.closest('[data-room-id]');
        if (roomEl) {
          const roomId = roomEl.getAttribute('data-room-id');
          const rooms = placedRoomsRef.current || [];
          const room = rooms.find(r => r && r.instance_id === roomId);
          if (!room) { startPan(e, screenX, screenY); return; }
          // Locked rooms are immovable → fall through to pan (spec Section 01).
          if (room.locked) { startPan(e, screenX, screenY); return; }

          // Double-tap: two taps on the same room within 300 ms → lock chip.
          // Step T2 — desktop mouse only. iOS Safari synthesizes mouse
          // events around taps in ways that collide with the native double-
          // tap zoom gesture; long-press is the touch lock trigger instead.
          if (e.pointerType !== "touch") {
            const now = Date.now();
            const last = lastTapRef.current;
            if (last && last.roomId === roomId && (now - last.time) < 300) {
              lastTapRef.current = null;
              openLockChip(roomId);
              return;
            }
          }

          startRoomDrag(e, room, screenX, screenY);
          return;
        }

        startPan(e, screenX, screenY);
      }

      function handlePointerMove(e) {
        const svg = svgRef.current;
        if (!svg) return;
        const rect = svg.getBoundingClientRect();
        const sx = e.clientX - rect.left;
        const sy = e.clientY - rect.top;

        // Step T2 — feed the long-press detector every move so it can cancel
        // the 500 ms timer as soon as the finger drifts > 3 px. Safe to call
        // unconditionally; a no-op when no long-press is armed.
        longPress.move(e);

        // Step T1 — keep the active-pointer map current so pinch can read
        // both positions each tick.
        if (activePointersRef.current.has(e.pointerId)) {
          activePointersRef.current.set(e.pointerId, {
            clientX: e.clientX, clientY: e.clientY, pointerType: e.pointerType
          });
        }

        // Step T1 — pinching takes over completely while two pointers are
        // down. Don't run pan/drag/reproportion motion in that case.
        if (pinchRef.current && activePointersRef.current.size === 2) {
          tickPinch();
          return;
        }

        const ds = dragStateRef.current;
        if (!ds) {
          // Step 06 — idle hover: detect walls so we can change cursor +
          // preview the alignment group.
          // Step T2 — gate on mouse. Touch has no idle hover (pointermove
          // only fires during active drag), but Safari sometimes synthesizes
          // stray pointermove events from touches; an explicit guard keeps
          // the wall index quiet and avoids accidental hover previews.
          if (e.pointerType !== "mouse") {
            // Also clear any stale hover from a previous mouse session so
            // the highlight doesn't linger when a touch takes over.
            if (hoveredWallIdRef.current) setHoveredWallId(null);
            return;
          }
          const vp = viewportRef.current;
          const view = viewRef.current;
          if (!vp || !view) return;
          const [wx, wy] = screenToWorld(sx, sy, view, vp);
          const hit = findHoverableWall(
            wallIndexRef.current || [],
            placedRoomsRef.current || [],
            wx, wy, view.zoom
          );
          const hitId = hit ? hit.id : null;
          if (hitId !== hoveredWallIdRef.current) {
            setHoveredWallId(hitId);
          }
          return;
        }

        if (ds.mode === "pan") {
          const dx = sx - ds.startScreenX;
          const dy = sy - ds.startScreenY;
          setView(v => ({
            panX: ds.startPanX - dx / v.zoom,
            panY: ds.startPanY + dy / v.zoom,
            zoom: v.zoom
          }));
          return;
        }

        if (ds.mode === "room") {
          const dsx = sx - ds.startScreenX;
          const dsy = sy - ds.startScreenY;
          if (!ds.moved && Math.hypot(dsx, dsy) > 3) {
            ds.moved = true;
            // Redundant with longPress.move() called at the top of this
            // handler, but cheap and explicit — defense in depth.
            longPress.cancel();
          }
          const v = viewRef.current;
          const g = gridRef.current;
          if (!g) return;

          // Step 07 — check whether the cursor is over a floor-strip tile
          // BEFORE running the in-canvas reflow ghost. elementFromPoint reads
          // the actual DOM node under the cursor (the floor strip is HTML, not
          // SVG). When over a tile, freeze the in-canvas ghost and preview
          // the cross-floor drop instead.
          let crossFloorTarget = null;
          let crossFloorValid = false;
          const overEl = document.elementFromPoint(e.clientX, e.clientY);
          if (overEl) {
            const tile = overEl.closest && overEl.closest('[data-floor-index]');
            if (tile) {
              const idxAttr = tile.getAttribute('data-floor-index');
              const idx = parseInt(idxAttr, 10);
              if (Number.isInteger(idx)) {
                const proj = projectRef.current;
                const activeIdxNow = (proj && proj.current_plan &&
                  Number.isFinite(Number(proj.current_plan.active_floor_index)))
                    ? Math.floor(Number(proj.current_plan.active_floor_index)) : 0;
                if (idx !== activeIdxNow) {
                  crossFloorTarget = idx;
                  // Lightweight validity check: target floor must have a
                  // matching department region. Detailed packing happens at
                  // commit time in crossFloorMove; we only need a hint here.
                  const floors = (proj && proj.current_plan &&
                    Array.isArray(proj.current_plan.floors))
                      ? proj.current_plan.floors : [];
                  const tf = floors[idx];
                  const draggedRoom = (placedRoomsRef.current || []).find(
                    r => r && r.instance_id === ds.roomId);
                  if (tf && draggedRoom && Array.isArray(tf.department_regions)) {
                    crossFloorValid = tf.department_regions.some(rr =>
                      rr && rr.id === draggedRoom.department_id);
                  }
                }
              }
            }
          }

          if (Number.isInteger(crossFloorTarget)) {
            // Cursor is over a target tile — freeze the in-canvas ghost at
            // the source room's original cells (matches what crossFloorMove
            // would do) and surface the drop preview on the strip.
            setGesture(G => ({
              ...G,
              type: "dragging_room",
              ghostCells: ds.startCells,
              dropValid: false,
              crossFloorTarget,
              crossFloorValid,
              fingerScreen: { x: sx, y: sy },
              fingerClient: { x: e.clientX, y: e.clientY }
            }));
            return;
          }

          // World delta (Y flipped).
          const dwx = dsx / v.zoom;
          const dwy = -dsy / v.zoom;
          const du = Math.round(dwx / g.cell_size_ft);
          const dv = Math.round(dwy / g.cell_size_ft);
          const ghostCells = ds.startCells.map(([u, cv]) => [u + du, cv + dv]);

          // Validate the drop for ghost coloring. Mirrors localReflow's
          // out-of-department + locked-collision checks so the user sees
          // red before they commit.
          const rooms = placedRoomsRef.current || [];
          const regs = regionsRef.current || [];
          const room = rooms.find(r => r && r.instance_id === ds.roomId);
          const homeDept = room ? room.department_id : null;
          const regionOwner = new Map();
          for (const rr of regs) {
            if (!isPlainObject(rr) || !Array.isArray(rr.cells)) continue;
            for (const [ux, vx] of rr.cells) {
              regionOwner.set(ux + "," + vx, rr.id);
            }
          }
          const lockedKeys = new Set();
          for (const r of rooms) {
            if (!r || !r.locked || !Array.isArray(r.cells)) continue;
            for (const [u, cv] of r.cells) lockedKeys.add(u + "," + cv);
          }
          const oldKeys = new Set(ds.startCells.map(([u, cv]) => u + "," + cv));

          const W = g.width_cells, H = g.height_cells;
          let valid = true;
          for (const [u, cv] of ghostCells) {
            if (u < 0 || u >= W || cv < 0 || cv >= H) { valid = false; break; }
            if (!g.inside[cv] || !g.inside[cv][u]) { valid = false; break; }
            if (regionOwner.get(u + "," + cv) !== homeDept) { valid = false; break; }
            const k = u + "," + cv;
            if (lockedKeys.has(k) && !oldKeys.has(k)) { valid = false; break; }
          }

          setGesture(G => ({
            ...G,
            type: "dragging_room",
            ghostCells,
            dropValid: valid,
            crossFloorTarget: null,
            crossFloorValid: false,
            fingerScreen: { x: sx, y: sy },
            fingerClient: { x: e.clientX, y: e.clientY }
          }));
          return;
        }

        if (ds.mode === "reproportion") {
          tickReproportion(e, sx, sy);
          return;
        }
      }

      function handlePointerUp(e) {
        // Step T1 — retire the pointer from the active map and clear its
        // ignored flag (so a re-press after a pinch works normally).
        activePointersRef.current.delete(e.pointerId);
        ignoredPointersRef.current.delete(e.pointerId);
        syncPointerCount();

        // Step T1 — pinch end when the second finger lifts. If a finger
        // remains down it's marked ignored until it also lifts.
        if (pinchRef.current) {
          if (activePointersRef.current.size < 2) {
            endPinch();
          }
          return;
        }

        const ds = dragStateRef.current;
        if (!ds) return;
        const svg = svgRef.current;
        try {
          if (svg && svg.hasPointerCapture &&
              svg.hasPointerCapture(e.pointerId)) {
            svg.releasePointerCapture(e.pointerId);
          }
        } catch (err) {}

        if (ds.mode === "pan") {
          dragStateRef.current = null;
          setIsPanning(false);
          setGesture(g => (g.type === "panning"
            ? { type: "idle", roomId: null, startBounds: null,
                ghostCells: null, dropValid: false,
                crossFloorTarget: null, crossFloorValid: false,
                pointerType: null, fingerScreen: null, fingerClient: null, currentZoom: null }
            : g));
          return;
        }

        if (ds.mode === "room") {
          longPress.cancel();
          const roomId = ds.roomId;
          const startCells = ds.startCells;
          const moved = ds.moved;

          // Step 07 — capture the final pointer location so we can detect a
          // cross-floor drop on a strip tile (the gesture state's
          // crossFloorTarget may be one tick stale).
          let dropTileIdx = null;
          const overEl = document.elementFromPoint(e.clientX, e.clientY);
          if (overEl) {
            const tile = overEl.closest && overEl.closest('[data-floor-index]');
            if (tile) {
              const idxAttr = tile.getAttribute('data-floor-index');
              const idx = parseInt(idxAttr, 10);
              if (Number.isInteger(idx)) dropTileIdx = idx;
            }
          }

          // Recompute ghost cells from the up event so they're final.
          let ghostCells = startCells;
          const rect = svg ? svg.getBoundingClientRect() : null;
          const g = gridRef.current;
          if (rect && g) {
            const sx = e.clientX - rect.left;
            const sy = e.clientY - rect.top;
            const dsx = sx - ds.startScreenX;
            const dsy = sy - ds.startScreenY;
            const v = viewRef.current;
            const du = Math.round(dsx / v.zoom / g.cell_size_ft);
            const dv = Math.round(-dsy / v.zoom / g.cell_size_ft);
            ghostCells = startCells.map(([u, cv]) => [u + du, cv + dv]);
          }

          dragStateRef.current = null;
          setGesture({ type: "idle", roomId: null, startBounds: null,
                       ghostCells: null, dropValid: false,
                       crossFloorTarget: null, crossFloorValid: false,
                       pointerType: null, fingerScreen: null, fingerClient: null, currentZoom: null });

          // Pure tap (no movement): record for double-tap, do nothing else.
          // Step T2 — skip the double-tap bookkeeping for touch. Touch no
          // longer uses double-tap as a lock trigger (long-press is the
          // touch trigger, right-click the desktop trigger); recording a
          // tap here would only invite false positives when a subsequent
          // mouse click lands on the same room ID during a mixed session.
          if (!moved) {
            if (e.pointerType !== "touch") {
              lastTapRef.current = { roomId, time: Date.now() };
            }
            return;
          }

          // Step 07 — cross-floor drop. If the cursor is over a tile other
          // than the active floor, route through crossFloorMove. Same-floor
          // tile drops fall through to the normal localReflow path so the
          // user can drop on the source floor's tile to "cancel" without an
          // accidental in-canvas reflow.
          if (Number.isInteger(dropTileIdx) && setProject) {
            const projNow = projectRef.current;
            const activeIdxNow = (projNow && projNow.current_plan &&
              Number.isFinite(Number(projNow.current_plan.active_floor_index)))
                ? Math.floor(Number(projNow.current_plan.active_floor_index)) : 0;
            if (dropTileIdx !== activeIdxNow) {
              setProject(p => {
                const result = crossFloorMove(p, roomId, dropTileIdx);
                if (result && result.ok) {
                  const np = result.project;
                  logEvent(np, "CROSS_FLOOR_DRAG", {
                    room_id: roomId,
                    from_floor: activeIdxNow + 1,
                    to_floor: dropTileIdx + 1
                  });
                  return np;
                }
                showReject(result && result.reason ? result.reason : "cross_floor_failed");
                return p;
              });
              return;
            }
            // dropTileIdx === activeIdxNow → silent no-op; user cancelled.
            return;
          }

          // No-op drop (same cells) → silent revert.
          const same =
            ghostCells.length === startCells.length &&
            ghostCells.every(([u, v], i) =>
              u === startCells[i][0] && v === startCells[i][1]);
          if (same) return;

          if (!setProject) return;
          // Commit through localReflow; it owns all validation + reflow.
          setProject(p => {
            const result = localReflow(p, roomId, ghostCells,
              { radius: 4, cascadeDepth: 1 });
            if (result && result.ok) {
              // v1 — Phase 7. Log DRAG_ROOM on successful commit.
              const np = result.project;
              const fromCentroidCells = (() => {
                let su = 0, sv = 0;
                for (const [u, v] of startCells) { su += u; sv += v; }
                return startCells.length > 0
                  ? [su / startCells.length, sv / startCells.length] : [0, 0];
              })();
              const toCentroidCells = (() => {
                let su = 0, sv = 0;
                for (const [u, v] of ghostCells) { su += u; sv += v; }
                return ghostCells.length > 0
                  ? [su / ghostCells.length, sv / ghostCells.length] : [0, 0];
              })();
              const distance = Math.hypot(
                toCentroidCells[0] - fromCentroidCells[0],
                toCentroidCells[1] - fromCentroidCells[1]);
              const activeIdxNow = (np.current_plan &&
                Number.isFinite(Number(np.current_plan.active_floor_index)))
                ? Math.floor(Number(np.current_plan.active_floor_index)) : 0;
              logEvent(np, "DRAG_ROOM", {
                room_id: roomId,
                floor_level: activeIdxNow + 1,
                from_centroid: fromCentroidCells,
                to_centroid: toCentroidCells,
                distance_cells: distance
              });
              return np;
            }
            showReject(result && result.reason ? result.reason : "invalid_drop");
            return p;
          });
          return;
        }

        if (ds.mode === "reproportion") {
          // Let tickReproportion run once more with the final screen coords
          // so a fast release still commits whatever position the cursor
          // landed on.
          const rect2 = svg ? svg.getBoundingClientRect() : null;
          if (rect2) {
            tickReproportion(e, e.clientX - rect2.left, e.clientY - rect2.top);
          }
          commitReproportion();
          return;
        }
      }

      function handlePointerCancel(e) {
        longPress.cancel();
        // Step T1 — a cancelled pointer should leave the active map just
        // like a normal up. handlePointerUp already does this for the
        // non-reproportion paths; mirror it here for the early return.
        if (dragStateRef.current && dragStateRef.current.mode === "reproportion") {
          activePointersRef.current.delete(e.pointerId);
          ignoredPointersRef.current.delete(e.pointerId);
          syncPointerCount();
          cancelReproportion();
          return;
        }
        handlePointerUp(e);
      }

      function handleContextMenu(e) {
        // Right-click on a room → lock chip.
        // Step T2 — preventDefault unconditionally so iOS Safari's long-press
        // context menu never appears inside the canvas (belt-and-suspenders
        // with -webkit-touch-callout: none from T1 and the native
        // preventDefault in the pointerdown listener). Desktop right-click
        // on background loses its browser menu too, but this editor has no
        // "save image as" etc. to preserve.
        e.preventDefault();
        const roomEl = e.target && e.target.closest &&
                       e.target.closest('[data-room-id]');
        if (!roomEl) return;
        const roomId = roomEl.getAttribute('data-room-id');
        openLockChip(roomId);
      }

      function handleDoubleClick(e) {
        if (e.target !== backgroundRef.current) return;
        setView(computeInitialView(polygon, viewport.width, viewport.height));
      }

      function handleFitClick() {
        setView(computeInitialView(polygon, viewport.width, viewport.height));
      }

      // Step 05/06 — Escape cancels an in-flight gesture or closes the lock
      // chip without committing. During reproportion: drop the ghost,
      // project stays as it was before the scrub started.
      React.useEffect(() => {
        function onKeyDown(e) {
          if (e.key !== "Escape") return;
          const gs = gestureRef.current;
          if (gs && gs.type === "dragging_room") {
            cancelDrag();
          } else if (gs && gs.type === "showing_lock_chip") {
            closeLockChip();
          } else if (gs && gs.type === "reproportioning") {
            cancelReproportion();
          }
        }
        document.addEventListener("keydown", onKeyDown);
        return () => document.removeEventListener("keydown", onKeyDown);
        // eslint-disable-next-line react-hooks/exhaustive-deps
      }, []);

      // Cleanup timers on unmount.
      React.useEffect(() => () => {
        longPress.cancel();
        if (lockChipTimerRef.current) clearTimeout(lockChipTimerRef.current);
        if (rejectTimerRef.current) clearTimeout(rejectTimerRef.current);
        // eslint-disable-next-line react-hooks/exhaustive-deps
      }, []);

      // ----- Step 03: Generate (Stage A) -----

      const [isGenerating, setIsGenerating] = React.useState(false);
      const [generateError, setGenerateError] = React.useState(null);
      // Cache building-type JSONs keyed by filename. Cleared on remount.
      const bTypeCacheRef = React.useRef(new Map());

      const dbLoaded = !!(programDb && programDb.loaded);
      const canGenerate =
        !!setProject &&
        dbLoaded &&
        project && project.context && project.context.program &&
        project.context.program.building_type != null &&
        polygon.length >= 3 &&
        !isGenerating;

      async function fetchBuildingTypeJson(buildingTypeName) {
        if (!programDb || !programDb.loaded) {
          throw new Error("program database not loaded");
        }
        const databases = Array.isArray(programDb.databases) ? programDb.databases : [];
        const entry = databases.find(e =>
          isPlainObject(e) && e.building_type === buildingTypeName);
        if (!entry) {
          throw new Error("building type not in master index: " + buildingTypeName);
        }
        const fileName = entry.file || entry.json;
        if (!fileName) throw new Error("master index entry has no file: " + buildingTypeName);
        const cache = bTypeCacheRef.current;
        if (cache.has(fileName)) return cache.get(fileName);
        // Same directory as the master index.
        const src = programDb.source || "./data/master_index.json";
        const dir = src.substring(0, src.lastIndexOf("/") + 1);
        const path = dir + fileName;
        const res = await fetch(path);
        if (!res.ok) throw new Error("fetch failed for " + path + " (" + res.status + ")");
        const json = await res.json();
        cache.set(fileName, json);
        return json;
      }

      async function handleGenerate() {
        if (!canGenerate) return;
        setIsGenerating(true);
        setGenerateError(null);
        const startedAt = Date.now();
        try {
          const btName = project.context.program.building_type;
          const btJson = await fetchBuildingTypeJson(btName);
          const newProject = generatePlan(project, btJson);
          // v1 — Phase 7. Log GENERATE event with summary payload.
          const totalRooms = (newProject.current_plan.floors || [])
            .reduce((acc, f) => acc +
              (Array.isArray(f.rooms) ? f.rooms.length : 0), 0);
          logEvent(newProject, "GENERATE", {
            building_type: btName,
            total_rooms: totalRooms,
            confidence: newProject.confidence
              ? newProject.confidence.total_score : null,
            duration_ms: Date.now() - startedAt
          });
          setProject(newProject);
        } catch (err) {
          console.error("generate failed:", err);
          setGenerateError(err && err.message ? err.message : String(err));
        } finally {
          setIsGenerating(false);
        }
      }

      // ----- Step 04: RE-SEED FROM DB -----
      // Clears program_inputs then regenerates. First click shows an inline
      // confirm; subsequent clicks in the same session go straight through.
      const [reseedConfirm, setReseedConfirm] = React.useState(false);
      const reseedConfirmedOnceRef = React.useRef(false);

      async function runReseed() {
        if (!canGenerate) return;
        setIsGenerating(true);
        setGenerateError(null);
        try {
          const btName = project.context.program.building_type;
          const btJson = await fetchBuildingTypeJson(btName);
          const cleared = cloneProject(project);
          if (!isPlainObject(cleared.context.program)) cleared.context.program = {};
          cleared.context.program.program_inputs = {};
          const newProject = generatePlan(cleared, btJson);
          setProject(newProject);
        } catch (err) {
          console.error("re-seed failed:", err);
          setGenerateError(err && err.message ? err.message : String(err));
        } finally {
          setIsGenerating(false);
        }
      }

      function handleReseedClick() {
        if (!canGenerate) return;
        if (reseedConfirmedOnceRef.current) {
          runReseed();
        } else {
          setReseedConfirm(true);
        }
      }

      function handleReseedConfirm() {
        reseedConfirmedOnceRef.current = true;
        setReseedConfirm(false);
        runReseed();
      }

      function handleReseedCancel() {
        setReseedConfirm(false);
      }

      // ----- Step 04: click-to-pulse on unplaced rows -----
      // Tracks which department (if any) is currently pulsing. We render a
      // yellow outlined rect over each *unclaimed* cell of that department's
      // region for 2.4 seconds (3 × 0.8s animation cycles).
      const [pulsingDeptId, setPulsingDeptId] = React.useState(null);
      const pulseTimerRef = React.useRef(null);
      React.useEffect(() => () => {
        if (pulseTimerRef.current) clearTimeout(pulseTimerRef.current);
      }, []);

      function pulseUnplacedForDept(deptId) {
        if (!deptId) return;
        if (pulseTimerRef.current) clearTimeout(pulseTimerRef.current);
        // Restart animation by clearing then setting. React re-mounts keyed
        // rects so the CSS animation replays.
        setPulsingDeptId(null);
        setTimeout(() => setPulsingDeptId(deptId), 20);
        pulseTimerRef.current = setTimeout(() => {
          setPulsingDeptId(null);
          pulseTimerRef.current = null;
        }, 2400);
      }

      // ----- Render-time projection -----

      const screenPoints = polygon
        .filter(pt => Array.isArray(pt) && pt.length >= 2 &&
          Number.isFinite(Number(pt[0])) && Number.isFinite(Number(pt[1])))
        .map(([x, y]) => worldToScreen(Number(x), Number(y), view, viewport));
      const polygonPointsAttr = screenPoints
        .map(([x, y]) => x.toFixed(2) + "," + y.toFixed(2))
        .join(" ");
      const validPolygon = screenPoints.length >= 3;

      const [originSX, originSY] = worldToScreen(0, 0, view, viewport);

      // Compass overlay (screen-space, top-left, 20px inset, 48px square)
      const compassCx = 20 + 24;
      const compassCy = 20 + 24;
      const needleRad = (trueNorthDeg * Math.PI) / 180;
      // 0° = north (up on screen, -Y), 90° = east (+X), so the screen-space
      // needle direction is (sin, -cos).
      const needleDX = Math.sin(needleRad);
      const needleDY = -Math.cos(needleRad);
      const needleTipX = compassCx + 18 * needleDX;
      const needleTipY = compassCy + 18 * needleDY;
      const labelOffsetX = compassCx + 26 * needleDX;
      const labelOffsetY = compassCy + 26 * needleDY;
      // Triangle arrowhead: base perpendicular to needle, tip at needle end.
      const perpX = -needleDY;
      const perpY = needleDX;
      const arrowBaseX = compassCx + 12 * needleDX;
      const arrowBaseY = compassCy + 12 * needleDY;
      const arrowPts =
        (arrowBaseX + 3.5 * perpX).toFixed(2) + "," + (arrowBaseY + 3.5 * perpY).toFixed(2) + " " +
        (arrowBaseX - 3.5 * perpX).toFixed(2) + "," + (arrowBaseY - 3.5 * perpY).toFixed(2) + " " +
        needleTipX.toFixed(2) + "," + needleTipY.toFixed(2);

      // Scale bar (screen-space, bottom-left, 20px inset)
      const scaleBarFt = niceScaleBarLength(view.zoom);
      const scaleBarPx = scaleBarFt * view.zoom;
      const scaleBarX = 20;
      const scaleBarY = Math.max(40, viewport.height - 32);

      // Metadata overlay text
      const polyVertexCount = polygon.length;
      const areaSF = computePolygonAreaSF(polygon);
      const areaLabel = areaSF >= 100
        ? Math.round(areaSF).toLocaleString()
        : areaSF.toFixed(1);

      const showOriginMarker = viewport.width > 0 && viewport.height > 0;

      // ----- Department region projection (Step 03) -----
      // For each region: project cells to screen rects, trace the outer
      // boundary by emitting the 4 edges that face cells outside the region,
      // and pick a label point (centroid, or nearest in-region cell center).
      const regionLayer = React.useMemo(() => {
        if (!grid || !Array.isArray(regions) || regions.length === 0) return null;
        const cs = grid.cell_size_ft;
        const ox = grid.origin_x, oy = grid.origin_y;
        const W = grid.width_cells, H = grid.height_cells;

        // Build an ownership lookup: (u,v) → regionIndex, so boundary detection
        // handles both "outside grid" and "other-region" correctly.
        const owner = new Array(H);
        for (let v = 0; v < H; v++) owner[v] = new Array(W).fill(-1);
        regions.forEach((r, ri) => {
          if (!Array.isArray(r.cells)) return;
          for (const [u, v] of r.cells) {
            if (u >= 0 && u < W && v >= 0 && v < H) owner[v][u] = ri;
          }
        });

        function cornerScreen(u, v) {
          return worldToScreen(ox + u * cs, oy + v * cs, view, viewport);
        }

        return regions.map((region, ri) => {
          if (!Array.isArray(region.cells) || region.cells.length === 0) return null;
          const color = deptColor(region.id);
          // 1) Cell rects
          const rects = region.cells.map(([u, v], i) => {
            const [sx0, sy0] = cornerScreen(u, v);         // world-SW → screen (flipped Y)
            const [sx1, sy1] = cornerScreen(u + 1, v + 1); // world-NE → screen
            const x = Math.min(sx0, sx1), y = Math.min(sy0, sy1);
            const w = Math.abs(sx1 - sx0), h = Math.abs(sy1 - sy0);
            return (
              <rect key={"c" + i} x={x} y={y} width={w} height={h}
                    fill={color} fillOpacity="0.7"
                    style={{ pointerEvents: "none" }} />
            );
          });

          // 2) Outer boundary: per-cell, emit edges facing non-members.
          const edges = [];
          region.cells.forEach(([u, v], i) => {
            // North edge (u,v) – (u+1,v+1 side of v+1 row) at y = (v+1)*cs
            if (v + 1 >= H || owner[v + 1][u] !== ri) {
              const [ax, ay] = cornerScreen(u, v + 1);
              const [bx, by] = cornerScreen(u + 1, v + 1);
              edges.push(<line key={"n" + i} x1={ax} y1={ay} x2={bx} y2={by}
                stroke="var(--calvey-muted)" strokeOpacity="0.4" strokeWidth="1"
                style={{ pointerEvents: "none" }} />);
            }
            // South edge
            if (v - 1 < 0 || owner[v - 1][u] !== ri) {
              const [ax, ay] = cornerScreen(u, v);
              const [bx, by] = cornerScreen(u + 1, v);
              edges.push(<line key={"s" + i} x1={ax} y1={ay} x2={bx} y2={by}
                stroke="var(--calvey-muted)" strokeOpacity="0.4" strokeWidth="1"
                style={{ pointerEvents: "none" }} />);
            }
            // East edge
            if (u + 1 >= W || owner[v][u + 1] !== ri) {
              const [ax, ay] = cornerScreen(u + 1, v);
              const [bx, by] = cornerScreen(u + 1, v + 1);
              edges.push(<line key={"e" + i} x1={ax} y1={ay} x2={bx} y2={by}
                stroke="var(--calvey-muted)" strokeOpacity="0.4" strokeWidth="1"
                style={{ pointerEvents: "none" }} />);
            }
            // West edge
            if (u - 1 < 0 || owner[v][u - 1] !== ri) {
              const [ax, ay] = cornerScreen(u, v);
              const [bx, by] = cornerScreen(u, v + 1);
              edges.push(<line key={"w" + i} x1={ax} y1={ay} x2={bx} y2={by}
                stroke="var(--calvey-muted)" strokeOpacity="0.4" strokeWidth="1"
                style={{ pointerEvents: "none" }} />);
            }
          });

          // 3) Label point: region centroid unless that cell is not in the
          // region (concave case) — then nearest in-region cell center.
          let labelPt = null;
          if (region.centroid) {
            const [rcx, rcy] = region.centroid;
            let bestD = Infinity, bestC = region.cells[0];
            for (const [u, v] of region.cells) {
              const wx = ox + (u + 0.5) * cs, wy = oy + (v + 0.5) * cs;
              const d = (wx - rcx) * (wx - rcx) + (wy - rcy) * (wy - rcy);
              if (d < bestD) { bestD = d; bestC = [u, v]; }
            }
            const [u, v] = bestC;
            labelPt = worldToScreen(ox + (u + 0.5) * cs, oy + (v + 0.5) * cs, view, viewport);
          }

          return (
            <g key={"region-" + region.id + "-" + ri}>
              {rects}
              {edges}
              {labelPt && (
                <text
                  x={labelPt[0]} y={labelPt[1]}
                  fontFamily="'Space Mono', monospace"
                  fontSize="11"
                  fontWeight="700"
                  letterSpacing="0.05em"
                  textAnchor="middle"
                  dominantBaseline="middle"
                  fill="var(--calvey-text)"
                  style={{ pointerEvents: "none", textTransform: "uppercase" }}
                >{(region.name || region.id).toUpperCase()}</text>
              )}
            </g>
          );
        });
      }, [grid, regions, view, viewport]);

      // ----- Room projection (Step 03 — Stage B output) -----
      // For each placed room: fill cells with the department's palette color
      // (darker than the dept background), trace the room's outer boundary as
      // 1px walls in calvey-text, and draw the room's display name at its
      // centroid in Space Mono 10px. Skip labels for rooms whose screen bbox
      // is too small to be legible (< 40×14 px).
      const roomLayer = React.useMemo(() => {
        if (!grid || !Array.isArray(placedRooms) || placedRooms.length === 0) return null;
        const cs = grid.cell_size_ft;
        const ox = grid.origin_x, oy = grid.origin_y;
        const W = grid.width_cells, H = grid.height_cells;

        // Per-cell ownership lookup: (u,v) → roomIndex. Used so a wall is
        // only drawn between this room and a NON-member cell (other room or
        // empty department slack).
        const owner = new Array(H);
        for (let v = 0; v < H; v++) owner[v] = new Array(W).fill(-1);
        placedRooms.forEach((room, ri) => {
          if (!Array.isArray(room.cells)) return;
          for (const [u, v] of room.cells) {
            if (u >= 0 && u < W && v >= 0 && v < H) owner[v][u] = ri;
          }
        });

        function cornerScreen(u, v) {
          return worldToScreen(ox + u * cs, oy + v * cs, view, viewport);
        }

        return placedRooms.map((room, ri) => {
          if (!Array.isArray(room.cells) || room.cells.length === 0) return null;
          const color = deptColor(room.department_id);

          // 1) Cell rects, darker than the department background.
          const rects = room.cells.map(([u, v], i) => {
            const [sx0, sy0] = cornerScreen(u, v);
            const [sx1, sy1] = cornerScreen(u + 1, v + 1);
            const x = Math.min(sx0, sx1), y = Math.min(sy0, sy1);
            const w = Math.abs(sx1 - sx0), h = Math.abs(sy1 - sy0);
            return (
              <rect key={"c" + i} x={x} y={y} width={w} height={h}
                    fill={color} fillOpacity="0.9"
                    style={{ pointerEvents: "none" }} />
            );
          });

          // 2) Wall edges: emit each shared edge between this room and a
          //    non-member cell (different room or empty/unowned).
          const edges = [];
          room.cells.forEach(([u, v], i) => {
            if (v + 1 >= H || owner[v + 1][u] !== ri) {
              const [ax, ay] = cornerScreen(u, v + 1);
              const [bx, by] = cornerScreen(u + 1, v + 1);
              edges.push(<line key={"n" + i} x1={ax} y1={ay} x2={bx} y2={by}
                stroke="var(--calvey-text)" strokeWidth="1"
                style={{ pointerEvents: "none" }} />);
            }
            if (v - 1 < 0 || owner[v - 1][u] !== ri) {
              const [ax, ay] = cornerScreen(u, v);
              const [bx, by] = cornerScreen(u + 1, v);
              edges.push(<line key={"s" + i} x1={ax} y1={ay} x2={bx} y2={by}
                stroke="var(--calvey-text)" strokeWidth="1"
                style={{ pointerEvents: "none" }} />);
            }
            if (u + 1 >= W || owner[v][u + 1] !== ri) {
              const [ax, ay] = cornerScreen(u + 1, v);
              const [bx, by] = cornerScreen(u + 1, v + 1);
              edges.push(<line key={"e" + i} x1={ax} y1={ay} x2={bx} y2={by}
                stroke="var(--calvey-text)" strokeWidth="1"
                style={{ pointerEvents: "none" }} />);
            }
            if (u - 1 < 0 || owner[v][u - 1] !== ri) {
              const [ax, ay] = cornerScreen(u, v);
              const [bx, by] = cornerScreen(u, v + 1);
              edges.push(<line key={"w" + i} x1={ax} y1={ay} x2={bx} y2={by}
                stroke="var(--calvey-text)" strokeWidth="1"
                style={{ pointerEvents: "none" }} />);
            }
          });

          // 3) Label at room centroid — but only if the screen bbox is
          //    large enough to fit a readable label. Step 05 prepends a small
          //    padlock glyph when the room is locked.
          let labelEl = null;
          let lockGlyphEl = null;
          let labelW = 0;
          let labelX = 0, labelY = 0;
          if (room.bbox_cells && Array.isArray(room.centroid)) {
            const bb = room.bbox_cells;
            const wPx = (bb.u_max - bb.u_min + 1) * cs * view.zoom;
            const hPx = (bb.v_max - bb.v_min + 1) * cs * view.zoom;
            if (wPx >= 40 && hPx >= 14 && room.cells.length >= 2) {
              const [lx, ly] = worldToScreen(room.centroid[0], room.centroid[1], view, viewport);
              const text = (room.display_name || room.type || "").toString().toUpperCase();
              labelX = lx; labelY = ly;
              // Rough width estimate for Space Mono 10 px: ~5.5 px / char.
              labelW = text.length * 5.5;
              labelEl = (
                <text x={lx} y={ly} className="room-label">{text}</text>
              );
              if (room.locked) {
                // Tiny 8x9 padlock anchored to the left of the label text.
                const gx = lx - labelW / 2 - 11;
                const gy = ly - 4.5;
                lockGlyphEl = (
                  <g key="lock" transform={`translate(${gx.toFixed(2)} ${gy.toFixed(2)})`}
                     style={{ pointerEvents: "none" }}>
                    <rect x="0" y="4" width="8" height="5"
                          fill="var(--calvey-text)" stroke="none" rx="0.5" />
                    <path d="M 1.4 4 V 2.4 A 2.6 2.6 0 0 1 6.6 2.4 V 4"
                          fill="none" stroke="var(--calvey-text)" strokeWidth="1" />
                  </g>
                );
              }
            }
          }

          // 4) Step 05 — hit-target rect on top of everything else. It's
          //    transparent but has `pointer-events: all` so hit-testing works
          //    regardless of paint state. Clicks on the room's bbox start a
          //    drag (or fall through to pan when locked).
          let hitEl = null;
          if (room.bbox_cells) {
            const bb = room.bbox_cells;
            const [bx0, by0] = cornerScreen(bb.u_min, bb.v_min);
            const [bx1, by1] = cornerScreen(bb.u_max + 1, bb.v_max + 1);
            const hx = Math.min(bx0, bx1);
            const hy = Math.min(by0, by1);
            const hw = Math.abs(bx1 - bx0);
            const hh = Math.abs(by1 - by0);
            const classes = [];
            if (room.locked) classes.push("locked");
            hitEl = (
              <rect
                key="hit"
                data-room-id={room.instance_id}
                x={hx} y={hy} width={hw} height={hh}
                fill="transparent"
                className={classes.join(" ") || undefined}
                style={{ pointerEvents: "all" }}
              />
            );
          }

          // v1 — Phase 3. Red dashed outline for low-confidence rooms.
          let lowConfOutlineEl = null;
          if (typeof room.confidence === "number" && room.confidence < 0.40 &&
              room.bbox_cells) {
            const bb = room.bbox_cells;
            const [bx0, by0] = cornerScreen(bb.u_min, bb.v_min);
            const [bx1, by1] = cornerScreen(bb.u_max + 1, bb.v_max + 1);
            const lx = Math.min(bx0, bx1), ly = Math.min(by0, by1);
            const lw = Math.abs(bx1 - bx0), lh = Math.abs(by1 - by0);
            lowConfOutlineEl = (
              <rect key="lowconf" x={lx + 1} y={ly + 1}
                    width={Math.max(0, lw - 2)} height={Math.max(0, lh - 2)}
                    fill="none" stroke="#C05050" strokeWidth="1.5"
                    strokeDasharray="4 2"
                    style={{ pointerEvents: "none" }} />
            );
          }

          return (
            <g key={"room-" + room.instance_id + "-" + ri}>
              {rects}
              {edges}
              {lowConfOutlineEl}
              {lockGlyphEl}
              {labelEl}
              {hitEl}
            </g>
          );
        });
      }, [grid, placedRooms, view, viewport]);

      // ----- Summary panel data (Step 03) -----
      // Per department: how many rooms placed, actual SF, target SF.
      // Step 04: switched to target_area_sf (instances now have count=1 each).
      const summaryRows = React.useMemo(() => {
        if (!Array.isArray(regions) || regions.length === 0) return [];
        const programRooms = (project && project.context && project.context.program &&
                              Array.isArray(project.context.program.rooms))
          ? project.context.program.rooms : [];
        const targetByDept = new Map();
        for (const r of programRooms) {
          if (!isPlainObject(r)) continue;
          const dep = r.department_id || r.department || "unassigned";
          const ta = Number.isFinite(Number(r.target_area_sf)) ? Number(r.target_area_sf)
                  : (Number.isFinite(Number(r.target_area)) ? Number(r.target_area) : 0);
          targetByDept.set(dep, (targetByDept.get(dep) || 0) + ta);
        }
        const placedByDept = new Map();
        for (const room of placedRooms) {
          if (!isPlainObject(room)) continue;
          const dep = room.department_id || "unassigned";
          if (!placedByDept.has(dep)) placedByDept.set(dep, { count: 0, area: 0 });
          const slot = placedByDept.get(dep);
          slot.count += 1;
          slot.area += Number.isFinite(Number(room.area_sf)) ? Number(room.area_sf) : 0;
        }
        return regions.map(r => {
          const slot = placedByDept.get(r.id) || { count: 0, area: 0 };
          return {
            id: r.id,
            name: (r.name || r.id).toUpperCase(),
            count: slot.count,
            actualSf: Math.round(slot.area),
            targetSf: Math.round(targetByDept.get(r.id) || 0)
          };
        });
      }, [regions, placedRooms, project]);

      // ----- Step 04: Pulse layer -----
      // When the user clicks an unplaced row, pulse the *empty* cells of that
      // department's region. Empty = inside the region AND not claimed by a
      // placed room. Re-keyed by pulsingDeptId so the CSS animation replays
      // on every click.
      const pulseLayer = React.useMemo(() => {
        if (!grid || !pulsingDeptId) return null;
        const cs = grid.cell_size_ft;
        const ox = grid.origin_x, oy = grid.origin_y;
        const W = grid.width_cells, H = grid.height_cells;
        const region = regions.find(r => r && r.id === pulsingDeptId);
        if (!region || !Array.isArray(region.cells) || region.cells.length === 0) return null;

        // Build a lookup of cells claimed by placed rooms (any department) so
        // "empty" means "still available slack in this region".
        const claimed = new Set();
        for (const rm of placedRooms) {
          if (!rm || !Array.isArray(rm.cells)) continue;
          for (const [u, v] of rm.cells) claimed.add(u + "," + v);
        }

        function cornerScreen(u, v) {
          return worldToScreen(ox + u * cs, oy + v * cs, view, viewport);
        }

        const empties = region.cells.filter(([u, v]) => !claimed.has(u + "," + v));
        return empties.map(([u, v], i) => {
          const [sx0, sy0] = cornerScreen(u, v);
          const [sx1, sy1] = cornerScreen(u + 1, v + 1);
          const x = Math.min(sx0, sx1), y = Math.min(sy0, sy1);
          const w = Math.abs(sx1 - sx0), h = Math.abs(sy1 - sy0);
          return (
            <rect
              key={pulsingDeptId + "-" + i}
              className="pulse-cell"
              x={x + 1} y={y + 1}
              width={Math.max(0, w - 2)} height={Math.max(0, h - 2)}
            />
          );
        });
      }, [grid, regions, placedRooms, view, viewport, pulsingDeptId]);

      // ----- Step 05: Ghost layer -----
      // When a room is being dragged, render a semi-transparent rectangle at
      // the proposed drop cells. Stroke flips between accent blue (drop
      // would succeed) and error red (drop would fail validation).
      const ghostLayer = React.useMemo(() => {
        if (gesture.type !== "dragging_room") return null;
        if (!grid || !Array.isArray(gesture.ghostCells) ||
            gesture.ghostCells.length === 0) return null;
        const cs = grid.cell_size_ft;
        const ox = grid.origin_x, oy = grid.origin_y;
        let uMin = Infinity, uMax = -Infinity, vMin = Infinity, vMax = -Infinity;
        for (const [u, v] of gesture.ghostCells) {
          if (u < uMin) uMin = u;
          if (u > uMax) uMax = u;
          if (v < vMin) vMin = v;
          if (v > vMax) vMax = v;
        }
        if (!Number.isFinite(uMin)) return null;
        const [sx0, sy0] = worldToScreen(ox + uMin * cs, oy + vMin * cs, view, viewport);
        const [sx1, sy1] = worldToScreen(ox + (uMax + 1) * cs, oy + (vMax + 1) * cs, view, viewport);
        const x = Math.min(sx0, sx1), y = Math.min(sy0, sy1);
        const w = Math.abs(sx1 - sx0), h = Math.abs(sy1 - sy0);
        const draggedRoom = placedRooms.find(r => r && r.instance_id === gesture.roomId);
        const color = draggedRoom ? deptColor(draggedRoom.department_id) : "#CCCCCC";
        const strokeColor = gesture.dropValid
          ? "var(--calvey-accent)"
          : "var(--calvey-error)";
        // Step T1 — on touch, nudge the ghost 40 screen-px up so the user's
        // finger doesn't cover it. The proposed cells (and the drop target)
        // are still determined by the real finger position — this offset is
        // visual only. A dashed connector line links the finger to the ghost
        // so the relationship is obvious.
        const ghostOffsetPx = gesture.pointerType === "touch" ? 40 : 0;
        const gy = y - ghostOffsetPx;
        const finger = gesture.fingerScreen;
        const showConnector = ghostOffsetPx > 0 && finger &&
          Number.isFinite(finger.x) && Number.isFinite(finger.y);
        // Connect to the ghost's bottom-center as the most readable anchor.
        const connectorX = x + w / 2;
        const connectorY = gy + h;
        return (
          <g style={{ pointerEvents: "none" }}>
            <rect x={x} y={gy} width={w} height={h}
                  fill={color} fillOpacity="0.5"
                  stroke={strokeColor} strokeWidth="2"
                  strokeDasharray="6 4" />
            {showConnector && (
              <line className="ghost-finger-connector"
                    x1={finger.x} y1={finger.y}
                    x2={connectorX} y2={connectorY} />
            )}
          </g>
        );
      }, [gesture, grid, placedRooms, view, viewport]);

      // Step 06 — Alignment-group highlight. On idle mouse hover over a
      // scrubbable wall, paint the full alignment group in 3-px accent blue
      // at 0.6 opacity so the user sees which walls will translate together
      // BEFORE they click. Step T2 — also paint during an active
      // reproportion scrub so the wall line stays visible alongside the
      // repro ghost. This doubles as the "press-to-preview" affordance on
      // touch (touch has no hover state, so the highlight only appears once
      // the finger lands on the wall).
      const alignmentHighlightLayer = React.useMemo(() => {
        let wallIdToShow = null;
        if (gesture.type === "idle" && hoveredWallId) {
          wallIdToShow = hoveredWallId;
        } else if (gesture.type === "reproportioning" && gesture.wallId) {
          wallIdToShow = gesture.wallId;
        }
        if (!wallIdToShow) return null;
        const walls = wallIndex || [];
        const wall = walls.find(w => w.id === wallIdToShow);
        if (!wall) return null;
        const group = computeAlignmentGroup(wall, walls);
        return (
          <g style={{ pointerEvents: "none" }}>
            {group.map((w, i) => {
              const [ax, ay] = worldToScreen(w.worldLine.x1, w.worldLine.y1, view, viewport);
              const [bx, by] = worldToScreen(w.worldLine.x2, w.worldLine.y2, view, viewport);
              return (
                <line key={"align-" + w.id + "-" + i}
                      x1={ax} y1={ay} x2={bx} y2={by}
                      className="alignment-highlight" />
              );
            })}
          </g>
        );
      }, [gesture.type, gesture.wallId, hoveredWallId, wallIndex, view, viewport]);

      // Step 06 — Reproportion ghost layer. Renders every affected room at
      // its proposed new position as a translucent overlay on top of the
      // frozen underlying plan. Stroke colour flips red when the current
      // cursor position is invalid (scrub "hits a wall").
      const reproGhostLayer = React.useMemo(() => {
        if (gesture.type !== "reproportioning") return null;
        if (!grid || !gesture.ghostRooms) return null;
        const cs = grid.cell_size_ft;
        const ox = grid.origin_x, oy = grid.origin_y;
        const strokeColor = gesture.dropValid
          ? "var(--calvey-accent)"
          : "var(--calvey-error)";
        const els = [];
        for (const [rid, g] of Object.entries(gesture.ghostRooms)) {
          const room = placedRooms.find(r => r && r.instance_id === rid);
          const color = room ? deptColor(room.department_id) : "#CCCCCC";
          const b = g.bounds;
          const [sx0, sy0] = worldToScreen(ox + b.u_min * cs, oy + b.v_min * cs, view, viewport);
          const [sx1, sy1] = worldToScreen(ox + (b.u_max + 1) * cs,
            oy + (b.v_max + 1) * cs, view, viewport);
          const x = Math.min(sx0, sx1), y = Math.min(sy0, sy1);
          const w = Math.abs(sx1 - sx0), h = Math.abs(sy1 - sy0);
          els.push(
            <rect key={"repro-" + rid}
                  x={x} y={y} width={w} height={h}
                  fill={color} fillOpacity="0.55"
                  stroke={strokeColor} strokeWidth="2"
                  strokeDasharray="6 4" />
          );
        }
        return <g style={{ pointerEvents: "none" }}>{els}</g>;
      }, [gesture.type, gesture.ghostRooms, gesture.dropValid, grid, placedRooms, view, viewport]);

      // Step 06 — cursor class for the svg element. `ew-resize` for vertical
      // walls (the user scrubs left/right), `ns-resize` for horizontal walls.
      const svgCursorClass = React.useMemo(() => {
        if (isPanning) return "panning";
        if (gesture.type !== "idle" || !hoveredWallId) return "";
        const wall = (wallIndex || []).find(w => w.id === hoveredWallId);
        if (!wall) return "";
        return wall.axis === "vertical" ? "wall-ew" : "wall-ns";
      }, [isPanning, gesture.type, hoveredWallId, wallIndex]);

      // ---------- Step 07 — Floor strip handlers ----------

      // Activate a different floor: just write current_plan.active_floor_index.
      function handleActivateFloor(idx) {
        if (!setProject) return;
        if (!Number.isInteger(idx) || idx < 0) return;
        setProject(p => {
          const np = cloneProject(p);
          if (!isPlainObject(np.current_plan)) return p;
          const floorsLen = Array.isArray(np.current_plan.floors)
            ? np.current_plan.floors.length : 0;
          if (idx >= floorsLen) return p;
          if (Number(np.current_plan.active_floor_index) === idx) return p;
          np.current_plan.active_floor_index = idx;
          np.updated_at = new Date().toISOString();
          return np;
        });
      }

      // Add an empty floor on top. Bumps floor_count and pushes a stub floor
      // entry. Does NOT regenerate — that's the user's call (per spec, to
      // preserve locked-room positions).
      function handleAddFloor() {
        if (!setProject) return;
        setProject(p => {
          const np = cloneProject(p);
          if (!isPlainObject(np.context)) np.context = {};
          if (!isPlainObject(np.context.program)) np.context.program = {};
          if (!isPlainObject(np.current_plan)) {
            np.current_plan = {
              floors: [], active_floor_index: 0, total_score: null,
              program_fit_report: null, unplaced_rooms: [], stale: false
            };
          }
          if (!Array.isArray(np.current_plan.floors)) np.current_plan.floors = [];
          const oldFc = np.current_plan.floors.length;
          const newLevel = oldFc + 1;
          np.current_plan.floors.push({
            level: newLevel, grid: null, sun_vector: null,
            department_regions: [], rooms: [], unplaced_rooms: []
          });
          np.context.program.floor_count = np.current_plan.floors.length;
          if (!isPlainObject(np.context.program.program_inputs)) {
            np.context.program.program_inputs = {};
          }
          np.context.program.program_inputs.floor_count = np.current_plan.floors.length;
          // Stale until the user regenerates — the new floor is empty.
          np.current_plan.stale = true;
          np.updated_at = new Date().toISOString();
          return np;
        });
      }

      // Step 07.1 — confirmation chip state. When non-null, the
      // − REMOVE TOP button is replaced by an inline confirmation chip
      // because the top floor contains locked rooms. Ephemeral: not
      // persisted to the project or localStorage.
      const [floorRemovalPending, setFloorRemovalPending] =
        React.useState(null);

      // Remove the top floor. No-op if floor_count is already 1. Clamps
      // active_floor_index to the new top.
      //
      // Step 07.1 — when the top floor contains locked rooms, require an
      // explicit PROCEED click before removing. Option A from the patch:
      // the handler takes a `confirmed` flag that the chip's PROCEED
      // button sets to true. Without the flag, a locked-rooms top floor
      // short-circuits into showing the chip instead of removing.
      function handleRemoveFloor(confirmed) {
        if (!setProject) return;
        if (!project || !project.current_plan ||
            !Array.isArray(project.current_plan.floors)) return;
        const floors = project.current_plan.floors;
        if (floors.length <= 1) return;
        const topFloor = floors[floors.length - 1];
        const topRooms = (isPlainObject(topFloor) && Array.isArray(topFloor.rooms))
          ? topFloor.rooms : [];
        const lockedOnTop = topRooms.filter(r => isPlainObject(r) && r.locked === true);
        if (lockedOnTop.length > 0 && confirmed !== true) {
          const level = Number.isFinite(Number(topFloor && topFloor.level))
            ? Number(topFloor.level) : floors.length;
          setFloorRemovalPending({
            floorLevel: level,
            lockedCount: lockedOnTop.length,
            lockedRoomNames: lockedOnTop
              .slice(0, 3)
              .map(r => (typeof r.name === "string" && r.name) ? r.name
                : (typeof r.template_id === "string" ? r.template_id : "room"))
          });
          return;
        }
        executeFloorRemoval();
        setFloorRemovalPending(null);
      }

      function executeFloorRemoval() {
        setProject(p => {
          const np = cloneProject(p);
          if (!isPlainObject(np.current_plan) ||
              !Array.isArray(np.current_plan.floors)) return p;
          const oldFc = np.current_plan.floors.length;
          if (oldFc <= 1) return p;
          const topFloor = np.current_plan.floors[np.current_plan.floors.length - 1];
          const topRooms = (isPlainObject(topFloor) && Array.isArray(topFloor.rooms))
            ? topFloor.rooms : [];
          const hadLocks = topRooms.some(r => isPlainObject(r) && r.locked === true);
          np.current_plan.floors.pop();
          if (hadLocks) {
            logEvent(np, "REMOVE_LOCKED_FLOOR", {
              floor_level: topFloor && topFloor.level != null
                ? topFloor.level : oldFc,
              room_count: topRooms.length
            });
          }
          const newFc = np.current_plan.floors.length;
          if (Number(np.current_plan.active_floor_index) >= newFc) {
            np.current_plan.active_floor_index = newFc - 1;
          }
          if (!isPlainObject(np.context)) np.context = {};
          if (!isPlainObject(np.context.program)) np.context.program = {};
          np.context.program.floor_count = newFc;
          if (!isPlainObject(np.context.program.program_inputs)) {
            np.context.program.program_inputs = {};
          }
          np.context.program.program_inputs.floor_count = newFc;
          np.current_plan.stale = true;
          np.updated_at = new Date().toISOString();
          return np;
        });
      }

      function handleCancelFloorRemoval() {
        setFloorRemovalPending(null);
      }

      function handleConfirmFloorRemoval() {
        // Re-enter the guarded handler with confirmation given.
        handleRemoveFloor(true);
      }

      // Regen-prompt chip below the floor strip — shown whenever the plan
      // is stale (e.g. after add/remove floor). Cleared on next successful
      // generate. Same signal the top-bar STALE chip uses.
      const regenChipShown = !!(project && project.current_plan &&
        project.current_plan.stale);

      return (
        <div className="canvas-container" ref={containerRef}>
          <svg
            ref={svgRef}
            className={svgCursorClass}
            onPointerDown={handlePointerDown}
            onPointerMove={handlePointerMove}
            onPointerUp={handlePointerUp}
            onPointerCancel={handlePointerCancel}
            onDoubleClick={handleDoubleClick}
            onContextMenu={handleContextMenu}
          >
            {/* Background hit target (also the pan/zoom target) */}
            <rect
              ref={backgroundRef}
              x="0" y="0"
              width={viewport.width}
              height={viewport.height}
              fill="var(--calvey-surface)"
            />

            {/* Department regions (Step 03) — drawn between background and polygon stroke */}
            {regionLayer && <g style={{ pointerEvents: "none" }}>{regionLayer}</g>}

            {/* Placed rooms — Step 05 now hosts hit-target rects per room, so
                the wrapper no longer disables pointer events. Individual
                cell rects, edges, labels, and glyphs keep their own
                pointerEvents: "none" styling. */}
            {roomLayer && <g>{roomLayer}</g>}

            {/* Step 04 — unplaced pulse overlay; renders above rooms, below compass/scale */}
            {pulseLayer && <g style={{ pointerEvents: "none" }}>{pulseLayer}</g>}

            {/* Step 05 — drag ghost; renders above everything else in the canvas. */}
            {ghostLayer}

            {/* Step 06 — alignment-group highlight (hover preview). */}
            {alignmentHighlightLayer}

            {/* Step 06 — reproportion ghost; one translucent rect per
                affected room at its proposed bounds. */}
            {reproGhostLayer}

            {/* Origin crosshair at world (0,0) */}
            {showOriginMarker && (
              <g style={{ pointerEvents: "none" }}>
                <line
                  x1={originSX - 6} y1={originSY}
                  x2={originSX + 6} y2={originSY}
                  stroke="var(--calvey-muted)"
                  strokeWidth="1"
                  strokeDasharray="2 2"
                />
                <line
                  x1={originSX} y1={originSY - 6}
                  x2={originSX} y2={originSY + 6}
                  stroke="var(--calvey-muted)"
                  strokeWidth="1"
                  strokeDasharray="2 2"
                />
                <text
                  x={originSX + 8}
                  y={originSY - 4}
                  fontFamily="'Space Mono', monospace"
                  fontSize="9"
                  fill="var(--calvey-muted)"
                >0,0</text>
              </g>
            )}

            {/* Footprint polygon */}
            {validPolygon && (
              <polygon
                points={polygonPointsAttr}
                fill="white"
                fillOpacity="1"
                stroke="var(--calvey-text)"
                strokeWidth="1.5"
                style={{ pointerEvents: "none" }}
              />
            )}

            {/* Polygon vertices */}
            {validPolygon && screenPoints.map(([x, y], i) => (
              <circle
                key={i}
                cx={x}
                cy={y}
                r="3"
                fill="var(--calvey-accent)"
                style={{ pointerEvents: "none" }}
              />
            ))}

            {/* True-north compass (top-left overlay, 20px inset) */}
            <g style={{ pointerEvents: "none" }}>
              <circle
                cx={compassCx} cy={compassCy} r="22"
                stroke="var(--calvey-text)" strokeWidth="1" fill="white"
              />
              <line
                x1={compassCx} y1={compassCy}
                x2={needleTipX} y2={needleTipY}
                stroke="var(--calvey-accent)" strokeWidth="2"
              />
              <polygon
                points={arrowPts}
                fill="var(--calvey-accent)"
              />
              <text
                x={labelOffsetX} y={labelOffsetY}
                fontFamily="'Space Mono', monospace"
                fontSize="10"
                textAnchor="middle"
                dominantBaseline="middle"
                fill="var(--calvey-text)"
              >N</text>
            </g>

            {/* Scale bar (bottom-left overlay, 20px inset) */}
            <g style={{ pointerEvents: "none" }}>
              <line
                x1={scaleBarX} y1={scaleBarY}
                x2={scaleBarX + scaleBarPx} y2={scaleBarY}
                stroke="var(--calvey-text)" strokeWidth="1"
              />
              <line
                x1={scaleBarX} y1={scaleBarY - 3}
                x2={scaleBarX} y2={scaleBarY + 3}
                stroke="var(--calvey-text)" strokeWidth="1"
              />
              <line
                x1={scaleBarX + scaleBarPx} y1={scaleBarY - 3}
                x2={scaleBarX + scaleBarPx} y2={scaleBarY + 3}
                stroke="var(--calvey-text)" strokeWidth="1"
              />
              <text
                x={scaleBarX} y={scaleBarY + 14}
                fontFamily="'Space Mono', monospace"
                fontSize="10"
                fill="var(--calvey-text)"
              >{scaleBarFt} ft</text>
            </g>
          </svg>

          {/* Context metadata + Generate / Re-seed / Fit buttons (top-right) */}
          <div className="canvas-overlay top-right">
            <div><span className="label">BUILDING TYPE:</span> {buildingType}</div>
            <div><span className="label">FOOTPRINT:</span> {polyVertexCount} vertices · {areaLabel} SF</div>
            <div><span className="label">TRUE NORTH:</span> {trueNorthDeg}°</div>
            <div><span className="label">ZOOM:</span> {view.zoom.toFixed(2)} px/ft</div>
            <div style={{ marginTop: 8 }}>
              <button type="button" onClick={handleGenerate} disabled={!canGenerate}>
                {isGenerating ? "GENERATING…" : "GENERATE"}
              </button>
              <button type="button"
                      onClick={() => onRegenerate && onRegenerate()}
                      disabled={!onRegenerate || !canGenerate ||
                        !(project && project.current_plan &&
                          Array.isArray(project.current_plan.floors) &&
                          project.current_plan.floors.some(f =>
                            Array.isArray(f.rooms) && f.rooms.length > 0))}
                      title="Regenerate with current weights + inputs + locks (opens A/B modal)">
                REGENERATE
              </button>
              <button type="button" onClick={handleReseedClick} disabled={!canGenerate}
                      title="Clear program_inputs and regenerate from subtypes[0]">
                RE-SEED FROM DB
              </button>
              <button type="button" onClick={handleFitClick}>FIT</button>
            </div>
            {reseedConfirm && (
              <div style={{ marginTop: 8, maxWidth: 240, whiteSpace: "normal" }}>
                <div style={{ color: "var(--calvey-warn)", marginBottom: 6 }}>
                  Clear program inputs and regenerate?
                </div>
                <button type="button" onClick={handleReseedConfirm}>YES</button>
                <button type="button" onClick={handleReseedCancel}>NO</button>
              </div>
            )}
            {generateError && (
              <div style={{ color: "var(--calvey-error)", marginTop: 6, maxWidth: 240, whiteSpace: "normal" }}>
                {generateError}
              </div>
            )}
          </div>

          {/* Department summary (HTML overlay, bottom-right) — Step 03
              + Step 04 individual unplaced rows (click → pulse empty cells). */}
          {regions.length > 0 && (
            <div className="canvas-overlay bottom-right">
              {summaryRows.map(row => (
                <div key={row.id} className="dept-row">
                  <span className="dept-name">{row.name}</span>
                  <span className="dept-meta">
                    {row.count} rooms · {row.actualSf.toLocaleString()} SF / {row.targetSf.toLocaleString()} SF
                  </span>
                </div>
              ))}
              {unplacedRooms.length > 0 && (
                <div className="dept-row unplaced" style={{ marginTop: 4, borderTop: "1px solid var(--calvey-rule)", paddingTop: 4 }}>
                  <span className="dept-name">UNPLACED</span>
                  <span className="dept-meta">{unplacedRooms.length} rooms</span>
                </div>
              )}
              {unplacedRooms.map((u, i) => {
                const tpl = (u && typeof u.type === "string") ? u.type
                  : (u && typeof u.template_id === "string") ? u.template_id : "?";
                const reason = (u && typeof u.reason === "string") ? u.reason : "?";
                const dep = (u && typeof u.department_id === "string") ? u.department_id : null;
                const isPulsing = dep && pulsingDeptId === dep;
                return (
                  <div
                    key={"u" + i}
                    className={"dept-row unplaced unplaced-row" + (isPulsing ? " is-pulsing" : "")}
                    onClick={() => pulseUnplacedForDept(dep)}
                    title={dep ? ("Pulse empty cells in " + dep) : "No department"}
                  >
                    <span className="dept-name">{tpl}</span>
                    <span className="dept-meta">· {reason}</span>
                  </div>
                );
              })}
            </div>
          )}

          {/* Step 05 — rejection chip. Shows for 2 s then auto-clears. */}
          {rejectReason && (
            <div className="reject-chip">
              REJECTED · {rejectReason.replace(/_/g, " ")}
            </div>
          )}

          {/* Step 05 — lock chip. Opens on right-click / long-press /
              double-tap on a non-locked room. Auto-dismisses after 3 s. */}
          {lockChip && (() => {
            const room = placedRooms.find(r => r && r.instance_id === lockChip.roomId);
            if (!room) return null;
            const isLocked = !!room.locked;
            return (
              <div className="lock-chip"
                   style={{ left: lockChip.x, top: lockChip.y }}
                   onPointerDown={(e) => e.stopPropagation()}
                   onContextMenu={(e) => { e.preventDefault(); e.stopPropagation(); }}>
                {isLocked ? (
                  <button type="button" onClick={commitUnlock}>UNLOCK</button>
                ) : (
                  <div className="reasons">
                    {LOCK_REASONS.map(r => (
                      <button key={r} type="button" onClick={() => commitLock(r)}>
                        {r.replace(/_/g, " ")}
                      </button>
                    ))}
                  </div>
                )}
                <button type="button" className="close"
                        onClick={closeLockChip} title="Dismiss">✕</button>
              </div>
            );
          })()}

          {/* Step 06 — live area tooltip during reproportion. Shows the
              primary (cursor-side) room's name + actual_area_sf as the ghost
              advances. Omits the "+N rooms moving" line when only one room
              is affected (e.g. an isolated wall). pointer-events: none so
              it never blocks input. */}
          {gesture.type === "reproportioning" && gesture.tooltip &&
            gesture.tooltip.pos && (
            <div className="scrub-area-tooltip"
                 style={{
                   left: gesture.tooltip.pos.x,
                   top: gesture.tooltip.pos.y
                 }}>
              <div className="room-name">
                {(gesture.tooltip.name || "").toUpperCase()}
              </div>
              <div className="room-area">
                {Math.round(gesture.tooltip.areaSf).toLocaleString()} SF
              </div>
              {gesture.tooltip.othersMoving > 0 && (
                <div className="others">
                  + {gesture.tooltip.othersMoving} rooms moving
                </div>
              )}
            </div>
          )}

          {/* Step 07 — Floor strip (HTML overlay, left side). One tile per
              floor + add/remove floor buttons. Cross-floor drag drop targets
              are detected by the canvas's pointer handlers via the
              data-floor-index attribute on each tile. */}
          <FloorStrip
            project={project}
            polygon={polygon}
            activeIdx={activeIdx}
            dropTargetIdx={Number.isInteger(gesture.crossFloorTarget)
              ? gesture.crossFloorTarget : -1}
            dropTargetValid={!!gesture.crossFloorValid}
            gestureType={gesture.type}
            onActivate={handleActivateFloor}
            onAddFloor={handleAddFloor}
            onRemoveFloor={() => handleRemoveFloor(false)}
            showRegenChip={regenChipShown}
            floorRemovalPending={floorRemovalPending}
            onCancelFloorRemoval={handleCancelFloorRemoval}
            onConfirmFloorRemoval={handleConfirmFloorRemoval}
          />

          {/* Step T3 — dragged-room name float. Rendered during any
              dragging_room gesture as a position:fixed label 60 px above
              the finger, showing the room name + department so the user
              can confirm what they're carrying. Especially useful on touch
              where the finger covers both the room-source and any floor
              tile it hovers. Clamped to the viewport with an 8-px margin. */}
          {gesture.type === "dragging_room" && gesture.fingerClient &&
            Number.isFinite(gesture.fingerClient.x) &&
            Number.isFinite(gesture.fingerClient.y) && (() => {
              const draggedRoom = placedRooms.find(
                r => r && r.instance_id === gesture.roomId);
              if (!draggedRoom) return null;
              const roomName = (draggedRoom.display_name ||
                draggedRoom.type || "").toString();
              const deptId = draggedRoom.department_id || "";
              const deptRegion = regions.find(
                rr => rr && rr.id === deptId);
              const deptName = (deptRegion && deptRegion.name)
                ? deptRegion.name : deptId;
              // position: fixed uses viewport coords; translate(-50%, -100%)
              // anchors the label centered horizontally above its top-left
              // position. Offset 60 px above the finger. The browser clamps
              // by default via the edge, but we add explicit margins via
              // max()/min() so long labels don't spill off.
              const fx = gesture.fingerClient.x;
              const fy = gesture.fingerClient.y - 60;
              const clampedX = Math.max(8, Math.min(window.innerWidth - 8, fx));
              const clampedY = Math.max(8, fy);
              return (
                <div className="drag-room-name-float"
                     style={{
                       left: clampedX + "px",
                       top: clampedY + "px",
                       transform: "translate(-50%, -100%)"
                     }}>
                  <div className="name">{roomName.toUpperCase()}</div>
                  {deptName && (
                    <div className="dept">{deptName.toString().toUpperCase()}</div>
                  )}
                </div>
              );
            })()}

          {/* Step T1 — debug gesture readout. Scaffolding for the iPhone
              touch test session; suppressed by ?debug=0. Slated to come out
              with T3 unless the user opts to keep it. */}
          {DEBUG_ENABLED && (
            <div className="debug-gesture-readout">
              {gestureDebugLine(gesture, activePointerCount)}
            </div>
          )}
        </div>
      );
    }

    // ============================================================
    // SECTION 06 — EXPORTERS (v1 — Phase 8)
    // JSON, SVG, PDF, training bundle.
    // ============================================================

    function slugifyBuildingType(bt) {
      return (bt || "project").toString().toLowerCase()
        .replace(/[^a-z0-9]+/g, "_").replace(/^_+|_+$/g, "");
    }

    function todayStamp() {
      const d = new Date();
      const pad = n => String(n).padStart(2, "0");
      return d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate());
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = filename;
      document.body.appendChild(a); a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    function exportProjectJson(project) {
      const btSlug = slugifyBuildingType(
        project && project.context && project.context.program
          ? project.context.program.building_type : "project");
      const filename = "CALVEY_PARTY_" + btSlug + "_" + todayStamp() + ".json";
      const blob = new Blob([JSON.stringify(project, null, 2)],
        { type: "application/json" });
      downloadBlob(blob, filename);
    }

    // Build the raw SVG text for a plan. Uses real world→SVG feet→pixel scale
