      // Pass 1: try to fit into the matching region's UNCLAIMED cells (no
      // displacement). This is the common path when the target floor has slack.
      const freeMask = new Array(H);
      for (let v = 0; v < H; v++) freeMask[v] = new Array(W).fill(false);
      for (const [u, v] of matchingRegion.cells) {
        if (u >= 0 && u < W && v >= 0 && v < H && !ownerByCell.has(u + "," + v)) {
          freeMask[v][u] = true;
        }
      }
      let placement = findBestRectInMask(
        freeMask, H, W, cellsNeeded, minW, minD, maxAspect, targetAspect);
      let displacedRoom = null;
      let displacedTargetIdx = -1;

      if (!placement) {
        // Pass 2: cascade depth 1. Allow rectangles inside the region (sans
        // locked cells) that overlap at most ONE non-locked target room.
        const regionMask = new Array(H);
        for (let v = 0; v < H; v++) regionMask[v] = new Array(W).fill(false);
        for (const [u, v] of matchingRegion.cells) {
          if (u >= 0 && u < W && v >= 0 && v < H && !lockedKeys.has(u + "," + v)) {
            regionMask[v][u] = true;
          }
        }
        // Build down[][] for the region mask.
        const down = new Array(H);
        for (let v = H - 1; v >= 0; v--) {
          const row = new Array(W);
          for (let u = 0; u < W; u++) {
            row[u] = regionMask[v][u] ? (1 + (v + 1 < H ? down[v + 1][u] : 0)) : 0;
          }
          down[v] = row;
        }

        let best = null;
        for (let av = 0; av < H; av++) {
          for (let au = 0; au < W; au++) {
            if (!regionMask[av][au]) continue;
            let maxRun = 0;
            while (au + maxRun < W && regionMask[av][au + maxRun]) maxRun++;
            let minDown = Infinity;
            for (let w = 1; w <= maxRun; w++) {
              const d = down[av][au + w - 1];
              if (d < minDown) minDown = d;
              if (minDown < 1) break;
              const hNeed = Math.max(1, Math.ceil(cellsNeeded / w));
              if (hNeed > minDown) continue;
              const h = hNeed;
              const ar = (w >= h) ? (w / h) : (h / w);
              if (ar > maxAspect + 1e-9) continue;
              const fitsA = (w >= minW && h >= minD);
              const fitsB = (h >= minW && w >= minD);
              if (!fitsA && !fitsB) continue;

              // Count overlapping non-self rooms in the rectangle.
              const overlapIds = new Set();
              let bail = false;
              for (let dv = 0; dv < h && !bail; dv++) {
                for (let du = 0; du < w; du++) {
                  const owner = ownerByCell.get((au + du) + "," + (av + dv));
                  if (owner && owner !== room.instance_id) {
                    overlapIds.add(owner);
                    if (overlapIds.size > 1) { bail = true; break; }
                  }
                }
              }
              if (overlapIds.size > 1) continue;
              const aspectDiff = Math.abs(ar - targetAspect);
              const area = w * h;
              const fit = Math.abs(area - cellsNeeded);
              const overlapPenalty = overlapIds.size;  // prefer 0 overlaps
              if (!best ||
                  overlapPenalty < best.overlapPenalty ||
                  (overlapPenalty === best.overlapPenalty && aspectDiff < best.aspectDiff) ||
                  (overlapPenalty === best.overlapPenalty && aspectDiff === best.aspectDiff && fit < best.fit)) {
                best = { au, av, w, h, area, aspectDiff, fit,
                         overlapPenalty, overlapIds: [...overlapIds] };
              }
            }
          }
        }

        if (!best) return { ok: false, reason: "target_full" };

        if (best.overlapPenalty === 1) {
          // Try to absorb the displaced room into its own home department's
          // free slack on the target floor.
          const dispId = best.overlapIds[0];
          displacedTargetIdx = targetRooms.findIndex(r =>
            isPlainObject(r) && r.instance_id === dispId);
          if (displacedTargetIdx < 0) return { ok: false, reason: "target_full" };
          const disp = targetRooms[displacedTargetIdx];
          if (disp.locked) return { ok: false, reason: "locked_collision" };

          const dispRegion = targetRegions.find(r =>
            isPlainObject(r) && r.id === disp.department_id);
          if (!dispRegion || !Array.isArray(dispRegion.cells)) {
            return { ok: false, reason: "displaced_cannot_fit" };
          }

          // Build claimed-by-incoming set so the displaced room's pool excludes it.
          const claimedNew = new Set();
          for (let dv = 0; dv < best.h; dv++) {
            for (let du = 0; du < best.w; du++) {
              claimedNew.add((best.au + du) + "," + (best.av + dv));
            }
          }
          // Pool: the displaced room's existing cells minus claimed, plus any
          // unclaimed cells in its home department region.
          const dispMask = new Array(H);
          for (let v = 0; v < H; v++) dispMask[v] = new Array(W).fill(false);
          for (const [u, v] of disp.cells) {
            if (u >= 0 && u < W && v >= 0 && v < H && !claimedNew.has(u + "," + v)) {
              dispMask[v][u] = true;
            }
          }
          for (const [u, v] of dispRegion.cells) {
            if (u >= 0 && u < W && v >= 0 && v < H &&
                !ownerByCell.has(u + "," + v) && !claimedNew.has(u + "," + v)) {
              dispMask[v][u] = true;
            }
          }
          const dispCellsNeeded = Array.isArray(disp.cells) ? disp.cells.length
            : Math.max(1, Math.round(Number(disp.target_area_sf || 0) / cellArea));
          const dMinW = Math.max(1, Math.floor(Number(disp.min_width_cells)) || 1);
          const dMinD = Math.max(1, Math.floor(Number(disp.min_depth_cells)) || 1);
          const dMaxA = Number.isFinite(Number(disp.max_aspect_ratio)) &&
                        Number(disp.max_aspect_ratio) > 0
            ? Number(disp.max_aspect_ratio) : 2.5;
          const dTargetA = (dMinW >= 1 && dMinD >= 1)
            ? (Math.max(dMinW, dMinD) / Math.min(dMinW, dMinD)) : 1;
          const dispPlacement = findBestRectInMask(
            dispMask, H, W, dispCellsNeeded, dMinW, dMinD, dMaxA, dTargetA);
          if (!dispPlacement) return { ok: false, reason: "displaced_cannot_fit" };

          const dispNewCells = [];
          for (let dv = 0; dv < dispPlacement.h; dv++) {
            for (let du = 0; du < dispPlacement.w; du++) {
              dispNewCells.push([dispPlacement.au + du, dispPlacement.av + dv]);
            }
          }
          displacedRoom = rebuildRoomGeometry(disp, dispNewCells, grid);
        }

        placement = best;
      }

      // Build new cell list for the moved room.
      const newCells = [];
      for (let dv = 0; dv < placement.h; dv++) {
        for (let du = 0; du < placement.w; du++) {
          newCells.push([placement.au + du, placement.av + dv]);
        }
      }

      const np = cloneProject(project);
      const npFloors = np.current_plan.floors;
      // Splice the room out of source.
      npFloors[sourceIdx].rooms.splice(sourceRoomIdx, 1);
      // Rebuild geometry on target.
      const movedRoom = rebuildRoomGeometry(room, newCells, grid);
      if (displacedRoom && displacedTargetIdx >= 0) {
        npFloors[targetIdx].rooms[displacedTargetIdx] = displacedRoom;
      }
      npFloors[targetIdx].rooms.push(movedRoom);
      // UX decision (spec Section 05): auto-switch active floor on success so
      // the user sees the result immediately.
      np.current_plan.active_floor_index = targetIdx;
      np.updated_at = new Date().toISOString();
      return { ok: true, project: np };
    }

    // ============================================================
    // SECTION 05 — EDITOR
    // Step 02: read-only footprint canvas with pan/zoom/fit
    // ============================================================

    // World coords: feet, +X east, +Y north (Y is up).
    // Screen coords: SVG pixels, +X right, +Y down.
    // view = { panX, panY, zoom } — pan is the world coord at the viewport
    // center; zoom is pixels-per-foot.

    // ---------- Step T1 — touch framework foundation ----------
    //
    // These helpers are the shared primitives every touch gesture consumes.
    // T1 uses them for the readout + ghost offset; T2 (lock + wall scrub)
    // will consume useLongPress and fatFingerRadius. Pure browser APIs.

    // Fat-finger hit radius in screen pixels. Touch gets a 3x bubble around
    // hit targets that were sized for a mouse cursor. Multiply by 1/zoom to
    // get a world-space radius (callers do this themselves).
    function fatFingerRadius(pointerType) {
      return pointerType === "touch" ? 12 : 4;
    }

    // Reusable long-press detector. Starts a timer on pointerdown; if the
    // pointer moves > moveThresholdPx or lifts before durationMs, the timer
    // is cancelled. Otherwise onLongPress fires with the original payload.
    // T1 doesn't consume this directly (FootprintCanvas still has its own
    // inline long-press timer for the lock gesture, to be replaced in T2);
    // shipped here so T2 can adopt it without re-architecting.
    function useLongPress({ durationMs = 500, moveThresholdPx = 3, onLongPress }) {
      const stateRef = React.useRef({
        timerId: null,
        startX: 0,
        startY: 0,
        pointerId: null,
        payload: null
      });

      const start = React.useCallback((e, payload) => {
        if (stateRef.current.timerId) return;
        const startX = e.clientX;
        const startY = e.clientY;
        const pointerId = e.pointerId;
        const timerId = setTimeout(() => {
          if (typeof onLongPress === "function") {
            onLongPress({ payload, x: startX, y: startY });
          }
          stateRef.current.timerId = null;
        }, durationMs);
        stateRef.current = { timerId, startX, startY, pointerId, payload };
      }, [durationMs, onLongPress]);

      const move = React.useCallback((e) => {
        const s = stateRef.current;
        if (!s.timerId || e.pointerId !== s.pointerId) return;
        const dx = e.clientX - s.startX;
        const dy = e.clientY - s.startY;
        if (Math.sqrt(dx * dx + dy * dy) > moveThresholdPx) {
          clearTimeout(s.timerId);
          s.timerId = null;
        }
      }, [moveThresholdPx]);

      const cancel = React.useCallback(() => {
        if (stateRef.current.timerId) {
          clearTimeout(stateRef.current.timerId);
          stateRef.current.timerId = null;
        }
      }, []);

      return { start, move, cancel };
    }

    // Debug gesture readout formatter. Returns a short one-line string
    // describing the current gesture state for the bottom-center overlay.
    function gestureDebugLine(gesture, activePointerCount) {
      const n = activePointerCount | 0;
      const suffix = n === 1 ? "1 pointer" : n + " pointers";
      if (!gesture || !gesture.type || gesture.type === "idle") {
        return "idle · " + suffix;
      }
      if (gesture.type === "panning") {
        return "panning · " + suffix;
      }
      if (gesture.type === "pinching") {
        const z = Number.isFinite(gesture.currentZoom)
          ? gesture.currentZoom.toFixed(2) : "?";
        return "pinching · " + suffix + " · zoom " + z;
      }
      if (gesture.type === "dragging_room") {
        const rid = gesture.roomId || "?";
        let at = "";
        if (Array.isArray(gesture.ghostCells) && gesture.ghostCells.length > 0) {
          const [u, v] = gesture.ghostCells[0];
          at = " · at (" + u + ", " + v + ")";
        }
        // Step T3 — surface cross-floor drop target state so the iPhone
        // test session can verify that elementFromPoint is reporting the
        // right tile through the finger.
        if (Number.isInteger(gesture.crossFloorTarget)) {
          const tileSuffix = " · over floor tile " + gesture.crossFloorTarget +
            (gesture.crossFloorValid ? "" : " · INVALID");
          return "dragging_room " + rid + at + tileSuffix;
        }
        return "dragging_room " + rid + at;
      }
      if (gesture.type === "reproportioning") {
        // Step T2 — show wall id, cell offset, and affected-room count so the
        // iPhone test session can verify the scrub state at a glance.
        const parts = ["reproportioning"];
        if (gesture.wallId) parts.push("wall " + gesture.wallId);
        parts.push("offset " + ((gesture.cellOffset | 0)));
        const nRooms = gesture.ghostRooms
          ? Object.keys(gesture.ghostRooms).length : 0;
        if (nRooms > 0) parts.push(nRooms + " rooms affected");
        return parts.join(" · ");
      }
      if (gesture.type === "showing_lock_chip") {
        // Step T2 — room id lets the tester confirm which room the chip is
        // anchored to when it's far from its origin (e.g. viewport-clamped).
        return "showing_lock_chip" + (gesture.roomId
          ? " · room " + gesture.roomId : "");
      }
      return gesture.type + " · " + suffix;
    }

    // Debug readout on by default; ?debug=0 disables it. Computed once at
    // module load so the value is stable across re-renders.
    const DEBUG_ENABLED = (() => {
      try {
        return new URLSearchParams(window.location.search).get("debug") !== "0";
      } catch (e) {
        return true;
      }
    })();

    function computePolygonBounds(polygon) {
      if (!Array.isArray(polygon) || polygon.length === 0) {
        return { minX: 0, maxX: 0, minY: 0, maxY: 0 };
      }
      let minX = Infinity, maxX = -Infinity;
      let minY = Infinity, maxY = -Infinity;
      for (const pt of polygon) {
        if (!Array.isArray(pt) || pt.length < 2) continue;
        const x = Number(pt[0]);
        const y = Number(pt[1]);
        if (!Number.isFinite(x) || !Number.isFinite(y)) continue;
        if (x < minX) minX = x;
        if (x > maxX) maxX = x;
        if (y < minY) minY = y;
        if (y > maxY) maxY = y;
      }
      if (!Number.isFinite(minX)) {
        return { minX: 0, maxX: 0, minY: 0, maxY: 0 };
      }
      return { minX, maxX, minY, maxY };
    }

    function computePolygonAreaSF(polygon) {
      if (!Array.isArray(polygon) || polygon.length < 3) return 0;
      let sum = 0;
      for (let i = 0; i < polygon.length; i++) {
        const a = polygon[i];
        const b = polygon[(i + 1) % polygon.length];
        if (!Array.isArray(a) || !Array.isArray(b)) continue;
        const ax = Number(a[0]), ay = Number(a[1]);
        const bx = Number(b[0]), by = Number(b[1]);
        if (!Number.isFinite(ax) || !Number.isFinite(ay)) continue;
        if (!Number.isFinite(bx) || !Number.isFinite(by)) continue;
        sum += ax * by - bx * ay;
      }
      return Math.abs(sum) / 2;
    }

    function computeInitialView(polygon, viewportWidth, viewportHeight) {
      if (!Array.isArray(polygon) || polygon.length < 3) {
        return { panX: 0, panY: 0, zoom: 1 };
      }
      const { minX, maxX, minY, maxY } = computePolygonBounds(polygon);
      const worldWidth = maxX - minX;
      const worldHeight = maxY - minY;
      if (worldWidth <= 0 || worldHeight <= 0 || viewportWidth <= 0 || viewportHeight <= 0) {
        return { panX: (minX + maxX) / 2, panY: (minY + maxY) / 2, zoom: 1 };
      }
      const margin = 0.15;
      const zoomX = viewportWidth / (worldWidth * (1 + 2 * margin));
      const zoomY = viewportHeight / (worldHeight * (1 + 2 * margin));
      const zoom = Math.min(zoomX, zoomY);
      const panX = (minX + maxX) / 2;
      const panY = (minY + maxY) / 2;
      return { panX, panY, zoom };
    }

    function worldToScreen(wx, wy, view, viewport) {
      const sx = (wx - view.panX) * view.zoom + viewport.width / 2;
      const sy = -(wy - view.panY) * view.zoom + viewport.height / 2;
      return [sx, sy];
    }

    function screenToWorld(sx, sy, view, viewport) {
      const wx = (sx - viewport.width / 2) / view.zoom + view.panX;
      const wy = -(sy - viewport.height / 2) / view.zoom + view.panY;
      return [wx, wy];
    }

    function niceScaleBarLength(zoomPixelsPerFoot) {
      const ladder = [1, 2, 5, 10, 20, 50, 100, 200, 500, 1000, 2000];
      const maxPixels = 150;
      let best = ladder[0];
      for (const L of ladder) {
        if (L * zoomPixelsPerFoot <= maxPixels) {
          best = L;
        } else {
          break;
        }
      }
      return best;
    }

    // Stable 12-entry palette for department cell fills. Picked by
    // sum-of-char-codes hash so a given dept id always maps to the same color.
    const DEPT_PALETTE = [
      "#B8D4E3",  // academic blue
      "#E5C6A0",  // admin tan
      "#C8D5B9",  // circulation green
      "#E8B5C7",  // public pink
      "#D4C4E0",  // service lavender
      "#F0D9A7",  // dining amber
      "#A0C4D4",  // clinical teal
      "#E0B5A0",  // residential peach
      "#C4D8B0",  // recreation sage
      "#D0C0A0",  // utility khaki
      "#BFC8D8",  // back-of-house steel
      "#E5D5C0"   // support cream
    ];
    function deptColor(id) {
      const s = String(id || "");
      let h = 0;
      for (let i = 0; i < s.length; i++) h += s.charCodeAt(i);
      return DEPT_PALETTE[h % DEPT_PALETTE.length];
    }

    // ---------- Step 06 — wall index + alignment groups ----------

    // Build the index of scrubbable walls from placed rooms. A wall exists
    // between adjacent cells belonging to DIFFERENT rooms in the SAME
    // department. Facade walls (room ↔ exterior) and cross-department walls
    // are excluded — they're not scrubbable in Step 06.
    //
    // Wall object shape:
    //   { id, axis, perp_coord, segment: {start, end}, roomA_id, roomB_id,
    //     department, worldLine: {x1, y1, x2, y2}, length_ft }
    //
    // Terminology: a vertical wall runs parallel to the v-axis; its perp_coord
    // is a u-value (the cell boundary between cells at u-1 and u). Its
    // `segment` is a half-open v-range [start, end). Horizontal walls are
    // symmetric. `perp_coord` and segment values are in cell units.
    //
    // Contiguous cell-pair adjacencies with the same (axis, perp_coord,
    // roomA, roomB) are merged into a single wall. Walls < 2 cells long are
    // dropped (too small to make sense as scrub targets).
    function buildWallIndex(rooms, grid) {
      if (!grid || !Array.isArray(rooms) || rooms.length === 0) return [];
      const W = grid.width_cells, H = grid.height_cells;
      const cs = grid.cell_size_ft;
      const ox = grid.origin_x, oy = grid.origin_y;

      // Ownership lookup: cell (u, v) → roomIdx, or -1 if unowned.
      const owner = new Array(H);
      for (let v = 0; v < H; v++) owner[v] = new Array(W).fill(-1);
      rooms.forEach((r, ri) => {
        if (!r || !Array.isArray(r.cells)) return;
        for (const [u, v] of r.cells) {
          if (u >= 0 && u < W && v >= 0 && v < H) owner[v][u] = ri;
        }
      });

      // Bucket candidate segments by (axis, perp_coord, roomA, roomB) so
      // contiguous runs collapse into one wall per room-pair.
      const buckets = new Map();
      function addSegment(axis, perp, pCell, lowerId, upperId, dept) {
        const key = axis + "|" + perp + "|" + lowerId + "|" + upperId;
        let b = buckets.get(key);
        if (!b) {
          b = { axis, perp, roomA: lowerId, roomB: upperId, department: dept, cells: [] };
          buckets.set(key, b);
        }
        b.cells.push(pCell);
      }

      // Scan east + north neighbors only — avoids double-counting.
      for (let v = 0; v < H; v++) {
        for (let u = 0; u < W; u++) {
          const a = owner[v][u];
          if (a < 0) continue;
          const roomA = rooms[a];
          if (!roomA) continue;
          // East: vertical wall at u+1, parallel cell = v.
          if (u + 1 < W) {
            const b = owner[v][u + 1];
            if (b >= 0 && b !== a) {
              const roomB = rooms[b];
              if (roomB && roomA.department_id === roomB.department_id) {
                addSegment("vertical", u + 1, v,
                  roomA.instance_id, roomB.instance_id, roomA.department_id);
              }
            }
          }
          // North: horizontal wall at v+1, parallel cell = u.
          if (v + 1 < H) {
            const b = owner[v + 1][u];
            if (b >= 0 && b !== a) {
              const roomB = rooms[b];
              if (roomB && roomA.department_id === roomB.department_id) {
                addSegment("horizontal", v + 1, u,
                  roomA.instance_id, roomB.instance_id, roomA.department_id);
              }
            }
          }
        }
      }

      // Split each bucket into contiguous runs → wall objects.
      const walls = [];
      for (const b of buckets.values()) {
        const sorted = b.cells.slice().sort((x, y) => x - y);
        let start = sorted[0];
        let prev = sorted[0];
        for (let i = 1; i <= sorted.length; i++) {
          const c = sorted[i];
          if (c === undefined || c !== prev + 1) {
            const end = prev + 1;
            if (end - start >= 2) {
              let worldLine;
              if (b.axis === "vertical") {
                const wx = ox + b.perp * cs;
                worldLine = { x1: wx, y1: oy + start * cs,
                              x2: wx, y2: oy + end * cs };
              } else {
                const wy = oy + b.perp * cs;
                worldLine = { x1: ox + start * cs, y1: wy,
                              x2: ox + end * cs, y2: wy };
              }
              walls.push({
                id: "wall_" + b.roomA + "_" + b.roomB + "_" + b.axis + "_" + b.perp + "_" + start,
                axis: b.axis,
                perp_coord: b.perp,
                segment: { start, end },
                roomA_id: b.roomA,
                roomB_id: b.roomB,
                department: b.department,
                worldLine,
                length_ft: (end - start) * cs
              });
            }
            start = c;
          }
          prev = c;
        }
      }

      return walls;
    }

    // Return walls in the same alignment group as `grabbedWall`.
    // Collinearity rule: same axis + same perp_coord (within half a cell) +
    // same department. `grabbedWall` is always in its own group.
    //
    // Spec note: the half-cell tolerance is expressed in cell units because
    // walls are cell-aligned (perp_coord is an integer cell boundary). Two
    // walls at the same integer perp_coord always group; two walls one cell
    // apart never do. (Gate test 6: 12.0/12.4 → same, 12.0/13.0 → not.)
    function computeAlignmentGroup(grabbedWall, allWalls) {
      if (!grabbedWall) return [];
      if (!Array.isArray(allWalls)) return [grabbedWall];
      const tol = 0.5;
      return allWalls.filter(w =>
        w.axis === grabbedWall.axis &&
        w.department === grabbedWall.department &&
        Math.abs(w.perp_coord - grabbedWall.perp_coord) < tol
      );
    }

    // True if any wall in `group` has a locked adjacent room. Spec Section 04:
    // locked-adjacent → whole group is non-scrubbable.
    function alignmentGroupIsLocked(group, rooms) {
      if (!Array.isArray(group) || !Array.isArray(rooms)) return false;
      const byId = new Map();
      for (const r of rooms) {
        if (r && r.instance_id) byId.set(r.instance_id, r);
      }
      for (const wall of group) {
        const a = byId.get(wall.roomA_id);
        if (a && a.locked) return true;
        const b = byId.get(wall.roomB_id);
        if (b && b.locked) return true;
      }
      return false;
    }

    // Perpendicular distance (in world feet) from (worldX, worldY) to a wall's
    // line segment, or null if the projection is outside the segment bounds
    // (i.e., the cursor is past the wall's ends).
    function distanceToWallWorld(wall, worldX, worldY) {
      const { x1, y1, x2, y2 } = wall.worldLine;
      const dx = x2 - x1, dy = y2 - y1;
      const len2 = dx * dx + dy * dy;
      if (len2 <= 0) return null;
      const t = ((worldX - x1) * dx + (worldY - y1) * dy) / len2;
      if (t < 0 || t > 1) return null;
      const px = x1 + t * dx, py = y1 + t * dy;
      const ex = worldX - px, ey = worldY - py;
      return Math.sqrt(ex * ex + ey * ey);
    }

    // Pick the closest hoverable wall within `radiusPx` screen pixels of the
    // cursor. Default radius is 4 px (mouse hover); T2 passes 8 px at
    // pointer-down on touch to widen the fat-finger hit target without
    // encroaching on room-drag territory. Skip walls whose alignment group
    // contains a locked-room-adjacent wall.
    function findHoverableWall(walls, rooms, worldX, worldY, zoom, radiusPx) {
      if (!Array.isArray(walls) || walls.length === 0) return null;
      const px = Number.isFinite(radiusPx) ? radiusPx : 4;
      const maxDistFt = px / Math.max(zoom, 0.0001);
      let best = null, bestDist = Infinity;
      for (const w of walls) {
        const d = distanceToWallWorld(w, worldX, worldY);
        if (d === null || d > maxDistFt) continue;
        if (d < bestDist) { bestDist = d; best = w; }
      }
      if (!best) return null;
      const group = computeAlignmentGroup(best, walls);
      if (alignmentGroupIsLocked(group, rooms)) return null;
      return best;
    }

    // Compute proposed bounds + cells for a single affected room when the
    // alignment group shifts by `cellOffset`. Returns { ok, bounds, cells }
    // or { ok: false, reason }. Enforces: min dims, rectangular invariant
    // (via union-coverage), stays in home department, no overlap with
    // locked rooms.
    function proposeReproportionRoom(snap, groupWalls, axis, cellOffset, deptKeys, lockedKeys) {
      const b = snap.bounds;
      const sides = { east: [], west: [], north: [], south: [] };
      for (const wall of groupWalls) {
        if (wall.axis !== axis) continue;
        if (axis === "vertical") {
          const onEast = Math.abs(wall.perp_coord - (b.u_max + 1)) < 0.5;
          const onWest = Math.abs(wall.perp_coord - b.u_min) < 0.5;
          if (!onEast && !onWest) continue;
          if (wall.segment.end <= b.v_min) continue;
          if (wall.segment.start > b.v_max) continue;
          sides[onEast ? "east" : "west"].push(wall.segment);
        } else {
          const onNorth = Math.abs(wall.perp_coord - (b.v_max + 1)) < 0.5;
          const onSouth = Math.abs(wall.perp_coord - b.v_min) < 0.5;
          if (!onNorth && !onSouth) continue;
          if (wall.segment.end <= b.u_min) continue;
          if (wall.segment.start > b.u_max) continue;
          sides[onNorth ? "north" : "south"].push(wall.segment);
        }
      }

      // Union-coverage: the union of segments on a given side must cover the
      // room's full parallel extent. Otherwise the scrub would carve an L
      // out of a previously-rectangular room — rejected per Section 05.
      function unionCovers(segments, pMin, pMax) {
        if (segments.length === 0) return false;
        const sorted = segments.slice().sort((a, z) => a.start - z.start);
        let covered = pMin;
        for (const s of sorted) {
          if (s.start > covered) return false;
          if (s.end > covered) covered = s.end;
          if (covered >= pMax + 1) return true;
        }
        return covered >= pMax + 1;
      }

      const nb = { ...b };
      if (sides.east.length > 0) {
        if (!unionCovers(sides.east, b.v_min, b.v_max)) return { ok: false, reason: "l_shape" };
        nb.u_max = b.u_max + cellOffset;
      }
      if (sides.west.length > 0) {
        if (!unionCovers(sides.west, b.v_min, b.v_max)) return { ok: false, reason: "l_shape" };
        nb.u_min = b.u_min + cellOffset;
      }
      if (sides.north.length > 0) {
        if (!unionCovers(sides.north, b.u_min, b.u_max)) return { ok: false, reason: "l_shape" };
        nb.v_max = b.v_max + cellOffset;
      }
      if (sides.south.length > 0) {
        if (!unionCovers(sides.south, b.u_min, b.u_max)) return { ok: false, reason: "l_shape" };
        nb.v_min = b.v_min + cellOffset;
      }

      if (nb.u_max < nb.u_min || nb.v_max < nb.v_min) {
        return { ok: false, reason: "degenerate" };
      }
      const w = nb.u_max - nb.u_min + 1;
      const h = nb.v_max - nb.v_min + 1;
      const minW = Math.max(1, Number(snap.min_width_cells) || 1);
      const minD = Math.max(1, Number(snap.min_depth_cells) || 1);
      // min-cells product floor (spec section 05): preserves step 04 per-room
      // min dim. Also enforce each dim in at least one rotation.
      if (w * h < minW * minD) return { ok: false, reason: "below_min" };
      const fitsA = (w >= minW && h >= minD);
      const fitsB = (h >= minW && w >= minD);
      if (!fitsA && !fitsB) return { ok: false, reason: "below_min" };

      const cells = [];
      for (let vv = nb.v_min; vv <= nb.v_max; vv++) {
        for (let uu = nb.u_min; uu <= nb.u_max; uu++) {
          const key = uu + "," + vv;
          if (!deptKeys.has(key)) return { ok: false, reason: "outside_department" };
          if (lockedKeys.has(key)) return { ok: false, reason: "locked_overlap" };
          cells.push([uu, vv]);
        }
      }
      return { ok: true, bounds: nb, cells };
    }

    // Compute proposed ghost geometry for every affected room at a given
    // alignment-group shift. Returns { ok, ghostRooms } or { ok: false }.
    function proposeReproportion(snapshots, groupWalls, axis, cellOffset,
                                 affectedIds, rooms, regions, grid) {
      if (cellOffset === 0) {
        // Zero-offset: ghost is the snapshot itself.
        const ghostRooms = {};
        const cellArea = grid.cell_size_ft * grid.cell_size_ft;
        for (const rid of affectedIds) {
          const snap = snapshots[rid];
          ghostRooms[rid] = {
            cells: snap.cells.map(c => c.slice()),
            bounds: { ...snap.bounds },
            actualAreaSf: snap.cells.length * cellArea
          };
        }
        return { ok: true, ghostRooms };
      }

      const deptKeyByDept = new Map();
      for (const r of regions) {
        if (!r || !Array.isArray(r.cells)) continue;
        const set = new Set();
        for (const [u, v] of r.cells) set.add(u + "," + v);
        deptKeyByDept.set(r.id, set);
      }
      // Cells belonging to locked rooms — forbidden territory for any ghost.
      // (Spec pre-check makes this defensive, but keep it in case.)
      const lockedKeys = new Set();
      for (const r of rooms) {
        if (!r || !r.locked || !Array.isArray(r.cells)) continue;
        for (const [u, v] of r.cells) lockedKeys.add(u + "," + v);
      }

      const affectedSet = new Set(affectedIds);
      const ghostRooms = {};
      const cellArea = grid.cell_size_ft * grid.cell_size_ft;

      for (const rid of affectedIds) {
        const snap = snapshots[rid];
        if (!snap) return { ok: false, reason: "no_snapshot" };
        const deptKeys = deptKeyByDept.get(snap.department_id);
        if (!deptKeys) return { ok: false, reason: "no_dept" };
        const r = proposeReproportionRoom(snap, groupWalls, axis, cellOffset,
                                          deptKeys, lockedKeys);
        if (!r.ok) return r;
        ghostRooms[rid] = {
          cells: r.cells,
          bounds: r.bounds,
          actualAreaSf: r.cells.length * cellArea
        };
      }

      // Affected-vs-affected and affected-vs-unaffected overlap check.
      const claimed = new Map();
      for (const rid of affectedIds) {
        for (const [u, v] of ghostRooms[rid].cells) {
          const key = u + "," + v;
          if (claimed.has(key)) return { ok: false, reason: "affected_overlap" };
          claimed.set(key, rid);
        }
      }
      for (const r of rooms) {
        if (!r || affectedSet.has(r.instance_id)) continue;
        if (!Array.isArray(r.cells)) continue;
        for (const [u, v] of r.cells) {
          if (claimed.has(u + "," + v)) return { ok: false, reason: "unaffected_overlap" };
        }
      }

      return { ok: true, ghostRooms };
    }

    // ---------- Step 07 — FloorStrip ----------

    // Render a single floor as a tiny SVG thumbnail (no labels, no overlay,
    // no gestures). Uses the same world→screen math as the main canvas, but
    // a synthetic view scaled to fit the polygon bounds inside (widthPx ×
    // heightPx) with a small margin. Cells are filled with the dept palette;
    // room rectangles are drawn as 0.5-px outlines so the user can see the
    // overall plan at a glance.
    function renderFloorThumbnail(floor, polygon, widthPx, heightPx) {
      if (!isPlainObject(floor) || !isPlainObject(floor.grid) ||
          !Array.isArray(polygon) || polygon.length < 3) {
        return null;
      }
      const grid = floor.grid;
      const cs = grid.cell_size_ft;
      const ox = grid.origin_x, oy = grid.origin_y;
      const { minX, maxX, minY, maxY } = computePolygonBounds(polygon);
      const worldW = Math.max(1e-6, maxX - minX);
      const worldH = Math.max(1e-6, maxY - minY);
      const margin = 4;  // px
      const innerW = Math.max(8, widthPx - margin * 2);
      const innerH = Math.max(8, heightPx - margin * 2);
      const scale = Math.min(innerW / worldW, innerH / worldH);
      // Center the projected drawing in the tile.
      const offX = margin + (innerW - worldW * scale) / 2;
      const offY = margin + (innerH - worldH * scale) / 2;
      function w2s(wx, wy) {
        return [
          offX + (wx - minX) * scale,
          offY + (maxY - wy) * scale  // flip Y so screen +Y is south
        ];
      }
      const polyPts = polygon
        .filter(p => Array.isArray(p) && p.length >= 2)
        .map(([x, y]) => {
          const [sx, sy] = w2s(Number(x), Number(y));
          return sx.toFixed(1) + "," + sy.toFixed(1);
        }).join(" ");

      // Department region cells (translucent fills).
      const regions = Array.isArray(floor.department_regions) ? floor.department_regions : [];
      const regionEls = [];
      regions.forEach((region, ri) => {
        if (!Array.isArray(region.cells)) return;
        const fill = deptColor(region.id);
        // Combine cells into a single <path> for cheap rendering. Each cell
        // is one rect; they all share the same fill so a path is fine.
        let d = "";
        for (const [u, v] of region.cells) {
          const [x0, y0] = w2s(ox + u * cs, oy + (v + 1) * cs);
          const [x1, y1] = w2s(ox + (u + 1) * cs, oy + v * cs);
          const x = Math.min(x0, x1), y = Math.min(y0, y1);
          const w = Math.abs(x1 - x0), h = Math.abs(y1 - y0);
          d += "M" + x.toFixed(2) + " " + y.toFixed(2) +
               "h" + w.toFixed(2) + "v" + h.toFixed(2) +
               "h" + (-w).toFixed(2) + "Z";
        }
        if (d) regionEls.push(
          <path key={"r" + ri} d={d} fill={fill} fillOpacity="0.5" stroke="none" />
        );
      });

      // Room outlines (1-px text-color stroke, no fill).
      const rooms = Array.isArray(floor.rooms) ? floor.rooms : [];
      const roomEls = [];
      rooms.forEach((room, ri) => {
        if (!isPlainObject(room) || !room.bbox_cells) return;
        const bb = room.bbox_cells;
        const [x0, y0] = w2s(ox + bb.u_min * cs, oy + (bb.v_max + 1) * cs);
        const [x1, y1] = w2s(ox + (bb.u_max + 1) * cs, oy + bb.v_min * cs);
        const x = Math.min(x0, x1), y = Math.min(y0, y1);
        const w = Math.abs(x1 - x0), h = Math.abs(y1 - y0);
        roomEls.push(
          <rect key={"rm" + ri} x={x} y={y} width={w} height={h}
                fill="none" stroke="var(--calvey-text)" strokeWidth="0.5" />
        );
      });

      return (
        <svg viewBox={"0 0 " + widthPx + " " + heightPx}
             preserveAspectRatio="xMidYMid meet">
          {regionEls}
          {polyPts && (
            <polygon points={polyPts}
                     fill="none" stroke="var(--calvey-text)" strokeWidth="0.6" />
          )}
          {roomEls}
        </svg>
      );
    }

    // Vertical floor strip with one tile per floor + add/remove buttons.
    // Numbered top-to-bottom by physical level: the TOP tile is the top floor,
    // the BOTTOM tile is the ground floor. Tap activates; drop targets for
    // cross-floor drag are wired by data-floor-index attributes (the canvas's
    // pointer handlers detect via document.elementFromPoint).
    //
    // Step T3 — tile activation is now pointer-driven instead of click-driven.
    // onPointerDown stops propagation so a tile press never starts a canvas
    // pan; onPointerUp checks the current gesture state and either (a) yields
    // to the canvas's cross-floor-drop handler if a drag is in progress or
    // (b) switches the active floor and flashes the tile. The onClick path
    // is retired because iOS Safari's 300 ms synthesized click was racing
    // with the canvas's pointer handlers.
    function FloorStrip({ project, polygon, activeIdx, dropTargetIdx,
                          dropTargetValid, gestureType, onActivate,
                          onAddFloor, onRemoveFloor, showRegenChip,
                          floorRemovalPending, onCancelFloorRemoval,
                          onConfirmFloorRemoval }) {
      const floors = (project && project.current_plan &&
        Array.isArray(project.current_plan.floors))
          ? project.current_plan.floors : [];
      const fc = floors.length;
      // Top-to-bottom display order: highest level first (e.g. floor 3, 2, 1).
      const order = [];
      for (let i = fc - 1; i >= 0; i--) order.push(i);

      // Step T3 — tap-flash state. flashIdx is the floor index currently
      // showing the 250 ms tap-flash animation, or null. Cleared by a timer
      // so the class falls off after the animation completes.
      const [flashIdx, setFlashIdx] = React.useState(null);
      const flashTimerRef = React.useRef(null);
      React.useEffect(() => () => {
        if (flashTimerRef.current) clearTimeout(flashTimerRef.current);
      }, []);

      function triggerFlash(idx) {
        if (flashTimerRef.current) clearTimeout(flashTimerRef.current);
        setFlashIdx(idx);
        flashTimerRef.current = setTimeout(() => {
          setFlashIdx(null);
          flashTimerRef.current = null;
        }, 250);
      }

      // Step T3 — tile press: swallow the event so the canvas below doesn't
      // start a pan. The tile itself doesn't need to react on down; the
      // activation happens on up so a move-off still cancels naturally.
      function handleTilePointerDown(e) {
        e.stopPropagation();
      }

      // Step T3 — tile release: if a room-drag is in flight the canvas's
      // pointer-up handles the cross-floor drop (pointer capture on the SVG
      // means this handler normally won't even fire during a drag, but guard
      // defensively in case capture failed). Otherwise treat it as a tap and
      // switch the active floor.
      function handleTilePointerUp(e, i) {
        e.stopPropagation();
        if (gestureType === "dragging_room") return;
        if (onActivate) onActivate(i);
        triggerFlash(i);
      }

      return (
        <div className="floor-strip">
          {order.map(i => {
            const f = floors[i];
            if (!isPlainObject(f)) return null;
            const isActive = i === activeIdx;
            const isDrop = i === dropTargetIdx;
            const isFlashing = i === flashIdx;
            const cls = ["floor-tile"];
            if (isActive) cls.push("active");
            if (isFlashing) cls.push("tap-flash");
            const roomCount = Array.isArray(f.rooms) ? f.rooms.length : 0;
            const unplacedCount = Array.isArray(f.unplaced_rooms) ? f.unplaced_rooms.length : 0;
            const level = Number.isFinite(Number(f.level)) ? Number(f.level) : (i + 1);
            return (
              <div key={"floor-tile-" + i} className="floor-tile-wrapper">
                {isDrop && (
                  <div className={"drop-target-ring" +
                    (dropTargetValid ? "" : " invalid")} />
                )}
                <div className={cls.join(" ")}
                     data-floor-index={i}
                     onPointerDown={handleTilePointerDown}
                     onPointerUp={(e) => handleTilePointerUp(e, i)}
                     title={"Activate floor " + level}>
                  {renderFloorThumbnail(f, polygon, 80, 60)}
                  <div className="floor-label" data-floor-index={i}>FLOOR {level}</div>
                  <div className="room-count" data-floor-index={i}>{roomCount}</div>
                  {unplacedCount > 0 && (
                    <div className="unplaced-badge" data-floor-index={i}
                         title={unplacedCount + " unplaced"} />
                  )}
                </div>
              </div>
            );
          })}
          <div className="floor-controls">
            <button type="button" onClick={onAddFloor} title="Add a floor on top">
              + ADD FLOOR
            </button>
            {floorRemovalPending ? (
              (() => {
                const names = Array.isArray(floorRemovalPending.lockedRoomNames)
                  ? floorRemovalPending.lockedRoomNames : [];
                const total = Number.isFinite(Number(floorRemovalPending.lockedCount))
                  ? Number(floorRemovalPending.lockedCount) : names.length;
                const shown = names.slice(0, 3);
                const extra = total > shown.length ? (total - shown.length) : 0;
                const bullets = shown.map(n => "• " + (n || "").toUpperCase()).join(" ");
                const listText = bullets + (extra > 0 ? " · +" + extra + " more" : "");
                const plural = total === 1 ? "LOCKED ROOM" : "LOCKED ROOMS";
                return (
                  <div className="floor-removal-confirm">
                    <div className="title">
                      REMOVE FLOOR {floorRemovalPending.floorLevel} WITH {total} {plural}?
                    </div>
                    <div className="room-list">{listText}</div>
                    <div className="actions">
                      <button type="button" onClick={onCancelFloorRemoval}>
                        CANCEL
                      </button>
                      <button type="button" className="proceed"
                              onClick={onConfirmFloorRemoval}>
                        PROCEED
                      </button>
                    </div>
                  </div>
                );
              })()
            ) : (
              <button type="button" onClick={onRemoveFloor}
                      disabled={fc <= 1}
                      title={fc <= 1 ? "At least one floor required" : "Remove top floor"}>
                − REMOVE TOP
              </button>
            )}
          </div>
          {showRegenChip && (
            <div className="floor-chip">
              Click GENERATE to distribute rooms across the new floor count.
            </div>
          )}
        </div>
      );
    }

    function FootprintCanvas({ project, setProject, programDb, onRegenerate }) {
      const polygon =
        (project && project.context && project.context.footprint &&
         Array.isArray(project.context.footprint.polygon))
          ? project.context.footprint.polygon
          : [];
      const trueNorthDeg =
        (project && project.context && project.context.footprint &&
         typeof project.context.footprint.true_north_deg === "number")
          ? project.context.footprint.true_north_deg
          : 0;
      const buildingType =
        (project && project.context && project.context.program)
          ? (project.context.program.building_type ?? "—")
          : "—";

      // Step 07 — pick the active floor (Step 06 read floors[0] hardcoded).
      const floorsArr = (project && project.current_plan &&
        Array.isArray(project.current_plan.floors))
          ? project.current_plan.floors : [];
      const activeIdxRaw = (project && project.current_plan &&
        Number.isFinite(Number(project.current_plan.active_floor_index)))
          ? Math.floor(Number(project.current_plan.active_floor_index)) : 0;
      const activeIdx = Math.max(0, Math.min(activeIdxRaw, floorsArr.length - 1));
      const activeFloor = (floorsArr.length > 0 && isPlainObject(floorsArr[activeIdx]))
        ? floorsArr[activeIdx] : null;
      const grid = activeFloor && isPlainObject(activeFloor.grid) ? activeFloor.grid : null;
      const regions = activeFloor && Array.isArray(activeFloor.department_regions)
        ? activeFloor.department_regions : [];
      const placedRooms = activeFloor && Array.isArray(activeFloor.rooms)
        ? activeFloor.rooms : [];
      const unplacedRooms = activeFloor && Array.isArray(activeFloor.unplaced_rooms)
        ? activeFloor.unplaced_rooms : [];

      const containerRef = React.useRef(null);
      const svgRef = React.useRef(null);
      const backgroundRef = React.useRef(null);
      // Step 05 — pan & room-drag share dragStateRef (declared below);
      // dragRef from Step 02 is removed as obsolete.
      const didInitialFitRef = React.useRef(false);

      const [viewport, setViewport] = React.useState({ width: 900, height: 520 });
      const [view, setView] = React.useState({ panX: 0, panY: 0, zoom: 1 });
      const [isPanning, setIsPanning] = React.useState(false);

      // Step 05/06 — gesture state machine. Type is the current mode; other
      // fields carry mode-specific data. A ref mirror lets synchronous pointer
      // handlers read the latest value without closure staleness.
      const [gesture, setGesture] = React.useState({
        type: "idle",              // idle | panning | dragging_room | showing_lock_chip | reproportioning | pinching
        roomId: null,
        startBounds: null,
        ghostCells: null,
        dropValid: false,
        // Step 06 — set while type === "reproportioning". ghostRooms is keyed
        // by roomId: { cells, bounds, actualAreaSf }. tooltip holds screen
        // coords + primary-room area text for the live area chip.
        ghostRooms: null,
        cellOffset: 0,
        tooltip: null,
        // Step 07 — cross-floor drop preview while type === "dragging_room".
        // crossFloorTarget is the floor index the cursor is hovering (HTML
        // tile, not SVG); null when the cursor is over the canvas. valid
        // gates whether the target tile glows accent vs. red.
        crossFloorTarget: null,
        crossFloorValid: false,
        // Step T1 — current pointer type ("mouse" | "touch" | "pen").
        // Used to offset the drag ghost 40 px above the finger on touch so
        // the user can see the ghost around their finger.
        pointerType: null,
        // Step T1 — live zoom during pinching, for the debug readout.
        currentZoom: null,
        // Step T1 — last finger position during touch drag (container-screen
        // coords). Used to draw the finger→ghost dashed connector.
        fingerScreen: null,
        // Step T3 — last finger position in viewport (client) coords during
        // any pointer drag. Used to anchor the dragged-room-name float (a
        // position: fixed label) above the finger during cross-floor drag.
        fingerClient: null
      });
      const gestureRef = React.useRef(gesture);
      React.useEffect(() => { gestureRef.current = gesture; }, [gesture]);

      // Step T1 — multi-pointer tracking. Every pointerdown registers an
      // entry; pointermove updates it; pointerup/cancel deletes it. The
      // size of this Map drives pinch-start detection and the debug readout.
      const activePointersRef = React.useRef(new Map());
      // Step T1 — reactive mirror of the ref's size, for the debug readout
      // (refs don't trigger re-renders). Kept in sync by syncPointerCount().
      const [activePointerCount, setActivePointerCount] = React.useState(0);
      function syncPointerCount() {
        const n = activePointersRef.current.size;
        setActivePointerCount(prev => (prev === n ? prev : n));
      }
      // Step T1 — pointers that should be ignored for gesture starts. When
      // a pinch ends while fingers are still down, we mark the remaining
      // fingers ignored so they don't start a surprise pan. Cleared on
      // pointerup (any lift), so a re-press after the pinch is normal.
      const ignoredPointersRef = React.useRef(new Set());
      // Step T1 — pinch state (kept in a ref so the per-tick math doesn't
      // need to round-trip through React state). Mirror of the gesture
      // object's pinch fields, but written synchronously inside the
      // pointermove handler.
      const pinchRef = React.useRef(null);

      // Step 06 — wall that the cursor is currently hovering (idle only).
      // Drives the cursor change (ew/ns resize) and the alignment highlight.
      const [hoveredWallId, setHoveredWallId] = React.useState(null);
      const hoveredWallIdRef = React.useRef(null);
      React.useEffect(() => { hoveredWallIdRef.current = hoveredWallId; },
        [hoveredWallId]);

      // Step 06 — heavy reproportion state (group walls, snapshots, start
      // pointer coords). Lives in a ref so per-tick updates don't re-render.
      const reproRef = React.useRef(null);

      // Step 05 — the drag's pointer-origin + source room snapshot. Lives
      // outside React state so that we can mutate it on every pointermove
      // without causing a re-render per frame.
      const dragStateRef = React.useRef(null);
      // Step T2 — long-press handle shared by every room pointer-down. Step
      // 05 used an inline setTimeout; T2 routes through the shared helper so
      // touch + mouse follow identical cancellation rules (3 px move, 500 ms
      // duration). Desktop right-click is still the primary lock trigger.
      const longPress = useLongPress({
        durationMs: 500,
        moveThresholdPx: 3,
        onLongPress: ({ payload }) => {
          const rid = payload && payload.roomId;
          if (!rid) return;
          // If a drag was already in progress (fingerprint-on-room timer
          // armed concurrently with the drag ghost), cancel the drag before
          // popping the chip. The ghost disappears and no commit fires.
          if (gestureRef.current && gestureRef.current.type === "dragging_room") {
            cancelDrag();
          }
          openLockChip(rid);
        }
      });
      // Step 05 — last tap info for double-tap detection (desktop mouse only;
      // touch double-tap was removed in T2 — see spec Section 04).
      const lastTapRef = React.useRef(null);
      // Step 05 — lock chip state: { roomId, x, y } in container-screen coords.
      const [lockChip, setLockChip] = React.useState(null);
      const lockChipTimerRef = React.useRef(null);
      // Step 05 — transient reject reason shown at bottom-left for 2 s.
      const [rejectReason, setRejectReason] = React.useState(null);
      const rejectTimerRef = React.useRef(null);

      // Mirror state into refs so the wheel listener and pointer handlers
      // can read the latest values without re-installing.
      const viewRef = React.useRef(view);
      const viewportRef = React.useRef(viewport);
      const placedRoomsRef = React.useRef(placedRooms);
      const regionsRef = React.useRef(regions);
      const gridRef = React.useRef(grid);
      // Step 07 — cross-floor lookups need access to all floors. The pointer
      // handlers consult this to validate cross-floor drop targets.
      const projectRef = React.useRef(project);
      React.useEffect(() => { viewRef.current = view; }, [view]);
      React.useEffect(() => { viewportRef.current = viewport; }, [viewport]);
      React.useEffect(() => { placedRoomsRef.current = placedRooms; }, [placedRooms]);
      React.useEffect(() => { regionsRef.current = regions; }, [regions]);
      React.useEffect(() => { gridRef.current = grid; }, [grid]);
      React.useEffect(() => { projectRef.current = project; }, [project]);

      // Step 06 — wall index. Rebuilt whenever rooms/grid change and mirrored
      // to a ref so the pointer handlers (which run outside the React render
      // cycle) read the latest without closure staleness.
      const wallIndex = React.useMemo(
        () => buildWallIndex(placedRooms, grid),
        [placedRooms, grid]
      );
      const wallIndexRef = React.useRef(wallIndex);
      React.useEffect(() => { wallIndexRef.current = wallIndex; }, [wallIndex]);

      // Measure container synchronously on mount + observe resizes.
      // Doing the initial fit in the layout effect (before paint) avoids a
      // visible jump from default-viewport fit → measured-viewport fit.
      React.useLayoutEffect(() => {
        if (!containerRef.current) return;
        const rect = containerRef.current.getBoundingClientRect();
        const w0 = rect.width > 0 ? rect.width : 900;
        const h0 = rect.height > 0 ? rect.height : 520;
        setViewport({ width: w0, height: h0 });
        viewportRef.current = { width: w0, height: h0 };
        if (!didInitialFitRef.current && polygon.length >= 3) {
          didInitialFitRef.current = true;
          setView(computeInitialView(polygon, w0, h0));
        }
        const observer = new ResizeObserver((entries) => {
          for (const entry of entries) {
            const w = entry.contentRect.width;
            const h = entry.contentRect.height;
            if (w > 0 && h > 0) {
              setViewport({ width: w, height: h });
            }
          }
        });
        observer.observe(containerRef.current);
        return () => observer.disconnect();
      }, []);

      // Re-fit whenever the polygon changes (e.g. JSON edit, file upload,
      // start over → onboarding → create).
      const polygonKey = React.useMemo(() => JSON.stringify(polygon), [polygon]);
      React.useEffect(() => {
        const vp = viewportRef.current;
        if (vp.width <= 0 || vp.height <= 0) return;
        if (polygon.length < 3) return;
        // Skip the very first run if the layout effect already fit it, to
        // avoid a redundant setView. The layout effect bumps didInitialFitRef
        // when it does the initial fit.
        if (!didInitialFitRef.current) {
          didInitialFitRef.current = true;
        }
        setView(computeInitialView(polygon, vp.width, vp.height));
        // eslint-disable-next-line react-hooks/exhaustive-deps
      }, [polygonKey]);

      // Non-passive wheel listener so we can preventDefault and stop the
      // page from scrolling while the user zooms the canvas.
      React.useEffect(() => {
        const svg = svgRef.current;
        if (!svg) return;
        function handleWheel(e) {
          e.preventDefault();
          const v = viewRef.current;
          const vp = viewportRef.current;
          if (vp.width <= 0 || vp.height <= 0) return;
          const rect = svg.getBoundingClientRect();
          const cursorX = e.clientX - rect.left;
          const cursorY = e.clientY - rect.top;
          const [wx, wy] = screenToWorld(cursorX, cursorY, v, vp);
          const factor = Math.exp(-e.deltaY * 0.001);
          const newZoom = Math.max(0.05, Math.min(50, v.zoom * factor));
          const newPanX = wx - (cursorX - vp.width / 2) / newZoom;
          const newPanY = wy + (cursorY - vp.height / 2) / newZoom;
          setView({ panX: newPanX, panY: newPanY, zoom: newZoom });
        }
        svg.addEventListener("wheel", handleWheel, { passive: false });
        return () => svg.removeEventListener("wheel", handleWheel);
      }, []);

      // Step T1 — native non-passive pointerdown listener. React 18
      // registers pointerdown as non-passive by default, but Safari on iOS
      // still occasionally triggers selection/magnify on long-press unless
      // the root handler explicitly preventDefaults the touch event. This
      // listener runs before React's delegated handler and covers the case
      // where the synthetic handler can't cancel the default.
      React.useEffect(() => {
        const svg = svgRef.current;
        if (!svg) return;
        function onPointerDownNative(e) {
          if (e.pointerType === "touch" && e.cancelable) {
            e.preventDefault();
          }
        }
        svg.addEventListener("pointerdown", onPointerDownNative, { passive: false });
        return () => svg.removeEventListener("pointerdown", onPointerDownNative);
      }, []);

      // ---------- Step 05 — gesture helpers ----------

      function cancelDrag() {
        dragStateRef.current = null;
        setGesture(g => (g.type === "dragging_room"
          ? { type: "idle", roomId: null, startBounds: null,
              ghostCells: null, dropValid: false,
              crossFloorTarget: null, crossFloorValid: false,
              pointerType: null, fingerScreen: null, fingerClient: null, currentZoom: null }
          : g));
      }

      function showReject(reason) {
        if (rejectTimerRef.current) clearTimeout(rejectTimerRef.current);
        setRejectReason(reason);
        rejectTimerRef.current = setTimeout(() => {
          setRejectReason(null);
          rejectTimerRef.current = null;
        }, 2000);
      }

      function computeLockChipPosition(room) {
        const g = gridRef.current;
        const vp = viewportRef.current;
        const v = viewRef.current;
        if (!room || !room.bbox_cells || !g) {
          return { x: 8, y: 8, flipped: false };
        }
        const cs = g.cell_size_ft;
        const ox = g.origin_x, oy = g.origin_y;
        const bb = room.bbox_cells;
        // Top of bbox in world == v_max+1 (since Y points up). Screen Y is
        // flipped, so this becomes the smallest screen Y.
        const worldRight_x = ox + (bb.u_max + 1) * cs;
        const worldTop_y   = oy + (bb.v_max + 1) * cs;
        const worldLeft_x  = ox + bb.u_min * cs;
        const [srX, srY] = worldToScreen(worldRight_x, worldTop_y, v, vp);
        const [slX]      = worldToScreen(worldLeft_x,  worldTop_y, v, vp);
        // Step T2 — chip footprint reflects the 2-column button grid and
        // 36×72 min button size. Wider and taller than the single-row
        // Step 05 chip; fits the iPhone viewport once clamped below.
        const CHIP_W = 260;
        const CHIP_H = 160;
        const PAD = 16;
        // Reserve 80 px at the bottom of the viewport so the chip never
        // overlaps the thumb-resting zone / slider strip (Step 09 will
        // populate this; the padding is harmless until then).
        const BOTTOM_PAD = 80;

        // Anchor at the room's top-right corner (screen coords). Flip to the
        // top-left if placing the chip to the right would overflow.
        let x = srX + 8;
        let flipped = false;
        if (x + CHIP_W > vp.width - PAD) {
          flipped = true;
          x = slX - CHIP_W - 8;
        }
        // Final left/right clamp so the chip is always fully visible.
        if (x < PAD) x = PAD;
        if (x + CHIP_W > vp.width - PAD) x = Math.max(PAD, vp.width - CHIP_W - PAD);

        let y = srY;
        if (y + CHIP_H > vp.height - BOTTOM_PAD) {
          y = vp.height - CHIP_H - BOTTOM_PAD;
        }
        if (y < PAD) y = PAD;
        return { x, y, flipped };
      }

      function openLockChip(roomId) {
        const rooms = placedRoomsRef.current || [];
        const room = rooms.find(r => r && r.instance_id === roomId);
        if (!room) return;
        longPress.cancel();
        cancelDrag();
        if (lockChipTimerRef.current) clearTimeout(lockChipTimerRef.current);
        const pos = computeLockChipPosition(room);
        setLockChip({ roomId, x: pos.x, y: pos.y });
        setGesture({
          type: "showing_lock_chip", roomId,
          startBounds: null, ghostCells: null, dropValid: false
        });
        lockChipTimerRef.current = setTimeout(() => {
          closeLockChip();
        }, 3000);
      }

      function closeLockChip() {
        if (lockChipTimerRef.current) {
          clearTimeout(lockChipTimerRef.current);
          lockChipTimerRef.current = null;
        }
        setLockChip(null);
        setGesture(g => (g.type === "showing_lock_chip"
          ? { type: "idle", roomId: null, startBounds: null,
              ghostCells: null, dropValid: false }
          : g));
      }

      function commitLock(reason) {
        const chip = lockChip;
        if (!chip || !setProject) { closeLockChip(); return; }
        const roomId = chip.roomId;
        closeLockChip();
        setProject(p => {
          const np = cloneProject(p);
          const floors = isPlainObject(np.current_plan) &&
            Array.isArray(np.current_plan.floors) ? np.current_plan.floors : [];
          // Step 07 — search every floor for the room (chip target may be on
          // any visible floor; the active floor is just where the chip opened).
          for (let fi = 0; fi < floors.length; fi++) {
            const fl = floors[fi];
            if (!isPlainObject(fl) || !Array.isArray(fl.rooms)) continue;
            const idx = fl.rooms.findIndex(r => r && r.instance_id === roomId);
            if (idx < 0) continue;
            const room = fl.rooms[idx];
            fl.rooms[idx] = { ...room, locked: true, lock_reason: reason };
            np.updated_at = new Date().toISOString();
            logEvent(np, "LOCK", {
              room_id: roomId,
              room_name: room.display_name || room.type || roomId,
              floor_level: fl.level != null ? fl.level : (fi + 1),
              reason
            });
            return np;
          }
          return p;
        });
      }

      function commitUnlock() {
        const chip = lockChip;
        if (!chip || !setProject) { closeLockChip(); return; }
        const roomId = chip.roomId;
        closeLockChip();
        setProject(p => {
          const np = cloneProject(p);
          const floors = isPlainObject(np.current_plan) &&
            Array.isArray(np.current_plan.floors) ? np.current_plan.floors : [];
          for (let fi = 0; fi < floors.length; fi++) {
            const fl = floors[fi];
            if (!isPlainObject(fl) || !Array.isArray(fl.rooms)) continue;
            const idx = fl.rooms.findIndex(r => r && r.instance_id === roomId);
            if (idx < 0) continue;
            const room = fl.rooms[idx];
            fl.rooms[idx] = { ...room, locked: false, lock_reason: null };
            np.updated_at = new Date().toISOString();
            logEvent(np, "UNLOCK", {
              room_id: roomId,
              room_name: room.display_name || room.type || roomId,
              floor_level: fl.level != null ? fl.level : (fi + 1)
            });
            return np;
          }
          return p;
        });
      }

      // ---------- Step 06 — reproportion gesture helpers ----------

      // Compute tooltip screen position from a screen cursor. Mouse: 12 px
      // below-right. Step T2 — touch: 40 px above the finger so the
      // finger itself doesn't cover the live area readout. Same mirror-axis
      // rule as the T1 drag ghost. Clamped to the viewport in either case.
      function tooltipPosFor(sx, sy, pointerType) {
        const vp = viewportRef.current || { width: 0, height: 0 };
        const isTouch = pointerType === "touch";
        const ox = isTouch ? 0 : 12;
        const oy = isTouch ? -40 : 12;
        const tx = Math.max(8, Math.min(vp.width - 180, sx + ox));
        const ty = Math.max(8, Math.min(vp.height - 60, sy + oy));
        return { x: tx, y: ty };
      }

      function cancelReproportion() {
        reproRef.current = null;
        setGesture(g => (g.type === "reproportioning"
          ? { type: "idle", roomId: null, startBounds: null,
              ghostCells: null, dropValid: false,
              ghostRooms: null, cellOffset: 0, tooltip: null,
              wallId: null, pointerType: null }
          : g));
      }

      // Given a screen cursor on a hovered wall, kick off a reproportion
      // gesture. Collects the alignment group, snapshots every affected room,
      // and sets gesture state to "reproportioning". Returns true on start.
      function startReproportion(e, wall, screenX, screenY) {
        const svg = svgRef.current;
        if (!svg || !wall) return false;
        const walls = wallIndexRef.current || [];
        const rooms = placedRoomsRef.current || [];
        const grid = gridRef.current;
        if (!grid) return false;

        const group = computeAlignmentGroup(wall, walls);
        // Defense in depth: re-check the lock status (hover suppresses the
        // cursor when the group is locked, but pointer events could race).
        if (alignmentGroupIsLocked(group, rooms)) return false;

        // Collect every room touched by any wall in the group.
        const affectedSet = new Set();
        for (const w of group) {
          affectedSet.add(w.roomA_id);
          affectedSet.add(w.roomB_id);
        }
        const affectedIds = Array.from(affectedSet);

        // Snapshot each affected room — this is the source of truth during
        // the scrub. The project itself stays frozen until pointerup commits.
        const snapshots = {};
        for (const rid of affectedIds) {
          const r = rooms.find(rr => rr && rr.instance_id === rid);
          if (!r || !r.bbox_cells || !Array.isArray(r.cells)) return false;
          snapshots[rid] = {
            cells: r.cells.map(c => c.slice()),
            bounds: { ...r.bbox_cells },
            department_id: r.department_id,
            min_width_cells: r.min_width_cells,
            min_depth_cells: r.min_depth_cells,
            display_name: r.display_name || r.type || rid,
            locked: !!r.locked
          };
        }

        // Determine the cursor-side room on the grabbed wall. That's the
        // "primary" room whose area we show in the tooltip.
        const vp = viewportRef.current;
        const view = viewRef.current;
        const [worldX, worldY] = screenToWorld(screenX, screenY, view, vp);
        let primaryRoomId;
        if (wall.axis === "vertical") {
          // roomA is on the lower-u (west) side, roomB on the upper-u (east).
          const perpWorld = grid.origin_x + wall.perp_coord * grid.cell_size_ft;
          primaryRoomId = (worldX < perpWorld) ? wall.roomA_id : wall.roomB_id;
        } else {
          // roomA is on the lower-v (south) side, roomB on the upper-v (north).
          const perpWorld = grid.origin_y + wall.perp_coord * grid.cell_size_ft;
          primaryRoomId = (worldY < perpWorld) ? wall.roomA_id : wall.roomB_id;
        }

        try { svg.setPointerCapture(e.pointerId); } catch (err) {}
        const pointerType = e.pointerType || "mouse";
        dragStateRef.current = {
          mode: "reproportion",
          pointerId: e.pointerId,
          startScreenX: screenX,
          startScreenY: screenY,
          pointerType
        };
        reproRef.current = {
          groupId: wall.id,
          wall,
          groupWalls: group,
          axis: wall.axis,
          startPerpCoord: wall.perp_coord,
          affectedIds,
          snapshots,
          primaryRoomId,
          cellOffset: 0,
          // Step T2 — remembered so tickReproportion can mirror the tooltip
          // 40 px above the finger on touch.
          pointerType
        };

        // Seed the gesture state with a zero-offset ghost (matches the
        // snapshot). On touch, offset 0 is the "press-to-preview" state per
        // the spec — the alignment highlight and the ghost are both visible
        // immediately; the scrub only advances when the finger actually
        // moves. A zero-motion release is a silent no-op (commitReproportion
        // short-circuits when cellOffset === 0).
        const seed = proposeReproportion(
          snapshots, group, wall.axis, 0, affectedIds, rooms, regionsRef.current || [], grid);

        const primary = snapshots[primaryRoomId];
        const primaryGhost = seed.ok ? seed.ghostRooms[primaryRoomId] : null;
        const tooltip = {
          pos: tooltipPosFor(screenX, screenY, pointerType),
          name: primary ? primary.display_name : "",
          areaSf: primaryGhost ? primaryGhost.actualAreaSf : 0,
          othersMoving: Math.max(0, affectedIds.length - 1)
        };

        setGesture({
          type: "reproportioning",
          roomId: primaryRoomId,
          // Step T2 — wall id surfaced so the alignment highlight layer can
          // keep the accent-blue wall line visible during the scrub (not
          // just the ghost rooms). Also read by the debug readout.
          wallId: wall.id,
          pointerType,
          startBounds: null,
          ghostCells: null,
          dropValid: !!(seed && seed.ok),
          ghostRooms: seed.ok ? seed.ghostRooms : null,
          cellOffset: 0,
          tooltip
        });
        // Clear any residual wall-hover state (the scrub owns the cursor).
        setHoveredWallId(null);
        return true;
      }

      // Per-tick reproportion update: recompute cellOffset from the cursor,
      // attempt to propose new ghost geometry. If valid, advance; if not,
      // keep the last valid state and mark dropValid = false (the scrub
      // "hits a wall" visually).
      function tickReproportion(e, screenX, screenY) {
        const repro = reproRef.current;
        if (!repro) return;
        const grid = gridRef.current;
        const view = viewRef.current;
        if (!grid || !view) return;
        const ds = dragStateRef.current;
        if (!ds) return;

        const dsx = screenX - ds.startScreenX;
        const dsy = screenY - ds.startScreenY;
        let cellOffset;
        if (repro.axis === "vertical") {
          // Cursor X delta → world delta → cell delta. Positive = east
          // (higher perp_coord).
          const dwx = dsx / view.zoom;
          cellOffset = Math.round(dwx / grid.cell_size_ft);
        } else {
          // Cursor Y delta → world Y delta (screen Y is flipped) → cell delta.
          // Positive = north (higher perp_coord, higher v).
          const dwy = -dsy / view.zoom;
          cellOffset = Math.round(dwy / grid.cell_size_ft);
        }

        const rooms = placedRoomsRef.current || [];
        const regs = regionsRef.current || [];

        // Always recompute the tooltip position (it tracks the cursor even
        // when cellOffset hasn't advanced). Step T2 — pass the pointerType
        // recorded at gesture start so touch scrubs keep the tooltip above
        // the finger.
        const currentGs = gestureRef.current;
        const newTooltipPos = tooltipPosFor(screenX, screenY, repro.pointerType);

        if (cellOffset === repro.cellOffset) {
          // Only the pointer moved; keep ghosts + dropValid but refresh tooltip.
          if (currentGs.tooltip && currentGs.tooltip.pos &&
              currentGs.tooltip.pos.x === newTooltipPos.x &&
              currentGs.tooltip.pos.y === newTooltipPos.y) return;
          setGesture(g => ({
            ...g,
            tooltip: g.tooltip ? { ...g.tooltip, pos: newTooltipPos } : g.tooltip
          }));
          return;
        }

        const proposal = proposeReproportion(
          repro.snapshots, repro.groupWalls, repro.axis, cellOffset,
          repro.affectedIds, rooms, regs, grid);

        if (proposal.ok) {
          repro.cellOffset = cellOffset;
          const primary = repro.snapshots[repro.primaryRoomId];
          const pg = proposal.ghostRooms[repro.primaryRoomId];
          setGesture(g => ({
            ...g,
            type: "reproportioning",
            ghostRooms: proposal.ghostRooms,
            cellOffset,
            dropValid: true,
            tooltip: {
              pos: newTooltipPos,
              name: primary ? primary.display_name : "",
              areaSf: pg ? pg.actualAreaSf : 0,
              othersMoving: Math.max(0, repro.affectedIds.length - 1)
            }
          }));
        } else {
          // Invalid: freeze the ghost at the last valid offset (already in
          // gesture state); flag dropValid = false.
          setGesture(g => ({
            ...g,
            dropValid: false,
            tooltip: g.tooltip ? { ...g.tooltip, pos: newTooltipPos } : g.tooltip
          }));
        }
      }

      // Commit the current ghost geometry to the project on release. No-ops
      // if cellOffset === 0 or no valid ghost was produced.
      function commitReproportion() {
        const repro = reproRef.current;
        const gs = gestureRef.current;
        if (!repro) return;
        const ghostRooms = gs && gs.ghostRooms ? gs.ghostRooms : null;
        const cellOffset = repro.cellOffset;
        reproRef.current = null;
        dragStateRef.current = null;
        setGesture({
          type: "idle", roomId: null, startBounds: null,
          ghostCells: null, dropValid: false,
          ghostRooms: null, cellOffset: 0, tooltip: null,
          wallId: null, pointerType: null
        });
        if (cellOffset === 0 || !ghostRooms || !setProject) return;

        setProject(p => {
          const np = cloneProject(p);
          const floors = isPlainObject(np.current_plan) &&
            Array.isArray(np.current_plan.floors) ? np.current_plan.floors : [];
          // Step 07 — apply to the active floor (Step 06 hardcoded floors[0]).
          const fIdx = Number.isFinite(Number(np.current_plan.active_floor_index))
            ? Math.floor(Number(np.current_plan.active_floor_index)) : 0;
          const fl = (fIdx >= 0 && fIdx < floors.length) ? floors[fIdx] : null;
          if (!isPlainObject(fl) || !Array.isArray(fl.rooms)) return p;
          const grid = fl.grid;
          if (!isPlainObject(grid)) return p;
          const touchedIds = [];
          for (let i = 0; i < fl.rooms.length; i++) {
            const r = fl.rooms[i];
            if (!r || !ghostRooms[r.instance_id]) continue;
            fl.rooms[i] = rebuildRoomGeometry(r, ghostRooms[r.instance_id].cells, grid);
            touchedIds.push(r.instance_id);
          }
          np.updated_at = new Date().toISOString();
          logEvent(np, "REPROPORTION", {
            room_ids: touchedIds,
            axis: null,
            delta_cells: cellOffset,
            floor_level: fIdx + 1
          });
          return np;
        });
      }

      // ---------- Pointer handlers (Step 05 gesture machine) ----------

      function startPan(e, screenX, screenY) {
        const svg = svgRef.current;
        if (!svg) return;
        try { svg.setPointerCapture(e.pointerId); } catch (err) {}
        dragStateRef.current = {
          mode: "pan",
          startScreenX: screenX,
          startScreenY: screenY,
          startPanX: view.panX,
          startPanY: view.panY,
          pointerId: e.pointerId,
          pointerType: e.pointerType || "mouse"
        };
        setIsPanning(true);
        setGesture(g => ({ ...g, type: "panning", pointerType: e.pointerType || "mouse" }));
      }

      function startRoomDrag(e, room, screenX, screenY) {
        const svg = svgRef.current;
        if (!svg) return;
        try { svg.setPointerCapture(e.pointerId); } catch (err) {}
        const startCells = (Array.isArray(room.cells) ? room.cells : [])
          .map(c => c.slice());
        dragStateRef.current = {
          mode: "room",
          roomId: room.instance_id,
          startScreenX: screenX,
          startScreenY: screenY,
          startCells,
          startBounds: room.bbox_cells ? { ...room.bbox_cells } : null,
          pointerId: e.pointerId,
          pointerType: e.pointerType || "mouse",
          moved: false
        };
        setGesture({
          type: "dragging_room",
          roomId: room.instance_id,
          startBounds: room.bbox_cells ? { ...room.bbox_cells } : null,
          ghostCells: startCells,
          dropValid: true,
          pointerType: e.pointerType || "mouse",
          fingerScreen: { x: screenX, y: screenY },
          fingerClient: { x: e.clientX, y: e.clientY }
        });
        // Step T2 — arm long-press through the shared useLongPress helper.
        // The helper handles the 500 ms timer and 3 px move threshold; on
        // fire, the onLongPress callback (defined at the top of this
        // component) cancels any in-progress drag and opens the lock chip.
        longPress.cancel();
        longPress.start(e, { roomId: room.instance_id });
      }

      // ---------- Step T1 — pinch-to-zoom helpers ----------

      // Abort any in-progress single-pointer gesture (pan / drag /
      // reproportion) so pinch can take over cleanly. Called when a second
      // pointer lands during one of those gestures.
      function abortSinglePointerGesture() {
        longPress.cancel();
        const ds = dragStateRef.current;
        if (ds) {
          if (ds.mode === "reproportion") {
            cancelReproportion();
          } else if (ds.mode === "room") {
            cancelDrag();
          } else {
            dragStateRef.current = null;
            setIsPanning(false);
            setGesture(g => (g.type === "panning"
              ? { type: "idle", roomId: null, startBounds: null,
                  ghostCells: null, dropValid: false,
                  crossFloorTarget: null, crossFloorValid: false,
                  pointerType: null, fingerScreen: null, fingerClient: null, currentZoom: null }
              : g));
          }
        }
      }

      function startPinch() {
        const svg = svgRef.current;
        const vp = viewportRef.current;
        const view = viewRef.current;
        if (!svg || !vp) return;
        const iter = activePointersRef.current.values();
        const p1 = iter.next().value;
        const p2 = iter.next().value;
        if (!p1 || !p2) return;
        const rect = svg.getBoundingClientRect();
        const s1x = p1.clientX - rect.left, s1y = p1.clientY - rect.top;
        const s2x = p2.clientX - rect.left, s2y = p2.clientY - rect.top;
        const startDistPx = Math.hypot(s2x - s1x, s2y - s1y);
        if (startDistPx < 1) return; // degenerate; ignore
        const mx = (s1x + s2x) / 2;
        const my = (s1y + s2y) / 2;
        const [mwx, mwy] = screenToWorld(mx, my, view, vp);
        pinchRef.current = {
          startDistPx,
          startZoom: view.zoom,
          startPanX: view.panX,
          startPanY: view.panY,
          startMidScreen: [mx, my],
          startMidWorld: [mwx, mwy]
        };
        setGesture(g => ({
          ...g,
          type: "pinching",
          roomId: null,
          startBounds: null,
          ghostCells: null,
          dropValid: false,
          crossFloorTarget: null,
          crossFloorValid: false,
          currentZoom: view.zoom
        }));
      }

      function tickPinch() {
        const pinch = pinchRef.current;
        const svg = svgRef.current;
        const vp = viewportRef.current;
        if (!pinch || !svg || !vp) return;
        if (activePointersRef.current.size !== 2) return;
        const rect = svg.getBoundingClientRect();
        const iter = activePointersRef.current.values();
        const p1 = iter.next().value;
        const p2 = iter.next().value;
        const s1x = p1.clientX - rect.left, s1y = p1.clientY - rect.top;
        const s2x = p2.clientX - rect.left, s2y = p2.clientY - rect.top;
        const currDistPx = Math.hypot(s2x - s1x, s2y - s1y);
        if (currDistPx < 1) return;
        const zoomRatio = currDistPx / pinch.startDistPx;
        const newZoom = Math.max(0.05, Math.min(50, pinch.startZoom * zoomRatio));
