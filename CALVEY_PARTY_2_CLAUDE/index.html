<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>CALVEY PARTY 2 — Sandbox</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap');

    :root {
      --calvey-accent: #6A9CC4;
      --calvey-text: #1A1A1A;
      --calvey-muted: #888888;
      --calvey-surface: #F5F5F5;
      --calvey-rule: #E0E0E0;
      --calvey-error: #B33A3A;
      --calvey-warn: #C68A2E;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Cormorant Garamond', Georgia, serif;
      color: var(--calvey-text);
      background: white;
      margin: 0;
      padding: 0;
      font-size: 16px;
      line-height: 1.5;
    }

    .app {
      max-width: 960px;
      margin: 0 auto;
      padding: 48px 32px 96px;
    }

    h1, h2, h3 {
      font-weight: 500;
      margin: 0 0 16px;
    }

    h1 { font-size: 32px; letter-spacing: -0.01em; }
    h2 { font-size: 20px; }
    h3 { font-size: 14px; font-family: 'Space Mono', monospace; text-transform: uppercase; letter-spacing: 0.08em; color: var(--calvey-muted); }

    .label, .meta, button, .chip, .mono {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .hairline { border-top: 1px solid var(--calvey-rule); margin: 32px 0; }

    .section { margin-bottom: 32px; }

    table.kv { width: 100%; border-collapse: collapse; }
    table.kv td {
      border-bottom: 1px solid var(--calvey-rule);
      padding: 10px 14px;
      vertical-align: top;
    }
    table.kv td.label { width: 35%; color: var(--calvey-muted); font-family: 'Space Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
    table.kv td.value { background: var(--calvey-surface); font-family: 'Space Mono', monospace; font-size: 12px; word-break: break-all; }

    button {
      background: white;
      border: 1px solid var(--calvey-text);
      padding: 10px 16px;
      cursor: pointer;
      margin-right: 8px;
      color: var(--calvey-text);
    }
    button:hover { background: var(--calvey-text); color: white; }

    input[type="file"] { display: none; }

    label.upload {
      display: inline-block;
      background: white;
      border: 1px solid var(--calvey-text);
      padding: 10px 16px;
      cursor: pointer;
      margin-right: 8px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    label.upload:hover { background: var(--calvey-text); color: white; }

    textarea.json-viewer {
      width: 100%;
      min-height: 480px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      line-height: 1.6;
      padding: 16px;
      border: 1px solid var(--calvey-rule);
      background: var(--calvey-surface);
      color: var(--calvey-text);
      resize: vertical;
    }

    .chip {
      display: inline-block;
      padding: 4px 10px;
      border: 1px solid currentColor;
      margin-right: 6px;
      margin-bottom: 6px;
    }
    .chip-ok    { color: var(--calvey-accent); }
    .chip-warn  { color: var(--calvey-warn); }
    .chip-error { color: var(--calvey-error); }

    .block-note {
      border-left: 3px solid var(--calvey-accent);
      padding: 8px 16px;
      background: var(--calvey-surface);
      font-size: 14px;
      margin: 16px 0;
    }

    .onboard-card {
      border: 1px solid var(--calvey-rule);
      padding: 32px;
      margin-top: 24px;
      background: white;
    }

    .onboard-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    @media (min-width: 640px) {
      .onboard-grid.two { grid-template-columns: 1fr 1fr; }
    }

    .field { display: flex; flex-direction: column; }
    .field label {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--calvey-muted);
      margin-bottom: 6px;
    }
    .field select,
    .field input[type="number"],
    .field input[type="text"] {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      padding: 10px 12px;
      border: 1px solid var(--calvey-text);
      background: white;
      color: var(--calvey-text);
      width: 100%;
    }
    .field .hint {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--calvey-muted);
      margin-top: 6px;
    }

    .preset-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .preset-row button {
      padding: 6px 10px;
      margin: 0;
      font-size: 10px;
    }

    .primary {
      background: var(--calvey-text);
      color: white;
    }
    .primary:hover { background: var(--calvey-accent); border-color: var(--calvey-accent); }

    .linkish {
      background: transparent;
      border: none;
      color: var(--calvey-muted);
      padding: 6px 0;
      text-decoration: underline;
      cursor: pointer;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .linkish:hover { background: transparent; color: var(--calvey-text); }

    .soft-rule {
      text-align: center;
      color: var(--calvey-muted);
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin: 24px 0 16px;
    }

    footer {
      margin-top: 64px;
      padding-top: 16px;
      border-top: 1px solid var(--calvey-rule);
      color: var(--calvey-muted);
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .canvas-container {
      width: 100%;
      height: 520px;
      border: 1px solid var(--calvey-rule);
      margin: 32px 0;
      position: relative;
      overflow: hidden;
      background: var(--calvey-surface);
    }

    .canvas-container svg {
      width: 100%;
      height: 100%;
      display: block;
      cursor: grab;
      user-select: none;
    }

    .canvas-container svg.panning {
      cursor: grabbing;
    }

    .canvas-overlay {
      position: absolute;
      pointer-events: none;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--calvey-text);
    }

    .canvas-overlay.top-right {
      top: 20px;
      right: 20px;
      background: rgba(255, 255, 255, 0.9);
      padding: 8px 12px;
      border: 1px solid var(--calvey-rule);
      line-height: 1.6;
    }

    .canvas-overlay.top-right .label {
      color: var(--calvey-muted);
    }

    .canvas-overlay.top-right button {
      pointer-events: auto;
      margin-top: 8px;
      margin-right: 6px;
      padding: 6px 12px;
      font-size: 10px;
    }

    .canvas-overlay.bottom-right {
      bottom: 20px;
      right: 20px;
      background: rgba(255, 255, 255, 0.9);
      padding: 8px 12px;
      border: 1px solid var(--calvey-rule);
      line-height: 1.6;
      max-height: 200px;
      overflow-y: auto;
      pointer-events: auto;
    }

    .canvas-overlay.bottom-right .dept-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      white-space: nowrap;
    }

    .canvas-overlay.bottom-right .dept-row .dept-name {
      color: var(--calvey-text);
    }

    .canvas-overlay.bottom-right .dept-row .dept-meta {
      color: var(--calvey-muted);
    }

    button:disabled {
      background: var(--calvey-surface);
      color: var(--calvey-muted);
      border-color: var(--calvey-rule);
      cursor: not-allowed;
    }
    button:disabled:hover {
      background: var(--calvey-surface);
      color: var(--calvey-muted);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="env,react">
    // ============================================================
    // SECTION 01 — SCHEMA
    // v2.1-party schema, validators, migrateFromV13 stub
    // ============================================================

    const SCHEMA_VERSION = "2.1-party";
    const ENGINE_VERSION = "0.2.0-step03";

    function emptyProject() {
      const now = new Date().toISOString();
      const id =
        (typeof crypto !== "undefined" && typeof crypto.randomUUID === "function")
          ? crypto.randomUUID()
          : ("p-" + Math.random().toString(36).slice(2, 10) + "-" + Date.now().toString(36));
      return {
        schema_version: SCHEMA_VERSION,
        project_id: id,
        engine_version: ENGINE_VERSION,
        created_at: now,
        updated_at: now,
        context: {
          footprint: {
            polygon: [],
            polygon_units: "feet",
            source: null,
            true_north_deg: 0,
            lat: null,
            lon: null
          },
          site: {
            climate_zone: null,
            setbacks: [],
            adjacent_buildings: [],
            obstructions: []
          },
          program: {
            building_type: null,
            rooms: [],
            adjacency_graph: {},
            vertical_constraints: {}
          },
          vertical_anchors: {
            cores: [],
            structural_lines: [],
            shafts: []
          }
        },
        weights: {
          daylight: 0.25,
          adjacency: 0.25,
          compactness: 0.15,
          circulation: 0.20,
          facade: 0.15
        },
        code_limits: {
          max_stories: null,
          max_height_ft: null,
          jurisdiction: null
        },
        current_plan: {
          floors: [
            {
              level: 1,
              grid: null,
              department_regions: [],
              sun_vector: null,
              rooms: [],
              unplaced_rooms: []
            }
          ],
          total_score: null,
          program_fit_report: null,
          unplaced_rooms: []
        },
        warnings: [],
        sessions: []
      };
    }

    function isPlainObject(x) {
      return x !== null && typeof x === "object" && !Array.isArray(x);
    }

    function validateProject(p) {
      const errors = [];
      const warnings = [];

      if (!isPlainObject(p)) {
        return { ok: false, errors: ["project must be an object"], warnings: [] };
      }

      if (p.schema_version !== "2.1-party") {
        errors.push("schema_version must be 2.1-party");
      }
      if (typeof p.project_id !== "string" || p.project_id.length === 0) {
        errors.push("project_id must be a non-empty string");
      }

      if (!isPlainObject(p.context)) {
        errors.push("context must be an object");
      }
      if (!isPlainObject(p.weights)) {
        errors.push("weights must be an object");
      }
      if (!isPlainObject(p.code_limits)) {
        errors.push("code_limits must be an object");
      }
      if (!isPlainObject(p.current_plan)) {
        errors.push("current_plan must be an object");
      }
      if (!Array.isArray(p.warnings)) {
        errors.push("warnings must be an array");
      }
      if (!Array.isArray(p.sessions)) {
        errors.push("sessions must be an array");
      }

      const weightKeys = ["daylight", "adjacency", "compactness", "circulation", "facade"];
      if (isPlainObject(p.weights)) {
        for (const k of weightKeys) {
          if (!(k in p.weights)) {
            errors.push("weights missing key: " + k);
          }
        }
        const allPresent = weightKeys.every(k => typeof p.weights[k] === "number");
        if (allPresent) {
          const sum = weightKeys.reduce((acc, k) => acc + p.weights[k], 0);
          if (Math.abs(sum - 1.0) > 0.01) {
            warnings.push("weights do not sum to 1.0 ± 0.01 (got " + sum.toFixed(3) + ")");
          }
        }
      }

      if (
        isPlainObject(p.context) &&
        isPlainObject(p.context.footprint) &&
        Array.isArray(p.context.footprint.polygon) &&
        p.context.footprint.polygon.length === 0
      ) {
        warnings.push("footprint polygon is empty");
      }

      if (
        isPlainObject(p.context) &&
        isPlainObject(p.context.program) &&
        p.context.program.building_type === null
      ) {
        warnings.push("building_type not set");
      }

      // Step 03: validate floors[0].grid and floors[0].department_regions when populated.
      // These are warning-level — a null/empty state is legitimate (pre-generate).
      if (isPlainObject(p.current_plan) && Array.isArray(p.current_plan.floors)) {
        const f0 = p.current_plan.floors[0];
        if (isPlainObject(f0)) {
          if (isPlainObject(f0.grid)) {
            const g = f0.grid;
            if (!(typeof g.cell_size_ft === "number" && g.cell_size_ft > 0)) {
              warnings.push("floors[0].grid.cell_size_ft must be > 0");
            }
            if (!(typeof g.origin_x === "number")) {
              warnings.push("floors[0].grid.origin_x missing");
            }
            if (!(typeof g.origin_y === "number")) {
              warnings.push("floors[0].grid.origin_y missing");
            }
            if (!(typeof g.width_cells === "number" && g.width_cells >= 1)) {
              warnings.push("floors[0].grid.width_cells must be >= 1");
            }
            if (!(typeof g.height_cells === "number" && g.height_cells >= 1)) {
              warnings.push("floors[0].grid.height_cells must be >= 1");
            }
            if (!Array.isArray(g.inside) ||
                g.inside.length !== (g.height_cells | 0) ||
                (g.inside[0] && g.inside[0].length !== (g.width_cells | 0))) {
              warnings.push("floors[0].grid.inside must be a [height_cells][width_cells] 2D array");
            }
          }
          if (Array.isArray(f0.department_regions)) {
            const allowed = new Set(["high", "medium", "low"]);
            f0.department_regions.forEach((r, i) => {
              if (!isPlainObject(r)) {
                warnings.push("floors[0].department_regions[" + i + "] must be an object");
                return;
              }
              if (typeof r.id !== "string" || r.id.length === 0) {
                warnings.push("floors[0].department_regions[" + i + "].id must be a non-empty string");
              }
              if (typeof r.name !== "string" || r.name.length === 0) {
                warnings.push("floors[0].department_regions[" + i + "].name must be a non-empty string");
              }
              if (!allowed.has(r.daylight_priority)) {
                warnings.push("floors[0].department_regions[" + i + "].daylight_priority must be high|medium|low");
              }
              if (!Array.isArray(r.cells)) {
                warnings.push("floors[0].department_regions[" + i + "].cells must be an array");
              }
            });
          }
        }
      }

      // Mirror structured project.warnings into the chip row so engine-raised
      // warnings (e.g., overflow) show up alongside validator warnings.
      if (Array.isArray(p.warnings)) {
        for (const w of p.warnings) {
          if (typeof w === "string" && w.length > 0) {
            warnings.push(w);
          } else if (isPlainObject(w) && typeof w.message === "string") {
            warnings.push(w.message);
          }
        }
      }

      return { ok: errors.length === 0, errors, warnings };
    }

    function migrateFromV13(legacy) {
      // TODO Step 01.5 — real v13 migration once we decide whether v13 files
      // need to round-trip into this sandbox at all. For now: log and return null.
      console.warn("migrateFromV13: not implemented in Step 01");
      return null;
    }

    // ============================================================
    // SECTION 02 — PERSISTENCE
    // localStorage autosave + .calvey-party.json import/export
    // ============================================================

    const LS_KEY = "calvey_party_2_project";

    function loadFromLocalStorage() {
      try {
        const raw = localStorage.getItem(LS_KEY);
        if (!raw) return null;
        return JSON.parse(raw);
      } catch (e) {
        console.debug("loadFromLocalStorage: parse error", e);
        return null;
      }
    }

    function saveToLocalStorage(project) {
      try {
        project.updated_at = new Date().toISOString();
        localStorage.setItem(LS_KEY, JSON.stringify(project));
      } catch (e) {
        console.debug("saveToLocalStorage: write error (likely quota)", e);
      }
    }

    function downloadProjectFile(project) {
      const blob = new Blob([JSON.stringify(project, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = project.project_id + ".calvey-party.json";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function uploadProjectFile(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onerror = () => reject(new Error("Could not read file"));
        reader.onload = () => {
          let parsed;
          try {
            parsed = JSON.parse(reader.result);
          } catch (e) {
            reject(new Error("Could not parse JSON: " + e.message));
            return;
          }
          const v = validateProject(parsed);
          if (!v.ok) {
            reject(new Error("Invalid project file: " + v.errors.join("; ")));
            return;
          }
          resolve(parsed);
        };
        reader.readAsText(file);
      });
    }

    // ============================================================
    // SECTION 03 — SESSIONS  [Step 08 — TODO]
    // ============================================================

    // (empty — will be filled in Step 08)

    // ============================================================
    // SECTION 04 — ENGINE
    // Step 03: grid substrate, sun vector, Stage A department zoning.
    // Step 06 will add Stage C/D (adjacency repair, confidence).
    // ============================================================

    // ---------- Grid substrate ----------

    // Ray-cast point-in-polygon. Odd crossing count → inside.
    function pointInPolygon(polygon, x, y) {
      if (!Array.isArray(polygon) || polygon.length < 3) return false;
      let inside = false;
      for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
        const pi = polygon[i], pj = polygon[j];
        if (!Array.isArray(pi) || !Array.isArray(pj)) continue;
        const xi = Number(pi[0]), yi = Number(pi[1]);
        const xj = Number(pj[0]), yj = Number(pj[1]);
        if (!Number.isFinite(xi) || !Number.isFinite(yi)) continue;
        if (!Number.isFinite(xj) || !Number.isFinite(yj)) continue;
        const intersects =
          (yi > y) !== (yj > y) &&
          x < ((xj - xi) * (y - yi)) / (yj - yi) + xi;
        if (intersects) inside = !inside;
      }
      return inside;
    }

    // Default cell size is 5 ft; bumps to 10 ft on large footprints to keep the
    // cell count tractable. Step 08 will expose this as a slider.
    function chooseCellSize(polygon) {
      const area = computePolygonAreaSF(polygon);
      return area > 50000 ? 10 : 5;
    }

    function buildGrid(polygon, cellSizeFt) {
      const cs = cellSizeFt > 0 ? cellSizeFt : 5;
      const { minX, minY, maxX, maxY } = computePolygonBounds(polygon);
      const width_cells = Math.max(1, Math.ceil((maxX - minX) / cs));
      const height_cells = Math.max(1, Math.ceil((maxY - minY) / cs));
      const inside = new Array(height_cells);
      for (let v = 0; v < height_cells; v++) {
        const row = new Array(width_cells);
        const cy = minY + (v + 0.5) * cs;
        for (let u = 0; u < width_cells; u++) {
          const cx = minX + (u + 0.5) * cs;
          row[u] = pointInPolygon(polygon, cx, cy);
        }
        inside[v] = row;
      }
      return {
        cell_size_ft: cs,
        origin_x: minX,
        origin_y: minY,
        width_cells,
        height_cells,
        inside
      };
    }

    function cellCenter(grid, u, v) {
      return [
        grid.origin_x + (u + 0.5) * grid.cell_size_ft,
        grid.origin_y + (v + 0.5) * grid.cell_size_ft
      ];
    }

    // ---------- Sun vector ----------

    // Returns the direction of true south and true north in the project's LOCAL
    // coordinate frame. Local +Y points north when true_north_deg === 0; nonzero
    // values rotate the polygon clockwise relative to true north.
    //   north_x = sin(true_north_deg), north_y = cos(true_north_deg).
    // lat is captured for forward compatibility; Step 03 does not use it.
    function computeSunVector(trueNorthDeg, _lat) {
      const rad = (Number(trueNorthDeg) || 0) * Math.PI / 180;
      const north_x = Math.sin(rad);
      const north_y = Math.cos(rad);
      return {
        north_x,
        north_y,
        south_x: -north_x,
        south_y: -north_y
      };
    }

    // ---------- Daylight priority normalization ----------

    const DAYLIGHT_RANK = { high: 3, medium: 2, low: 1 };

    // Input data uses "High"|"Medium"|"Low"|"None"; normalize to lowercase and
    // collapse "none" → "low" since Stage A has no weaker tier.
    function normalizeDaylightPriority(raw) {
      if (raw == null) return "medium";
      const s = String(raw).toLowerCase().trim();
      if (s === "high") return "high";
      if (s === "medium") return "medium";
      if (s === "low") return "low";
      if (s === "none") return "low";
      return "medium";
    }

    function maxDaylight(a, b) {
      return (DAYLIGHT_RANK[a] || 0) >= (DAYLIGHT_RANK[b] || 0) ? a : b;
    }

    function toTitleCase(s) {
      if (!s) return "";
      return String(s)
        .replace(/[_\/]+/g, " ")
        .split(/\s+/)
        .filter(Boolean)
        .map(w => w[0].toUpperCase() + w.slice(1).toLowerCase())
        .join(" ");
    }

    function slugify(s) {
      return String(s || "").toLowerCase().replace(/[^a-z0-9]+/g, "_").replace(/^_+|_+$/g, "");
    }

    // ---------- Room / department extraction ----------

    // Shape B adapter: the CALVEY_PROGRAM databases have no top-level
    // `departments` array — each space_library entry carries
    // `parti.department_group` (preferred) or `category` (fallback).
    function deptKeyForSpace(space) {
      if (isPlainObject(space) && isPlainObject(space.parti) &&
          typeof space.parti.department_group === "string" &&
          space.parti.department_group.length > 0) {
        return space.parti.department_group;
      }
      if (isPlainObject(space) && typeof space.category === "string" && space.category.length > 0) {
        return space.category.split("/")[0];
      }
      return "Unassigned";
    }

    // Seed context.program.rooms from a building-type JSON's space_library.
    // Keep the shape minimal and stable for Step 04 to extend.
    function roomsFromBuildingType(buildingTypeJson) {
      if (!isPlainObject(buildingTypeJson) || !Array.isArray(buildingTypeJson.space_library)) {
        return [];
      }
      return buildingTypeJson.space_library
        .filter(isPlainObject)
        .map(space => {
          const deptKey = deptKeyForSpace(space);
          const targetArea = (isPlainObject(space.dimensions_ft) &&
                              Number.isFinite(Number(space.dimensions_ft.typical_area_sf)))
            ? Number(space.dimensions_ft.typical_area_sf)
            : (Array.isArray(space.nsf_range) && space.nsf_range.length === 2
                ? (Number(space.nsf_range[0]) + Number(space.nsf_range[1])) / 2
                : 0);
          return {
            id: typeof space.id === "string" ? space.id : slugify(space.name || "room"),
            name: typeof space.name === "string" ? space.name : (space.id || "Room"),
            department: slugify(deptKey),
            department_name: toTitleCase(deptKey),
            daylight_priority: normalizeDaylightPriority(space.daylight_priority),
            target_area: targetArea,
            count: 1
          };
        });
    }

    // Aggregate rooms into departments with area_fraction and daylight_priority.
    function departmentsFromRooms(rooms) {
      if (!Array.isArray(rooms) || rooms.length === 0) return [];
      const groups = new Map();
      for (const r of rooms) {
        if (!isPlainObject(r)) continue;
        const key = typeof r.department === "string" && r.department.length > 0
          ? r.department
          : "unassigned";
        const name = typeof r.department_name === "string" && r.department_name.length > 0
          ? r.department_name
          : toTitleCase(key);
        const dp = normalizeDaylightPriority(r.daylight_priority);
        const area = Number.isFinite(Number(r.target_area)) ? Number(r.target_area) : 0;
        const count = Number.isFinite(Number(r.count)) && Number(r.count) > 0 ? Number(r.count) : 1;
        if (!groups.has(key)) {
          groups.set(key, { id: key, name, daylight_priority: dp, _area: 0 });
        }
        const g = groups.get(key);
        g.daylight_priority = maxDaylight(g.daylight_priority, dp);
        g._area += area * count;
      }
      const list = Array.from(groups.values());
      const total = list.reduce((s, g) => s + g._area, 0);
      if (total <= 0) {
        const equal = 1 / list.length;
        return list.map(g => ({
          id: g.id, name: g.name, daylight_priority: g.daylight_priority, area_fraction: equal
        }));
      }
      return list.map(g => ({
        id: g.id,
        name: g.name,
        daylight_priority: g.daylight_priority,
        area_fraction: g._area / total
      }));
    }

    // ---------- Stage A — seeded region growing ----------

    function runStageA(grid, sun, departments) {
      const W = grid.width_cells, H = grid.height_cells, inside = grid.inside;

      // Collect interior cells.
      const interior = [];
      for (let v = 0; v < H; v++) {
        for (let u = 0; u < W; u++) {
          if (inside[v][u]) interior.push([u, v]);
        }
      }
      const N = interior.length;

      const depts = Array.isArray(departments) ? departments : [];
      if (depts.length === 0 || N === 0) {
        return depts.map(d => ({
          id: d.id, name: d.name,
          daylight_priority: d.daylight_priority,
          cell_count: 0, area_sf: 0, cells: [], centroid: null
        }));
      }

      // Per-department target cell counts. Sum must equal N; adjust the
      // largest target to absorb rounding error.
      const targets = depts.map(d => Math.round(N * (d.area_fraction || 0)));
      let sumT = targets.reduce((a, b) => a + b, 0);
      if (sumT !== N) {
        let maxIdx = 0;
        for (let i = 1; i < targets.length; i++) {
          if (targets[i] > targets[maxIdx]) maxIdx = i;
        }
        targets[maxIdx] = Math.max(0, targets[maxIdx] + (N - sumT));
      }

      // Grid centroid (over interior cells).
      let gcx = 0, gcy = 0;
      for (const [u, v] of interior) {
        const [cx, cy] = cellCenter(grid, u, v);
        gcx += cx; gcy += cy;
      }
      gcx /= N; gcy /= N;

      // Score a cell for a given daylight priority.
      //   high   → max (projection on sun.south)    = south-most
      //   low    → max (projection on sun.north)    = north-most
      //   medium → min (distance to grid centroid)  = center
      function scoreCell(u, v, priority) {
        const [cx, cy] = cellCenter(grid, u, v);
        const dx = cx - gcx, dy = cy - gcy;
        if (priority === "high") return dx * sun.south_x + dy * sun.south_y;
        if (priority === "low")  return dx * sun.north_x + dy * sun.north_y;
        return -(dx * dx + dy * dy);
      }

      // Seed placement: higher-daylight-priority departments pick first, then
      // alphabetical by id to break ties deterministically.
      const seedOrder = depts.map((_, i) => i).sort((a, b) => {
        const ra = DAYLIGHT_RANK[depts[a].daylight_priority] || 0;
        const rb = DAYLIGHT_RANK[depts[b].daylight_priority] || 0;
        if (rb !== ra) return rb - ra;
        return String(depts[a].id).localeCompare(String(depts[b].id));
      });

      const claimed = new Map();  // "u,v" -> deptIndex
      const usedSeeds = new Set();
      const seeds = new Array(depts.length).fill(null);

      for (const di of seedOrder) {
        const priority = depts[di].daylight_priority;
        let bestIdx = -1, bestScore = -Infinity;
        for (let i = 0; i < interior.length; i++) {
          const [u, v] = interior[i];
          const key = u + "," + v;
          if (usedSeeds.has(key)) continue;
          const s = scoreCell(u, v, priority);
          if (s > bestScore) { bestScore = s; bestIdx = i; }
        }
        if (bestIdx < 0) continue;
        const [u, v] = interior[bestIdx];
        const key = u + "," + v;
        usedSeeds.add(key);
        claimed.set(key, di);
        seeds[di] = [u, v];
      }

      // BFS frontiers per department (arrays used as FIFO queues).
      const frontiers = depts.map(() => []);
      const cellCounts = depts.map(() => 0);
      for (let di = 0; di < depts.length; di++) {
        if (seeds[di]) { frontiers[di].push(seeds[di]); cellCounts[di] = 1; }
      }

      const inBounds = (u, v) => u >= 0 && u < W && v >= 0 && v < H;
      const isClaimable = (u, v) =>
        inBounds(u, v) && inside[v][u] && !claimed.has(u + "," + v);

      // Simultaneous BFS with rotating department order each round so smaller
      // departments aren't starved.
      let round = 0;
      const MAX_ROUNDS = N * depts.length + 10;  // safety cap
      while (round < MAX_ROUNDS) {
        let claimedThisRound = false;
        for (let k = 0; k < depts.length; k++) {
          const di = (k + round) % depts.length;
          if (cellCounts[di] >= targets[di]) continue;
          const q = frontiers[di];
          // Pop stale frontier cells (no claimable neighbors) until we find one
          // that can claim a neighbor this tick, or the queue is empty.
          while (q.length > 0) {
            const [u, v] = q[0];
            const neighbors = [[u + 1, v], [u - 1, v], [u, v + 1], [u, v - 1]];
            let picked = null;
            for (const n of neighbors) {
              if (isClaimable(n[0], n[1])) { picked = n; break; }
            }
            if (picked) {
              claimed.set(picked[0] + "," + picked[1], di);
              q.push(picked);
              cellCounts[di] += 1;
              claimedThisRound = true;
              break;
            } else {
              q.shift();
            }
          }
        }
        if (!claimedThisRound) break;
        round++;
      }

      // Any unclaimed interior cells (pockets isolated by concave geometry or
      // under-target departments) fall to the nearest claimed cell's department
      // by Manhattan distance; ties broken by dept id alphabetical order.
      const unclaimed = [];
      for (const [u, v] of interior) {
        if (!claimed.has(u + "," + v)) unclaimed.push([u, v]);
      }
      if (unclaimed.length > 0 && claimed.size > 0) {
        const claimedList = [];
        for (const [key, di] of claimed.entries()) {
          const parts = key.split(",");
          claimedList.push([Number(parts[0]), Number(parts[1]), di]);
        }
        for (const [u, v] of unclaimed) {
          let bestDist = Infinity, bestDi = null, bestId = null;
          for (const [cu, cv, di] of claimedList) {
            const d = Math.abs(cu - u) + Math.abs(cv - v);
            const id = depts[di].id;
            if (d < bestDist || (d === bestDist && bestId !== null && id < bestId)) {
              bestDist = d; bestDi = di; bestId = id;
            }
          }
          if (bestDi !== null) claimed.set(u + "," + v, bestDi);
        }
      }

      // Build region objects.
      const cellsByDept = depts.map(() => []);
      for (const [key, di] of claimed.entries()) {
        const parts = key.split(",");
        cellsByDept[di].push([Number(parts[0]), Number(parts[1])]);
      }
      return depts.map((d, di) => {
        const cells = cellsByDept[di];
        let cx = 0, cy = 0;
        for (const [u, v] of cells) {
          const [wx, wy] = cellCenter(grid, u, v);
          cx += wx; cy += wy;
        }
        const centroid = cells.length > 0 ? [cx / cells.length, cy / cells.length] : null;
        return {
          id: d.id,
          name: d.name,
          daylight_priority: d.daylight_priority,
          cell_count: cells.length,
          area_sf: cells.length * grid.cell_size_ft * grid.cell_size_ft,
          cells,
          centroid
        };
      });
    }

    // ---------- Overflow warning ----------

    const OVERFLOW_WARNING_ID = "overflow";
    const GROSS_TO_NET_DEFAULT = 1.4;  // hardcoded for Step 03; Step 08 slider.

    // Replace-or-remove semantics: at most one overflow warning at a time.
    function upsertOverflowWarning(warnings, programArea, capacity) {
      const list = Array.isArray(warnings)
        ? warnings.filter(w => !(isPlainObject(w) && w.id === OVERFLOW_WARNING_ID))
        : [];
      if (programArea > capacity) {
        list.push({
          id: OVERFLOW_WARNING_ID,
          severity: "warning",
          message: "Program (" + Math.round(programArea).toLocaleString() +
                   " SF) exceeds capacity (" + Math.round(capacity).toLocaleString() +
                   " SF) at gross/net " + GROSS_TO_NET_DEFAULT.toFixed(1),
          raised_at: new Date().toISOString(),
          auto_clear_when: "programArea <= capacity"
        });
      }
      return list;
    }

    // ---------- generatePlan — orchestrator ----------

    // Deep clone via JSON round-trip. All our schema is JSON-safe.
    function cloneProject(p) {
      return JSON.parse(JSON.stringify(p));
    }

    // Runs the full Step 03 pipeline. Returns a NEW project object with
    // current_plan.floors[0] populated. Does NOT mutate input.
    // sunVectorLogged is a module-level flag so we log the first-run sun vector
    // once per page load.
    let __sunVectorLogged = false;
    let __cellSizeLogged = false;
    function generatePlan(project, buildingTypeJson) {
      if (!isPlainObject(project)) throw new Error("generatePlan: project must be an object");
      const np = cloneProject(project);
      if (!isPlainObject(np.context) || !isPlainObject(np.context.footprint)) {
        throw new Error("generatePlan: project.context.footprint missing");
      }
      const polygon = Array.isArray(np.context.footprint.polygon)
        ? np.context.footprint.polygon : [];
      if (polygon.length < 3) {
        throw new Error("generatePlan: footprint polygon needs at least 3 vertices");
      }

      // Seed context.program.rooms from the building-type JSON ONLY if empty.
      // Respecting existing entries lets the user hand-edit target_area in the
      // JSON viewer and regenerate to see the overflow warning update.
      if (!isPlainObject(np.context.program)) np.context.program = { building_type: null, rooms: [], adjacency_graph: {}, vertical_constraints: {} };
      if (!Array.isArray(np.context.program.rooms) || np.context.program.rooms.length === 0) {
        np.context.program.rooms = roomsFromBuildingType(buildingTypeJson);
      }

      const rooms = np.context.program.rooms;
      const departments = departmentsFromRooms(rooms);

      // Grid
      const cellSize = chooseCellSize(polygon);
      if (!__cellSizeLogged) {
        console.debug("generatePlan: cell size chosen =", cellSize, "ft (footprint area",
                      Math.round(computePolygonAreaSF(polygon)).toLocaleString(), "SF)");
        __cellSizeLogged = true;
      }
      const grid = buildGrid(polygon, cellSize);

      // Sun vector
      const trueNorthDeg = Number(np.context.footprint.true_north_deg) || 0;
      const lat = np.context.footprint.lat;
      const sun = computeSunVector(trueNorthDeg, lat);
      if (!__sunVectorLogged) {
        console.debug("generatePlan: sun vector", sun, "true_north_deg", trueNorthDeg);
        __sunVectorLogged = true;
      }

      // Stage A
      const regions = runStageA(grid, sun, departments);

      // Write to floors[0]; do not touch rooms/unplaced_rooms on the floor.
      if (!isPlainObject(np.current_plan)) {
        np.current_plan = { floors: [], total_score: null, program_fit_report: null, unplaced_rooms: [] };
      }
      if (!Array.isArray(np.current_plan.floors) || np.current_plan.floors.length === 0) {
        np.current_plan.floors = [{
          level: 1, grid: null, department_regions: [], sun_vector: null,
          rooms: [], unplaced_rooms: []
        }];
      }
      const f0 = np.current_plan.floors[0];
      f0.grid = grid;
      f0.department_regions = regions;
      f0.sun_vector = sun;
      // rooms + unplaced_rooms on the floor stay untouched (Step 04 fills rooms).

      // Overflow warning
      const footprintArea = computePolygonAreaSF(polygon);
      const programArea = rooms.reduce((acc, r) => {
        const a = Number.isFinite(Number(r.target_area)) ? Number(r.target_area) : 0;
        const c = Number.isFinite(Number(r.count)) && Number(r.count) > 0 ? Number(r.count) : 1;
        return acc + a * c;
      }, 0);
      const capacity = footprintArea / GROSS_TO_NET_DEFAULT;
      np.warnings = upsertOverflowWarning(np.warnings, programArea, capacity);

      return np;
    }

    // ============================================================
    // SECTION 05 — EDITOR
    // Step 02: read-only footprint canvas with pan/zoom/fit
    // ============================================================

    // World coords: feet, +X east, +Y north (Y is up).
    // Screen coords: SVG pixels, +X right, +Y down.
    // view = { panX, panY, zoom } — pan is the world coord at the viewport
    // center; zoom is pixels-per-foot.

    function computePolygonBounds(polygon) {
      if (!Array.isArray(polygon) || polygon.length === 0) {
        return { minX: 0, maxX: 0, minY: 0, maxY: 0 };
      }
      let minX = Infinity, maxX = -Infinity;
      let minY = Infinity, maxY = -Infinity;
      for (const pt of polygon) {
        if (!Array.isArray(pt) || pt.length < 2) continue;
        const x = Number(pt[0]);
        const y = Number(pt[1]);
        if (!Number.isFinite(x) || !Number.isFinite(y)) continue;
        if (x < minX) minX = x;
        if (x > maxX) maxX = x;
        if (y < minY) minY = y;
        if (y > maxY) maxY = y;
      }
      if (!Number.isFinite(minX)) {
        return { minX: 0, maxX: 0, minY: 0, maxY: 0 };
      }
      return { minX, maxX, minY, maxY };
    }

    function computePolygonAreaSF(polygon) {
      if (!Array.isArray(polygon) || polygon.length < 3) return 0;
      let sum = 0;
      for (let i = 0; i < polygon.length; i++) {
        const a = polygon[i];
        const b = polygon[(i + 1) % polygon.length];
        if (!Array.isArray(a) || !Array.isArray(b)) continue;
        const ax = Number(a[0]), ay = Number(a[1]);
        const bx = Number(b[0]), by = Number(b[1]);
        if (!Number.isFinite(ax) || !Number.isFinite(ay)) continue;
        if (!Number.isFinite(bx) || !Number.isFinite(by)) continue;
        sum += ax * by - bx * ay;
      }
      return Math.abs(sum) / 2;
    }

    function computeInitialView(polygon, viewportWidth, viewportHeight) {
      if (!Array.isArray(polygon) || polygon.length < 3) {
        return { panX: 0, panY: 0, zoom: 1 };
      }
      const { minX, maxX, minY, maxY } = computePolygonBounds(polygon);
      const worldWidth = maxX - minX;
      const worldHeight = maxY - minY;
      if (worldWidth <= 0 || worldHeight <= 0 || viewportWidth <= 0 || viewportHeight <= 0) {
        return { panX: (minX + maxX) / 2, panY: (minY + maxY) / 2, zoom: 1 };
      }
      const margin = 0.15;
      const zoomX = viewportWidth / (worldWidth * (1 + 2 * margin));
      const zoomY = viewportHeight / (worldHeight * (1 + 2 * margin));
      const zoom = Math.min(zoomX, zoomY);
      const panX = (minX + maxX) / 2;
      const panY = (minY + maxY) / 2;
      return { panX, panY, zoom };
    }

    function worldToScreen(wx, wy, view, viewport) {
      const sx = (wx - view.panX) * view.zoom + viewport.width / 2;
      const sy = -(wy - view.panY) * view.zoom + viewport.height / 2;
      return [sx, sy];
    }

    function screenToWorld(sx, sy, view, viewport) {
      const wx = (sx - viewport.width / 2) / view.zoom + view.panX;
      const wy = -(sy - viewport.height / 2) / view.zoom + view.panY;
      return [wx, wy];
    }

    function niceScaleBarLength(zoomPixelsPerFoot) {
      const ladder = [1, 2, 5, 10, 20, 50, 100, 200, 500, 1000, 2000];
      const maxPixels = 150;
      let best = ladder[0];
      for (const L of ladder) {
        if (L * zoomPixelsPerFoot <= maxPixels) {
          best = L;
        } else {
          break;
        }
      }
      return best;
    }

    // Stable 12-entry palette for department cell fills. Picked by
    // sum-of-char-codes hash so a given dept id always maps to the same color.
    const DEPT_PALETTE = [
      "#B8D4E3",  // academic blue
      "#E5C6A0",  // admin tan
      "#C8D5B9",  // circulation green
      "#E8B5C7",  // public pink
      "#D4C4E0",  // service lavender
      "#F0D9A7",  // dining amber
      "#A0C4D4",  // clinical teal
      "#E0B5A0",  // residential peach
      "#C4D8B0",  // recreation sage
      "#D0C0A0",  // utility khaki
      "#BFC8D8",  // back-of-house steel
      "#E5D5C0"   // support cream
    ];
    function deptColor(id) {
      const s = String(id || "");
      let h = 0;
      for (let i = 0; i < s.length; i++) h += s.charCodeAt(i);
      return DEPT_PALETTE[h % DEPT_PALETTE.length];
    }

    function FootprintCanvas({ project, setProject, programDb }) {
      const polygon =
        (project && project.context && project.context.footprint &&
         Array.isArray(project.context.footprint.polygon))
          ? project.context.footprint.polygon
          : [];
      const trueNorthDeg =
        (project && project.context && project.context.footprint &&
         typeof project.context.footprint.true_north_deg === "number")
          ? project.context.footprint.true_north_deg
          : 0;
      const buildingType =
        (project && project.context && project.context.program)
          ? (project.context.program.building_type ?? "—")
          : "—";

      // Step 03: department regions from current_plan.floors[0]
      const floor0 =
        project && project.current_plan && Array.isArray(project.current_plan.floors) &&
        project.current_plan.floors.length > 0 && isPlainObject(project.current_plan.floors[0])
          ? project.current_plan.floors[0]
          : null;
      const grid = floor0 && isPlainObject(floor0.grid) ? floor0.grid : null;
      const regions = floor0 && Array.isArray(floor0.department_regions)
        ? floor0.department_regions : [];

      const containerRef = React.useRef(null);
      const svgRef = React.useRef(null);
      const backgroundRef = React.useRef(null);
      const dragRef = React.useRef(null);
      const didInitialFitRef = React.useRef(false);

      const [viewport, setViewport] = React.useState({ width: 900, height: 520 });
      const [view, setView] = React.useState({ panX: 0, panY: 0, zoom: 1 });
      const [isPanning, setIsPanning] = React.useState(false);

      // Mirror state into refs so the wheel listener can install once.
      const viewRef = React.useRef(view);
      const viewportRef = React.useRef(viewport);
      React.useEffect(() => { viewRef.current = view; }, [view]);
      React.useEffect(() => { viewportRef.current = viewport; }, [viewport]);

      // Measure container synchronously on mount + observe resizes.
      // Doing the initial fit in the layout effect (before paint) avoids a
      // visible jump from default-viewport fit → measured-viewport fit.
      React.useLayoutEffect(() => {
        if (!containerRef.current) return;
        const rect = containerRef.current.getBoundingClientRect();
        const w0 = rect.width > 0 ? rect.width : 900;
        const h0 = rect.height > 0 ? rect.height : 520;
        setViewport({ width: w0, height: h0 });
        viewportRef.current = { width: w0, height: h0 };
        if (!didInitialFitRef.current && polygon.length >= 3) {
          didInitialFitRef.current = true;
          setView(computeInitialView(polygon, w0, h0));
        }
        const observer = new ResizeObserver((entries) => {
          for (const entry of entries) {
            const w = entry.contentRect.width;
            const h = entry.contentRect.height;
            if (w > 0 && h > 0) {
              setViewport({ width: w, height: h });
            }
          }
        });
        observer.observe(containerRef.current);
        return () => observer.disconnect();
      }, []);

      // Re-fit whenever the polygon changes (e.g. JSON edit, file upload,
      // start over → onboarding → create).
      const polygonKey = React.useMemo(() => JSON.stringify(polygon), [polygon]);
      React.useEffect(() => {
        const vp = viewportRef.current;
        if (vp.width <= 0 || vp.height <= 0) return;
        if (polygon.length < 3) return;
        // Skip the very first run if the layout effect already fit it, to
        // avoid a redundant setView. The layout effect bumps didInitialFitRef
        // when it does the initial fit.
        if (!didInitialFitRef.current) {
          didInitialFitRef.current = true;
        }
        setView(computeInitialView(polygon, vp.width, vp.height));
        // eslint-disable-next-line react-hooks/exhaustive-deps
      }, [polygonKey]);

      // Non-passive wheel listener so we can preventDefault and stop the
      // page from scrolling while the user zooms the canvas.
      React.useEffect(() => {
        const svg = svgRef.current;
        if (!svg) return;
        function handleWheel(e) {
          e.preventDefault();
          const v = viewRef.current;
          const vp = viewportRef.current;
          if (vp.width <= 0 || vp.height <= 0) return;
          const rect = svg.getBoundingClientRect();
          const cursorX = e.clientX - rect.left;
          const cursorY = e.clientY - rect.top;
          const [wx, wy] = screenToWorld(cursorX, cursorY, v, vp);
          const factor = Math.exp(-e.deltaY * 0.001);
          const newZoom = Math.max(0.05, Math.min(50, v.zoom * factor));
          const newPanX = wx - (cursorX - vp.width / 2) / newZoom;
          const newPanY = wy + (cursorY - vp.height / 2) / newZoom;
          setView({ panX: newPanX, panY: newPanY, zoom: newZoom });
        }
        svg.addEventListener("wheel", handleWheel, { passive: false });
        return () => svg.removeEventListener("wheel", handleWheel);
      }, []);

      function handlePointerDown(e) {
        // Only start a pan if the user pressed on empty background, not on
        // any content layer. Future steps will hang interactions off rooms.
        if (e.target !== backgroundRef.current) return;
        const rect = svgRef.current.getBoundingClientRect();
        try { e.currentTarget.setPointerCapture(e.pointerId); } catch (err) {}
        dragRef.current = {
          startScreenX: e.clientX - rect.left,
          startScreenY: e.clientY - rect.top,
          startPanX: view.panX,
          startPanY: view.panY,
          pointerId: e.pointerId
        };
        setIsPanning(true);
      }

      function handlePointerMove(e) {
        if (!dragRef.current) return;
        const rect = svgRef.current.getBoundingClientRect();
        const sx = e.clientX - rect.left;
        const sy = e.clientY - rect.top;
        const dx = sx - dragRef.current.startScreenX;
        const dy = sy - dragRef.current.startScreenY;
        const startPanX = dragRef.current.startPanX;
        const startPanY = dragRef.current.startPanY;
        // World-delta = screen-delta / zoom, with a Y flip because +Y world
        // points up while +Y screen points down. Pan moves opposite to the
        // grabbed point's motion.
        setView(v => ({
          panX: startPanX - dx / v.zoom,
          panY: startPanY + dy / v.zoom,
          zoom: v.zoom
        }));
      }

      function handlePointerUp(e) {
        if (!dragRef.current) return;
        try {
          if (svgRef.current && svgRef.current.hasPointerCapture &&
              svgRef.current.hasPointerCapture(e.pointerId)) {
            svgRef.current.releasePointerCapture(e.pointerId);
          }
        } catch (err) {}
        dragRef.current = null;
        setIsPanning(false);
      }

      function handleDoubleClick(e) {
        if (e.target !== backgroundRef.current) return;
        setView(computeInitialView(polygon, viewport.width, viewport.height));
      }

      function handleFitClick() {
        setView(computeInitialView(polygon, viewport.width, viewport.height));
      }

      // ----- Step 03: Generate (Stage A) -----

      const [isGenerating, setIsGenerating] = React.useState(false);
      const [generateError, setGenerateError] = React.useState(null);
      // Cache building-type JSONs keyed by filename. Cleared on remount.
      const bTypeCacheRef = React.useRef(new Map());

      const dbLoaded = !!(programDb && programDb.loaded);
      const canGenerate =
        !!setProject &&
        dbLoaded &&
        project && project.context && project.context.program &&
        project.context.program.building_type != null &&
        polygon.length >= 3 &&
        !isGenerating;

      async function fetchBuildingTypeJson(buildingTypeName) {
        if (!programDb || !programDb.loaded) {
          throw new Error("program database not loaded");
        }
        const databases = Array.isArray(programDb.databases) ? programDb.databases : [];
        const entry = databases.find(e =>
          isPlainObject(e) && e.building_type === buildingTypeName);
        if (!entry) {
          throw new Error("building type not in master index: " + buildingTypeName);
        }
        const fileName = entry.file || entry.json;
        if (!fileName) throw new Error("master index entry has no file: " + buildingTypeName);
        const cache = bTypeCacheRef.current;
        if (cache.has(fileName)) return cache.get(fileName);
        // Same directory as the master index.
        const src = programDb.source || "./data/master_index.json";
        const dir = src.substring(0, src.lastIndexOf("/") + 1);
        const path = dir + fileName;
        const res = await fetch(path);
        if (!res.ok) throw new Error("fetch failed for " + path + " (" + res.status + ")");
        const json = await res.json();
        cache.set(fileName, json);
        return json;
      }

      async function handleGenerate() {
        if (!canGenerate) return;
        setIsGenerating(true);
        setGenerateError(null);
        try {
          const btName = project.context.program.building_type;
          const btJson = await fetchBuildingTypeJson(btName);
          const newProject = generatePlan(project, btJson);
          setProject(newProject);
        } catch (err) {
          console.error("generate failed:", err);
          setGenerateError(err && err.message ? err.message : String(err));
        } finally {
          setIsGenerating(false);
        }
      }

      // ----- Render-time projection -----

      const screenPoints = polygon
        .filter(pt => Array.isArray(pt) && pt.length >= 2 &&
          Number.isFinite(Number(pt[0])) && Number.isFinite(Number(pt[1])))
        .map(([x, y]) => worldToScreen(Number(x), Number(y), view, viewport));
      const polygonPointsAttr = screenPoints
        .map(([x, y]) => x.toFixed(2) + "," + y.toFixed(2))
        .join(" ");
      const validPolygon = screenPoints.length >= 3;

      const [originSX, originSY] = worldToScreen(0, 0, view, viewport);

      // Compass overlay (screen-space, top-left, 20px inset, 48px square)
      const compassCx = 20 + 24;
      const compassCy = 20 + 24;
      const needleRad = (trueNorthDeg * Math.PI) / 180;
      // 0° = north (up on screen, -Y), 90° = east (+X), so the screen-space
      // needle direction is (sin, -cos).
      const needleDX = Math.sin(needleRad);
      const needleDY = -Math.cos(needleRad);
      const needleTipX = compassCx + 18 * needleDX;
      const needleTipY = compassCy + 18 * needleDY;
      const labelOffsetX = compassCx + 26 * needleDX;
      const labelOffsetY = compassCy + 26 * needleDY;
      // Triangle arrowhead: base perpendicular to needle, tip at needle end.
      const perpX = -needleDY;
      const perpY = needleDX;
      const arrowBaseX = compassCx + 12 * needleDX;
      const arrowBaseY = compassCy + 12 * needleDY;
      const arrowPts =
        (arrowBaseX + 3.5 * perpX).toFixed(2) + "," + (arrowBaseY + 3.5 * perpY).toFixed(2) + " " +
        (arrowBaseX - 3.5 * perpX).toFixed(2) + "," + (arrowBaseY - 3.5 * perpY).toFixed(2) + " " +
        needleTipX.toFixed(2) + "," + needleTipY.toFixed(2);

      // Scale bar (screen-space, bottom-left, 20px inset)
      const scaleBarFt = niceScaleBarLength(view.zoom);
      const scaleBarPx = scaleBarFt * view.zoom;
      const scaleBarX = 20;
      const scaleBarY = Math.max(40, viewport.height - 32);

      // Metadata overlay text
      const polyVertexCount = polygon.length;
      const areaSF = computePolygonAreaSF(polygon);
      const areaLabel = areaSF >= 100
        ? Math.round(areaSF).toLocaleString()
        : areaSF.toFixed(1);

      const showOriginMarker = viewport.width > 0 && viewport.height > 0;

      // ----- Department region projection (Step 03) -----
      // For each region: project cells to screen rects, trace the outer
      // boundary by emitting the 4 edges that face cells outside the region,
      // and pick a label point (centroid, or nearest in-region cell center).
      const regionLayer = React.useMemo(() => {
        if (!grid || !Array.isArray(regions) || regions.length === 0) return null;
        const cs = grid.cell_size_ft;
        const ox = grid.origin_x, oy = grid.origin_y;
        const W = grid.width_cells, H = grid.height_cells;

        // Build an ownership lookup: (u,v) → regionIndex, so boundary detection
        // handles both "outside grid" and "other-region" correctly.
        const owner = new Array(H);
        for (let v = 0; v < H; v++) owner[v] = new Array(W).fill(-1);
        regions.forEach((r, ri) => {
          if (!Array.isArray(r.cells)) return;
          for (const [u, v] of r.cells) {
            if (u >= 0 && u < W && v >= 0 && v < H) owner[v][u] = ri;
          }
        });

        function cornerScreen(u, v) {
          return worldToScreen(ox + u * cs, oy + v * cs, view, viewport);
        }

        return regions.map((region, ri) => {
          if (!Array.isArray(region.cells) || region.cells.length === 0) return null;
          const color = deptColor(region.id);
          // 1) Cell rects
          const rects = region.cells.map(([u, v], i) => {
            const [sx0, sy0] = cornerScreen(u, v);         // world-SW → screen (flipped Y)
            const [sx1, sy1] = cornerScreen(u + 1, v + 1); // world-NE → screen
            const x = Math.min(sx0, sx1), y = Math.min(sy0, sy1);
            const w = Math.abs(sx1 - sx0), h = Math.abs(sy1 - sy0);
            return (
              <rect key={"c" + i} x={x} y={y} width={w} height={h}
                    fill={color} fillOpacity="0.7"
                    style={{ pointerEvents: "none" }} />
            );
          });

          // 2) Outer boundary: per-cell, emit edges facing non-members.
          const edges = [];
          region.cells.forEach(([u, v], i) => {
            // North edge (u,v) – (u+1,v+1 side of v+1 row) at y = (v+1)*cs
            if (v + 1 >= H || owner[v + 1][u] !== ri) {
              const [ax, ay] = cornerScreen(u, v + 1);
              const [bx, by] = cornerScreen(u + 1, v + 1);
              edges.push(<line key={"n" + i} x1={ax} y1={ay} x2={bx} y2={by}
                stroke="var(--calvey-muted)" strokeOpacity="0.4" strokeWidth="1"
                style={{ pointerEvents: "none" }} />);
            }
            // South edge
            if (v - 1 < 0 || owner[v - 1][u] !== ri) {
              const [ax, ay] = cornerScreen(u, v);
              const [bx, by] = cornerScreen(u + 1, v);
              edges.push(<line key={"s" + i} x1={ax} y1={ay} x2={bx} y2={by}
                stroke="var(--calvey-muted)" strokeOpacity="0.4" strokeWidth="1"
                style={{ pointerEvents: "none" }} />);
            }
            // East edge
            if (u + 1 >= W || owner[v][u + 1] !== ri) {
              const [ax, ay] = cornerScreen(u + 1, v);
              const [bx, by] = cornerScreen(u + 1, v + 1);
              edges.push(<line key={"e" + i} x1={ax} y1={ay} x2={bx} y2={by}
                stroke="var(--calvey-muted)" strokeOpacity="0.4" strokeWidth="1"
                style={{ pointerEvents: "none" }} />);
            }
            // West edge
            if (u - 1 < 0 || owner[v][u - 1] !== ri) {
              const [ax, ay] = cornerScreen(u, v);
              const [bx, by] = cornerScreen(u, v + 1);
              edges.push(<line key={"w" + i} x1={ax} y1={ay} x2={bx} y2={by}
                stroke="var(--calvey-muted)" strokeOpacity="0.4" strokeWidth="1"
                style={{ pointerEvents: "none" }} />);
            }
          });

          // 3) Label point: region centroid unless that cell is not in the
          // region (concave case) — then nearest in-region cell center.
          let labelPt = null;
          if (region.centroid) {
            const [rcx, rcy] = region.centroid;
            let bestD = Infinity, bestC = region.cells[0];
            for (const [u, v] of region.cells) {
              const wx = ox + (u + 0.5) * cs, wy = oy + (v + 0.5) * cs;
              const d = (wx - rcx) * (wx - rcx) + (wy - rcy) * (wy - rcy);
              if (d < bestD) { bestD = d; bestC = [u, v]; }
            }
            const [u, v] = bestC;
            labelPt = worldToScreen(ox + (u + 0.5) * cs, oy + (v + 0.5) * cs, view, viewport);
          }

          return (
            <g key={"region-" + region.id + "-" + ri}>
              {rects}
              {edges}
              {labelPt && (
                <text
                  x={labelPt[0]} y={labelPt[1]}
                  fontFamily="'Space Mono', monospace"
                  fontSize="11"
                  fontWeight="700"
                  letterSpacing="0.05em"
                  textAnchor="middle"
                  dominantBaseline="middle"
                  fill="var(--calvey-text)"
                  style={{ pointerEvents: "none", textTransform: "uppercase" }}
                >{(region.name || region.id).toUpperCase()}</text>
              )}
            </g>
          );
        });
      }, [grid, regions, view, viewport]);

      return (
        <div className="canvas-container" ref={containerRef}>
          <svg
            ref={svgRef}
            className={isPanning ? "panning" : ""}
            onPointerDown={handlePointerDown}
            onPointerMove={handlePointerMove}
            onPointerUp={handlePointerUp}
            onPointerCancel={handlePointerUp}
            onDoubleClick={handleDoubleClick}
          >
            {/* Background hit target (also the pan/zoom target) */}
            <rect
              ref={backgroundRef}
              x="0" y="0"
              width={viewport.width}
              height={viewport.height}
              fill="var(--calvey-surface)"
            />

            {/* Department regions (Step 03) — drawn between background and polygon stroke */}
            {regionLayer && <g style={{ pointerEvents: "none" }}>{regionLayer}</g>}

            {/* Origin crosshair at world (0,0) */}
            {showOriginMarker && (
              <g style={{ pointerEvents: "none" }}>
                <line
                  x1={originSX - 6} y1={originSY}
                  x2={originSX + 6} y2={originSY}
                  stroke="var(--calvey-muted)"
                  strokeWidth="1"
                  strokeDasharray="2 2"
                />
                <line
                  x1={originSX} y1={originSY - 6}
                  x2={originSX} y2={originSY + 6}
                  stroke="var(--calvey-muted)"
                  strokeWidth="1"
                  strokeDasharray="2 2"
                />
                <text
                  x={originSX + 8}
                  y={originSY - 4}
                  fontFamily="'Space Mono', monospace"
                  fontSize="9"
                  fill="var(--calvey-muted)"
                >0,0</text>
              </g>
            )}

            {/* Footprint polygon */}
            {validPolygon && (
              <polygon
                points={polygonPointsAttr}
                fill="white"
                fillOpacity="1"
                stroke="var(--calvey-text)"
                strokeWidth="1.5"
                style={{ pointerEvents: "none" }}
              />
            )}

            {/* Polygon vertices */}
            {validPolygon && screenPoints.map(([x, y], i) => (
              <circle
                key={i}
                cx={x}
                cy={y}
                r="3"
                fill="var(--calvey-accent)"
                style={{ pointerEvents: "none" }}
              />
            ))}

            {/* True-north compass (top-left overlay, 20px inset) */}
            <g style={{ pointerEvents: "none" }}>
              <circle
                cx={compassCx} cy={compassCy} r="22"
                stroke="var(--calvey-text)" strokeWidth="1" fill="white"
              />
              <line
                x1={compassCx} y1={compassCy}
                x2={needleTipX} y2={needleTipY}
                stroke="var(--calvey-accent)" strokeWidth="2"
              />
              <polygon
                points={arrowPts}
                fill="var(--calvey-accent)"
              />
              <text
                x={labelOffsetX} y={labelOffsetY}
                fontFamily="'Space Mono', monospace"
                fontSize="10"
                textAnchor="middle"
                dominantBaseline="middle"
                fill="var(--calvey-text)"
              >N</text>
            </g>

            {/* Scale bar (bottom-left overlay, 20px inset) */}
            <g style={{ pointerEvents: "none" }}>
              <line
                x1={scaleBarX} y1={scaleBarY}
                x2={scaleBarX + scaleBarPx} y2={scaleBarY}
                stroke="var(--calvey-text)" strokeWidth="1"
              />
              <line
                x1={scaleBarX} y1={scaleBarY - 3}
                x2={scaleBarX} y2={scaleBarY + 3}
                stroke="var(--calvey-text)" strokeWidth="1"
              />
              <line
                x1={scaleBarX + scaleBarPx} y1={scaleBarY - 3}
                x2={scaleBarX + scaleBarPx} y2={scaleBarY + 3}
                stroke="var(--calvey-text)" strokeWidth="1"
              />
              <text
                x={scaleBarX} y={scaleBarY + 14}
                fontFamily="'Space Mono', monospace"
                fontSize="10"
                fill="var(--calvey-text)"
              >{scaleBarFt} ft</text>
            </g>
          </svg>

          {/* Context metadata + Fit/Generate buttons (HTML overlay, top-right) */}
          <div className="canvas-overlay top-right">
            <div><span className="label">BUILDING TYPE:</span> {buildingType}</div>
            <div><span className="label">FOOTPRINT:</span> {polyVertexCount} vertices · {areaLabel} SF</div>
            <div><span className="label">TRUE NORTH:</span> {trueNorthDeg}°</div>
            <div><span className="label">ZOOM:</span> {view.zoom.toFixed(2)} px/ft</div>
            <button type="button" onClick={handleFitClick}>FIT</button>
            <button type="button" onClick={handleGenerate} disabled={!canGenerate}>
              {isGenerating ? "GENERATING…" : "GENERATE"}
            </button>
            {generateError && (
              <div style={{ color: "var(--calvey-error)", marginTop: 6, maxWidth: 240, whiteSpace: "normal" }}>
                {generateError}
              </div>
            )}
          </div>

          {/* Department summary (HTML overlay, bottom-right) — Step 03 */}
          {regions.length > 0 && (
            <div className="canvas-overlay bottom-right">
              {regions.map(r => (
                <div key={r.id} className="dept-row">
                  <span className="dept-name">{(r.name || r.id).toUpperCase()}</span>
                  <span className="dept-meta">
                    {r.cell_count} cells · {Math.round(r.area_sf).toLocaleString()} SF
                  </span>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    // ============================================================
    // SECTION 06 — EXPORTERS  [Step 09 — TODO]
    // ============================================================

    // (empty — will be filled in Step 09)

    // ============================================================
    // SECTION 07 — APP
    // Step 01 shell UI: metadata panel + JSON viewer + buttons
    // ============================================================

    function formatWeights(w) {
      if (!w || typeof w !== "object") return "—";
      const keys = ["daylight", "adjacency", "compactness", "circulation", "facade"];
      return keys
        .filter(k => typeof w[k] === "number")
        .map(k => k + " " + w[k].toFixed(2))
        .join(" · ");
    }

    function ValidationChips({ validation }) {
      // NOTE: Spec section 07 says "VALID chip if ok && warnings.length === 0",
      // but gate test 2 expects "green VALID plus two yellow warnings" on a new
      // project. Going with the gate test interpretation: VALID shows whenever
      // there are no errors; warnings are displayed alongside.
      const { ok, errors, warnings } = validation;
      const chips = [];
      if (ok) {
        chips.push(<span key="ok" className="chip chip-ok">VALID</span>);
      }
      errors.forEach((e, i) => {
        chips.push(<span key={"e" + i} className="chip chip-error">{e}</span>);
      });
      warnings.forEach((w, i) => {
        chips.push(<span key={"w" + i} className="chip chip-warn">{w}</span>);
      });
      return <div className="section">{chips}</div>;
    }

    function MetadataPanel({ project }) {
      const vertexCount =
        project &&
        project.context &&
        project.context.footprint &&
        Array.isArray(project.context.footprint.polygon)
          ? project.context.footprint.polygon.length
          : 0;
      const buildingType =
        project && project.context && project.context.program
          ? (project.context.program.building_type ?? "—")
          : "—";
      return (
        <table className="kv">
          <tbody>
            <tr><td className="label">SCHEMA VERSION</td><td className="value">{project.schema_version}</td></tr>
            <tr><td className="label">PROJECT ID</td><td className="value">{project.project_id}</td></tr>
            <tr><td className="label">ENGINE VERSION</td><td className="value">{project.engine_version}</td></tr>
            <tr><td className="label">CREATED</td><td className="value">{project.created_at}</td></tr>
            <tr><td className="label">UPDATED</td><td className="value">{project.updated_at}</td></tr>
            <tr><td className="label">BUILDING TYPE</td><td className="value">{buildingType}</td></tr>
            <tr><td className="label">FOOTPRINT</td><td className="value">{vertexCount} vertices</td></tr>
            <tr><td className="label">WEIGHTS</td><td className="value">{formatWeights(project.weights)}</td></tr>
          </tbody>
        </table>
      );
    }

    // Fallback building types if program database isn't available yet.
    // Mirrors the canonical list in CALVEY_PROGRAM/data/building_program_database_master_updated.json.
    const FALLBACK_BUILDING_TYPES = [
      "Office",
      "Multifamily Residential",
      "K-12 School",
      "Higher Education",
      "Healthcare (Outpatient / Inpatient mix)",
      "Civic / Government",
      "Laboratory",
      "Hospitality (Hotel)",
      "Retail / Mixed-Use",
      "Industrial / Warehouse",
      "Cultural / Museum",
      "Religious / Worship",
      "Recreation / Sports",
      "Data Center / Tech",
      "Parking Structure",
      "Transit / Transportation",
      "Senior Living / Assisted Living",
      "Student Housing / Dormitory",
      "Convention Center / Exhibition Hall",
      "Fire Station / Emergency Services",
      "Public Library",
      "Restaurant / Food Hall"
    ];

    function buildRectanglePolygon(widthFt, depthFt) {
      const w = Math.max(0, Number(widthFt) || 0);
      const d = Math.max(0, Number(depthFt) || 0);
      // CCW starting at origin, feet.
      return [
        [0, 0],
        [w, 0],
        [w, d],
        [0, d]
      ];
    }

    // Is this a fresh, not-yet-started project? Used to decide whether to show
    // the onboarding screen vs. the metadata/JSON view.
    function isFreshProject(p) {
      if (!isPlainObject(p)) return true;
      const polyEmpty =
        isPlainObject(p.context) &&
        isPlainObject(p.context.footprint) &&
        Array.isArray(p.context.footprint.polygon) &&
        p.context.footprint.polygon.length === 0;
      const noType =
        isPlainObject(p.context) &&
        isPlainObject(p.context.program) &&
        (p.context.program.building_type === null || p.context.program.building_type === undefined);
      return polyEmpty && noType;
    }

    function OnboardingView({ buildingTypes, dbLoaded, onStart, onUpload, onBlank, uploadError }) {
      const availableTypes = buildingTypes && buildingTypes.length > 0
        ? buildingTypes
        : FALLBACK_BUILDING_TYPES;

      const [buildingType, setBuildingType] = React.useState(availableTypes[0] || "");
      const [width, setWidth] = React.useState(150);
      const [depth, setDepth] = React.useState(100);

      // If the db loads after mount and our selection isn't in its list, realign
      // to the first real option so submission matches the database.
      React.useEffect(() => {
        if (!dbLoaded) return;
        if (!buildingTypes || buildingTypes.length === 0) return;
        if (!buildingTypes.includes(buildingType)) {
          setBuildingType(buildingTypes[0]);
        }
      }, [dbLoaded, buildingTypes]);

      const area = Math.max(0, Number(width) || 0) * Math.max(0, Number(depth) || 0);

      function applyPreset(w, d) {
        setWidth(w);
        setDepth(d);
      }

      function handleCreate() {
        const w = Math.max(1, Math.round(Number(width) || 0));
        const d = Math.max(1, Math.round(Number(depth) || 0));
        onStart({ buildingType, width: w, depth: d });
      }

      return (
        <div className="app">
          <header className="section">
            <h1>CALVEY PARTY 2</h1>
            <div className="label">SANDBOX · WELCOME</div>
          </header>

          <div className="block-note">
            Let's set up a new project. Pick a building type and a starting footprint size
            to get going. You can reshape the footprint later.
          </div>

          {uploadError && (
            <div className="section">
              <span className="chip chip-error">UPLOAD FAILED: {uploadError}</span>
            </div>
          )}

          <div className="onboard-card">
            <h3>01 · Building Type</h3>
            <div className="field" style={{ marginBottom: 24 }}>
              <label htmlFor="building-type-select">What are you designing?</label>
              <select
                id="building-type-select"
                value={buildingType}
                onChange={(e) => setBuildingType(e.target.value)}
              >
                {availableTypes.map(t => (
                  <option key={t} value={t}>{t}</option>
                ))}
              </select>
              <div className="hint">
                {dbLoaded
                  ? (buildingTypes.length + " types loaded from program database")
                  : "Program database not detected — using fallback list"}
              </div>
            </div>

            <h3>02 · Starting Footprint</h3>
            <div className="onboard-grid two">
              <div className="field">
                <label htmlFor="fp-width">Width (ft)</label>
                <input
                  id="fp-width"
                  type="number"
                  min="1"
                  step="1"
                  value={width}
                  onChange={(e) => setWidth(e.target.value)}
                />
              </div>
              <div className="field">
                <label htmlFor="fp-depth">Depth (ft)</label>
                <input
                  id="fp-depth"
                  type="number"
                  min="1"
                  step="1"
                  value={depth}
                  onChange={(e) => setDepth(e.target.value)}
                />
              </div>
            </div>

            <div className="preset-row">
              <button type="button" onClick={() => applyPreset(80, 60)}>Small · 80×60</button>
              <button type="button" onClick={() => applyPreset(150, 100)}>Medium · 150×100</button>
              <button type="button" onClick={() => applyPreset(220, 160)}>Large · 220×160</button>
              <button type="button" onClick={() => applyPreset(300, 200)}>XL · 300×200</button>
            </div>
            <div className="hint" style={{ marginTop: 12 }}>
              FOOTPRINT AREA · {area.toLocaleString()} SF
            </div>

            <div style={{ marginTop: 28 }}>
              <button type="button" className="primary" onClick={handleCreate}>
                Create Project
              </button>
            </div>
          </div>

          <div className="soft-rule">— OR —</div>

          <div className="section" style={{ textAlign: "center" }}>
            <label className="upload">
              Load existing .calvey-party.json
              <input type="file" accept=".json,application/json" onChange={onUpload} />
            </label>
          </div>

          <div style={{ textAlign: "center", marginTop: 16 }}>
            <button type="button" className="linkish" onClick={onBlank}>
              Skip setup · start from blank JSON (advanced)
            </button>
          </div>

          <footer>
            SCHEMA 2.1-PARTY · ENGINE 0.1.0-STEP01 · STEP 01 OF 09
          </footer>
        </div>
      );
    }

    function App() {
      const [project, setProject] = React.useState(() => loadFromLocalStorage() ?? emptyProject());
      const [validation, setValidation] = React.useState(() => validateProject(project));
      const [dbStatus, setDbStatus] = React.useState({ loaded: false, count: 0, error: null, types: [], databases: [] });
      const [forceAdvanced, setForceAdvanced] = React.useState(false);
      const [textareaValue, setTextareaValue] = React.useState(() => JSON.stringify(project, null, 2));
      const [applyError, setApplyError] = React.useState(null);
      const [uploadError, setUploadError] = React.useState(null);

      // Autosave + revalidate on every project change
      React.useEffect(() => {
        saveToLocalStorage(project);
        setValidation(validateProject(project));
        setTextareaValue(JSON.stringify(project, null, 2));
      }, [project]);

      // Probe program database on mount.
      // CALVEY_PROGRAM ships its master index as building_program_database_master[_updated].json
      // with a top-level `databases` array. Depending on how Matt copies the folder in,
      // the file may land at the canonical ./data/ path, or nested one level deeper.
      // Try each candidate in order and use the first one that parses.
      React.useEffect(() => {
        const candidates = [
          "./data/master_index.json",
          "./data/building_program_database_master_updated.json",
          "./data/building_program_database_master.json",
          "./data/CALVEY_PROGRAM/data/building_program_database_master_updated.json",
          "./data/CALVEY_PROGRAM/data/building_program_database_master.json"
        ];
        let cancelled = false;
        (async () => {
          for (const path of candidates) {
            try {
              const res = await fetch(path);
              if (!res.ok) continue;
              const json = await res.json();
              if (cancelled) return;
              let count = 0;
              let types = [];
              let databases = [];
              if (Array.isArray(json)) {
                count = json.length;
                databases = json.filter(isPlainObject);
                types = json
                  .map(x => (isPlainObject(x) ? (x.building_type || x.name || null) : null))
                  .filter(Boolean);
              } else if (isPlainObject(json)) {
                const arr = Array.isArray(json.databases)
                  ? json.databases
                  : Array.isArray(json.building_types)
                    ? json.building_types
                    : Array.isArray(json.types)
                      ? json.types
                      : null;
                if (arr) {
                  count = arr.length;
                  databases = arr.filter(isPlainObject);
                  types = arr
                    .map(x => (isPlainObject(x) ? (x.building_type || x.name || null) : (typeof x === "string" ? x : null)))
                    .filter(Boolean);
                } else {
                  count = Object.keys(json).length;
                }
              }
              // De-duplicate while preserving order
              const seen = new Set();
              types = types.filter(t => {
                if (seen.has(t)) return false;
                seen.add(t);
                return true;
              });
              setDbStatus({ loaded: true, count, error: null, source: path, types, databases });
              return;
            } catch (e) {
              console.debug("program database probe miss:", path, e && e.message);
            }
          }
          if (cancelled) return;
          setDbStatus({ loaded: false, count: 0, error: "no master index found", source: null, types: [], databases: [] });
        })();
        return () => { cancelled = true; };
      }, []);

      function handleNewProject() {
        const p = emptyProject();
        setProject(p);
        setApplyError(null);
        setUploadError(null);
        setForceAdvanced(false);
      }

      function handleStartFromOnboarding({ buildingType, width, depth }) {
        const p = emptyProject();
        if (buildingType) {
          p.context.program.building_type = buildingType;
        }
        p.context.footprint.polygon = buildRectanglePolygon(width, depth);
        p.context.footprint.source = "onboarding_rectangle";
