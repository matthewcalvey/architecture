    // (1 ft → 2 px). Accepts an optional `floorIndex` to render just one floor
    // (used by the A/B modal thumbnails).
    function buildPlanSvg(project, options) {
      const opts = isPlainObject(options) ? options : {};
      const ptsPerFt = Number.isFinite(opts.ptsPerFt) ? opts.ptsPerFt : 2;
      const padding = Number.isFinite(opts.padding) ? opts.padding : 40;
      const titleBlockH = opts.omitTitle ? 0 : 120;
      const floors = (project && project.current_plan &&
                      Array.isArray(project.current_plan.floors))
        ? project.current_plan.floors : [];
      const polygon = (project && project.context && project.context.footprint &&
                       Array.isArray(project.context.footprint.polygon))
        ? project.context.footprint.polygon : [];
      if (polygon.length < 3 || floors.length === 0) {
        return '<svg xmlns="http://www.w3.org/2000/svg" width="200" height="40">' +
               '<text x="8" y="24" font-family="monospace" font-size="11">No plan</text></svg>';
      }
      const bnds = (function () {
        let mnx = Infinity, mny = Infinity, mxx = -Infinity, mxy = -Infinity;
        for (const [x, y] of polygon) {
          if (!Number.isFinite(x) || !Number.isFinite(y)) continue;
          if (x < mnx) mnx = x; if (x > mxx) mxx = x;
          if (y < mny) mny = y; if (y > mxy) mxy = y;
        }
        return { mnx, mny, mxx, mxy };
      })();
      const wFt = bnds.mxx - bnds.mnx;
      const hFt = bnds.mxy - bnds.mny;
      const floorW = wFt * ptsPerFt;
      const floorH = hFt * ptsPerFt;
      const spacing = 40;

      let floorIndexes = Array.from({ length: floors.length }, (_, i) => i);
      if (Number.isInteger(opts.floorIndex)) floorIndexes = [opts.floorIndex];

      const rowH = floorH + spacing + 60; // floor body + label + scale bar
      const totalH = titleBlockH + padding + (rowH * floorIndexes.length) + padding;
      const totalW = floorW + padding * 2;

      function worldToSvg(x, y, yOffset) {
        const sx = (x - bnds.mnx) * ptsPerFt;
        // Y flip — world Y up, SVG Y down.
        const sy = (bnds.mxy - y) * ptsPerFt;
        return [sx, sy + yOffset];
      }

      const buildingType = project.context.program.building_type || "—";
      const confidence = (project.confidence && project.confidence.total_score != null)
        ? project.confidence.total_score.toFixed(2) : "—";

      const parts = [];
      parts.push('<svg xmlns="http://www.w3.org/2000/svg" width="' +
        totalW.toFixed(1) + '" height="' + totalH.toFixed(1) + '">');
      parts.push('<defs><style>' +
        'text{font-family:\'Cormorant Garamond\',Georgia,serif;fill:#1A1A1A;}' +
        '.label{font-family:\'Space Mono\',monospace;font-size:9px;}' +
        '</style></defs>');

      if (!opts.omitTitle) {
        parts.push('<g transform="translate(' + padding + ',' + padding + ')">');
        parts.push('<text x="0" y="0" font-size="24">CALVEY FORM / PARTY</text>');
        parts.push('<text x="0" y="28" font-size="14">' +
          escapeXml(buildingType) + '</text>');
        parts.push('<text x="0" y="46" font-size="11" fill="#888">' +
          escapeXml(todayStamp() + " · confidence " + confidence) +
          '</text>');
        parts.push('</g>');
      }

      const palette = { fill: ["#E6E2D6","#D6DFE6","#E6D6DA","#D6E6DB","#DFD6E6","#E6E0D6","#D6E1E6"] };

      for (let i = 0; i < floorIndexes.length; i++) {
        const fi = floorIndexes[i];
        const fl = floors[fi];
        if (!isPlainObject(fl)) continue;
        const yOffset = titleBlockH + padding + i * rowH;
        parts.push('<g transform="translate(' + padding + ',' +
          yOffset + ')">');
        if (!opts.omitLabels) {
          parts.push('<text x="0" y="-8" class="label" font-size="10">FLOOR ' +
            (fl.level || (fi + 1)) + '</text>');
        }
        // Outline polygon
        parts.push('<polygon points="' + polygon.map(p => {
          const [sx, sy] = worldToSvg(p[0], p[1], 0);
          return sx.toFixed(1) + "," + sy.toFixed(1);
        }).join(" ") + '" fill="#F9F9F4" stroke="#1A1A1A" stroke-width="2" />');

        // Department regions
        const regions = Array.isArray(fl.department_regions)
          ? fl.department_regions : [];
        const grid = fl.grid;
        if (isPlainObject(grid) && regions.length > 0) {
          const cs = grid.cell_size_ft;
          regions.forEach((reg, ri) => {
            if (!Array.isArray(reg.cells)) return;
            const c = palette.fill[ri % palette.fill.length];
            const cellRects = reg.cells.map(([u, v]) => {
              const wx = grid.origin_x + u * cs;
              const wy = grid.origin_y + v * cs;
              const [sx0, sy0] = worldToSvg(wx, wy + cs, 0);
              const [sx1, sy1] = worldToSvg(wx + cs, wy, 0);
              const x = Math.min(sx0, sx1), y = Math.min(sy0, sy1);
              const w = Math.abs(sx1 - sx0), h = Math.abs(sy1 - sy0);
              return '<rect x="' + x.toFixed(1) + '" y="' + y.toFixed(1) +
                '" width="' + w.toFixed(1) + '" height="' + h.toFixed(1) +
                '" fill="' + c + '" fill-opacity="0.5" />';
            });
            parts.push(cellRects.join(""));
          });
        }

        // Rooms
        const rooms = Array.isArray(fl.rooms) ? fl.rooms : [];
        for (const r of rooms) {
          if (!isPlainObject(r) || !Array.isArray(r.cells) || !r.bbox_cells ||
              !isPlainObject(grid)) continue;
          const cs = grid.cell_size_ft;
          const bb = r.bbox_cells;
          const wx = grid.origin_x + bb.u_min * cs;
          const wy = grid.origin_y + bb.v_min * cs;
          const [sx0, sy0] = worldToSvg(wx, wy + (bb.v_max - bb.v_min + 1) * cs, 0);
          const [sx1, sy1] = worldToSvg(wx + (bb.u_max - bb.u_min + 1) * cs, wy, 0);
          const x = Math.min(sx0, sx1), y = Math.min(sy0, sy1);
          const w = Math.abs(sx1 - sx0), h = Math.abs(sy1 - sy0);
          parts.push('<rect x="' + x.toFixed(1) + '" y="' + y.toFixed(1) +
            '" width="' + w.toFixed(1) + '" height="' + h.toFixed(1) +
            '" fill="rgba(0,0,0,0.05)" stroke="#1A1A1A" stroke-width="0.75" />');
          if (!opts.omitLabels && w > 40 && h > 14) {
            const label = (r.display_name || r.type || "").toString().toUpperCase();
            parts.push('<text x="' + (x + w / 2).toFixed(1) +
              '" y="' + (y + h / 2 + 3).toFixed(1) +
              '" text-anchor="middle" class="label">' +
              escapeXml(label.slice(0, 24)) + '</text>');
          }
        }

        // Scale bar
        if (!opts.omitLabels) {
          const sb100 = 100 * ptsPerFt;
          const sby = floorH + 20;
          parts.push('<line x1="0" y1="' + sby + '" x2="' + sb100 +
            '" y2="' + sby + '" stroke="#1A1A1A" stroke-width="1" />');
          parts.push('<text x="0" y="' + (sby + 14) +
            '" class="label">100 ft</text>');
        }

        parts.push('</g>');
      }

      parts.push('</svg>');
      return parts.join("\n");
    }

    function escapeXml(s) {
      return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;")
        .replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }

    function exportPlanSvg(project) {
      const btSlug = slugifyBuildingType(
        project && project.context && project.context.program
          ? project.context.program.building_type : "project");
      const filename = "CALVEY_PARTY_" + btSlug + "_" + todayStamp() + ".svg";
      const svg = buildPlanSvg(project);
      const blob = new Blob([svg], { type: "image/svg+xml" });
      downloadBlob(blob, filename);
    }

    // Rasterize an SVG string to a PNG data URL. Returns Promise<dataUrl>.
    function svgToPngDataUrl(svgText, widthPx, heightPx, scale) {
      return new Promise((resolve, reject) => {
        const dpr = Math.max(1, Math.min(scale || 2, 3));
        const img = new Image();
        const svgBlob = new Blob([svgText], { type: "image/svg+xml;charset=utf-8" });
        const url = URL.createObjectURL(svgBlob);
        img.onload = () => {
          try {
            const canvas = document.createElement("canvas");
            canvas.width = Math.max(1, Math.round(widthPx * dpr));
            canvas.height = Math.max(1, Math.round(heightPx * dpr));
            const ctx = canvas.getContext("2d");
            ctx.fillStyle = "#FFFFFF";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            URL.revokeObjectURL(url);
            resolve(canvas.toDataURL("image/png"));
          } catch (e) { reject(e); }
        };
        img.onerror = (e) => { URL.revokeObjectURL(url); reject(e); };
        img.src = url;
      });
    }

    // Lazy load jsPDF from CDN. Returns Promise<jsPDF constructor>.
    let __jspdfLoadPromise = null;
    function loadJsPdf() {
      if (window.jspdf && window.jspdf.jsPDF) {
        return Promise.resolve(window.jspdf.jsPDF);
      }
      if (__jspdfLoadPromise) return __jspdfLoadPromise;
      __jspdfLoadPromise = new Promise((resolve, reject) => {
        const script = document.createElement("script");
        script.src = "https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
        script.onload = () => {
          if (window.jspdf && window.jspdf.jsPDF) resolve(window.jspdf.jsPDF);
          else reject(new Error("jsPDF loaded but constructor missing"));
        };
        script.onerror = () => reject(new Error("Failed to load jsPDF"));
        document.head.appendChild(script);
      });
      return __jspdfLoadPromise;
    }

    async function exportPlanPdf(project) {
      const jsPDF = await loadJsPdf();
      const doc = new jsPDF({ unit: "pt", format: "letter", orientation: "portrait" });
      const pageW = doc.internal.pageSize.getWidth();
      const pageH = doc.internal.pageSize.getHeight();
      const margin = 40;

      const buildingType = (project.context && project.context.program)
        ? (project.context.program.building_type || "—") : "—";
      const conf = (project.confidence && project.confidence.total_score != null)
        ? project.confidence.total_score : null;
      const floors = (project.current_plan && Array.isArray(project.current_plan.floors))
        ? project.current_plan.floors : [];

      // --- Title page ---
      doc.setFont("times", "normal");
      doc.setFontSize(32);
      doc.text("CALVEY FORM / PARTY", margin, margin + 40);
      doc.setFont("courier", "normal");
      doc.setFontSize(11);
      doc.text(String(buildingType), margin, margin + 70);
      doc.text(todayStamp(), margin, margin + 86);
      doc.setFont("times", "normal");
      doc.setFontSize(24);
      doc.text("Confidence: " + (conf != null ? (conf * 100).toFixed(0) + "%" : "—"),
        margin, margin + 160);
      doc.setFont("courier", "normal");
      doc.setFontSize(10);
      const rooms = floors.reduce((acc, f) => acc +
        (Array.isArray(f.rooms) ? f.rooms.length : 0), 0);
      doc.text("Floors: " + floors.length, margin, margin + 200);
      doc.text("Rooms placed: " + rooms, margin, margin + 214);

      // --- Floor pages ---
      for (let i = 0; i < floors.length; i++) {
        doc.addPage();
        doc.setFont("courier", "normal");
        doc.setFontSize(12);
        doc.text("FLOOR " + (floors[i].level || (i + 1)), margin, margin + 14);
        try {
          const svg = buildPlanSvg(project, {
            omitTitle: true, floorIndex: i, ptsPerFt: 2
          });
          // Try to fit the rasterized SVG inside the page area below the header.
          const availW = pageW - margin * 2;
          const availH = pageH - margin * 2 - 30;
          const dataUrl = await svgToPngDataUrl(svg, availW, availH, 2);
          doc.addImage(dataUrl, "PNG", margin, margin + 30, availW, availH);
        } catch (e) {
          console.warn("PDF: floor raster failed", e);
          doc.setFontSize(10);
          doc.text("(Floor rasterization failed)", margin, margin + 60);
        }
      }

      // --- Confidence report ---
      doc.addPage();
      doc.setFont("courier", "normal");
      doc.setFontSize(12);
      doc.text("CONFIDENCE REPORT", margin, margin + 14);
      doc.setFontSize(10);
      let y = margin + 40;
      const weights = (project.confidence && project.confidence.weights) || {};
      doc.text("Weights:", margin, y); y += 14;
      for (const k of ["program_fit","daylight","adjacency","lock_preservation","circulation_quality"]) {
        doc.text("  " + k + ": " + (Number(weights[k]) || 0).toFixed(2), margin, y);
        y += 12;
      }
      y += 8;
      doc.text("Per-floor scores:", margin, y); y += 14;
      const fs = (project.confidence && project.confidence.floor_scores) || [];
      for (const f of fs) {
        doc.text("  Floor " + f.level + ": " +
          (f.score != null ? (f.score * 100).toFixed(0) + "%" : "—"),
          margin, y);
        y += 12;
      }
      y += 8;
      const rs = (project.confidence && project.confidence.room_scores) || [];
      const sorted = rs.slice().sort((a, b) => (b.score || 0) - (a.score || 0));
      doc.text("Top 10 rooms:", margin, y); y += 14;
      for (const r of sorted.slice(0, 10)) {
        doc.text("  " + (r.room_id || "") + " — " +
          (r.score != null ? (r.score * 100).toFixed(0) + "%" : "—"),
          margin, y);
        y += 11;
        if (y > pageH - margin) { doc.addPage(); y = margin + 14; }
      }
      y += 8;
      doc.text("Bottom 10 rooms:", margin, y); y += 14;
      for (const r of sorted.slice(-10).reverse()) {
        doc.text("  " + (r.room_id || "") + " — " +
          (r.score != null ? (r.score * 100).toFixed(0) + "%" : "—"),
          margin, y);
        y += 11;
        if (y > pageH - margin) { doc.addPage(); y = margin + 14; }
      }

      const btSlug = slugifyBuildingType(buildingType);
      doc.save("CALVEY_PARTY_" + btSlug + "_" + todayStamp() + ".pdf");
    }

    function exportTrainingBundle(project) {
      // Assemble the structured-decisions bundle.
      const session = isPlainObject(project.session) ? project.session : {
        events: [], ab_history: [], derived_signals: null
      };
      const lockReasonsLog = [];
      for (const ev of (session.events || [])) {
        if (ev && ev.type === "LOCK") {
          lockReasonsLog.push({
            room_id: ev.payload && ev.payload.room_id,
            room_name: ev.payload && ev.payload.room_name,
            reason: ev.payload && ev.payload.reason,
            locked_at: ev.timestamp
          });
        }
      }
      const regenDiffs = [];
      for (const ev of (session.events || [])) {
        if (ev && ev.type === "REGENERATE") {
          regenDiffs.push({
            timestamp: ev.timestamp,
            confidence_before: ev.payload && ev.payload.confidence_before,
            confidence_after: ev.payload && ev.payload.confidence_after,
            rooms_moved: null,
            chosen_variant: null
          });
        }
      }
      for (const ab of (session.ab_history || [])) {
        // Merge chosen_variant into the nearest REGENERATE diff.
        if (!regenDiffs.length) break;
        const last = regenDiffs[regenDiffs.length - 1];
        if (!last.chosen_variant) {
          last.chosen_variant = ab.chosen;
          last.rooms_moved = (ab.delta && ab.delta.rooms_moved) || null;
        }
      }
      const bundle = {
        bundle_version: "1.0",
        exported_at: nowIso(),
        project_id: project.project_id,
        building_type: (project.context && project.context.program)
          ? project.context.program.building_type : null,
        session,
        final_plan: project.current_plan,
        final_confidence: project.confidence,
        ab_history: session.ab_history || [],
        weights_used: (project.confidence && project.confidence.weights) || {},
        program_inputs: project.program_inputs || (
          project.context && project.context.program
            ? project.context.program.program_inputs : {}),
        lock_reasons_log: lockReasonsLog,
        regeneration_diffs: regenDiffs
      };
      const filename = "CALVEY_PARTY_training_" +
        (project.project_id || "project") + "_" + todayStamp() + ".json";
      const blob = new Blob([JSON.stringify(bundle, null, 2)],
        { type: "application/json" });
      downloadBlob(blob, filename);
    }

    function formatWeights(w) {
      if (!w || typeof w !== "object") return "—";
      const keys = ["daylight", "adjacency", "compactness", "circulation", "facade"];
      return keys
        .filter(k => typeof w[k] === "number")
        .map(k => k + " " + w[k].toFixed(2))
        .join(" · ");

    function ValidationChips({ validation, stale }) {
      // NOTE: Spec section 07 says "VALID chip if ok && warnings.length === 0",
      // but gate test 2 expects "green VALID plus two yellow warnings" on a new
      // project. Going with the gate test interpretation: VALID shows whenever
      // there are no errors; warnings are displayed alongside.
      const { ok, errors, warnings } = validation;
      const chips = [];
      if (ok) {
        chips.push(<span key="ok" className="chip chip-ok">VALID</span>);
      }
      // Step 04 — STALE chip appears immediately after VALID (if any) so the
      // user notices it before scrolling through other warnings.
      if (stale) {
        chips.push(
          <span key="stale" className="chip chip-warn" title="Plan no longer reflects the current inputs">
            STALE — regenerate to see updated plan
          </span>
        );
      }
      errors.forEach((e, i) => {
        chips.push(<span key={"e" + i} className="chip chip-error">{e}</span>);
      });
      warnings.forEach((w, i) => {
        chips.push(<span key={"w" + i} className="chip chip-warn">{w}</span>);
      });
      return <div className="section">{chips}</div>;
    }

    // Is this a fresh, not-yet-started project? Used to decide whether to show

    function isFreshProject(p) {
      if (!isPlainObject(p)) return true;
      const polyEmpty =
        isPlainObject(p.context) &&
        isPlainObject(p.context.footprint) &&
        Array.isArray(p.context.footprint.polygon) &&
        p.context.footprint.polygon.length === 0;

        isPlainObject(p.context) &&
        isPlainObject(p.context.program) &&
        (p.context.program.building_type === null || p.context.program.building_type === undefined);
      return polyEmpty && noType;

    const DEFAULT_CONFIDENCE_WEIGHTS = {
      program_fit: 0.25,
      daylight: 0.25,
      adjacency: 0.15,
      lock_preservation: 0.20,
      circulation_quality: 0.15

    function WeightsPanel({ project, setProject }) {
      const weights = (project && project.confidence && project.confidence.weights)
        ? project.confidence.weights : DEFAULT_CONFIDENCE_WEIGHTS;
      const totalScore = (project && project.confidence &&
        project.confidence.total_score != null)
        ? project.confidence.total_score : null;

      function onChange(k, v) {
        setProject(p => {
          const np = cloneProject(p);
          if (!isPlainObject(np.confidence)) {
            np.confidence = {
              weights: { ...DEFAULT_CONFIDENCE_WEIGHTS },
              threshold: 0.55, total_score: null,
              floor_scores: [], room_scores: [], below_threshold: false
            };
          }
          if (!isPlainObject(np.confidence.weights)) {
            np.confidence.weights = { ...DEFAULT_CONFIDENCE_WEIGHTS };
          }
          np.confidence.weights[k] = Number(v);
          // Recompute scores immediately (weights change → total changes).
          const rescored = recomputeScoresOnly(np);
          return rescored;
        });
      }

      function onRelease() {
        setProject(p => logEvent(cloneProject(p), "WEIGHTS_CHANGED", {
          weights: { ...(p.confidence && p.confidence.weights) }
        }));
      }

      function onReset() {
        setProject(p => {
          const np = cloneProject(p);
          if (!isPlainObject(np.confidence)) np.confidence = {};
          np.confidence.weights = { ...DEFAULT_CONFIDENCE_WEIGHTS };
          const rescored = recomputeScoresOnly(np);
          logEvent(rescored, "WEIGHTS_CHANGED",
            { weights: { ...DEFAULT_CONFIDENCE_WEIGHTS }, reset: true });
          return rescored;
        });
      }

      const rows = [
        ["program_fit", "PROGRAM FIT"],
        ["daylight", "DAYLIGHT"],

                  onChange={(e) => onChange(k, e.target.value)}
                  onPointerUp={onRelease}

                <span className="slider-value">
                  {Number.isFinite(val) ? val.toFixed(2) : "—"}
                </span>

    function ProgramInputsPanel({ project, setProject }) {
      const inputs = (project && project.context && project.context.program &&
        isPlainObject(project.context.program.program_inputs))
        ? project.context.program.program_inputs : {};
      const keys = Object.keys(inputs).sort();

      function onChange(k, v) {
        const newVal = v === "" ? "" : Number(v);
        setProject(p => {
          const np = cloneProject(p);
          if (!isPlainObject(np.context)) np.context = {};
          if (!isPlainObject(np.context.program)) np.context.program = {};
          if (!isPlainObject(np.context.program.program_inputs)) {
            np.context.program.program_inputs = {};
          }
          np.context.program.program_inputs[k] = Number.isFinite(Number(newVal))
            ? Number(newVal) : 0;
          // Mirror root.
          if (!isPlainObject(np.program_inputs)) np.program_inputs = {};
          np.program_inputs[k] = np.context.program.program_inputs[k];
          // Dirty chip.
          np.warnings = (np.warnings || []).filter(
            w => !(isPlainObject(w) && w.id === "inputs_dirty"));
          np.warnings.push({
            id: "inputs_dirty",
            severity: "info",
            message: "Program inputs changed — regenerate to apply",
            raised_at: nowIso()
          });
          return np;
        });
      }

      function onBlur(k, oldVal, newVal) {
        if (oldVal === newVal) return;
        setProject(p => logEvent(cloneProject(p),
          "PROGRAM_INPUTS_CHANGED",
          { driver: k, old_value: oldVal, new_value: newVal }));
      }

      if (keys.length === 0) {
        return (
          <div className="program-inputs-panel">
            <h3>PROGRAM INPUTS</h3>

        </div>

    // A/B modal. Renders two side-by-side plan thumbnails with metadata.
    function ABModal({ current, candidate, diffSummary, onKeepA, onAcceptB, onClose }) {
      const aSvg = React.useMemo(() => buildPlanSvg(current, {

      const bSvg = React.useMemo(() => buildPlanSvg(candidate, {

      }), [candidate]);

      function counts(p) {
        const floors = (p && p.current_plan && Array.isArray(p.current_plan.floors))
          ? p.current_plan.floors : [];
        let rooms = 0, violations = 0;
        for (const f of floors) {
          if (f && Array.isArray(f.rooms)) {

              if (r && Array.isArray(r.adjacency_violations)) {
                violations += r.adjacency_violations.length;
              }
            }
          }
        }
        const conf = (p && p.confidence && p.confidence.total_score != null)
          ? p.confidence.total_score : null;
        return { rooms, violations, conf };
      }
      const aMeta = counts(current);
      const bMeta = counts(candidate);

      return (

                    <span className="value">{aMeta.violations}</span>
                  </div>

                </button>

                    <span className="value">
                      {bMeta.conf != null ? (bMeta.conf * 100).toFixed(0) + "%" : "—"}
                    </span>
                  </div>
                  <div className="row">
                    <span className="label">ROOMS</span>
                    <span className="value">{bMeta.rooms}</span>
                  </div>
                  <div className="row">
                    <span className="label">ADJACENCY VIO</span>
                    <span className="value">{bMeta.violations}</span>
                  </div>

                  ACCEPT B
                </button>

              {diffSummary && (
                <>
                  <span>
                    Δ CONFIDENCE&nbsp;{diffSummary.confidence_delta != null
                      ? (diffSummary.confidence_delta > 0 ? "+" : "") +
                        (diffSummary.confidence_delta * 100).toFixed(1) + "%"

    // Compute a diff summary between two projects. Used by the A/B modal.
    function computeDiffSummary(currentProject, candidateProject) {
      const centroid = (r) => Array.isArray(r.centroid) ? r.centroid : [0, 0];
      const currRooms = new Map();
      const candRooms = new Map();
      const floorsA = (currentProject && currentProject.current_plan &&
        Array.isArray(currentProject.current_plan.floors))
        ? currentProject.current_plan.floors : [];
      const floorsB = (candidateProject && candidateProject.current_plan &&
        Array.isArray(candidateProject.current_plan.floors))
        ? candidateProject.current_plan.floors : [];
      for (const f of floorsA) {
        if (f && Array.isArray(f.rooms)) {
          for (const r of f.rooms) if (r && r.instance_id) currRooms.set(r.instance_id, r);
        }
      }
      for (const f of floorsB) {
        if (f && Array.isArray(f.rooms)) {
          for (const r of f.rooms) if (r && r.instance_id) candRooms.set(r.instance_id, r);
        }
      }
      let moved = 0;
      for (const [id, r] of candRooms) {
        const prev = currRooms.get(id);
        if (!prev) continue;
        const c1 = centroid(r), c0 = centroid(prev);
        const dx = Math.abs(c1[0] - c0[0]);
        const dy = Math.abs(c1[1] - c0[1]);
        // 2 cells threshold — convert using grid cell size where available.
        const cell = (prev.target_area_sf && prev.cells && prev.cells.length)
          ? Math.sqrt(prev.target_area_sf / prev.cells.length) : 5;
        if (Math.hypot(dx, dy) > 2 * cell) moved++;
      }
      const added = [];
      for (const id of candRooms.keys()) {
        if (!currRooms.has(id)) added.push(id);
      }
      const removed = [];
      for (const id of currRooms.keys()) {
        if (!candRooms.has(id)) removed.push(id);
      }
      const confA = (currentProject.confidence && currentProject.confidence.total_score) || 0;
      const confB = (candidateProject.confidence && candidateProject.confidence.total_score) || 0;
      return {
        rooms_moved: moved,
        rooms_added: added.length,
        rooms_removed: removed.length,
        confidence_delta: confB - confA
      };
    }

    function OnboardingView({ buildingTypes, dbLoaded, onStart, onUpload, onBlank, uploadError }) {

    function App() {
      const [project, setProject] = React.useState(() => {
        const p = loadFromLocalStorage() ?? emptyProject();
        // v1 — Phase 7. Start a session if the loaded project has none.
        if (!p.session || !p.session.started_at) startSession(p);
        return p;
      });
      const [validation, setValidation] = React.useState(() => validateProject(project));
      const [dbStatus, setDbStatus] = React.useState({ loaded: false, count: 0, error: null, types: [], databases: [] });
      const [forceAdvanced, setForceAdvanced] = React.useState(false);
      const [textareaValue, setTextareaValue] = React.useState(() => JSON.stringify(project, null, 2));
      const [applyError, setApplyError] = React.useState(null);
      const [uploadError, setUploadError] = React.useState(null);
      // v1 — Phase 6. A/B modal state.
      const [abModal, setAbModal] = React.useState(null); // { current, candidate, diff }

      // Autosave + revalidate on every project change
      React.useEffect(() => {
        saveToLocalStorage(project);
        setValidation(validateProject(project));
        setTextareaValue(JSON.stringify(project, null, 2));
      }, [project]);

      // Probe program database on mount.
      // CALVEY_PROGRAM ships its master index as building_program_database_master[_updated].json
      // with a top-level `databases` array. Depending on how Matt copies the folder in,
      // the file may land at the canonical ./data/ path, or nested one level deeper.
      // Try each candidate in order and use the first one that parses.
      React.useEffect(() => {
        const candidates = [
          "./data/master_index.json",
          "./data/building_program_database_master_updated.json",
          "./data/building_program_database_master.json",
          "./data/CALVEY_PROGRAM/data/building_program_database_master_updated.json",
          "./data/CALVEY_PROGRAM/data/building_program_database_master.json"
        ];
        let cancelled = false;
        (async () => {
          for (const path of candidates) {
            try {
              const res = await fetch(path);
              if (!res.ok) continue;
              const json = await res.json();
              if (cancelled) return;
              let count = 0;
              let types = [];
              let databases = [];
              if (Array.isArray(json)) {
                count = json.length;
                databases = json.filter(isPlainObject);
                types = json
                  .map(x => (isPlainObject(x) ? (x.building_type || x.name || null) : null))
                  .filter(Boolean);
              } else if (isPlainObject(json)) {
                const arr = Array.isArray(json.databases)
                  ? json.databases
                  : Array.isArray(json.building_types)
                    ? json.building_types
                    : Array.isArray(json.types)
                      ? json.types
                      : null;
                if (arr) {
                  count = arr.length;
                  databases = arr.filter(isPlainObject);
                  types = arr
                    .map(x => (isPlainObject(x) ? (x.building_type || x.name || null) : (typeof x === "string" ? x : null)))
                    .filter(Boolean);
                } else {
                  count = Object.keys(json).length;
                }
              }
              // De-duplicate while preserving order
              const seen = new Set();
              types = types.filter(t => {
                if (seen.has(t)) return false;
                seen.add(t);
                return true;
              });
              setDbStatus({ loaded: true, count, error: null, source: path, types, databases });
              return;
            } catch (e) {
              console.debug("program database probe miss:", path, e && e.message);
            }
          }
          if (cancelled) return;
          setDbStatus({ loaded: false, count: 0, error: "no master index found", source: null, types: [], databases: [] });
        })();
        return () => { cancelled = true; };
      }, []);

      function handleNewProject() {
        // v1 — Phase 7. Fire SESSION_END before clearing, then start a new session.
        if (project && project.session && project.session.started_at &&
            !project.session.ended_at) {
          endSession(project);
        }
        const p = emptyProject();
        startSession(p);
        setProject(p);
        setApplyError(null);
        setUploadError(null);
        setForceAdvanced(false);
      }

      function handleStartFromOnboarding({ buildingType, width, depth }) {
        const p = emptyProject();
        if (buildingType) {
          p.context.program.building_type = buildingType;
        }
        p.context.footprint.polygon = buildRectanglePolygon(width, depth);
        p.context.footprint.source = "onboarding_rectangle";
        startSession(p);
        setProject(p);
        setApplyError(null);
        setUploadError(null);
        setForceAdvanced(false);
      }

      // v1 — Phase 7. End the current session in place (keeps the plan, shows chips).
      function handleEndSession() {
        setProject(p => {
          const np = cloneProject(p);
          endSession(np);
          return np;
        });
      }

      // v1 — Phase 7. Start a new session (after END SESSION). Keeps the plan.
      function handleNewSession() {
        setProject(p => {
          const np = cloneProject(p);
          startSession(np);
          return np;
        });
      }

      // v1 — Phase 6. REGENERATE. Runs a fresh A→B→C→D pipeline with the
      // current weights + program_inputs + locks, and opens A/B modal.
      async function handleRegenerate() {
        if (!project || !project.current_plan ||
            !Array.isArray(project.current_plan.floors) ||
            project.current_plan.floors.every(f =>
              !Array.isArray(f.rooms) || f.rooms.length === 0)) {
          return;
        }
        const btName = project.context && project.context.program
          ? project.context.program.building_type : null;
        if (!btName) return;
        try {
          // Fetch building type. Use the canvas's fetchBuildingTypeJson indirectly
          // — we need programDb here. Fall back to re-reading master index.
          const dbPath = dbStatus.source || "./data/master_index.json";
          const entry = (Array.isArray(dbStatus.databases) ? dbStatus.databases : [])
            .find(e => isPlainObject(e) && e.building_type === btName);
          if (!entry) throw new Error("building type not in master index");
          const fileName = entry.file || entry.json;
          if (!fileName) throw new Error("master index entry has no file");
          const dir = dbPath.substring(0, dbPath.lastIndexOf("/") + 1);
          const res = await fetch(dir + fileName);
          if (!res.ok) throw new Error("fetch failed (" + res.status + ")");
          const btJson = await res.json();

          const before = project;
          const confBefore = (before.confidence && before.confidence.total_score)
            || null;
          const candidate = generatePlan(before, btJson);
          const confAfter = (candidate.confidence && candidate.confidence.total_score)
            || null;
          const diff = computeDiffSummary(before, candidate);

          logEvent(candidate, "REGENERATE", {
            locks_respected: true,
            confidence_before: confBefore,
            confidence_after: confAfter,
            duration_ms: null
          });

          setAbModal({ current: before, candidate, diff });
        } catch (err) {
          console.error("regenerate failed:", err);
          setApplyError("Regenerate failed: " + (err && err.message ? err.message : String(err)));
        }
      }

      function handleAbKeepA() {
        if (!abModal) return;
        const evt = {
          type: "SELECT_AB_VARIANT",
          timestamp: nowIso(),
          payload: { chosen: "A", delta: abModal.diff }
        };
        setProject(p => {
          const np = cloneProject(p);
          if (!isPlainObject(np.session)) np.session = {
            events: [], ab_history: [], derived_signals: null
          };
          if (!Array.isArray(np.session.events)) np.session.events = [];
          if (!Array.isArray(np.session.ab_history)) np.session.ab_history = [];
          np.session.events.push(evt);
          np.session.ab_history.push({
            timestamp: evt.timestamp, chosen: "A", delta: abModal.diff
          });
          return np;
        });
        setAbModal(null);
      }

      function handleAbAcceptB() {
        if (!abModal) return;
        const evt = {
          type: "SELECT_AB_VARIANT",
          timestamp: nowIso(),
          payload: { chosen: "B", delta: abModal.diff }
        };
        // Candidate becomes current. Copy session from current (already carries events).
        const accepted = cloneProject(abModal.candidate);
        // Preserve the session from the A side (current) — it has the full history.
        accepted.session = JSON.parse(JSON.stringify(project.session || {
          events: [], ab_history: [], derived_signals: null
        }));
        if (!Array.isArray(accepted.session.events)) accepted.session.events = [];
        if (!Array.isArray(accepted.session.ab_history)) accepted.session.ab_history = [];
        accepted.session.events.push(evt);
        accepted.session.ab_history.push({
          timestamp: evt.timestamp, chosen: "B", delta: abModal.diff
        });
        setProject(accepted);
        setAbModal(null);
      }

      function handleAbClose() {
        if (!abModal) return;
        const evt = {
          type: "SELECT_AB_VARIANT",
          timestamp: nowIso(),
          payload: { chosen: "A", delta: abModal.diff, note: "closed_without_selecting" }
        };
        setProject(p => {
          const np = cloneProject(p);
          if (!isPlainObject(np.session)) np.session = {
            events: [], ab_history: [], derived_signals: null
          };
          if (!Array.isArray(np.session.events)) np.session.events = [];
          if (!Array.isArray(np.session.ab_history)) np.session.ab_history = [];
          np.session.events.push(evt);
          np.session.ab_history.push({
            timestamp: evt.timestamp, chosen: "A",
            delta: abModal.diff, note: "closed_without_selecting"
          });
          return np;
        });
        setAbModal(null);
      }

      function handleBlankStart() {
        // Escape hatch for power users who want to hand-edit JSON immediately.
        setForceAdvanced(true);
        setApplyError(null);
        setUploadError(null);
      }

      function handleUpload(ev) {
        const file = ev.target.files && ev.target.files[0];
        // reset input so the same file can be re-selected later
        ev.target.value = "";
        if (!file) return;
        uploadProjectFile(file)
          .then(p => {
            setProject(p);
            setUploadError(null);
          })
          .catch(err => {
            setUploadError(err && err.message ? err.message : String(err));
          });
      }

      function handleDownload() {
        downloadProjectFile(project);
      }

      function handleValidate() {
        setValidation(validateProject(project));
      }

      function handleApplyEdits() {
        let parsed;
        try {
          parsed = JSON.parse(textareaValue);
        } catch (e) {
          setApplyError("Could not parse JSON: " + e.message);
          return;
        }
        setApplyError(null);

        // Step 04 — STALE chip: if the parsed edit changes anything the
        // packer depends on (footprint polygon, program_inputs, building_type),
        // mark the plan stale so the user knows to regenerate.
        const polyOld = JSON.stringify(
          (project && project.context && project.context.footprint &&
           Array.isArray(project.context.footprint.polygon))
            ? project.context.footprint.polygon : []);
        const polyNew = JSON.stringify(
          (parsed && parsed.context && parsed.context.footprint &&
           Array.isArray(parsed.context.footprint.polygon))
            ? parsed.context.footprint.polygon : []);
        const piOld = JSON.stringify(
          (project && project.context && project.context.program &&
           isPlainObject(project.context.program.program_inputs))
            ? project.context.program.program_inputs : {});
        const piNew = JSON.stringify(
          (parsed && parsed.context && parsed.context.program &&
           isPlainObject(parsed.context.program.program_inputs))
            ? parsed.context.program.program_inputs : {});
        const btOld = (project && project.context && project.context.program)
          ? project.context.program.building_type : null;
        const btNew = (parsed && parsed.context && parsed.context.program)
          ? parsed.context.program.building_type : null;
        // Step 07 — floor_count changes also stale the plan.
        const fcOld = (project && project.context && project.context.program)
          ? Number(project.context.program.floor_count) || 1 : 1;
        const fcNew = (parsed && parsed.context && parsed.context.program)
          ? Number(parsed.context.program.floor_count) || 1 : 1;

        const changed = (polyOld !== polyNew) || (piOld !== piNew) ||
                        (btOld !== btNew) || (fcOld !== fcNew);
        if (changed) {
          if (!isPlainObject(parsed.current_plan)) {
            parsed.current_plan = {
              floors: [], total_score: null, program_fit_report: null,
              unplaced_rooms: [], stale: true
            };
          } else {
            parsed.current_plan.stale = true;
          }
        }
        setProject(parsed);
      }

      function handleRevert() {
        setTextareaValue(JSON.stringify(project, null, 2));
        setApplyError(null);
      }

      const dbMessage = dbStatus.loaded
        ? ("PROGRAM DATABASE LOADED · " + dbStatus.count + " building types · " + (dbStatus.source || ""))
        : "PROGRAM DATABASE NOT PRESENT — copy CALVEY_PROGRAM/data into ./data/ and reload";

      const showOnboarding = !forceAdvanced && isFreshProject(project);

      if (showOnboarding) {
        return (
          <OnboardingView
            buildingTypes={dbStatus.types || []}
            dbLoaded={dbStatus.loaded}
            onStart={handleStartFromOnboarding}
            onUpload={handleUpload}
            onBlank={handleBlankStart}
            uploadError={uploadError}
          />
        );
      }

      const sessionEnded = !!(project.session && project.session.ended_at);
      const canExportPlan = !!(project.current_plan &&
        Array.isArray(project.current_plan.floors) &&
        project.current_plan.floors.some(f =>
          Array.isArray(f.rooms) && f.rooms.length > 0));

      return (
        <div className="app">
          <header className="section">
            <h1>CALVEY PARTY 2</h1>
            <div className="label">SANDBOX · v1.0.0 · STAGE A–D + CONFIDENCE</div>
          </header>

          <div className="section">
            <button onClick={handleNewProject}>Start Over</button>
            {!sessionEnded && (
              <button onClick={handleEndSession}>End Session</button>
            )}
            {sessionEnded && (
              <button onClick={handleNewSession}>New Session</button>
            )}
            <label className="upload">
              Load .calvey-party.json
              <input type="file" accept=".json,application/json" onChange={handleUpload} />
            </label>
            <button onClick={handleDownload}>Download .calvey-party.json</button>
            <button onClick={handleValidate}>Validate</button>
          </div>

          {uploadError && (
            <div className="section">
              <span className="chip chip-error">UPLOAD FAILED: {uploadError}</span>
            </div>
          )}

          <ValidationChips
            validation={validation}
            stale={!!(project && project.current_plan && project.current_plan.stale)}
          />

          <FootprintCanvas project={project} setProject={setProject}
            programDb={dbStatus} onRegenerate={handleRegenerate} />

          <div className="hairline"></div>

          {/* v1 — Phase 4 & 5 & 7 & 8 panels. */}
          {!sessionEnded && (
            <>
              <WeightsPanel project={project} setProject={setProject} />
              <ProgramInputsPanel project={project} setProject={setProject} />
            </>
          )}
          {sessionEnded && (
            <SessionSummaryPanel project={project} />
          )}
          <ExportPanel project={project} canExportPlan={canExportPlan} />

          <div className="section">
            <h3>METADATA</h3>
            <MetadataPanel project={project} />
          </div>

          <div className="section">
            <h3>PROGRAM DATABASE</h3>
            <div className="block-note">{dbMessage}</div>
          </div>

          <div className="hairline"></div>

          <div className="section">
            <h3>PROJECT JSON</h3>
            {applyError && (
              <div className="section">
                <span className="chip chip-error">{applyError}</span>
              </div>
            )}
            <textarea
              className="json-viewer"
              value={textareaValue}
              onChange={(e) => setTextareaValue(e.target.value)}
              spellCheck={false}
            />
            <div style={{ marginTop: 12 }}>
              <button onClick={handleApplyEdits}>Apply edits</button>
              <button onClick={handleRevert}>Revert</button>
            </div>
          </div>

          <footer>
            SCHEMA 2.1-PARTY · ENGINE {ENGINE_VERSION}
          </footer>

          {abModal && (
            <ABModal current={abModal.current} candidate={abModal.candidate}
              diffSummary={abModal.diff}
              onKeepA={handleAbKeepA} onAcceptB={handleAbAcceptB}
              onClose={handleAbClose} />
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
