<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>CALVEY PARTY 2 — Sandbox</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap');

    :root {
      --calvey-accent: #6A9CC4;
      --calvey-text: #1A1A1A;
      --calvey-muted: #888888;
      --calvey-surface: #F5F5F5;
      --calvey-rule: #E0E0E0;
      --calvey-error: #B33A3A;
      --calvey-warn: #C68A2E;
    }

    * { box-sizing: border-box; }

    /* Step T1 — touch framework foundation. Default tap behavior is
       "manipulation" (disables double-tap-to-zoom + click delay);
       -webkit-text-size-adjust keeps iOS from auto-inflating type on
       orientation change. Canvas-specific overrides live below. */
    html, body {
      touch-action: manipulation;
      -webkit-text-size-adjust: 100%;
    }

    body {
      font-family: 'Cormorant Garamond', Georgia, serif;
      color: var(--calvey-text);
      background: white;
      margin: 0;
      padding: 0;
      font-size: 16px;
      line-height: 1.5;
    }

    /* Step T1 — buttons are tappable without triggering selection/highlight. */
    button {
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      max-width: 960px;
      margin: 0 auto;
      padding: 48px 32px 96px;
    }

    h1, h2, h3 {
      font-weight: 500;
      margin: 0 0 16px;
    }

    h1 { font-size: 32px; letter-spacing: -0.01em; }
    h2 { font-size: 20px; }
    h3 { font-size: 14px; font-family: 'Space Mono', monospace; text-transform: uppercase; letter-spacing: 0.08em; color: var(--calvey-muted); }

    .label, .meta, button, .chip, .mono {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .hairline { border-top: 1px solid var(--calvey-rule); margin: 32px 0; }

    .section { margin-bottom: 32px; }

    table.kv { width: 100%; border-collapse: collapse; }
    table.kv td {
      border-bottom: 1px solid var(--calvey-rule);
      padding: 10px 14px;
      vertical-align: top;
    }
    table.kv td.label { width: 35%; color: var(--calvey-muted); font-family: 'Space Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
    table.kv td.value { background: var(--calvey-surface); font-family: 'Space Mono', monospace; font-size: 12px; word-break: break-all; }

    button {
      background: white;
      border: 1px solid var(--calvey-text);
      padding: 10px 16px;
      cursor: pointer;
      margin-right: 8px;
      color: var(--calvey-text);
    }
    button:hover { background: var(--calvey-text); color: white; }

    input[type="file"] { display: none; }

    label.upload {
      display: inline-block;
      background: white;
      border: 1px solid var(--calvey-text);
      padding: 10px 16px;
      cursor: pointer;
      margin-right: 8px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    label.upload:hover { background: var(--calvey-text); color: white; }

    textarea.json-viewer {
      width: 100%;
      min-height: 480px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      line-height: 1.6;
      padding: 16px;
      border: 1px solid var(--calvey-rule);
      background: var(--calvey-surface);
      color: var(--calvey-text);
      resize: vertical;
    }

    .chip {
      display: inline-block;
      padding: 4px 10px;
      border: 1px solid currentColor;
      margin-right: 6px;
      margin-bottom: 6px;
    }
    .chip-ok    { color: var(--calvey-accent); }
    .chip-warn  { color: var(--calvey-warn); }
    .chip-error { color: var(--calvey-error); }

    .block-note {
      border-left: 3px solid var(--calvey-accent);
      padding: 8px 16px;
      background: var(--calvey-surface);
      font-size: 14px;
      margin: 16px 0;
    }

    .onboard-card {
      border: 1px solid var(--calvey-rule);
      padding: 32px;
      margin-top: 24px;
      background: white;
    }

    .onboard-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    @media (min-width: 640px) {
      .onboard-grid.two { grid-template-columns: 1fr 1fr; }
    }

    .field { display: flex; flex-direction: column; }
    .field label {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--calvey-muted);
      margin-bottom: 6px;
    }
    .field select,
    .field input[type="number"],
    .field input[type="text"] {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      padding: 10px 12px;
      border: 1px solid var(--calvey-text);
      background: white;
      color: var(--calvey-text);
      width: 100%;
    }
    .field .hint {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--calvey-muted);
      margin-top: 6px;
    }

    .preset-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .preset-row button {
      padding: 6px 10px;
      margin: 0;
      font-size: 10px;
    }

    .primary {
      background: var(--calvey-text);
      color: white;
    }
    .primary:hover { background: var(--calvey-accent); border-color: var(--calvey-accent); }

    .linkish {
      background: transparent;
      border: none;
      color: var(--calvey-muted);
      padding: 6px 0;
      text-decoration: underline;
      cursor: pointer;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .linkish:hover { background: transparent; color: var(--calvey-text); }

    .soft-rule {
      text-align: center;
      color: var(--calvey-muted);
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin: 24px 0 16px;
    }

    footer {
      margin-top: 64px;
      padding-top: 16px;
      border-top: 1px solid var(--calvey-rule);
      color: var(--calvey-muted);
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .canvas-container {
      width: 100%;
      height: 520px;
      border: 1px solid var(--calvey-rule);
      margin: 32px 0;
      position: relative;
      overflow: hidden;
      background: var(--calvey-surface);
      /* Step T1 — the canvas owns its touch events. Disabling the browser's
         default pan/zoom is what lets our custom pinch-to-zoom work without
         Safari hijacking two-finger gestures to zoom the page. */
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    .canvas-container svg {
      width: 100%;
      height: 100%;
      display: block;
      cursor: grab;
      user-select: none;
      touch-action: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    .canvas-container svg.panning {
      cursor: grabbing;
    }

    /* Step T1 — rooms and walls suppress iOS long-press selection menu
       and the tap highlight halo so the gestures feel direct. */
    [data-room-id] {
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* Step T1 — debug gesture readout (bottom-center, transient scaffolding
       for iPhone test sessions). Hidden by URL query param ?debug=0. */
    .debug-gesture-readout {
      position: absolute;
      bottom: 4px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.7);
      color: white;
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 2px;
      pointer-events: none;
      z-index: 100;
      white-space: nowrap;
    }

    /* Step T1 — thin dashed line connecting finger position to offset ghost
       during touch drag so the user sees the relationship. */
    .ghost-finger-connector {
      stroke: var(--calvey-accent);
      stroke-width: 1;
      stroke-dasharray: 3 3;
      stroke-opacity: 0.5;
      fill: none;
      pointer-events: none;
    }

    .canvas-overlay {
      position: absolute;
      pointer-events: none;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--calvey-text);
    }

    .canvas-overlay.top-right {
      top: 20px;
      right: 20px;
      background: rgba(255, 255, 255, 0.9);
      padding: 8px 12px;
      border: 1px solid var(--calvey-rule);
      line-height: 1.6;
    }

    .canvas-overlay.top-right .label {
      color: var(--calvey-muted);
    }

    .canvas-overlay.top-right button {
      pointer-events: auto;
      margin-top: 8px;
      margin-right: 6px;
      padding: 6px 12px;
      font-size: 10px;
    }

    .canvas-overlay.bottom-right {
      bottom: 20px;
      right: 20px;
      background: rgba(255, 255, 255, 0.9);
      padding: 8px 12px;
      border: 1px solid var(--calvey-rule);
      line-height: 1.6;
      max-height: 200px;
      overflow-y: auto;
      pointer-events: auto;
    }

    .canvas-overlay.bottom-right .dept-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      white-space: nowrap;
    }

    .canvas-overlay.bottom-right .dept-row .dept-name {
      color: var(--calvey-text);
    }

    .canvas-overlay.bottom-right .dept-row .dept-meta {
      color: var(--calvey-muted);
    }

    .canvas-overlay.bottom-right .dept-row.unplaced .dept-name,
    .canvas-overlay.bottom-right .dept-row.unplaced .dept-meta {
      color: var(--calvey-warn);
    }

    button:disabled {
      background: var(--calvey-surface);
      color: var(--calvey-muted);
      border-color: var(--calvey-rule);
      cursor: not-allowed;
    }
    button:disabled:hover {
      background: var(--calvey-surface);
      color: var(--calvey-muted);
    }

    .room-label {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      fill: var(--calvey-text);
      text-anchor: middle;
      dominant-baseline: middle;
      pointer-events: none;
      user-select: none;
    }

    /* Step 04 — click-to-pulse on unplaced rows. 0.8s × 3 cycles = 2.4s total. */
    @keyframes soft-pulse {
      0%, 100% { stroke-opacity: 0.25; }
      50%      { stroke-opacity: 1.0; }
    }
    .pulse-cell {
      animation: soft-pulse 0.8s ease-in-out 3;
      fill: none;
      stroke: #E0B84D;
      stroke-width: 2;
      pointer-events: none;
    }

    /* Step 04 — clickable unplaced rows in the bottom-right summary. */
    .canvas-overlay.bottom-right .dept-row.unplaced-row {
      cursor: pointer;
      padding: 2px 4px;
      margin: 0 -4px;
      border-radius: 2px;
    }
    .canvas-overlay.bottom-right .dept-row.unplaced-row:hover {
      background: rgba(224, 184, 77, 0.15);
    }
    .canvas-overlay.bottom-right .dept-row.unplaced-row.is-pulsing {
      background: rgba(224, 184, 77, 0.25);
    }

    /* Step 05 — room cursor affordances. The hit-target rect owns the cursor;
       cell rects and walls below stay pointer-events:none so they never steal
       the hit. `.locked` rooms fall through to pan, so we show not-allowed. */
    [data-room-id] {
      cursor: grab;
    }
    [data-room-id].dragging {
      cursor: grabbing;
    }
    [data-room-id].locked {
      cursor: not-allowed;
    }

    /* Step 05 — inline lock chip. Positioned (left/top set inline) near the
       target room's screen bbox; flips to the opposite corner if it would
       overflow the canvas. Dismiss on any-button-press outside or 3s timeout. */
    .lock-chip {
      position: absolute;
      background: white;
      border: 1px solid var(--calvey-text);
      padding: 6px 10px;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: flex;
      gap: 8px;
      align-items: flex-start;
      pointer-events: auto;
      z-index: 10;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
    }
    /* Step T2 — 2-column grid of reason buttons. Works on desktop too; the
       chip is just a bit wider. Keeps the chip from blowing past an iPhone
       viewport's right edge when all six reasons are shown in a single row. */
    .lock-chip .reasons {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 4px;
    }
    .lock-chip button {
      background: white;
      border: 1px solid var(--calvey-rule);
      padding: 8px 14px;
      margin: 0;
      cursor: pointer;
      font-family: inherit;
      font-size: inherit;
      text-transform: inherit;
      color: var(--calvey-text);
      /* Step T2 — touch-friendly minimum tap target. 36×72 is a compromise
         between Apple HIG's 44×44 (bulky) and the original 24-ish height
         (too small for fingers). */
      min-height: 36px;
      min-width: 72px;
    }
    .lock-chip button:hover {
      background: var(--calvey-text);
      color: white;
    }
    .lock-chip .close {
      color: var(--calvey-muted);
      padding: 6px 10px;
      min-width: 32px;
    }

    /* Step 05 — rejection chip (bottom-left, 2s auto-clear). */
    .reject-chip {
      position: absolute;
      bottom: 120px;
      left: 20px;
      background: var(--calvey-error);
      color: white;
      padding: 8px 12px;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      pointer-events: none;
      z-index: 11;
    }

    /* Step 06 — alignment-group highlight on wall hover. One SVG <line> per
       wall in the group; renders above rooms so the preview is visible even
       over filled room cells. */
    .alignment-highlight {
      pointer-events: none;
      stroke: var(--calvey-accent);
      stroke-width: 3;
      stroke-opacity: 0.6;
      fill: none;
    }

    /* Step 06 — scrub area tooltip. Absolute positioning inside the canvas
       container so it floats near the cursor. pointer-events: none so the
       chip itself never intercepts a pointer during the scrub. */
    .scrub-area-tooltip {
      position: absolute;
      pointer-events: none;
      background: white;
      border: 1px solid var(--calvey-text);
      padding: 6px 10px;
      font-family: 'Space Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      z-index: 30;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
    }
    .scrub-area-tooltip .room-name { font-size: 9px; color: var(--calvey-text); }
    .scrub-area-tooltip .room-area { font-size: 12px; color: var(--calvey-text); margin-top: 2px; }
    .scrub-area-tooltip .others    { font-size: 8px; color: var(--calvey-muted); margin-top: 2px; }

    /* Step T3 — dragged-room name float. Rendered 60 px above the finger
       during a cross-floor drag so the user can confirm they're dragging
       the room they meant to. Above the T1 ghost offset (which sits 40 px
       above the finger) so both labels are visible together. position:
       fixed uses viewport coords; pointer-events: none so it never blocks
       hit-testing on the floor tile underneath. */
    .drag-room-name-float {
      position: fixed;
      background: white;
      border: 1px solid var(--calvey-text);
      padding: 4px 8px;
      font-family: 'Space Mono', monospace;
      pointer-events: none;
      z-index: 50;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
      white-space: nowrap;
    }
    .drag-room-name-float .name {
      font-size: 10px;
      text-transform: uppercase;
      color: var(--calvey-text);
    }
    .drag-room-name-float .dept {
      font-size: 8px;
      text-transform: uppercase;
      color: var(--calvey-muted);
    }

    /* Step 06 — wall hover cursors. The descendant selector is required
       because per-room hit-target rects (`[data-room-id]`) already set
       `cursor: grab`, which would otherwise win for the user's actual
       hover target. !important forces the resize cursor while a wall is
       hovered even though the cursor physically lands on a room rect. */
    svg.wall-ew,
    svg.wall-ew * { cursor: ew-resize !important; }
    svg.wall-ns,
    svg.wall-ns * { cursor: ns-resize !important; }

    /* Step 07 — Floor strip. HTML overlay positioned over the canvas-container
       (left side, below the compass). Each tile renders an inline SVG
       thumbnail of one floor; clicking activates that floor; dropping a
       dragged room on a tile triggers crossFloorMove. */
    .floor-strip {
      position: absolute;
      top: 80px;         /* below the top-left compass */
      left: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: auto;
      z-index: 5;
    }

    /* Step T3 — each tile lives inside a wrapper so the drop-target ring
       can be rendered as an absolutely-positioned sibling that extends
       outside the tile bounds (so it's still visible around a fingertip
       on touch). The tile itself keeps overflow:hidden for the thumbnail;
       the wrapper and the floor-strip column let it spill out. */
    .floor-tile-wrapper {
      position: relative;
      width: 80px;
      height: 60px;
    }

    .floor-tile {
      width: 80px;
      height: 60px;
      background: white;
      border: 1px solid var(--calvey-rule);
      position: relative;
      cursor: pointer;
      overflow: hidden;
      /* Step T3 — make tile taps immediate on iOS (no 300 ms synthesized
         click delay) and suppress the default tap highlight halo. */
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .floor-tile.active {
      border: 2px solid var(--calvey-accent);
    }

    /* Step T3 — drop-target ring. A 4-px ring positioned 12 px outside
       the tile on all sides so the user can see it around a fingertip.
       pointer-events: none lets hit-testing pass through to the tile
       underneath (so document.elementFromPoint still reports the tile
       that receives the drop). Valid targets pulse; invalid targets stay
       static red (a pulsing red feels aggressive). */
    .drop-target-ring {
      position: absolute;
      top: -12px;
      left: -12px;
      right: -12px;
      bottom: -12px;
      border: 4px solid var(--calvey-accent);
      pointer-events: none;
      z-index: 10;
      animation: drop-target-pulse 1s ease-in-out infinite;
    }

    .drop-target-ring.invalid {
      border-color: var(--calvey-error);
      animation: none;
    }

    @keyframes drop-target-pulse {
      0%, 100% {
        border-color: var(--calvey-accent);
        box-shadow: 0 0 0 0 rgba(106, 156, 196, 0.4);
      }
      50% {
        border-color: var(--calvey-accent);
        box-shadow: 0 0 0 6px rgba(106, 156, 196, 0.0);
      }
    }

    /* Step T3 — brief flash on a floor tile tap so the user gets "the
       system heard you" feedback even before the canvas rerenders. */
    .floor-tile.tap-flash {
      animation: tap-flash 0.25s ease-out;
    }

    @keyframes tap-flash {
      0%   { background: var(--calvey-accent); }
      100% { background: white; }
    }

    .floor-tile .floor-label {
      position: absolute;
      top: 3px;
      left: 4px;
      font-family: 'Space Mono', monospace;
      font-size: 8px;
      text-transform: uppercase;
      color: var(--calvey-text);
      pointer-events: none;
    }

    .floor-tile .room-count {
      position: absolute;
      top: 3px;
      right: 4px;
      font-family: 'Space Mono', monospace;
      font-size: 8px;
      color: var(--calvey-muted);
      pointer-events: none;
    }

    .floor-tile .unplaced-badge {
      position: absolute;
      bottom: 3px;
      right: 4px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--calvey-error);
      pointer-events: none;
    }

    .floor-tile svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .floor-controls {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-top: 8px;
    }

    .floor-controls button {
      width: 80px;
      padding: 4px 0;
      font-size: 9px;
      margin: 0;
    }

    .floor-chip {
      width: 80px;
      margin-top: 6px;
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      line-height: 1.3;
      color: var(--calvey-warn);
      background: white;
      border: 1px solid var(--calvey-warn);
      padding: 4px 6px;
      pointer-events: none;
    }

    /* Step 07.1 — inline confirmation chip shown in place of − REMOVE TOP
       when the top floor contains locked rooms. Replaces the button so the
       user's eye stays on the same spot. */
    .floor-removal-confirm {
      width: 80px;
      background: white;
      border: 1px solid var(--calvey-error);
      padding: 8px;
      margin-top: 8px;
      font-family: 'Space Mono', monospace;
      pointer-events: auto;
      box-sizing: border-box;
    }

    .floor-removal-confirm .title {
      font-size: 10px;
      text-transform: uppercase;
      color: var(--calvey-text);
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .floor-removal-confirm .room-list {
      font-size: 9px;
      color: var(--calvey-muted);
      margin-bottom: 8px;
      line-height: 1.4;
      word-break: break-word;
    }

    .floor-removal-confirm .actions {
      display: flex;
      gap: 4px;
    }

    .floor-removal-confirm .actions button {
      flex: 1;
      padding: 4px 0;
      font-size: 9px;
      font-family: inherit;
      text-transform: uppercase;
      cursor: pointer;
      border: 1px solid var(--calvey-rule);
      background: var(--calvey-surface);
      color: var(--calvey-text);
    }

    .floor-removal-confirm .actions button.proceed {
      background: var(--calvey-error);
      color: white;
      border-color: var(--calvey-error);
    }

    .floor-removal-confirm .actions button.proceed:hover {
      filter: brightness(1.1);
    }

    /* ============================================================
       v1 — Phase 9. Weights + Program Inputs + Session Summary +
       Export panels, plus A/B modal.
       ============================================================ */
    :root {
      --calvey-warning: #C05050;
    }

    .program-inputs-panel input[type="number"] {

    .program-inputs-panel .dirty-note {

    .session-summary-panel .chip-grid {

    .session-summary-panel .summary-chip .chip-label {

    .session-summary-panel .summary-chip .chip-value {

    .session-summary-panel .timeline {

    .session-summary-panel .timeline-event {

    .ab-modal-backdrop {

      background: white;

    .ab-modal-panel h4 {

    .ab-modal-panel .metadata .value {

    .ab-modal-panel button {
      width: 100%;
      min-height: 44px;

      border: none;

    .ab-modal-panel button.secondary {

    .ab-modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 24px;
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid var(--calvey-rule);
      font-family: 'Space Mono', monospace;

    .export-panel button {
      display: block;
      width: 100%;
      min-height: 44px;
      margin-bottom: 8px;
      padding: 12px 16px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      background: white;
      color: var(--calvey-text);
      border: 1px solid var(--calvey-rule);
      cursor: pointer;
      text-align: left;
      transition: background 0.15s;
    }

    .export-panel button:hover:not(:disabled) {
      background: var(--calvey-surface);
    }

    .export-panel button:disabled {
      opacity: 0.5;
      cursor: not-allowed;

  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="env,react">
    // ============================================================
    // SECTION 01 — SCHEMA
    // v2.1-party schema, validators, migrateFromV13 stub
    // ============================================================

    const SCHEMA_VERSION = "2.1-party";
    const ENGINE_VERSION = "1.0.0-v1";

    function emptyProject() {
      const now = new Date().toISOString();
      const id =
        (typeof crypto !== "undefined" && typeof crypto.randomUUID === "function")
          ? crypto.randomUUID()
          : ("p-" + Math.random().toString(36).slice(2, 10) + "-" + Date.now().toString(36));
      return {
        schema_version: SCHEMA_VERSION,
        project_id: id,
        engine_version: ENGINE_VERSION,
        created_at: now,
        updated_at: now,
        context: {
          footprint: {
            polygon: [],
            polygon_units: "feet",
            source: null,
            true_north_deg: 0,
            lat: null,
            lon: null
          },
          site: {
            climate_zone: null,
            setbacks: [],
            adjacent_buildings: [],
            obstructions: []
          },
          program: {
            building_type: null,
            rooms: [],
            adjacency_graph: {},
            vertical_constraints: {},
            // Step 04 — program drivers seeded from subtypes[0] (lazy, first
            // generate only). Empty by default. User edits preserved across
            // generates.
            program_inputs: {},
            // Step 04 — post-resolution digest: template/instance counts,
            // count_rule breakdown, driver values used, gross/net ratio.
            resolved_rooms_digest: null,
            // Step 07 — canonical multi-floor count. User edits via the floor
            // strip +/- buttons or the JSON viewer. Kept in sync with
            // program_inputs.floor_count so count_rule "one_per_floor" keeps
            // working.
            floor_count: 1
          },
          vertical_anchors: {
            cores: [],
            structural_lines: [],
            shafts: []
          }
        },
        weights: {
          daylight: 0.25,
          adjacency: 0.25,
          compactness: 0.15,
          circulation: 0.20,
          facade: 0.15
        },
        code_limits: {
          max_stories: null,
          max_height_ft: null,
          jurisdiction: null
        },
        current_plan: {
          floors: [
            {
              level: 1,
              grid: null,
              department_regions: [],
              sun_vector: null,
              rooms: [],
              unplaced_rooms: []
            }
          ],
          // Step 07 — which floor the canvas is showing. Clamped to
          // [0, floors.length - 1] after any add/remove.
          active_floor_index: 0,
          total_score: null,
          program_fit_report: null,
          unplaced_rooms: [],
          // Step 04 — set true when user edits footprint/program_inputs/
          // building_type out from under a plan. Cleared on next successful
          // generate. Non-blocking warning chip.
          stale: false
        },
        warnings: [],
        sessions: [],
        // v1 — Phase 1. Confidence scoring scaffolding. weights default to the
        // 5-way split the Stage D scorer uses; threshold controls the
        // low_confidence chip + red-outline logic. total_score/floor_scores/
        // room_scores are populated by Stage D.
        confidence: {
          weights: {
            program_fit: 0.25,
            daylight: 0.25,
            adjacency: 0.15,
            lock_preservation: 0.20,
            circulation_quality: 0.15
          },
          threshold: 0.55,
          total_score: null,
          floor_scores: [],
          room_scores: [],
          below_threshold: false
        },
        // v1 — Phase 1. Program driver inputs. Kept in sync with
        // context.program.program_inputs (which is what the engine has always
        // read). UI writes to context.program.program_inputs; we copy here on
        // generate so the bundle exporter and the spec-mandated root-level
        // field both see the same data.
        program_inputs: {},
        // v1 — Phase 1. Typed event log per session.
        session: {
          id: null,
          started_at: null,
          ended_at: null,
          events: [],
          derived_signals: null,
          ab_history: []
        },
        // v1 — Phase 1. A/B candidate pair (regenerate modal).
        candidate_plans: {
          current: null,
          candidate: null,
          diff_summary: null
        }
      };
    }

    function isPlainObject(x) {
      return x !== null && typeof x === "object" && !Array.isArray(x);
    }

    function validateProject(p) {
      const errors = [];
      const warnings = [];

      if (!isPlainObject(p)) {
        return { ok: false, errors: ["project must be an object"], warnings: [] };
      }

      if (p.schema_version !== "2.1-party") {
        errors.push("schema_version must be 2.1-party");
      }
      if (typeof p.project_id !== "string" || p.project_id.length === 0) {
        errors.push("project_id must be a non-empty string");
      }

      if (!isPlainObject(p.context)) {
        errors.push("context must be an object");
      }
      if (!isPlainObject(p.weights)) {
        errors.push("weights must be an object");
      }
      if (!isPlainObject(p.code_limits)) {
        errors.push("code_limits must be an object");
      }
      if (!isPlainObject(p.current_plan)) {
        errors.push("current_plan must be an object");
      }
      if (!Array.isArray(p.warnings)) {
        errors.push("warnings must be an array");
      }
      if (!Array.isArray(p.sessions)) {
        errors.push("sessions must be an array");
      }

      const weightKeys = ["daylight", "adjacency", "compactness", "circulation", "facade"];
      if (isPlainObject(p.weights)) {
        for (const k of weightKeys) {
          if (!(k in p.weights)) {
            errors.push("weights missing key: " + k);
          }
        }
        const allPresent = weightKeys.every(k => typeof p.weights[k] === "number");
        if (allPresent) {
          const sum = weightKeys.reduce((acc, k) => acc + p.weights[k], 0);
          if (Math.abs(sum - 1.0) > 0.01) {
            warnings.push("weights do not sum to 1.0 ± 0.01 (got " + sum.toFixed(3) + ")");
          }
        }
      }

      if (
        isPlainObject(p.context) &&
        isPlainObject(p.context.footprint) &&
        Array.isArray(p.context.footprint.polygon) &&
        p.context.footprint.polygon.length === 0
      ) {
        warnings.push("footprint polygon is empty");
      }

      if (
        isPlainObject(p.context) &&
        isPlainObject(p.context.program) &&
        p.context.program.building_type === null
      ) {
        warnings.push("building_type not set");
      }

      // Step 07 — validate every floor (Step 03 only validated floors[0]).
      // Errors are still warning-level (pre-generate state is legitimate).
      if (isPlainObject(p.current_plan) && Array.isArray(p.current_plan.floors)) {
        p.current_plan.floors.forEach((fl, fi) => {
          if (!isPlainObject(fl)) return;
          const tag = "floors[" + fi + "]";
          if (isPlainObject(fl.grid)) {
            const g = fl.grid;
            if (!(typeof g.cell_size_ft === "number" && g.cell_size_ft > 0)) {
              warnings.push(tag + ".grid.cell_size_ft must be > 0");
            }
            if (!(typeof g.origin_x === "number")) {
              warnings.push(tag + ".grid.origin_x missing");
            }
            if (!(typeof g.origin_y === "number")) {
              warnings.push(tag + ".grid.origin_y missing");
            }
            if (!(typeof g.width_cells === "number" && g.width_cells >= 1)) {
              warnings.push(tag + ".grid.width_cells must be >= 1");
            }
            if (!(typeof g.height_cells === "number" && g.height_cells >= 1)) {
              warnings.push(tag + ".grid.height_cells must be >= 1");
            }
            if (!Array.isArray(g.inside) ||
                g.inside.length !== (g.height_cells | 0) ||
                (g.inside[0] && g.inside[0].length !== (g.width_cells | 0))) {
              warnings.push(tag + ".grid.inside must be a [height_cells][width_cells] 2D array");
            }
          }
          if (Array.isArray(fl.department_regions)) {
            const allowed = new Set(["high", "medium", "low"]);
            fl.department_regions.forEach((r, i) => {
              if (!isPlainObject(r)) {
                warnings.push(tag + ".department_regions[" + i + "] must be an object");
                return;
              }
              if (typeof r.id !== "string" || r.id.length === 0) {
                warnings.push(tag + ".department_regions[" + i + "].id must be a non-empty string");
              }
              if (typeof r.name !== "string" || r.name.length === 0) {
                warnings.push(tag + ".department_regions[" + i + "].name must be a non-empty string");
              }
              if (!allowed.has(r.daylight_priority)) {
                warnings.push(tag + ".department_regions[" + i + "].daylight_priority must be high|medium|low");
              }
              if (!Array.isArray(r.cells)) {
                warnings.push(tag + ".department_regions[" + i + "].cells must be an array");
              }
            });
          }
          if (Array.isArray(fl.rooms) && fl.rooms.length > 0) {
            fl.rooms.forEach((r, i) => {
              if (!isPlainObject(r)) {
                warnings.push(tag + ".rooms[" + i + "] must be an object");
                return;
              }
              if (typeof r.instance_id !== "string" || r.instance_id.length === 0) {
                warnings.push(tag + ".rooms[" + i + "].instance_id must be a non-empty string");
              }
              if (typeof r.type !== "string" || r.type.length === 0) {
                warnings.push(tag + ".rooms[" + i + "].type must be a non-empty string");
              }
              if (typeof r.department_id !== "string" || r.department_id.length === 0) {
                warnings.push(tag + ".rooms[" + i + "].department_id must be a non-empty string");
              }
              if (!Array.isArray(r.cells)) {
                warnings.push(tag + ".rooms[" + i + "].cells must be an array");
              }
              if (!Number.isFinite(Number(r.area_sf))) {
                warnings.push(tag + ".rooms[" + i + "].area_sf must be a number");
              }
              if (Number.isFinite(Number(r.max_aspect_ratio)) &&
                  Number(r.max_aspect_ratio) > 0 &&
                  r.bbox_cells && typeof r.bbox_cells === "object") {
                const w = (Number(r.bbox_cells.u_max) - Number(r.bbox_cells.u_min) + 1);
                const h = (Number(r.bbox_cells.v_max) - Number(r.bbox_cells.v_min) + 1);
                if (w >= 1 && h >= 1) {
                  const ar = Math.max(w, h) / Math.min(w, h);
                  if (ar > Number(r.max_aspect_ratio) + 0.001) {
                    warnings.push(tag + ".rooms[" + i + "] aspect " +
                      ar.toFixed(2) + " exceeds max_aspect_ratio " +
                      Number(r.max_aspect_ratio).toFixed(2));
                  }
                }
              }
            });
          }
        });
        // Step 07 — active_floor_index sanity check.
        if (p.current_plan.active_floor_index !== undefined) {
          const idx = Number(p.current_plan.active_floor_index);
          if (!Number.isInteger(idx) || idx < 0 || idx >= p.current_plan.floors.length) {
            warnings.push("active_floor_index out of range");
          }
        }
      }

      // Step 04: program_inputs must be numeric where present.
      if (isPlainObject(p.context) && isPlainObject(p.context.program) &&
          isPlainObject(p.context.program.program_inputs)) {
        for (const [k, v] of Object.entries(p.context.program.program_inputs)) {
          if (v !== null && v !== undefined && !Number.isFinite(Number(v))) {
            warnings.push("program_inputs." + k + " must be numeric (got " +
              (typeof v) + ")");
          }
        }
      }

      // v1 — Phase 1 validator additions.
      if (isPlainObject(p.confidence)) {
        const cw = p.confidence.weights;
        const cwKeys = ["program_fit","daylight","adjacency","lock_preservation","circulation_quality"];
        if (isPlainObject(cw)) {
          const allPresent = cwKeys.every(k => typeof cw[k] === "number");
          if (!allPresent) {
            warnings.push("confidence.weights missing one of program_fit/daylight/adjacency/lock_preservation/circulation_quality");
          } else {
            const sum = cwKeys.reduce((acc, k) => acc + Number(cw[k]), 0);
            if (Math.abs(sum - 1.0) > 0.02) {
              warnings.push("confidence.weights do not sum to 1.0 ± 0.02 (got " + sum.toFixed(3) + ")");
            }
          }
        }
        if (p.confidence.total_score !== null && p.confidence.total_score !== undefined) {
          const ts = Number(p.confidence.total_score);
          if (!Number.isFinite(ts) || ts < 0 || ts > 1) {
            warnings.push("confidence.total_score out of [0,1]");
          }
        }
      }
      if (isPlainObject(p.session) && Array.isArray(p.session.events)) {
        p.session.events.forEach((ev, i) => {
          if (!isPlainObject(ev) ||
              typeof ev.type !== "string" || !ev.type ||
              typeof ev.timestamp !== "string" || !ev.timestamp ||
              !("payload" in ev)) {
            warnings.push("session.events[" + i + "] missing type/timestamp/payload");
          }
        });
      }

      // Mirror structured project.warnings into the chip row so engine-raised
      // warnings (e.g., overflow) show up alongside validator warnings.
      if (Array.isArray(p.warnings)) {
        for (const w of p.warnings) {
          if (typeof w === "string" && w.length > 0) {
            warnings.push(w);
          } else if (isPlainObject(w) && typeof w.message === "string") {
            warnings.push(w.message);
          }
        }
      }

      return { ok: errors.length === 0, errors, warnings };
    }

    function migrateFromV13(legacy) {
      // TODO Step 01.5 — real v13 migration once we decide whether v13 files
      // need to round-trip into this sandbox at all. For now: log and return null.
      console.warn("migrateFromV13: not implemented in Step 01");
      return null;
    }

    // ============================================================
    // SECTION 02 — PERSISTENCE
    // localStorage autosave + .calvey-party.json import/export
    // ============================================================

    const LS_KEY = "calvey_party_2_project";

    function loadFromLocalStorage() {
      try {
        const raw = localStorage.getItem(LS_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        return upgradeProject(parsed);
      } catch (e) {
        console.debug("loadFromLocalStorage: parse error", e);
        return null;
      }
    }

    // v1 — Phase 1. Non-destructive upgrade of older projects so they gain
    // the new confidence / session / candidate_plans / program_inputs fields
    // with safe defaults. Existing data preserved.
    function upgradeProject(p) {
      if (!isPlainObject(p)) return p;
      if (!isPlainObject(p.confidence)) {
        p.confidence = {
          weights: {
            program_fit: 0.25,
            daylight: 0.25,
            adjacency: 0.15,
            lock_preservation: 0.20,
            circulation_quality: 0.15
          },
          threshold: 0.55,
          total_score: null,
          floor_scores: [],
          room_scores: [],
          below_threshold: false
        };
      } else {
        if (!isPlainObject(p.confidence.weights)) {
          p.confidence.weights = {
            program_fit: 0.25,
            daylight: 0.25,
            adjacency: 0.15,
            lock_preservation: 0.20,
            circulation_quality: 0.15
          };
        }
        if (typeof p.confidence.threshold !== "number") p.confidence.threshold = 0.55;
        if (!("total_score" in p.confidence)) p.confidence.total_score = null;
        if (!Array.isArray(p.confidence.floor_scores)) p.confidence.floor_scores = [];
        if (!Array.isArray(p.confidence.room_scores)) p.confidence.room_scores = [];
        if (!("below_threshold" in p.confidence)) p.confidence.below_threshold = false;
      }
      if (!isPlainObject(p.session)) {
        p.session = {
          id: null, started_at: null, ended_at: null,
          events: [], derived_signals: null, ab_history: []
        };
      } else {
        if (!Array.isArray(p.session.events)) p.session.events = [];
        if (!Array.isArray(p.session.ab_history)) p.session.ab_history = [];
        if (!("derived_signals" in p.session)) p.session.derived_signals = null;
      }
      if (!isPlainObject(p.candidate_plans)) {
        p.candidate_plans = { current: null, candidate: null, diff_summary: null };
      }
      if (!isPlainObject(p.program_inputs)) p.program_inputs = {};
      return p;
    }

    function saveToLocalStorage(project) {
      try {
        project.updated_at = new Date().toISOString();
        localStorage.setItem(LS_KEY, JSON.stringify(project));
      } catch (e) {
        console.debug("saveToLocalStorage: write error (likely quota)", e);
      }
    }

    function downloadProjectFile(project) {
      const blob = new Blob([JSON.stringify(project, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = project.project_id + ".calvey-party.json";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function uploadProjectFile(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onerror = () => reject(new Error("Could not read file"));
        reader.onload = () => {
          let parsed;
          try {
            parsed = JSON.parse(reader.result);
          } catch (e) {
            reject(new Error("Could not parse JSON: " + e.message));
            return;
          }
          const upgraded = upgradeProject(parsed);
          const v = validateProject(upgraded);
          if (!v.ok) {
            reject(new Error("Invalid project file: " + v.errors.join("; ")));
            return;
          }
          resolve(upgraded);
        };
        reader.readAsText(file);
      });
    }

    // ============================================================
    // SECTION 03 — SESSIONS (v1 — Phase 7)
    // Typed event log, session start/end, derived signals.
    // ============================================================

    const EVENT_TYPES = [
      "SESSION_START",
      "GENERATE",
      "REGENERATE",
      "LOCK",
      "UNLOCK",
      "DRAG_ROOM",
      "REPROPORTION",
      "CROSS_FLOOR_DRAG",
      "REMOVE_LOCKED_FLOOR",
      "SELECT_AB_VARIANT",
      "WEIGHTS_CHANGED",
      "PROGRAM_INPUTS_CHANGED",
      "SESSION_END"
    ];

    function nowIso() { return new Date().toISOString(); }

    // Mutates project.session.events.push with a typed event. Unknown types
    // console.warn and no-op.
    function logEvent(project, type, payload) {
      if (!isPlainObject(project)) return project;
      if (!EVENT_TYPES.includes(type)) {
        console.warn("logEvent: unknown type", type);
        return project;
      }
      if (!isPlainObject(project.session)) {
        project.session = {
          id: null, started_at: null, ended_at: null,
          events: [], derived_signals: null, ab_history: []
        };
      }
      if (!Array.isArray(project.session.events)) project.session.events = [];
      project.session.events.push({
        type,
        timestamp: nowIso(),
        payload: isPlainObject(payload) ? payload : {}
      });
      return project;
    }

    // Initialize a new session (new id, new event log). Does not clear plan.
    function startSession(project) {
      if (!isPlainObject(project)) return project;
      const id = (typeof crypto !== "undefined" && typeof crypto.randomUUID === "function")
        ? crypto.randomUUID()
        : ("s-" + Math.random().toString(36).slice(2, 10));
      project.session = {
        id,
        started_at: nowIso(),
        ended_at: null,
        events: [{
          type: "SESSION_START",
          timestamp: nowIso(),
          payload: {
            project_id: project.project_id || null,
            building_type: (project.context && project.context.program)
              ? project.context.program.building_type : null
          }
        }],
        derived_signals: null,
        ab_history: Array.isArray(project.session && project.session.ab_history)
          ? project.session.ab_history : []
      };
      return project;
    }

    function deriveSessionSignals(session) {
      if (!isPlainObject(session)) return null;
      const events = Array.isArray(session.events) ? session.events : [];
      const typeCounts = {};
      const lockReasons = {};
      const floorActivity = {};
      for (const ev of events) {
        if (!isPlainObject(ev)) continue;
        typeCounts[ev.type] = (typeCounts[ev.type] || 0) + 1;
        if (ev.type === "LOCK" && ev.payload && ev.payload.reason) {
          lockReasons[ev.payload.reason] = (lockReasons[ev.payload.reason] || 0) + 1;
        }
        const fl = ev.payload && (ev.payload.floor_level ??
                                   ev.payload.from_floor ??
                                   ev.payload.to_floor);
        if (fl != null) {
          floorActivity[fl] = (floorActivity[fl] || 0) + 1;
        }
      }
      const duration_ms = (session.started_at && session.ended_at)
        ? (new Date(session.ended_at).getTime() - new Date(session.started_at).getTime())
        : null;
      let abA = 0, abB = 0;
      for (const ev of events) {
        if (ev && ev.type === "SELECT_AB_VARIANT" && ev.payload) {
          if (ev.payload.chosen === "A") abA++;
          else if (ev.payload.chosen === "B") abB++;
        }
      }
      let mostActive = null;
      let mostCount = -1;
      for (const [fl, c] of Object.entries(floorActivity)) {
        if (c > mostCount) { mostCount = c; mostActive = fl; }
      }
      return {
        duration_ms,
        generate_count: typeCounts.GENERATE || 0,
        regenerate_count: typeCounts.REGENERATE || 0,
        lock_count: typeCounts.LOCK || 0,
        unlock_count: typeCounts.UNLOCK || 0,
        drag_count: typeCounts.DRAG_ROOM || 0,
        cross_floor_move_count: typeCounts.CROSS_FLOOR_DRAG || 0,
        reproportion_count: typeCounts.REPROPORTION || 0,
        ab_a_count: abA,
        ab_b_count: abB,
        lock_reasons_breakdown: lockReasons,
        most_active_floor: mostActive
      };
    }

    function endSession(project) {
      if (!isPlainObject(project) || !isPlainObject(project.session)) return project;
      if (!project.session.started_at) return project;
      project.session.ended_at = nowIso();
      project.session.events.push({
        type: "SESSION_END",
        timestamp: nowIso(),
        payload: {
          duration_ms: project.session.started_at
            ? (new Date(project.session.ended_at).getTime() -
               new Date(project.session.started_at).getTime())
            : null
        }
      });
      const derived = deriveSessionSignals(project.session);
      if (derived && isPlainObject(project.confidence)) {
        derived.final_confidence = project.confidence.total_score;
      }
      project.session.derived_signals = derived;
      return project;
    }

    // ============================================================
    // SECTION 04 — ENGINE
    // Step 03: grid substrate, sun vector, Stage A department zoning.
    // Step 06 will add Stage C/D (adjacency repair, confidence).
    // ============================================================

    // ---------- Grid substrate ----------

    // Ray-cast point-in-polygon. Odd crossing count → inside.
    function pointInPolygon(polygon, x, y) {
      if (!Array.isArray(polygon) || polygon.length < 3) return false;
      let inside = false;
      for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
        const pi = polygon[i], pj = polygon[j];
        if (!Array.isArray(pi) || !Array.isArray(pj)) continue;
        const xi = Number(pi[0]), yi = Number(pi[1]);
        const xj = Number(pj[0]), yj = Number(pj[1]);
        if (!Number.isFinite(xi) || !Number.isFinite(yi)) continue;
        if (!Number.isFinite(xj) || !Number.isFinite(yj)) continue;
        const intersects =
          (yi > y) !== (yj > y) &&
          x < ((xj - xi) * (y - yi)) / (yj - yi) + xi;
        if (intersects) inside = !inside;
      }
      return inside;
    }

    // Default cell size is 5 ft; bumps to 10 ft on large footprints to keep the
    // cell count tractable. Step 08 will expose this as a slider.
    function chooseCellSize(polygon) {
      const area = computePolygonAreaSF(polygon);
      return area > 50000 ? 10 : 5;
    }

    function buildGrid(polygon, cellSizeFt) {
      const cs = cellSizeFt > 0 ? cellSizeFt : 5;
      const { minX, minY, maxX, maxY } = computePolygonBounds(polygon);
      const width_cells = Math.max(1, Math.ceil((maxX - minX) / cs));
      const height_cells = Math.max(1, Math.ceil((maxY - minY) / cs));
      const inside = new Array(height_cells);
      for (let v = 0; v < height_cells; v++) {
        const row = new Array(width_cells);
        const cy = minY + (v + 0.5) * cs;
        for (let u = 0; u < width_cells; u++) {
          const cx = minX + (u + 0.5) * cs;
          row[u] = pointInPolygon(polygon, cx, cy);
        }
        inside[v] = row;
      }
      return {
        cell_size_ft: cs,
        origin_x: minX,
        origin_y: minY,
        width_cells,
        height_cells,
        inside
      };
    }

    function cellCenter(grid, u, v) {
      return [
        grid.origin_x + (u + 0.5) * grid.cell_size_ft,
        grid.origin_y + (v + 0.5) * grid.cell_size_ft
      ];
    }

    // ---------- Sun vector ----------

    // Returns the direction of true south and true north in the project's LOCAL
    // coordinate frame. Local +Y points north when true_north_deg === 0; nonzero
    // values rotate the polygon clockwise relative to true north.
    //   north_x = sin(true_north_deg), north_y = cos(true_north_deg).
    // lat is captured for forward compatibility; Step 03 does not use it.
    function computeSunVector(trueNorthDeg, _lat) {
      const rad = (Number(trueNorthDeg) || 0) * Math.PI / 180;
      const north_x = Math.sin(rad);
      const north_y = Math.cos(rad);
      return {
        north_x,
        north_y,
        south_x: -north_x,
        south_y: -north_y
      };
    }

    // ---------- Daylight priority normalization ----------

    const DAYLIGHT_RANK = { high: 3, medium: 2, low: 1 };

    // Input data uses "High"|"Medium"|"Low"|"None"; normalize to lowercase and
    // collapse "none" → "low" since Stage A has no weaker tier.
    function normalizeDaylightPriority(raw) {
      if (raw == null) return "medium";
      const s = String(raw).toLowerCase().trim();
      if (s === "high") return "high";
      if (s === "medium") return "medium";
      if (s === "low") return "low";
      if (s === "none") return "low";
      return "medium";
    }

    function maxDaylight(a, b) {
      return (DAYLIGHT_RANK[a] || 0) >= (DAYLIGHT_RANK[b] || 0) ? a : b;
    }

    function toTitleCase(s) {
      if (!s) return "";
      return String(s)
        .replace(/[_\/]+/g, " ")
        .split(/\s+/)
        .filter(Boolean)
        .map(w => w[0].toUpperCase() + w.slice(1).toLowerCase())
        .join(" ");
    }

    function slugify(s) {
      return String(s || "").toLowerCase().replace(/[^a-z0-9]+/g, "_").replace(/^_+|_+$/g, "");
    }

    // ---------- Room / department extraction ----------

    // Shape B adapter: the CALVEY_PROGRAM databases have no top-level
    // `departments` array — each space_library entry carries
    // `parti.department_group` (preferred) or `category` (fallback).
    function deptKeyForSpace(space) {
      if (isPlainObject(space) && isPlainObject(space.parti) &&
          typeof space.parti.department_group === "string" &&
          space.parti.department_group.length > 0) {
        return space.parti.department_group;
      }
      if (isPlainObject(space) && typeof space.category === "string" && space.category.length > 0) {
        return space.category.split("/")[0];
      }
      return "Unassigned";
    }

    // ---------- Step 04 — program_inputs seeding ----------

    // Accept either a number or [min, max] range; return midpoint when a range.
    function midpoint(v) {
      if (Array.isArray(v) && v.length === 2 &&
          Number.isFinite(Number(v[0])) && Number.isFinite(Number(v[1]))) {
        return (Number(v[0]) + Number(v[1])) / 2;
      }
      if (Number.isFinite(Number(v))) return Number(v);
      return null;
    }

    // Seed program_inputs (in place) from buildingTypeJson.subtypes[0].
    // Only fills *absent* keys — user edits survive subsequent generates.
    // Also scans the space_library to discover driver_keys so program_inputs
    // has a slot for every field the packer might read.
    function seedProgramInputs(programInputs, buildingTypeJson) {
      if (!isPlainObject(programInputs)) programInputs = {};
      const bt = isPlainObject(buildingTypeJson) ? buildingTypeJson : {};
      const subtypes = Array.isArray(bt.subtypes) ? bt.subtypes : [];
      const s0 = subtypes.length > 0 && isPlainObject(subtypes[0]) ? subtypes[0] : null;

      if (!s0) {
        console.debug("seedProgramInputs: no subtypes[0] found, seeding 0s");
      }

      // Core demographic keys. student_count / staff_count come straight from
      // subtypes; occupant_count falls out of student+staff unless explicit.
      const student = s0 ? midpoint(s0.student_count_typical) : null;
      const staff = s0 ? midpoint(s0.staff_count_typical) : null;
      if (!("student_count" in programInputs)) {
        programInputs.student_count = (student != null) ? Math.round(student) : 0;
      }
      if (!("staff_count" in programInputs)) {
        programInputs.staff_count = (staff != null) ? Math.round(staff) : 0;
      }
      if (!("students" in programInputs)) {
        // The DB uses "students" as the driver_key verbatim; mirror that.
        programInputs.students = Number(programInputs.student_count) || 0;
      }
      if (!("occupant_count" in programInputs)) {
        const s = Number(programInputs.student_count) || 0;
        const st = Number(programInputs.staff_count) || 0;
        programInputs.occupant_count = s + st;
      }
      if (!("floor_count" in programInputs)) {
        programInputs.floor_count = 1;  // Step 04 is single-floor; Step 07 owns multi.
      }
      if (!("unit_count" in programInputs)) {
        // residential-style; 0 signals "not applicable" for non-residential.
        programInputs.unit_count = 0;
      }

      // Discover other driver_keys referenced in space_library.scaling so the
      // user sees them in program_inputs and can edit them in the JSON viewer.
      if (Array.isArray(bt.space_library)) {
        for (const sp of bt.space_library) {
          if (!isPlainObject(sp)) continue;
          const sc = isPlainObject(sp.scaling) ? sp.scaling : {};
          const dk = sc.driver_key;
          if (typeof dk === "string" && dk.length > 0 && !(dk in programInputs)) {
            programInputs[dk] = 0;
          }
        }
      }

      return programInputs;
    }

    // ---------- Step 04 — count_rule resolution ----------

    // Pick the numeric value of the driver for a given template. Falls back
    // across common aliases so a template with driver_key="students" still
    // resolves when user entered "student_count" in program_inputs, and v.v.
    function readDriverValue(programInputs, driverKey, fallbackDefaultKey) {
      if (!isPlainObject(programInputs)) return 0;
      const tryKey = (k) => (k && Number.isFinite(Number(programInputs[k])))
        ? Number(programInputs[k]) : null;
      let v = tryKey(driverKey);
      if (v != null) return v;
      // Common aliases.
      if (driverKey === "students") {
        v = tryKey("student_count"); if (v != null) return v;
      }
      if (driverKey === "student_count") {
        v = tryKey("students"); if (v != null) return v;
      }
      if (driverKey === "occupants") {
        v = tryKey("occupant_count"); if (v != null) return v;
      }
      if (fallbackDefaultKey) {
        v = tryKey(fallbackDefaultKey); if (v != null) return v;
      }
      return 0;
    }

    // Look up a count from step_thresholds given a driver value.
    // Supports both {driver_min, driver_max, count} (actual K-12 format) and
    // {threshold, count} (spec's simpler format).
    function countFromStepThresholds(thresholds, driverValue) {
      if (!Array.isArray(thresholds) || thresholds.length === 0) return null;
      const dv = Number(driverValue) || 0;
      // Range format: find the bucket whose [driver_min, driver_max] contains dv.
      if (thresholds.every(t => isPlainObject(t) &&
          Number.isFinite(Number(t.driver_min)) &&
          Number.isFinite(Number(t.driver_max)))) {
        for (const t of thresholds) {
          if (dv >= Number(t.driver_min) && dv <= Number(t.driver_max)) {
            return Math.max(0, Math.round(Number(t.count) || 0));
          }
        }
        // dv past the last bucket → use the largest bucket's count.
        const last = thresholds[thresholds.length - 1];
        return Math.max(0, Math.round(Number(last.count) || 0));
      }
      // Simple threshold format: largest threshold <= dv wins.
      let chosen = null;
      for (const t of thresholds) {
        if (!isPlainObject(t)) continue;
        const th = Number(t.threshold);
        if (Number.isFinite(th) && th <= dv) {
          if (!chosen || Number(chosen.threshold) < th) chosen = t;
        }
      }
      if (chosen) return Math.max(0, Math.round(Number(chosen.count) || 0));
      return null;
    }

    // Resolve a template's count_rule into a concrete instance count.
    // Clamps to [0, 500] to guard against typo'd coefficients. Returns the
    // integer count plus a `ruleApplied` string for digest bookkeeping.
    function resolveCountForTemplate(space, programInputs, floorCount) {
      const cr = typeof space.count_rule === "string" ? space.count_rule : null;
      const scaling = isPlainObject(space.scaling) ? space.scaling : {};
      const fc = Math.max(1, Math.floor(Number(floorCount) || 1));

      let count = 1;
      let rule = cr || "unknown";

      switch (cr) {
        case "one_per_building":
          count = 1;
          break;

        case "one_per_floor":
          count = fc;
          break;

        case "per_driver": {
          const dv = readDriverValue(programInputs, scaling.driver_key, null);
          const st = countFromStepThresholds(scaling.step_thresholds, dv);
          if (st != null) {
            count = st;
          } else if (Number.isFinite(Number(scaling.coefficient)) &&
                     Number(scaling.coefficient) > 0 &&
                     Number(scaling.coefficient) < 1) {
            // count-ish coefficient (e.g. "rooms per student" = 0.03)
            count = Math.max(1, Math.ceil(dv * Number(scaling.coefficient)));
          } else if (!scaling.driver_key) {
            count = 1;
            rule = "per_driver_no_key";
          } else if (!Number.isFinite(Number(programInputs[scaling.driver_key]))) {
            count = 1;
            rule = "unknown_driver";
          } else {
            // No step_thresholds, no count-like coefficient → fall back to
            // one-per-25 driver units as a rough sizing. Clamp at 1.
            count = Math.max(1, Math.ceil(dv / 25));
          }
          break;
        }

        case "per_occupant": {
          const dv = readDriverValue(programInputs,
            scaling.driver_key || "occupant_count", "occupant_count");
          const st = countFromStepThresholds(scaling.step_thresholds, dv);
          if (st != null) {
            count = st;
          } else if (Number.isFinite(Number(scaling.coefficient)) &&
                     Number(scaling.coefficient) > 0 &&
                     Number(scaling.coefficient) < 1) {
            count = Math.max(1, Math.ceil(dv * Number(scaling.coefficient)));
          } else {
            // K-12 toilets has coef=37.4 (SF/occupant, not count multiplier).
            // Rather than spam the plan with 500 toilets, treat as 1 cluster.
            count = 1;
            rule = "per_occupant_area_scale";
          }
          break;
        }

        case "unit_count": {
          const uc = Number(programInputs && programInputs.unit_count);
          count = Number.isFinite(uc) && uc > 0 ? Math.floor(uc) : 1;
          break;
        }

        case "fixed": {
          const fx = Number(scaling.fixed_count);
          count = Number.isFinite(fx) && fx > 0 ? Math.floor(fx) : 1;
          break;
        }

        case "step_thresholds": {
          const dv = readDriverValue(programInputs, scaling.driver_key, "students");
          const st = countFromStepThresholds(scaling.step_thresholds, dv);
          count = (st != null) ? st : 1;
          break;
        }

        default: {
          // Unknown or missing count_rule — default to 1, let the user notice.
          count = 1;
          rule = cr ? ("unknown:" + cr) : "unknown";
          console.debug("resolveRoomCounts: unknown count_rule for",
            space.id || "(unnamed)", "→", cr);
        }
      }

      // Clamp: a typo'd coefficient shouldn't be able to crash the packer.
      if (!Number.isFinite(count) || count < 0) count = 0;
      if (count > 500) count = 500;
      return { count: Math.floor(count), ruleApplied: rule };
    }

    // Build a flat array of room instances from a space_library, applying
    // count_rule to each template. Returns { instances, digest }.
    function resolveRoomCounts(spaceLibrary, programInputs, _subtypes, floorCount) {
      const digest = {
        total_templates: 0,
        total_instances: 0,
        rules_applied: {
          one_per_building: 0, one_per_floor: 0,
          per_driver: 0, per_occupant: 0,
          unit_count: 0, fixed: 0, step_thresholds: 0,
          unknown_driver: 0, unknown: 0
        },
        program_inputs_used: isPlainObject(programInputs) ? { ...programInputs } : {},
        gross_over_net_used: GROSS_TO_NET_DEFAULT
      };
      const instances = [];
      if (!Array.isArray(spaceLibrary)) return { instances, digest };

      let partiPathCount = 0;
      let areaPathCount = 0;

      for (const space of spaceLibrary) {
        if (!isPlainObject(space)) continue;
        digest.total_templates += 1;
        const resolved = resolveCountForTemplate(space, programInputs, floorCount);
        const n = resolved.count;

        // Digest bookkeeping: bucketize into the known cells; stash unknowns.
        if (digest.rules_applied[resolved.ruleApplied] !== undefined) {
          digest.rules_applied[resolved.ruleApplied] += 1;
        } else if (resolved.ruleApplied &&
                   resolved.ruleApplied.startsWith("unknown")) {
          digest.rules_applied.unknown += 1;
        } else {
          // rule-variant buckets (e.g. per_occupant_area_scale) fold into
          // their base count_rule bucket for the digest.
          const base = resolved.ruleApplied.split("_")[0] + "_" +
                       resolved.ruleApplied.split("_")[1];
          if (digest.rules_applied[base] !== undefined) {
            digest.rules_applied[base] += 1;
          }
        }

        // Build N identical instances for this template.
        const deptKey = deptKeyForSpace(space);
        const dims = isPlainObject(space.dimensions_ft) ? space.dimensions_ft : {};
        const parti = isPlainObject(space.parti) ? space.parti : {};

        const targetArea = Number.isFinite(Number(dims.typical_area_sf))
          ? Number(dims.typical_area_sf)
          : (Array.isArray(space.nsf_range) && space.nsf_range.length === 2
              ? (Number(space.nsf_range[0]) + Number(space.nsf_range[1])) / 2
              : 0);

        // Refinement 4 — prefer parti.parti_area_cells when present/positive.
        const partiCells = Number.isFinite(Number(parti.parti_area_cells)) &&
                           Number(parti.parti_area_cells) > 0
          ? Math.floor(Number(parti.parti_area_cells)) : null;
        if (partiCells !== null) partiPathCount++; else areaPathCount++;

        // Refinement 2 — prefer parti.min_*_cells when present; else convert
        // ft to cells at runtime (Stage B knows cell_size).
        const minWidthCells = Number.isFinite(Number(parti.min_width_cells))
          ? Math.max(1, Math.floor(Number(parti.min_width_cells)))
          : null;
        const minDepthCells = Number.isFinite(Number(parti.min_depth_cells))
          ? Math.max(1, Math.floor(Number(parti.min_depth_cells)))
          : null;

        // Legacy ft-based min_width/length, still plumbed for Stage B fallback.
        const minWidthFt = Number.isFinite(Number(space.min_width_ft))
          ? Number(space.min_width_ft)
          : (Number.isFinite(Number(dims.min_width)) ? Number(dims.min_width) : null);
        const minLengthFt = Number.isFinite(Number(space.min_depth_ft))
          ? Number(space.min_depth_ft)
          : (Number.isFinite(Number(dims.min_depth)) ? Number(dims.min_depth) : null);

        // Refinement 3 — max_aspect_ratio as hard ceiling. Take from parti
        // first, then the top-level field, then a conservative default. Core
        // and corridor-named templates get a loose default (they are linear).
        let maxAspect = null;
        if (Number.isFinite(Number(parti.max_aspect_ratio)) &&
            Number(parti.max_aspect_ratio) > 0) {
          maxAspect = Number(parti.max_aspect_ratio);
        } else if (Number.isFinite(Number(space.max_aspect_ratio)) &&
                   Number(space.max_aspect_ratio) > 0) {
          maxAspect = Number(space.max_aspect_ratio);
        } else {
          const isCore = (typeof parti.department_group === "string" &&
                          parti.department_group.toLowerCase() === "core") ||
                         /corridor/i.test(String(space.name || space.id || ""));
          maxAspect = isCore ? 8.0 : 2.5;
        }

        // Refinement 5 — placement_zone: foh | boh | primary | support | core
        const placementZone =
          (typeof parti.placement_zone === "string" && parti.placement_zone.length > 0)
            ? parti.placement_zone.toLowerCase() : null;

        // Step 07 — stacking hints used by distributeInstancesToFloors.
        // stacking_preference is DB-free-form; normalized inside the
        // distributor. floor_priority + stack_group pass through verbatim.
        const stackingPreference =
          (typeof space.stacking_preference === "string" && space.stacking_preference.length > 0)
            ? space.stacking_preference : "Any";
        const floorPriority = Number.isFinite(Number(space.floor_priority))
          ? Number(space.floor_priority) : null;
        const stackGroup = (typeof space.stack_group === "string" && space.stack_group.length > 0)
          ? space.stack_group : null;

        const templateId = typeof space.id === "string"
          ? space.id : slugify(space.name || "room");
        const nameStr = typeof space.name === "string"
          ? space.name : (space.id || "Room");
        const deptSlug = slugify(deptKey);
        const deptName = toTitleCase(deptKey);
        const daylight = normalizeDaylightPriority(space.daylight_priority);

        // v1 — Phase 2. Carry adjacency declarations through to the placed
        // room so Stage C can read them without re-consulting the building
        // type JSON. Normalize to [{ template_id, weight, relationship }].
        const adjacenciesRaw = Array.isArray(space.adjacencies) ? space.adjacencies : [];
        const adjacencies = adjacenciesRaw
          .map(a => {
            if (!isPlainObject(a)) return null;
            const tid = a.space_id || a.template_id || a.id || null;
            if (!tid) return null;
            return {
              template_id: String(tid),
              weight: Number.isFinite(Number(a.weight)) ? Number(a.weight) : 0.5,
              relationship: typeof a.relationship === "string" ? a.relationship : "near"
            };
          })
          .filter(Boolean);
        const departmentGroup = (typeof parti.department_group === "string")
          ? parti.department_group.toLowerCase() : null;

        for (let k = 0; k < n; k++) {
          instances.push({
            // New (Step 04) canonical fields:
            template_id: templateId,
            instance_id: "r_" + deptSlug + "_" + templateId + "_" +
                         String(instances.length).padStart(4, "0"),
            department_id: deptSlug,
            department_name: deptName,
            placement_zone: placementZone,
            daylight_priority: daylight,
            target_area_sf: targetArea,
            parti_area_cells: partiCells,
            min_width_cells: minWidthCells,
            min_depth_cells: minDepthCells,
            max_aspect_ratio: maxAspect,

            // Step 07 — stacking hints. Read in distributeInstancesToFloors.
            stacking_preference: stackingPreference,
            floor_priority: floorPriority,
            stack_group: stackGroup,

            // Legacy (pre-Step 04) field mirrors — keep populated so
            // downstream Step 02/03 code (summary panel, departmentsFromRooms,
            // overflow warning, JSON viewer readers) continues working.
            id: templateId,
            name: nameStr,
            department: deptSlug,
            target_area: targetArea,
            min_width: minWidthFt,
            min_length: minLengthFt,
            count: 1,

            // Reserved for Stage B to populate during packing:
            cells: [],
            actual_area_sf: 0,
            bounds: null,
            locked: false,
            lock_reason: null,

            // v1 — Phase 2. Adjacency declarations + department_group for
            // Stage C / Stage D.
            adjacencies,
            department_group: departmentGroup
          });
        }
        digest.total_instances += n;
      }
      console.debug("resolveRoomCounts: partiCells path used for",
        partiPathCount, "templates;", areaPathCount, "fell back to target_area");
      return { instances, digest };
    }

    // Seed context.program.rooms from a building-type JSON's space_library.
    // Step 04 — wraps resolveRoomCounts so multi-instance templates expand
    // into one element per instance.
    function roomsFromBuildingType(buildingTypeJson, programInputs, floorCount) {
      if (!isPlainObject(buildingTypeJson) || !Array.isArray(buildingTypeJson.space_library)) {
        return { instances: [], digest: null };
      }
      return resolveRoomCounts(
        buildingTypeJson.space_library,
        programInputs || {},
        buildingTypeJson.subtypes,
        floorCount || 1
      );
    }

    // Aggregate rooms into departments with area_fraction and daylight_priority.
    function departmentsFromRooms(rooms) {
      if (!Array.isArray(rooms) || rooms.length === 0) return [];
      const groups = new Map();
      for (const r of rooms) {
        if (!isPlainObject(r)) continue;
        const key = typeof r.department === "string" && r.department.length > 0
          ? r.department
          : "unassigned";
        const name = typeof r.department_name === "string" && r.department_name.length > 0
          ? r.department_name
          : toTitleCase(key);
        const dp = normalizeDaylightPriority(r.daylight_priority);
        const area = Number.isFinite(Number(r.target_area)) ? Number(r.target_area) : 0;
        const count = Number.isFinite(Number(r.count)) && Number(r.count) > 0 ? Number(r.count) : 1;
        if (!groups.has(key)) {
          groups.set(key, { id: key, name, daylight_priority: dp, _area: 0 });
        }
        const g = groups.get(key);
        g.daylight_priority = maxDaylight(g.daylight_priority, dp);
        g._area += area * count;
      }
      const list = Array.from(groups.values());
      const total = list.reduce((s, g) => s + g._area, 0);
      if (total <= 0) {
        const equal = 1 / list.length;
        return list.map(g => ({
          id: g.id, name: g.name, daylight_priority: g.daylight_priority, area_fraction: equal
        }));
      }
      return list.map(g => ({
        id: g.id,
        name: g.name,
        daylight_priority: g.daylight_priority,
        area_fraction: g._area / total
      }));
    }

    // ---------- Stage A — seeded region growing ----------

    function runStageA(grid, sun, departments) {
      const W = grid.width_cells, H = grid.height_cells, inside = grid.inside;

      // Collect interior cells.
      const interior = [];
      for (let v = 0; v < H; v++) {
        for (let u = 0; u < W; u++) {
          if (inside[v][u]) interior.push([u, v]);
        }
      }
      const N = interior.length;

      const depts = Array.isArray(departments) ? departments : [];
      if (depts.length === 0 || N === 0) {
        return depts.map(d => ({
          id: d.id, name: d.name,
          daylight_priority: d.daylight_priority,
          cell_count: 0, area_sf: 0, cells: [], centroid: null
        }));
      }

      // Per-department target cell counts. Sum must equal N; adjust the
      // largest target to absorb rounding error.
      const targets = depts.map(d => Math.round(N * (d.area_fraction || 0)));
      let sumT = targets.reduce((a, b) => a + b, 0);
      if (sumT !== N) {
        let maxIdx = 0;
        for (let i = 1; i < targets.length; i++) {
          if (targets[i] > targets[maxIdx]) maxIdx = i;
        }
        targets[maxIdx] = Math.max(0, targets[maxIdx] + (N - sumT));
      }

      // Grid centroid (over interior cells).
      let gcx = 0, gcy = 0;
      for (const [u, v] of interior) {
        const [cx, cy] = cellCenter(grid, u, v);
        gcx += cx; gcy += cy;
      }
      gcx /= N; gcy /= N;

      // Score a cell for a given daylight priority.
      //   high   → max (projection on sun.south)    = south-most
      //   low    → max (projection on sun.north)    = north-most
      //   medium → min (distance to grid centroid)  = center
      function scoreCell(u, v, priority) {
        const [cx, cy] = cellCenter(grid, u, v);
        const dx = cx - gcx, dy = cy - gcy;
        if (priority === "high") return dx * sun.south_x + dy * sun.south_y;
        if (priority === "low")  return dx * sun.north_x + dy * sun.north_y;
        return -(dx * dx + dy * dy);
      }

      // Seed placement: higher-daylight-priority departments pick first, then
      // alphabetical by id to break ties deterministically.
      const seedOrder = depts.map((_, i) => i).sort((a, b) => {
        const ra = DAYLIGHT_RANK[depts[a].daylight_priority] || 0;
        const rb = DAYLIGHT_RANK[depts[b].daylight_priority] || 0;
        if (rb !== ra) return rb - ra;
        return String(depts[a].id).localeCompare(String(depts[b].id));
      });

      const claimed = new Map();  // "u,v" -> deptIndex
      const usedSeeds = new Set();
      const seeds = new Array(depts.length).fill(null);

      for (const di of seedOrder) {
        const priority = depts[di].daylight_priority;
        let bestIdx = -1, bestScore = -Infinity;
        for (let i = 0; i < interior.length; i++) {
          const [u, v] = interior[i];
          const key = u + "," + v;
          if (usedSeeds.has(key)) continue;
          const s = scoreCell(u, v, priority);
          if (s > bestScore) { bestScore = s; bestIdx = i; }
        }
        if (bestIdx < 0) continue;
        const [u, v] = interior[bestIdx];
        const key = u + "," + v;
        usedSeeds.add(key);
        claimed.set(key, di);
        seeds[di] = [u, v];
      }

      // BFS frontiers per department (arrays used as FIFO queues).
      const frontiers = depts.map(() => []);
      const cellCounts = depts.map(() => 0);
      for (let di = 0; di < depts.length; di++) {
        if (seeds[di]) { frontiers[di].push(seeds[di]); cellCounts[di] = 1; }
      }

      const inBounds = (u, v) => u >= 0 && u < W && v >= 0 && v < H;
      const isClaimable = (u, v) =>
        inBounds(u, v) && inside[v][u] && !claimed.has(u + "," + v);

      // Simultaneous BFS with rotating department order each round so smaller
      // departments aren't starved.
      let round = 0;
      const MAX_ROUNDS = N * depts.length + 10;  // safety cap
      while (round < MAX_ROUNDS) {
        let claimedThisRound = false;
        for (let k = 0; k < depts.length; k++) {
          const di = (k + round) % depts.length;
          if (cellCounts[di] >= targets[di]) continue;
          const q = frontiers[di];
          // Pop stale frontier cells (no claimable neighbors) until we find one
          // that can claim a neighbor this tick, or the queue is empty.
          while (q.length > 0) {
            const [u, v] = q[0];
            const neighbors = [[u + 1, v], [u - 1, v], [u, v + 1], [u, v - 1]];
            let picked = null;
            for (const n of neighbors) {
              if (isClaimable(n[0], n[1])) { picked = n; break; }
            }
            if (picked) {
              claimed.set(picked[0] + "," + picked[1], di);
              q.push(picked);
              cellCounts[di] += 1;
              claimedThisRound = true;
              break;
            } else {
              q.shift();
            }
          }
        }
        if (!claimedThisRound) break;
        round++;
      }

      // Any unclaimed interior cells (pockets isolated by concave geometry or
      // under-target departments) fall to the nearest claimed cell's department
      // by Manhattan distance; ties broken by dept id alphabetical order.
      const unclaimed = [];
      for (const [u, v] of interior) {
        if (!claimed.has(u + "," + v)) unclaimed.push([u, v]);
      }
      if (unclaimed.length > 0 && claimed.size > 0) {
        const claimedList = [];
        for (const [key, di] of claimed.entries()) {
          const parts = key.split(",");
          claimedList.push([Number(parts[0]), Number(parts[1]), di]);
        }
        for (const [u, v] of unclaimed) {
          let bestDist = Infinity, bestDi = null, bestId = null;
