<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>CALVEY PARTY 2 — Sandbox</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap');

    :root {
      --calvey-accent: #6A9CC4;
      --calvey-text: #1A1A1A;
      --calvey-muted: #888888;
      --calvey-surface: #F5F5F5;
      --calvey-rule: #E0E0E0;
      --calvey-error: #B33A3A;
      --calvey-warn: #C68A2E;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Cormorant Garamond', Georgia, serif;
      color: var(--calvey-text);
      background: white;
      margin: 0;
      padding: 0;
      font-size: 16px;
      line-height: 1.5;
    }

    .app {
      max-width: 960px;
      margin: 0 auto;
      padding: 48px 32px 96px;
    }

    h1, h2, h3 {
      font-weight: 500;
      margin: 0 0 16px;
    }

    h1 { font-size: 32px; letter-spacing: -0.01em; }
    h2 { font-size: 20px; }
    h3 { font-size: 14px; font-family: 'Space Mono', monospace; text-transform: uppercase; letter-spacing: 0.08em; color: var(--calvey-muted); }

    .label, .meta, button, .chip, .mono {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .hairline { border-top: 1px solid var(--calvey-rule); margin: 32px 0; }

    .section { margin-bottom: 32px; }

    table.kv { width: 100%; border-collapse: collapse; }
    table.kv td {
      border-bottom: 1px solid var(--calvey-rule);
      padding: 10px 14px;
      vertical-align: top;
    }
    table.kv td.label { width: 35%; color: var(--calvey-muted); font-family: 'Space Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
    table.kv td.value { background: var(--calvey-surface); font-family: 'Space Mono', monospace; font-size: 12px; word-break: break-all; }

    button {
      background: white;
      border: 1px solid var(--calvey-text);
      padding: 10px 16px;
      cursor: pointer;
      margin-right: 8px;
      color: var(--calvey-text);
    }
    button:hover { background: var(--calvey-text); color: white; }

    input[type="file"] { display: none; }

    label.upload {
      display: inline-block;
      background: white;
      border: 1px solid var(--calvey-text);
      padding: 10px 16px;
      cursor: pointer;
      margin-right: 8px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    label.upload:hover { background: var(--calvey-text); color: white; }

    textarea.json-viewer {
      width: 100%;
      min-height: 480px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      line-height: 1.6;
      padding: 16px;
      border: 1px solid var(--calvey-rule);
      background: var(--calvey-surface);
      color: var(--calvey-text);
      resize: vertical;
    }

    .chip {
      display: inline-block;
      padding: 4px 10px;
      border: 1px solid currentColor;
      margin-right: 6px;
      margin-bottom: 6px;
    }
    .chip-ok    { color: var(--calvey-accent); }
    .chip-warn  { color: var(--calvey-warn); }
    .chip-error { color: var(--calvey-error); }

    .block-note {
      border-left: 3px solid var(--calvey-accent);
      padding: 8px 16px;
      background: var(--calvey-surface);
      font-size: 14px;
      margin: 16px 0;
    }

    .onboard-card {
      border: 1px solid var(--calvey-rule);
      padding: 32px;
      margin-top: 24px;
      background: white;
    }

    .onboard-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    @media (min-width: 640px) {
      .onboard-grid.two { grid-template-columns: 1fr 1fr; }
    }

    .field { display: flex; flex-direction: column; }
    .field label {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--calvey-muted);
      margin-bottom: 6px;
    }
    .field select,
    .field input[type="number"],
    .field input[type="text"] {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      padding: 10px 12px;
      border: 1px solid var(--calvey-text);
      background: white;
      color: var(--calvey-text);
      width: 100%;
    }
    .field .hint {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--calvey-muted);
      margin-top: 6px;
    }

    .preset-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .preset-row button {
      padding: 6px 10px;
      margin: 0;
      font-size: 10px;
    }

    .primary {
      background: var(--calvey-text);
      color: white;
    }
    .primary:hover { background: var(--calvey-accent); border-color: var(--calvey-accent); }

    .linkish {
      background: transparent;
      border: none;
      color: var(--calvey-muted);
      padding: 6px 0;
      text-decoration: underline;
      cursor: pointer;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .linkish:hover { background: transparent; color: var(--calvey-text); }

    .soft-rule {
      text-align: center;
      color: var(--calvey-muted);
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin: 24px 0 16px;
    }

    footer {
      margin-top: 64px;
      padding-top: 16px;
      border-top: 1px solid var(--calvey-rule);
      color: var(--calvey-muted);
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .canvas-container {
      width: 100%;
      height: 520px;
      border: 1px solid var(--calvey-rule);
      margin: 32px 0;
      position: relative;
      overflow: hidden;
      background: var(--calvey-surface);
    }

    .canvas-container svg {
      width: 100%;
      height: 100%;
      display: block;
      cursor: grab;
      user-select: none;
    }

    .canvas-container svg.panning {
      cursor: grabbing;
    }

    .canvas-overlay {
      position: absolute;
      pointer-events: none;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--calvey-text);
    }

    .canvas-overlay.top-right {
      top: 20px;
      right: 20px;
      background: rgba(255, 255, 255, 0.9);
      padding: 8px 12px;
      border: 1px solid var(--calvey-rule);
      line-height: 1.6;
    }

    .canvas-overlay.top-right .label {
      color: var(--calvey-muted);
    }

    .canvas-overlay.top-right button {
      pointer-events: auto;
      margin-top: 8px;
      margin-right: 0;
      padding: 6px 12px;
      font-size: 10px;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="env,react">
    // ============================================================
    // SECTION 01 — SCHEMA
    // v2.1-party schema, validators, migrateFromV13 stub
    // ============================================================

    const SCHEMA_VERSION = "2.1-party";
    const ENGINE_VERSION = "0.1.0-step01";

    function emptyProject() {
      const now = new Date().toISOString();
      const id =
        (typeof crypto !== "undefined" && typeof crypto.randomUUID === "function")
          ? crypto.randomUUID()
          : ("p-" + Math.random().toString(36).slice(2, 10) + "-" + Date.now().toString(36));
      return {
        schema_version: SCHEMA_VERSION,
        project_id: id,
        engine_version: ENGINE_VERSION,
        created_at: now,
        updated_at: now,
        context: {
          footprint: {
            polygon: [],
            polygon_units: "feet",
            source: null,
            true_north_deg: 0,
            lat: null,
            lon: null
          },
          site: {
            climate_zone: null,
            setbacks: [],
            adjacent_buildings: [],
            obstructions: []
          },
          program: {
            building_type: null,
            rooms: [],
            adjacency_graph: {},
            vertical_constraints: {}
          },
          vertical_anchors: {
            cores: [],
            structural_lines: [],
            shafts: []
          }
        },
        weights: {
          daylight: 0.25,
          adjacency: 0.25,
          compactness: 0.15,
          circulation: 0.20,
          facade: 0.15
        },
        code_limits: {
          max_stories: null,
          max_height_ft: null,
          jurisdiction: null
        },
        current_plan: {
          floors: [],
          total_score: null,
          program_fit_report: null,
          unplaced_rooms: []
        },
        warnings: [],
        sessions: []
      };
    }

    function isPlainObject(x) {
      return x !== null && typeof x === "object" && !Array.isArray(x);
    }

    function validateProject(p) {
      const errors = [];
      const warnings = [];

      if (!isPlainObject(p)) {
        return { ok: false, errors: ["project must be an object"], warnings: [] };
      }

      if (p.schema_version !== "2.1-party") {
        errors.push("schema_version must be 2.1-party");
      }
      if (typeof p.project_id !== "string" || p.project_id.length === 0) {
        errors.push("project_id must be a non-empty string");
      }

      if (!isPlainObject(p.context)) {
        errors.push("context must be an object");
      }
      if (!isPlainObject(p.weights)) {
        errors.push("weights must be an object");
      }
      if (!isPlainObject(p.code_limits)) {
        errors.push("code_limits must be an object");
      }
      if (!isPlainObject(p.current_plan)) {
        errors.push("current_plan must be an object");
      }
      if (!Array.isArray(p.warnings)) {
        errors.push("warnings must be an array");
      }
      if (!Array.isArray(p.sessions)) {
        errors.push("sessions must be an array");
      }

      const weightKeys = ["daylight", "adjacency", "compactness", "circulation", "facade"];
      if (isPlainObject(p.weights)) {
        for (const k of weightKeys) {
          if (!(k in p.weights)) {
            errors.push("weights missing key: " + k);
          }
        }
        const allPresent = weightKeys.every(k => typeof p.weights[k] === "number");
        if (allPresent) {
          const sum = weightKeys.reduce((acc, k) => acc + p.weights[k], 0);
          if (Math.abs(sum - 1.0) > 0.01) {
            warnings.push("weights do not sum to 1.0 ± 0.01 (got " + sum.toFixed(3) + ")");
          }
        }
      }

      if (
        isPlainObject(p.context) &&
        isPlainObject(p.context.footprint) &&
        Array.isArray(p.context.footprint.polygon) &&
        p.context.footprint.polygon.length === 0
      ) {
        warnings.push("footprint polygon is empty");
      }

      if (
        isPlainObject(p.context) &&
        isPlainObject(p.context.program) &&
        p.context.program.building_type === null
      ) {
        warnings.push("building_type not set");
      }

      return { ok: errors.length === 0, errors, warnings };
    }

    function migrateFromV13(legacy) {
      // TODO Step 01.5 — real v13 migration once we decide whether v13 files
      // need to round-trip into this sandbox at all. For now: log and return null.
      console.warn("migrateFromV13: not implemented in Step 01");
      return null;
    }

    // ============================================================
    // SECTION 02 — PERSISTENCE
    // localStorage autosave + .calvey-party.json import/export
    // ============================================================

    const LS_KEY = "calvey_party_2_project";

    function loadFromLocalStorage() {
      try {
        const raw = localStorage.getItem(LS_KEY);
        if (!raw) return null;
        return JSON.parse(raw);
      } catch (e) {
        console.debug("loadFromLocalStorage: parse error", e);
        return null;
      }
    }

    function saveToLocalStorage(project) {
      try {
        project.updated_at = new Date().toISOString();
        localStorage.setItem(LS_KEY, JSON.stringify(project));
      } catch (e) {
        console.debug("saveToLocalStorage: write error (likely quota)", e);
      }
    }

    function downloadProjectFile(project) {
      const blob = new Blob([JSON.stringify(project, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = project.project_id + ".calvey-party.json";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function uploadProjectFile(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onerror = () => reject(new Error("Could not read file"));
        reader.onload = () => {
          let parsed;
          try {
            parsed = JSON.parse(reader.result);
          } catch (e) {
            reject(new Error("Could not parse JSON: " + e.message));
            return;
          }
          const v = validateProject(parsed);
          if (!v.ok) {
            reject(new Error("Invalid project file: " + v.errors.join("; ")));
            return;
          }
          resolve(parsed);
        };
        reader.readAsText(file);
      });
    }

    // ============================================================
    // SECTION 03 — SESSIONS  [Step 08 — TODO]
    // ============================================================

    // (empty — will be filled in Step 08)

    // ============================================================
    // SECTION 04 — ENGINE  [Steps 03 + 06 — TODO]
    // ============================================================

    // (empty — will be filled in Steps 03 and 06)

    // ============================================================
    // SECTION 05 — EDITOR
    // Step 02: read-only footprint canvas with pan/zoom/fit
    // ============================================================

    // World coords: feet, +X east, +Y north (Y is up).
    // Screen coords: SVG pixels, +X right, +Y down.
    // view = { panX, panY, zoom } — pan is the world coord at the viewport
    // center; zoom is pixels-per-foot.

    function computePolygonBounds(polygon) {
      if (!Array.isArray(polygon) || polygon.length === 0) {
        return { minX: 0, maxX: 0, minY: 0, maxY: 0 };
      }
      let minX = Infinity, maxX = -Infinity;
      let minY = Infinity, maxY = -Infinity;
      for (const pt of polygon) {
        if (!Array.isArray(pt) || pt.length < 2) continue;
        const x = Number(pt[0]);
        const y = Number(pt[1]);
        if (!Number.isFinite(x) || !Number.isFinite(y)) continue;
        if (x < minX) minX = x;
        if (x > maxX) maxX = x;
        if (y < minY) minY = y;
        if (y > maxY) maxY = y;
      }
      if (!Number.isFinite(minX)) {
        return { minX: 0, maxX: 0, minY: 0, maxY: 0 };
      }
      return { minX, maxX, minY, maxY };
    }

    function computePolygonAreaSF(polygon) {
      if (!Array.isArray(polygon) || polygon.length < 3) return 0;
      let sum = 0;
      for (let i = 0; i < polygon.length; i++) {
        const a = polygon[i];
        const b = polygon[(i + 1) % polygon.length];
        if (!Array.isArray(a) || !Array.isArray(b)) continue;
        const ax = Number(a[0]), ay = Number(a[1]);
        const bx = Number(b[0]), by = Number(b[1]);
        if (!Number.isFinite(ax) || !Number.isFinite(ay)) continue;
        if (!Number.isFinite(bx) || !Number.isFinite(by)) continue;
        sum += ax * by - bx * ay;
      }
      return Math.abs(sum) / 2;
    }

    function computeInitialView(polygon, viewportWidth, viewportHeight) {
      if (!Array.isArray(polygon) || polygon.length < 3) {
        return { panX: 0, panY: 0, zoom: 1 };
      }
      const { minX, maxX, minY, maxY } = computePolygonBounds(polygon);
      const worldWidth = maxX - minX;
      const worldHeight = maxY - minY;
      if (worldWidth <= 0 || worldHeight <= 0 || viewportWidth <= 0 || viewportHeight <= 0) {
        return { panX: (minX + maxX) / 2, panY: (minY + maxY) / 2, zoom: 1 };
      }
      const margin = 0.15;
      const zoomX = viewportWidth / (worldWidth * (1 + 2 * margin));
      const zoomY = viewportHeight / (worldHeight * (1 + 2 * margin));
      const zoom = Math.min(zoomX, zoomY);
      const panX = (minX + maxX) / 2;
      const panY = (minY + maxY) / 2;
      return { panX, panY, zoom };
    }

    function worldToScreen(wx, wy, view, viewport) {
      const sx = (wx - view.panX) * view.zoom + viewport.width / 2;
      const sy = -(wy - view.panY) * view.zoom + viewport.height / 2;
      return [sx, sy];
    }

    function screenToWorld(sx, sy, view, viewport) {
      const wx = (sx - viewport.width / 2) / view.zoom + view.panX;
      const wy = -(sy - viewport.height / 2) / view.zoom + view.panY;
      return [wx, wy];
    }

    function niceScaleBarLength(zoomPixelsPerFoot) {
      const ladder = [1, 2, 5, 10, 20, 50, 100, 200, 500, 1000, 2000];
      const maxPixels = 150;
      let best = ladder[0];
      for (const L of ladder) {
        if (L * zoomPixelsPerFoot <= maxPixels) {
          best = L;
        } else {
          break;
        }
      }
      return best;
    }

    function FootprintCanvas({ project }) {
      const polygon =
        (project && project.context && project.context.footprint &&
         Array.isArray(project.context.footprint.polygon))
          ? project.context.footprint.polygon
          : [];
      const trueNorthDeg =
        (project && project.context && project.context.footprint &&
         typeof project.context.footprint.true_north_deg === "number")
          ? project.context.footprint.true_north_deg
          : 0;
      const buildingType =
        (project && project.context && project.context.program)
          ? (project.context.program.building_type ?? "—")
          : "—";

      const containerRef = React.useRef(null);
      const svgRef = React.useRef(null);
      const backgroundRef = React.useRef(null);
      const dragRef = React.useRef(null);
      const didInitialFitRef = React.useRef(false);

      const [viewport, setViewport] = React.useState({ width: 900, height: 520 });
      const [view, setView] = React.useState({ panX: 0, panY: 0, zoom: 1 });
      const [isPanning, setIsPanning] = React.useState(false);

      // Mirror state into refs so the wheel listener can install once.
      const viewRef = React.useRef(view);
      const viewportRef = React.useRef(viewport);
      React.useEffect(() => { viewRef.current = view; }, [view]);
      React.useEffect(() => { viewportRef.current = viewport; }, [viewport]);

      // Measure container synchronously on mount + observe resizes.
      // Doing the initial fit in the layout effect (before paint) avoids a
      // visible jump from default-viewport fit → measured-viewport fit.
      React.useLayoutEffect(() => {
        if (!containerRef.current) return;
        const rect = containerRef.current.getBoundingClientRect();
        const w0 = rect.width > 0 ? rect.width : 900;
        const h0 = rect.height > 0 ? rect.height : 520;
        setViewport({ width: w0, height: h0 });
        viewportRef.current = { width: w0, height: h0 };
        if (!didInitialFitRef.current && polygon.length >= 3) {
          didInitialFitRef.current = true;
          setView(computeInitialView(polygon, w0, h0));
        }
        const observer = new ResizeObserver((entries) => {
          for (const entry of entries) {
            const w = entry.contentRect.width;
            const h = entry.contentRect.height;
            if (w > 0 && h > 0) {
              setViewport({ width: w, height: h });
            }
          }
        });
        observer.observe(containerRef.current);
        return () => observer.disconnect();
      }, []);

      // Re-fit whenever the polygon changes (e.g. JSON edit, file upload,
      // start over → onboarding → create).
      const polygonKey = React.useMemo(() => JSON.stringify(polygon), [polygon]);
      React.useEffect(() => {
        const vp = viewportRef.current;
        if (vp.width <= 0 || vp.height <= 0) return;
        if (polygon.length < 3) return;
        // Skip the very first run if the layout effect already fit it, to
        // avoid a redundant setView. The layout effect bumps didInitialFitRef
        // when it does the initial fit.
        if (!didInitialFitRef.current) {
          didInitialFitRef.current = true;
        }
        setView(computeInitialView(polygon, vp.width, vp.height));
        // eslint-disable-next-line react-hooks/exhaustive-deps
      }, [polygonKey]);

      // Non-passive wheel listener so we can preventDefault and stop the
      // page from scrolling while the user zooms the canvas.
      React.useEffect(() => {
        const svg = svgRef.current;
        if (!svg) return;
        function handleWheel(e) {
          e.preventDefault();
          const v = viewRef.current;
          const vp = viewportRef.current;
          if (vp.width <= 0 || vp.height <= 0) return;
          const rect = svg.getBoundingClientRect();
          const cursorX = e.clientX - rect.left;
          const cursorY = e.clientY - rect.top;
          const [wx, wy] = screenToWorld(cursorX, cursorY, v, vp);
          const factor = Math.exp(-e.deltaY * 0.001);
          const newZoom = Math.max(0.05, Math.min(50, v.zoom * factor));
          const newPanX = wx - (cursorX - vp.width / 2) / newZoom;
          const newPanY = wy + (cursorY - vp.height / 2) / newZoom;
          setView({ panX: newPanX, panY: newPanY, zoom: newZoom });
        }
        svg.addEventListener("wheel", handleWheel, { passive: false });
        return () => svg.removeEventListener("wheel", handleWheel);
      }, []);

      function handlePointerDown(e) {
        // Only start a pan if the user pressed on empty background, not on
        // any content layer. Future steps will hang interactions off rooms.
        if (e.target !== backgroundRef.current) return;
        const rect = svgRef.current.getBoundingClientRect();
        try { e.currentTarget.setPointerCapture(e.pointerId); } catch (err) {}
        dragRef.current = {
          startScreenX: e.clientX - rect.left,
          startScreenY: e.clientY - rect.top,
          startPanX: view.panX,
          startPanY: view.panY,
          pointerId: e.pointerId
        };
        setIsPanning(true);
      }

      function handlePointerMove(e) {
        if (!dragRef.current) return;
        const rect = svgRef.current.getBoundingClientRect();
        const sx = e.clientX - rect.left;
        const sy = e.clientY - rect.top;
        const dx = sx - dragRef.current.startScreenX;
        const dy = sy - dragRef.current.startScreenY;
        const startPanX = dragRef.current.startPanX;
        const startPanY = dragRef.current.startPanY;
        // World-delta = screen-delta / zoom, with a Y flip because +Y world
        // points up while +Y screen points down. Pan moves opposite to the
        // grabbed point's motion.
        setView(v => ({
          panX: startPanX - dx / v.zoom,
          panY: startPanY + dy / v.zoom,
          zoom: v.zoom
        }));
      }

      function handlePointerUp(e) {
        if (!dragRef.current) return;
        try {
          if (svgRef.current && svgRef.current.hasPointerCapture &&
              svgRef.current.hasPointerCapture(e.pointerId)) {
            svgRef.current.releasePointerCapture(e.pointerId);
          }
        } catch (err) {}
        dragRef.current = null;
        setIsPanning(false);
      }

      function handleDoubleClick(e) {
        if (e.target !== backgroundRef.current) return;
        setView(computeInitialView(polygon, viewport.width, viewport.height));
      }

      function handleFitClick() {
        setView(computeInitialView(polygon, viewport.width, viewport.height));
      }

      // ----- Render-time projection -----

      const screenPoints = polygon
        .filter(pt => Array.isArray(pt) && pt.length >= 2 &&
          Number.isFinite(Number(pt[0])) && Number.isFinite(Number(pt[1])))
        .map(([x, y]) => worldToScreen(Number(x), Number(y), view, viewport));
      const polygonPointsAttr = screenPoints
        .map(([x, y]) => x.toFixed(2) + "," + y.toFixed(2))
        .join(" ");
      const validPolygon = screenPoints.length >= 3;

      const [originSX, originSY] = worldToScreen(0, 0, view, viewport);

      // Compass overlay (screen-space, top-left, 20px inset, 48px square)
      const compassCx = 20 + 24;
      const compassCy = 20 + 24;
      const needleRad = (trueNorthDeg * Math.PI) / 180;
      // 0° = north (up on screen, -Y), 90° = east (+X), so the screen-space
      // needle direction is (sin, -cos).
      const needleDX = Math.sin(needleRad);
      const needleDY = -Math.cos(needleRad);
      const needleTipX = compassCx + 18 * needleDX;
      const needleTipY = compassCy + 18 * needleDY;
      const labelOffsetX = compassCx + 26 * needleDX;
      const labelOffsetY = compassCy + 26 * needleDY;
      // Triangle arrowhead: base perpendicular to needle, tip at needle end.
      const perpX = -needleDY;
      const perpY = needleDX;
      const arrowBaseX = compassCx + 12 * needleDX;
      const arrowBaseY = compassCy + 12 * needleDY;
      const arrowPts =
        (arrowBaseX + 3.5 * perpX).toFixed(2) + "," + (arrowBaseY + 3.5 * perpY).toFixed(2) + " " +
        (arrowBaseX - 3.5 * perpX).toFixed(2) + "," + (arrowBaseY - 3.5 * perpY).toFixed(2) + " " +
        needleTipX.toFixed(2) + "," + needleTipY.toFixed(2);

      // Scale bar (screen-space, bottom-left, 20px inset)
      const scaleBarFt = niceScaleBarLength(view.zoom);
      const scaleBarPx = scaleBarFt * view.zoom;
      const scaleBarX = 20;
      const scaleBarY = Math.max(40, viewport.height - 32);

      // Metadata overlay text
      const polyVertexCount = polygon.length;
      const areaSF = computePolygonAreaSF(polygon);
      const areaLabel = areaSF >= 100
        ? Math.round(areaSF).toLocaleString()
        : areaSF.toFixed(1);

      const showOriginMarker = viewport.width > 0 && viewport.height > 0;

      return (
        <div className="canvas-container" ref={containerRef}>
          <svg
            ref={svgRef}
            className={isPanning ? "panning" : ""}
            onPointerDown={handlePointerDown}
            onPointerMove={handlePointerMove}
            onPointerUp={handlePointerUp}
            onPointerCancel={handlePointerUp}
            onDoubleClick={handleDoubleClick}
          >
            {/* Background hit target (also the pan/zoom target) */}
            <rect
              ref={backgroundRef}
              x="0" y="0"
              width={viewport.width}
              height={viewport.height}
              fill="var(--calvey-surface)"
            />

            {/* Origin crosshair at world (0,0) */}
            {showOriginMarker && (
              <g style={{ pointerEvents: "none" }}>
                <line
                  x1={originSX - 6} y1={originSY}
                  x2={originSX + 6} y2={originSY}
                  stroke="var(--calvey-muted)"
                  strokeWidth="1"
                  strokeDasharray="2 2"
                />
                <line
                  x1={originSX} y1={originSY - 6}
                  x2={originSX} y2={originSY + 6}
                  stroke="var(--calvey-muted)"
                  strokeWidth="1"
                  strokeDasharray="2 2"
                />
                <text
                  x={originSX + 8}
                  y={originSY - 4}
                  fontFamily="'Space Mono', monospace"
                  fontSize="9"
                  fill="var(--calvey-muted)"
                >0,0</text>
              </g>
            )}

            {/* Footprint polygon */}
            {validPolygon && (
              <polygon
                points={polygonPointsAttr}
                fill="white"
                fillOpacity="1"
                stroke="var(--calvey-text)"
                strokeWidth="1.5"
                style={{ pointerEvents: "none" }}
              />
            )}

            {/* Polygon vertices */}
            {validPolygon && screenPoints.map(([x, y], i) => (
              <circle
                key={i}
                cx={x}
                cy={y}
                r="3"
                fill="var(--calvey-accent)"
                style={{ pointerEvents: "none" }}
              />
            ))}

            {/* True-north compass (top-left overlay, 20px inset) */}
            <g style={{ pointerEvents: "none" }}>
              <circle
                cx={compassCx} cy={compassCy} r="22"
                stroke="var(--calvey-text)" strokeWidth="1" fill="white"
              />
              <line
                x1={compassCx} y1={compassCy}
                x2={needleTipX} y2={needleTipY}
                stroke="var(--calvey-accent)" strokeWidth="2"
              />
              <polygon
                points={arrowPts}
                fill="var(--calvey-accent)"
              />
              <text
                x={labelOffsetX} y={labelOffsetY}
                fontFamily="'Space Mono', monospace"
                fontSize="10"
                textAnchor="middle"
                dominantBaseline="middle"
                fill="var(--calvey-text)"
              >N</text>
            </g>

            {/* Scale bar (bottom-left overlay, 20px inset) */}
            <g style={{ pointerEvents: "none" }}>
              <line
                x1={scaleBarX} y1={scaleBarY}
                x2={scaleBarX + scaleBarPx} y2={scaleBarY}
                stroke="var(--calvey-text)" strokeWidth="1"
              />
              <line
                x1={scaleBarX} y1={scaleBarY - 3}
                x2={scaleBarX} y2={scaleBarY + 3}
                stroke="var(--calvey-text)" strokeWidth="1"
              />
              <line
                x1={scaleBarX + scaleBarPx} y1={scaleBarY - 3}
                x2={scaleBarX + scaleBarPx} y2={scaleBarY + 3}
                stroke="var(--calvey-text)" strokeWidth="1"
              />
              <text
                x={scaleBarX} y={scaleBarY + 14}
                fontFamily="'Space Mono', monospace"
                fontSize="10"
                fill="var(--calvey-text)"
              >{scaleBarFt} ft</text>
            </g>
          </svg>

          {/* Context metadata + Fit button (HTML overlay, top-right) */}
          <div className="canvas-overlay top-right">
            <div><span className="label">BUILDING TYPE:</span> {buildingType}</div>
            <div><span className="label">FOOTPRINT:</span> {polyVertexCount} vertices · {areaLabel} SF</div>
            <div><span className="label">TRUE NORTH:</span> {trueNorthDeg}°</div>
            <div><span className="label">ZOOM:</span> {view.zoom.toFixed(2)} px/ft</div>
            <button type="button" onClick={handleFitClick}>FIT</button>
          </div>
        </div>
      );
    }

    // ============================================================
    // SECTION 06 — EXPORTERS  [Step 09 — TODO]
    // ============================================================

    // (empty — will be filled in Step 09)

    // ============================================================
    // SECTION 07 — APP
    // Step 01 shell UI: metadata panel + JSON viewer + buttons
    // ============================================================

    function formatWeights(w) {
      if (!w || typeof w !== "object") return "—";
      const keys = ["daylight", "adjacency", "compactness", "circulation", "facade"];
      return keys
        .filter(k => typeof w[k] === "number")
        .map(k => k + " " + w[k].toFixed(2))
        .join(" · ");
    }

    function ValidationChips({ validation }) {
      // NOTE: Spec section 07 says "VALID chip if ok && warnings.length === 0",
      // but gate test 2 expects "green VALID plus two yellow warnings" on a new
      // project. Going with the gate test interpretation: VALID shows whenever
      // there are no errors; warnings are displayed alongside.
      const { ok, errors, warnings } = validation;
      const chips = [];
      if (ok) {
        chips.push(<span key="ok" className="chip chip-ok">VALID</span>);
      }
      errors.forEach((e, i) => {
        chips.push(<span key={"e" + i} className="chip chip-error">{e}</span>);
      });
      warnings.forEach((w, i) => {
        chips.push(<span key={"w" + i} className="chip chip-warn">{w}</span>);
      });
      return <div className="section">{chips}</div>;
    }

    function MetadataPanel({ project }) {
      const vertexCount =
        project &&
        project.context &&
        project.context.footprint &&
        Array.isArray(project.context.footprint.polygon)
          ? project.context.footprint.polygon.length
          : 0;
      const buildingType =
        project && project.context && project.context.program
          ? (project.context.program.building_type ?? "—")
          : "—";
      return (
        <table className="kv">
          <tbody>
            <tr><td className="label">SCHEMA VERSION</td><td className="value">{project.schema_version}</td></tr>
            <tr><td className="label">PROJECT ID</td><td className="value">{project.project_id}</td></tr>
            <tr><td className="label">ENGINE VERSION</td><td className="value">{project.engine_version}</td></tr>
            <tr><td className="label">CREATED</td><td className="value">{project.created_at}</td></tr>
            <tr><td className="label">UPDATED</td><td className="value">{project.updated_at}</td></tr>
            <tr><td className="label">BUILDING TYPE</td><td className="value">{buildingType}</td></tr>
            <tr><td className="label">FOOTPRINT</td><td className="value">{vertexCount} vertices</td></tr>
            <tr><td className="label">WEIGHTS</td><td className="value">{formatWeights(project.weights)}</td></tr>
          </tbody>
        </table>
      );
    }

    // Fallback building types if program database isn't available yet.
    // Mirrors the canonical list in CALVEY_PROGRAM/data/building_program_database_master_updated.json.
    const FALLBACK_BUILDING_TYPES = [
      "Office",
      "Multifamily Residential",
      "K-12 School",
      "Higher Education",
      "Healthcare (Outpatient / Inpatient mix)",
      "Civic / Government",
      "Laboratory",
      "Hospitality (Hotel)",
      "Retail / Mixed-Use",
      "Industrial / Warehouse",
      "Cultural / Museum",
      "Religious / Worship",
      "Recreation / Sports",
      "Data Center / Tech",
      "Parking Structure",
      "Transit / Transportation",
      "Senior Living / Assisted Living",
      "Student Housing / Dormitory",
      "Convention Center / Exhibition Hall",
      "Fire Station / Emergency Services",
      "Public Library",
      "Restaurant / Food Hall"
    ];

    function buildRectanglePolygon(widthFt, depthFt) {
      const w = Math.max(0, Number(widthFt) || 0);
      const d = Math.max(0, Number(depthFt) || 0);
      // CCW starting at origin, feet.
      return [
        [0, 0],
        [w, 0],
        [w, d],
        [0, d]
      ];
    }

    // Is this a fresh, not-yet-started project? Used to decide whether to show
    // the onboarding screen vs. the metadata/JSON view.
    function isFreshProject(p) {
      if (!isPlainObject(p)) return true;
      const polyEmpty =
        isPlainObject(p.context) &&
        isPlainObject(p.context.footprint) &&
        Array.isArray(p.context.footprint.polygon) &&
        p.context.footprint.polygon.length === 0;
      const noType =
        isPlainObject(p.context) &&
        isPlainObject(p.context.program) &&
        (p.context.program.building_type === null || p.context.program.building_type === undefined);
      return polyEmpty && noType;
    }

    function OnboardingView({ buildingTypes, dbLoaded, onStart, onUpload, onBlank, uploadError }) {
      const availableTypes = buildingTypes && buildingTypes.length > 0
        ? buildingTypes
        : FALLBACK_BUILDING_TYPES;

      const [buildingType, setBuildingType] = React.useState(availableTypes[0] || "");
      const [width, setWidth] = React.useState(150);
      const [depth, setDepth] = React.useState(100);

      // If the db loads after mount and our selection isn't in its list, realign
      // to the first real option so submission matches the database.
      React.useEffect(() => {
        if (!dbLoaded) return;
        if (!buildingTypes || buildingTypes.length === 0) return;
        if (!buildingTypes.includes(buildingType)) {
          setBuildingType(buildingTypes[0]);
        }
      }, [dbLoaded, buildingTypes]);

      const area = Math.max(0, Number(width) || 0) * Math.max(0, Number(depth) || 0);

      function applyPreset(w, d) {
        setWidth(w);
        setDepth(d);
      }

      function handleCreate() {
        const w = Math.max(1, Math.round(Number(width) || 0));
        const d = Math.max(1, Math.round(Number(depth) || 0));
        onStart({ buildingType, width: w, depth: d });
      }

      return (
        <div className="app">
          <header className="section">
            <h1>CALVEY PARTY 2</h1>
            <div className="label">SANDBOX · WELCOME</div>
          </header>

          <div className="block-note">
            Let's set up a new project. Pick a building type and a starting footprint size
            to get going. You can reshape the footprint later.
          </div>

          {uploadError && (
            <div className="section">
              <span className="chip chip-error">UPLOAD FAILED: {uploadError}</span>
            </div>
          )}

          <div className="onboard-card">
            <h3>01 · Building Type</h3>
            <div className="field" style={{ marginBottom: 24 }}>
              <label htmlFor="building-type-select">What are you designing?</label>
              <select
                id="building-type-select"
                value={buildingType}
                onChange={(e) => setBuildingType(e.target.value)}
              >
                {availableTypes.map(t => (
                  <option key={t} value={t}>{t}</option>
                ))}
              </select>
              <div className="hint">
                {dbLoaded
                  ? (buildingTypes.length + " types loaded from program database")
                  : "Program database not detected — using fallback list"}
              </div>
            </div>

            <h3>02 · Starting Footprint</h3>
            <div className="onboard-grid two">
              <div className="field">
                <label htmlFor="fp-width">Width (ft)</label>
                <input
                  id="fp-width"
                  type="number"
                  min="1"
                  step="1"
                  value={width}
                  onChange={(e) => setWidth(e.target.value)}
                />
              </div>
              <div className="field">
                <label htmlFor="fp-depth">Depth (ft)</label>
                <input
                  id="fp-depth"
                  type="number"
                  min="1"
                  step="1"
                  value={depth}
                  onChange={(e) => setDepth(e.target.value)}
                />
              </div>
            </div>

            <div className="preset-row">
              <button type="button" onClick={() => applyPreset(80, 60)}>Small · 80×60</button>
              <button type="button" onClick={() => applyPreset(150, 100)}>Medium · 150×100</button>
              <button type="button" onClick={() => applyPreset(220, 160)}>Large · 220×160</button>
              <button type="button" onClick={() => applyPreset(300, 200)}>XL · 300×200</button>
            </div>
            <div className="hint" style={{ marginTop: 12 }}>
              FOOTPRINT AREA · {area.toLocaleString()} SF
            </div>

            <div style={{ marginTop: 28 }}>
              <button type="button" className="primary" onClick={handleCreate}>
                Create Project
              </button>
            </div>
          </div>

          <div className="soft-rule">— OR —</div>

          <div className="section" style={{ textAlign: "center" }}>
            <label className="upload">
              Load existing .calvey-party.json
              <input type="file" accept=".json,application/json" onChange={onUpload} />
            </label>
          </div>

          <div style={{ textAlign: "center", marginTop: 16 }}>
            <button type="button" className="linkish" onClick={onBlank}>
              Skip setup · start from blank JSON (advanced)
            </button>
          </div>

          <footer>
            SCHEMA 2.1-PARTY · ENGINE 0.1.0-STEP01 · STEP 01 OF 09
          </footer>
        </div>
      );
    }

    function App() {
      const [project, setProject] = React.useState(() => loadFromLocalStorage() ?? emptyProject());
      const [validation, setValidation] = React.useState(() => validateProject(project));
      const [dbStatus, setDbStatus] = React.useState({ loaded: false, count: 0, error: null, types: [] });
      const [forceAdvanced, setForceAdvanced] = React.useState(false);
      const [textareaValue, setTextareaValue] = React.useState(() => JSON.stringify(project, null, 2));
      const [applyError, setApplyError] = React.useState(null);
      const [uploadError, setUploadError] = React.useState(null);

      // Autosave + revalidate on every project change
      React.useEffect(() => {
        saveToLocalStorage(project);
        setValidation(validateProject(project));
        setTextareaValue(JSON.stringify(project, null, 2));
      }, [project]);

      // Probe program database on mount.
      // CALVEY_PROGRAM ships its master index as building_program_database_master[_updated].json
      // with a top-level `databases` array. Depending on how Matt copies the folder in,
      // the file may land at the canonical ./data/ path, or nested one level deeper.
      // Try each candidate in order and use the first one that parses.
      React.useEffect(() => {
        const candidates = [
          "./data/master_index.json",
          "./data/building_program_database_master_updated.json",
          "./data/building_program_database_master.json",
          "./data/CALVEY_PROGRAM/data/building_program_database_master_updated.json",
          "./data/CALVEY_PROGRAM/data/building_program_database_master.json"
        ];
        let cancelled = false;
        (async () => {
          for (const path of candidates) {
            try {
              const res = await fetch(path);
              if (!res.ok) continue;
              const json = await res.json();
              if (cancelled) return;
              let count = 0;
              let types = [];
              if (Array.isArray(json)) {
                count = json.length;
                types = json
                  .map(x => (isPlainObject(x) ? (x.building_type || x.name || null) : null))
                  .filter(Boolean);
              } else if (isPlainObject(json)) {
                const arr = Array.isArray(json.databases)
                  ? json.databases
                  : Array.isArray(json.building_types)
                    ? json.building_types
                    : Array.isArray(json.types)
                      ? json.types
                      : null;
                if (arr) {
                  count = arr.length;
                  types = arr
                    .map(x => (isPlainObject(x) ? (x.building_type || x.name || null) : (typeof x === "string" ? x : null)))
                    .filter(Boolean);
                } else {
                  count = Object.keys(json).length;
                }
              }
              // De-duplicate while preserving order
              const seen = new Set();
              types = types.filter(t => {
                if (seen.has(t)) return false;
                seen.add(t);
                return true;
              });
              setDbStatus({ loaded: true, count, error: null, source: path, types });
              return;
            } catch (e) {
              console.debug("program database probe miss:", path, e && e.message);
            }
          }
          if (cancelled) return;
          setDbStatus({ loaded: false, count: 0, error: "no master index found", source: null, types: [] });
        })();
        return () => { cancelled = true; };
      }, []);

      function handleNewProject() {
        const p = emptyProject();
        setProject(p);
        setApplyError(null);
        setUploadError(null);
        setForceAdvanced(false);
      }

      function handleStartFromOnboarding({ buildingType, width, depth }) {
        const p = emptyProject();
        if (buildingType) {
          p.context.program.building_type = buildingType;
        }
        p.context.footprint.polygon = buildRectanglePolygon(width, depth);
        p.context.footprint.source = "onboarding_rectangle";
        setProject(p);
        setApplyError(null);
        setUploadError(null);
        setForceAdvanced(false);
      }

      function handleBlankStart() {
        // Escape hatch for power users who want to hand-edit JSON immediately.
        setForceAdvanced(true);
        setApplyError(null);
        setUploadError(null);
      }

      function handleUpload(ev) {
        const file = ev.target.files && ev.target.files[0];
        // reset input so the same file can be re-selected later
        ev.target.value = "";
        if (!file) return;
        uploadProjectFile(file)
          .then(p => {
            setProject(p);
            setUploadError(null);
          })
          .catch(err => {
            setUploadError(err && err.message ? err.message : String(err));
          });
      }

      function handleDownload() {
        downloadProjectFile(project);
      }

      function handleValidate() {
        setValidation(validateProject(project));
      }

      function handleApplyEdits() {
        let parsed;
        try {
          parsed = JSON.parse(textareaValue);
        } catch (e) {
          setApplyError("Could not parse JSON: " + e.message);
          return;
        }
        setApplyError(null);
        setProject(parsed);
      }

      function handleRevert() {
        setTextareaValue(JSON.stringify(project, null, 2));
        setApplyError(null);
      }

      const dbMessage = dbStatus.loaded
        ? ("PROGRAM DATABASE LOADED · " + dbStatus.count + " building types · " + (dbStatus.source || ""))
        : "PROGRAM DATABASE NOT PRESENT — copy CALVEY_PROGRAM/data into ./data/ and reload";

      const showOnboarding = !forceAdvanced && isFreshProject(project);

      if (showOnboarding) {
        return (
          <OnboardingView
            buildingTypes={dbStatus.types || []}
            dbLoaded={dbStatus.loaded}
            onStart={handleStartFromOnboarding}
            onUpload={handleUpload}
            onBlank={handleBlankStart}
            uploadError={uploadError}
          />
        );
      }

      return (
        <div className="app">
          <header className="section">
            <h1>CALVEY PARTY 2</h1>
            <div className="label">SANDBOX · STEP 01 · SCHEMA + PERSISTENCE SHELL</div>
          </header>

          <div className="section">
            <button onClick={handleNewProject}>Start Over</button>
            <label className="upload">
              Load .calvey-party.json
              <input type="file" accept=".json,application/json" onChange={handleUpload} />
            </label>
            <button onClick={handleDownload}>Download .calvey-party.json</button>
            <button onClick={handleValidate}>Validate</button>
          </div>

          {uploadError && (
            <div className="section">
              <span className="chip chip-error">UPLOAD FAILED: {uploadError}</span>
            </div>
          )}

          <ValidationChips validation={validation} />

          <FootprintCanvas project={project} />

          <div className="hairline"></div>

          <div className="section">
            <h3>METADATA</h3>
            <MetadataPanel project={project} />
          </div>

          <div className="section">
            <h3>PROGRAM DATABASE</h3>
            <div className="block-note">{dbMessage}</div>
          </div>

          <div className="hairline"></div>

          <div className="section">
            <h3>PROJECT JSON</h3>
            {applyError && (
              <div className="section">
                <span className="chip chip-error">{applyError}</span>
              </div>
            )}
            <textarea
              className="json-viewer"
              value={textareaValue}
              onChange={(e) => setTextareaValue(e.target.value)}
              spellCheck={false}
            />
            <div style={{ marginTop: 12 }}>
              <button onClick={handleApplyEdits}>Apply edits</button>
              <button onClick={handleRevert}>Revert</button>
            </div>
          </div>

          <footer>
            SCHEMA 2.1-PARTY · ENGINE 0.1.0-STEP01 · STEP 01 OF 09
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
