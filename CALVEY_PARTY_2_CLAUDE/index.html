          for (const [cu, cv, di] of claimedList) {
            const d = Math.abs(cu - u) + Math.abs(cv - v);
            const id = depts[di].id;
            if (d < bestDist || (d === bestDist && bestId !== null && id < bestId)) {
              bestDist = d; bestDi = di; bestId = id;
            }
          }
          if (bestDi !== null) claimed.set(u + "," + v, bestDi);
        }
      }

      // Build region objects.
      const cellsByDept = depts.map(() => []);
      for (const [key, di] of claimed.entries()) {
        const parts = key.split(",");
        cellsByDept[di].push([Number(parts[0]), Number(parts[1])]);
      }
      return depts.map((d, di) => {
        const cells = cellsByDept[di];
        let cx = 0, cy = 0;
        for (const [u, v] of cells) {
          const [wx, wy] = cellCenter(grid, u, v);
          cx += wx; cy += wy;
        }
        const centroid = cells.length > 0 ? [cx / cells.length, cy / cells.length] : null;
        return {
          id: d.id,
          name: d.name,
          daylight_priority: d.daylight_priority,
          cell_count: cells.length,
          area_sf: cells.length * grid.cell_size_ft * grid.cell_size_ft,
          cells,
          centroid
        };
      });
    }

    // ---------- Stage B — greedy rectangular room packing ----------

    // For each department region, build an availability mask, then for each
    // room instance (sorted big-to-small) scan all anchors for the rectangle
    // that best matches the room's target aspect ratio while still containing
    // at least cells_needed cells. Claim the rectangle and continue.
    //
    // Step 04 refinements:
    //   (2) use parti.min_{width,depth}_cells directly when present
    //   (3) reject candidates whose aspect > room.max_aspect_ratio (HARD)
    //   (4) use parti.parti_area_cells as the primary target when present
    //   (5) placement_zone tiebreaks candidate rectangles by world position
    //
    // Step 05 refinement:
    //   lockedPrePlaced — array of already-placed locked rooms carried forward
    //   from the previous plan. Their cells are reserved globally (pre-claimed
    //   in every region mask) and they are emitted directly into the `placed`
    //   output without re-packing. The `rooms` argument should NOT include
    //   them; generatePlan's carry-over logic removes one fresh instance per
    //   locked room so total room counts stay consistent.
    //
    // Output: {
    //   rooms:    [ <placed-room per floors[0].rooms schema> ],
    //   unplaced: [ { type, template_id, department_id, target_area_sf, reason } ]
    // }
    function runStageB(grid, regions, rooms, lockedPrePlaced) {
      const W = grid.width_cells, H = grid.height_cells;
      const cellArea = grid.cell_size_ft * grid.cell_size_ft;
      const placed = [];
      const unplaced = [];

      const roomList = Array.isArray(rooms) ? rooms.filter(isPlainObject) : [];
      const regionList = Array.isArray(regions) ? regions.filter(isPlainObject) : [];

      // Step 05 — seed `placed` with carry-over locked rooms and build a set
      // of their cells so we can exclude them from every region's mask.
      const lockedList = Array.isArray(lockedPrePlaced)
        ? lockedPrePlaced.filter(r =>
            isPlainObject(r) && Array.isArray(r.cells) && r.cells.length > 0)
        : [];
      const lockedCellSet = new Set();
      for (const lp of lockedList) {
        for (const [u, v] of lp.cells) {
          lockedCellSet.add(u + "," + v);
        }
        placed.push({ ...lp, locked: true });
      }

      // Footprint centroid in world coords — used by foh/boh zone scoring.
      // We average over all interior cells, not the polygon vertices (the
      // grid already approximates the inside).
      let fpCx = 0, fpCy = 0, fpN = 0;
      for (let v = 0; v < H; v++) {
        for (let u = 0; u < W; u++) {
          if (grid.inside[v][u]) {
            const [wx, wy] = cellCenter(grid, u, v);
            fpCx += wx; fpCy += wy; fpN++;
          }
        }
      }
      const footprintCentroid = fpN > 0 ? [fpCx / fpN, fpCy / fpN] : null;

      // Group rooms by department id. Step 04 — read either legacy `department`
      // field or the new `department_id` field (resolveRoomCounts writes both).
      const byDept = new Map();
      for (const r of roomList) {
        const key =
          (typeof r.department_id === "string" && r.department_id.length > 0)
            ? r.department_id
          : (typeof r.department === "string" && r.department.length > 0)
            ? r.department
            : "unassigned";
        if (!byDept.has(key)) byDept.set(key, []);
        byDept.get(key).push(r);
      }

      // Per-template instance counter so instance_ids on the OUTPUT are
      // unique within a floor. Keyed by template_id so multiple instances
      // of the same template (Step 04 refinement 1) get distinct ids.
      const counters = new Map();
      // Step 05 — seed the counter past any locked carry-over ids so newly
      // packed instances never collide. e.g. locked "classroom_02" → counter
      // starts at 2; next packed classroom will be "classroom_03".
      for (const lp of lockedList) {
        const tpl = lp.template_id || lp.type || "";
        const m = String(lp.instance_id || "").match(/_(\d+)$/);
        if (tpl && m) {
          const n = parseInt(m[1], 10);
          if (Number.isFinite(n)) {
            counters.set(tpl, Math.max(counters.get(tpl) || 0, n));
          }
        }
      }
      function nextInstanceId(type) {
        const n = (counters.get(type) || 0) + 1;
        counters.set(type, n);
        return type + "_" + String(n).padStart(2, "0");
      }

      for (const region of regionList) {
        const deptRooms = byDept.get(region.id) || [];
        if (deptRooms.length === 0) continue;

        // Region centroid in world coords — used by primary/support zone scoring.
        const regionCentroid = Array.isArray(region.centroid) ? region.centroid : null;

        // Build availability mask + interior cell count for this department.
        // Step 05 — locked carry-over cells are pre-claimed globally, so skip
        // them here. If Stage A now assigns those cells to a different dept
        // than the locked room originally belonged to, we still don't pack on
        // them (and the locked room remains visible via the `placed` seed).
        const mask = new Array(H);
        for (let v = 0; v < H; v++) mask[v] = new Array(W).fill(false);
        let availableCells = 0;
        if (Array.isArray(region.cells)) {
          for (const [u, v] of region.cells) {
            if (u >= 0 && u < W && v >= 0 && v < H &&
                !lockedCellSet.has(u + "," + v)) {
              mask[v][u] = true;
              availableCells++;
            }
          }
        }

        // Grid centroid for `core` zone preference (independent of department).
        const gridCentroid = footprintCentroid;

        // Build instances for this department. Each `r` is already a single
        // room instance (count=1); no expansion needed here — resolveRoomCounts
        // did that.
        //
        // For each instance we derive:
        //   cellsNeeded     — parti.parti_area_cells when present (refinement 4),
        //                     else round(target_area / cell²).
        //   minWCells/minDCells — parti.min_{width,depth}_cells when present
        //                         (refinement 2), else ceil(ft / cell_size).
        //   maxAspect       — room.max_aspect_ratio (refinement 3). HARD ceiling.
        //   zonePrefPoint   — anchor target for placement_zone tiebreaker (5).
        //   zoneSignedDir   — +1 pulls TOWARD, -1 pushes AWAY.
        const instances = [];
        for (const r of deptRooms) {
          const targetArea = Number.isFinite(Number(r.target_area_sf))
            ? Number(r.target_area_sf)
            : (Number.isFinite(Number(r.target_area)) ? Number(r.target_area) : 0);

          // (4) parti cells take precedence over area-derived count.
          let cellsNeeded;
          if (Number.isFinite(Number(r.parti_area_cells)) &&
              Number(r.parti_area_cells) > 0) {
            cellsNeeded = Math.max(1, Math.floor(Number(r.parti_area_cells)));
          } else {
            cellsNeeded = Math.max(1, Math.round(targetArea / cellArea));
          }

          // (2) min width/depth in cells: parti first, then ft→cells.
          let minWCells, minDCells;
          if (Number.isFinite(Number(r.min_width_cells)) &&
              Number(r.min_width_cells) > 0) {
            minWCells = Math.max(1, Math.floor(Number(r.min_width_cells)));
          } else if (Number.isFinite(Number(r.min_width)) && Number(r.min_width) > 0) {
            minWCells = Math.max(1, Math.ceil(Number(r.min_width) / grid.cell_size_ft));
          } else {
            minWCells = 1;
          }
          if (Number.isFinite(Number(r.min_depth_cells)) &&
              Number(r.min_depth_cells) > 0) {
            minDCells = Math.max(1, Math.floor(Number(r.min_depth_cells)));
          } else if (Number.isFinite(Number(r.min_length)) && Number(r.min_length) > 0) {
            minDCells = Math.max(1, Math.ceil(Number(r.min_length) / grid.cell_size_ft));
          } else {
            minDCells = 1;
          }

          // Legacy target aspect (min_length / min_width ratio) — used as a
          // *preference*, not a ceiling. Ceiling is max_aspect_ratio.
          const targetAspect = (minWCells >= 1 && minDCells >= 1)
            ? (Math.max(minWCells, minDCells) / Math.min(minWCells, minDCells))
            : 1.0;

          // (3) Hard ceiling. resolveRoomCounts always writes a value; guard
          // for direct-JSON-edit cases where the user might strip it.
          const maxAspect = (Number.isFinite(Number(r.max_aspect_ratio)) &&
                             Number(r.max_aspect_ratio) > 0)
            ? Number(r.max_aspect_ratio) : 2.5;

          // (5) placement_zone tiebreaker anchor and direction.
          const zone = (typeof r.placement_zone === "string")
            ? r.placement_zone.toLowerCase() : null;
          let zonePrefPoint = null, zoneSignedDir = 0;
          if (zone === "foh" && footprintCentroid) {
            zonePrefPoint = footprintCentroid; zoneSignedDir = +1;
          } else if (zone === "boh" && footprintCentroid) {
            zonePrefPoint = footprintCentroid; zoneSignedDir = -1;
          } else if (zone === "primary" && regionCentroid) {
            zonePrefPoint = regionCentroid; zoneSignedDir = +1;
          } else if (zone === "support" && regionCentroid) {
            zonePrefPoint = regionCentroid; zoneSignedDir = -1;
          } else if (zone === "core" && gridCentroid) {
            zonePrefPoint = gridCentroid; zoneSignedDir = +1;
          }

          instances.push({
            room: r,
            cellsNeeded,
            minWCells,
            minDCells,
            targetAspect,
            maxAspect,
            zonePrefPoint,
            zoneSignedDir
          });
        }

        if (availableCells === 0) {
          for (const inst of instances) {
            unplaced.push(makeUnplacedEntry(inst.room, "department_empty"));
          }
          continue;
        }

        // Sort instances big-first so larger rooms grab space before
        // small rooms scatter the mask.
        instances.sort((a, b) => b.cellsNeeded - a.cellsNeeded);

        for (const inst of instances) {
          if (inst.cellsNeeded > availableCells) {
            unplaced.push(makeUnplacedEntry(inst.room, "target_too_large"));
            continue;
          }

          // Precompute down_runs[v][u] = consecutive trues going from (u,v)
          // toward larger v. Lets us find max_h for any (anchor, w) in O(w).
          const down = new Array(H);
          for (let v = H - 1; v >= 0; v--) {
            const row = new Array(W);
            for (let u = 0; u < W; u++) {
              row[u] = mask[v][u] ? (1 + (v + 1 < H ? down[v + 1][u] : 0)) : 0;
            }
            down[v] = row;
          }

          // Scan all anchors row-major; track best placement by:
          //   1) aspect-distance from targetAspect (smaller is better)
          //   2) zone-preference score (smaller is better)
          //   3) area (smaller = less waste)
          // Rectangles that violate max_aspect_ratio (refinement 3) are rejected.
          // Rectangles smaller than (minWCells × minDCells) are rejected.
          let best = null;
          for (let av = 0; av < H; av++) {
            for (let au = 0; au < W; au++) {
              if (!mask[av][au]) continue;
              // max width of trues to the right on this row, starting at (au, av).
              let maxW = 0;
              while (au + maxW < W && mask[av][au + maxW]) maxW++;
              let minDown = Infinity;
              for (let w = 1; w <= maxW; w++) {
                const d = down[av][au + w - 1];
                if (d < minDown) minDown = d;
                if (minDown < 1) break;
                const hNeeded = Math.max(1, Math.ceil(inst.cellsNeeded / w));
                if (hNeeded > minDown) continue;
                const h = hNeeded;

                // (3) HARD max-aspect check. Reject and keep scanning.
                const ar = (w >= h) ? (w / h) : (h / w);
                if (ar > inst.maxAspect + 1e-9) continue;

                // Min-dimension check (either orientation).
                const fitsW = (w >= inst.minWCells && h >= inst.minDCells);
                const fitsR = (h >= inst.minWCells && w >= inst.minDCells);
                if (!fitsW && !fitsR) continue;

                const area = w * h;
                const aspectDiff = Math.abs(ar - inst.targetAspect);

                // (5) Zone preference — signed distance from zone target point.
                // Centroid of this candidate rectangle in world coords:
                let zoneScore = 0;
                if (inst.zonePrefPoint) {
                  const [px, py] = inst.zonePrefPoint;
                  const [rx0, ry0] = cellCenter(grid, au, av);
                  const [rx1, ry1] = cellCenter(grid, au + w - 1, av + h - 1);
                  const cxCand = (rx0 + rx1) / 2;
                  const cyCand = (ry0 + ry1) / 2;
                  const dist = Math.hypot(cxCand - px, cyCand - py);
                  // signedDir +1 → closer is better → score = +dist
                  // signedDir -1 → farther is better → score = -dist
                  zoneScore = -inst.zoneSignedDir * dist;
                }

                if (!best ||
                    aspectDiff < best.aspectDiff ||
                    (aspectDiff === best.aspectDiff && zoneScore < best.zoneScore) ||
                    (aspectDiff === best.aspectDiff && zoneScore === best.zoneScore && area < best.area)) {
                  best = { au, av, w, h, area, aspectDiff, zoneScore };
                }
              }
            }
          }

          if (!best) {
            unplaced.push(makeUnplacedEntry(inst.room, "no_rectangle_fits"));
            continue;
          }

          // Claim cells, update mask + bookkeeping.
          const cells = [];
          let cx = 0, cy = 0;
          for (let dv = 0; dv < best.h; dv++) {
            for (let du = 0; du < best.w; du++) {
              const u = best.au + du, v = best.av + dv;
              cells.push([u, v]);
              mask[v][u] = false;
              const [wx, wy] = cellCenter(grid, u, v);
              cx += wx; cy += wy;
            }
          }
          availableCells -= cells.length;
          cx /= cells.length; cy /= cells.length;

          const type = (typeof inst.room.template_id === "string" && inst.room.template_id.length > 0)
            ? inst.room.template_id
            : (typeof inst.room.id === "string" && inst.room.id.length > 0
                ? inst.room.id : "room");
          const displayName = (typeof inst.room.name === "string" && inst.room.name.length > 0)
            ? inst.room.name : toTitleCase(type);
          const actualArea = cells.length * cellArea;
          const targetArea = Number.isFinite(Number(inst.room.target_area_sf))
            ? Number(inst.room.target_area_sf)
            : (Number.isFinite(Number(inst.room.target_area)) ? Number(inst.room.target_area) : 0);
          placed.push({
            instance_id: nextInstanceId(type),
            type,
            template_id: type,
            display_name: displayName,
            department_id: region.id,
            // Step 04 — propagate template metadata into placed rooms so
            // the validator, JSON viewer, and future Stage C/D can read them.
            placement_zone: (typeof inst.room.placement_zone === "string")
              ? inst.room.placement_zone : null,
            daylight_priority: inst.room.daylight_priority || null,
            max_aspect_ratio: inst.maxAspect,
            parti_area_cells: Number.isFinite(Number(inst.room.parti_area_cells))
              ? Number(inst.room.parti_area_cells) : null,
            min_width_cells: inst.minWCells,
            min_depth_cells: inst.minDCells,
            cells,
            bbox_cells: {
              u_min: best.au, v_min: best.av,
              u_max: best.au + best.w - 1, v_max: best.av + best.h - 1
            },
            area_sf: actualArea,
            actual_area_sf: actualArea,
            target_area_sf: targetArea,
            centroid: [cx, cy],
            aspect_ratio: best.w / best.h,
            locked: false,
            lock_reason: null,
            // v1 — Phase 1. Populated by Stage C/D after placement.
            adjacency_violations: [],
            repair_reasons: [],
            confidence: null,
            confidence_subscores: null,
            // v1 — Phase 2. Declared adjacency targets + department group
            // so Stage C / Stage D can read them from the room directly.
            adjacencies: Array.isArray(inst.room.adjacencies)
              ? inst.room.adjacencies.map(a => ({ ...a })) : [],
            department_group: typeof inst.room.department_group === "string"
              ? inst.room.department_group : null
          });
        }
      }

      return { rooms: placed, unplaced };
    }

    // Step 04 — shared helper so all three unplaced code paths emit the
    // same shape (spec Section 03 and the click-to-pulse panel read this).
    function makeUnplacedEntry(room, reason) {
      if (!isPlainObject(room)) return { reason };
      const tpl = (typeof room.template_id === "string" && room.template_id.length > 0)
        ? room.template_id
        : (typeof room.id === "string" ? room.id : "room");
      const dep = (typeof room.department_id === "string" && room.department_id.length > 0)
        ? room.department_id
        : (typeof room.department === "string" ? room.department : "unassigned");
      const area = Number.isFinite(Number(room.target_area_sf))
        ? Number(room.target_area_sf)
        : (Number.isFinite(Number(room.target_area)) ? Number(room.target_area) : 0);
      return {
        type: tpl,
        template_id: tpl,
        department_id: dep,
        name: (typeof room.name === "string") ? room.name : tpl,
        target_area_sf: area,
        reason
      };
    }

    // ---------- Overflow warning ----------

    const OVERFLOW_WARNING_ID = "overflow";
    const GROSS_TO_NET_DEFAULT = 1.4;  // hardcoded for Step 03; Step 08 slider.

    // Replace-or-remove semantics: at most one overflow warning at a time.
    // Step 07 — floorCount is folded into the message so users see that e.g.
    // "2 floors" is the reason the capacity just doubled.
    function upsertOverflowWarning(warnings, programArea, capacity, floorCount) {
      const list = Array.isArray(warnings)
        ? warnings.filter(w => !(isPlainObject(w) && w.id === OVERFLOW_WARNING_ID))
        : [];
      if (programArea > capacity) {
        const fc = Math.max(1, Math.floor(Number(floorCount) || 1));
        const floorTxt = fc === 1 ? "1 floor" : (fc + " floors");
        list.push({
          id: OVERFLOW_WARNING_ID,
          severity: "warning",
          message: "Program (" + Math.round(programArea).toLocaleString() +
                   " SF) exceeds capacity (" + Math.round(capacity).toLocaleString() +
                   " SF across " + floorTxt + ") at gross/net " +
                   GROSS_TO_NET_DEFAULT.toFixed(1),
          raised_at: new Date().toISOString(),
          auto_clear_when: "programArea <= capacity"
        });
      }
      return list;
    }

    // ---------- Unplaced-rooms warning ----------

    const UNPLACED_WARNING_ID = "unplaced";

    // Replace-or-remove semantics: at most one unplaced warning at a time.
    function upsertUnplacedWarning(warnings, unplacedList) {
      const list = Array.isArray(warnings)
        ? warnings.filter(w => !(isPlainObject(w) && w.id === UNPLACED_WARNING_ID))
        : [];
      if (Array.isArray(unplacedList) && unplacedList.length > 0) {
        const types = [];
        for (const u of unplacedList) {
          const t = (isPlainObject(u) && typeof u.type === "string") ? u.type : "?";
          if (!types.includes(t)) types.push(t);
        }
        const head = types.slice(0, 3).join(", ");
        const tail = types.length > 3 ? ", ..." : "";
        list.push({
          id: UNPLACED_WARNING_ID,
          severity: "warning",
          message: unplacedList.length + " room(s) could not be placed: " + head + tail,
          raised_at: new Date().toISOString(),
          auto_clear_when: "all rooms placed"
        });
      }
      return list;
    }

    // ---------- Step 07 — multi-floor distribution ----------

    // Normalize the DB's free-form stacking_preference strings into one of
    //   "Ground" | "Top" | "Any"
    // The DB uses values like "Ground", "Ground/Roof", "Upper", "Roof/Penthouse",
    // "Basement/Ground", "All". Rules (applied top-to-bottom):
    //   * empty / missing / "any" / "all" / "same"    → "Any"
    //   * contains "ground" or "basement" (but not "roof"/"upper"/"top") → "Ground"
    //   * contains "roof"/"top"/"penthouse"/"upper"   → "Top"
    //   * anything else                               → "Any"
    function normalizeStackingPreference(raw) {
      if (raw == null) return "Any";
      const s = String(raw).toLowerCase().trim();
      if (s === "" || s === "any" || s === "all" || s === "same") return "Any";
      const hasGround = /ground|basement/.test(s);
      const hasTop = /roof|penthouse|\btop\b|upper/.test(s);
      if (hasGround && !hasTop) return "Ground";
      if (hasTop && !hasGround) return "Top";
      if (hasGround && hasTop) {
        // e.g. "Ground/Roof", "Upper/Ground" — prefer whichever the string
        // names FIRST, since the DB tends to list the primary preference first.
        const gi = s.search(/ground|basement/);
        const ti = s.search(/roof|penthouse|\btop\b|upper/);
        return ti >= 0 && gi >= 0 && ti < gi ? "Top" : "Ground";
      }
      return "Any";
    }

    // Distribute a flat list of room instances across floorCount floors.
    // Returns { byFloor, unplaced } where byFloor is an array of N instance
    // arrays and unplaced is a list of makeUnplacedEntry-shaped objects for
    // instances that found no floor with room.
    //
    // Algorithm (spec Section 03):
    //   1. Per-floor capacity = footprint / GROSS_TO_NET_DEFAULT.
    //   2. Sort Ground-first, Top-last, "Any" in the middle; within each
    //      class, higher floor_priority first.
    //   3. Fill floor 1 with "Ground" instances until capacity, spill to 2..N.
    //   4. Fill top floor with "Top" instances until capacity, spill downward.
    //   5. Any-stacked instances go to the floor with the most free capacity.
    //   6. stack_group members are kept together; once a group is placed on a
    //      floor, subsequent members prefer the same floor.
    //
    // lockedByFloor (optional) is an array of arrays: locked[fi] lists the
    // locked rooms on floor fi carried over from a previous plan. Their areas
    // pre-consume per-floor capacity so we don't over-assign.
    function distributeInstancesToFloors(instances, floorCount, footprintArea, lockedByFloor) {
      const fc = Math.max(1, Math.floor(Number(floorCount) || 1));
      const instList = Array.isArray(instances) ? instances.filter(isPlainObject) : [];
      const byFloor = [];
      for (let i = 0; i < fc; i++) byFloor.push([]);
      if (fc === 1) {
        return { byFloor: [instList.slice()], unplaced: [] };
      }
      const cap = Math.max(0, Number(footprintArea) || 0) / GROSS_TO_NET_DEFAULT;

      function areaOf(inst) {
        const a = Number(inst.target_area_sf);
        if (Number.isFinite(a) && a > 0) return a;
        const a2 = Number(inst.target_area);
        if (Number.isFinite(a2) && a2 > 0) return a2;
        // Locked carry-over rooms may only have area_sf.
        const a3 = Number(inst.area_sf);
        return Number.isFinite(a3) && a3 > 0 ? a3 : 0;
      }

      // Pre-consume capacity for locked carry-over rooms (their floor
      // assignment is preserved — the distributor may not re-home them).
      const usedByFloor = new Array(fc).fill(0);
      if (Array.isArray(lockedByFloor)) {
        for (let fi = 0; fi < fc; fi++) {
          const arr = lockedByFloor[fi];
          if (!Array.isArray(arr)) continue;
          for (const lp of arr) usedByFloor[fi] += areaOf(lp);
        }
      }

      // Classify each instance. Memoize so the sort below doesn't thrash.
      const classOf = new Map();
      for (const inst of instList) {
        classOf.set(inst, normalizeStackingPreference(inst.stacking_preference));
      }

      // Stable sort: Ground first, Any middle, Top last. Within each class,
      // higher floor_priority before lower. stack_group members sorted
      // together so the greedy fill naturally co-locates them.
      const classRank = { "Ground": 0, "Any": 1, "Top": 2 };
      const sorted = instList.slice().sort((a, b) => {
        const ca = classRank[classOf.get(a)];
        const cb = classRank[classOf.get(b)];
        if (ca !== cb) return ca - cb;
        const ga = a.stack_group || "";
        const gb = b.stack_group || "";
        if (ga !== gb) return ga < gb ? -1 : 1;
        const fpa = Number(a.floor_priority);
        const fpb = Number(b.floor_priority);
        const pa = Number.isFinite(fpa) ? fpa : 0;
        const pb = Number.isFinite(fpb) ? fpb : 0;
        return pb - pa;
      });

      const groupFloor = new Map();  // stack_group id → floor index
      const unplaced = [];
      const topIdx = fc - 1;

      function tryPut(fi, inst, area) {
        // Allow a small slack (5%) so a single oversized room doesn't skip a
        // floor it could tolerably fit on.
        if (usedByFloor[fi] + area > cap * 1.05 && cap > 0) return false;
        byFloor[fi].push(inst);
        usedByFloor[fi] += area;
        if (inst.stack_group) groupFloor.set(inst.stack_group, fi);
        return true;
      }

      for (const inst of sorted) {
        const area = areaOf(inst);
        const cls = classOf.get(inst);

        // stack_group co-location takes precedence over class preference —
        // once one wet-stack classroom lands on floor 2, the rest follow.
        if (inst.stack_group && groupFloor.has(inst.stack_group)) {
          const fi = groupFloor.get(inst.stack_group);
          if (tryPut(fi, inst, area)) continue;
          // Group floor is full — drop through to normal placement.
        }

        if (cls === "Ground") {
          if (tryPut(0, inst, area)) continue;
          let done = false;
          for (let fi = 1; fi < fc && !done; fi++) {
            done = tryPut(fi, inst, area);
          }
          if (!done) unplaced.push(makeUnplacedEntry(inst, "no_floor_space"));
        } else if (cls === "Top") {
          if (tryPut(topIdx, inst, area)) continue;
          let done = false;
          for (let fi = topIdx - 1; fi >= 0 && !done; fi--) {
            done = tryPut(fi, inst, area);
          }
          if (!done) unplaced.push(makeUnplacedEntry(inst, "no_floor_space"));
        } else {
          // Any — place on the floor with the most free capacity (ties → lowest index).
          let bestFi = -1, bestFree = -Infinity;
          for (let fi = 0; fi < fc; fi++) {
            const free = cap - usedByFloor[fi];
            if (free > bestFree && (usedByFloor[fi] + area <= cap * 1.05 || cap === 0)) {
              bestFi = fi;
              bestFree = free;
            }
          }
          if (bestFi < 0 || !tryPut(bestFi, inst, area)) {
            unplaced.push(makeUnplacedEntry(inst, "no_floor_space"));
          }
        }
      }

      return { byFloor, unplaced };
    }

    // ---------- generatePlan — orchestrator ----------

    // Deep clone via JSON round-trip. All our schema is JSON-safe.
    function cloneProject(p) {
      return JSON.parse(JSON.stringify(p));
    }

    // Runs the full Step 03 pipeline. Returns a NEW project object with
    // current_plan.floors[0] populated. Does NOT mutate input.
    // sunVectorLogged is a module-level flag so we log the first-run sun vector
    // once per page load.
    let __sunVectorLogged = false;
    let __cellSizeLogged = false;
    function generatePlan(project, buildingTypeJson) {
      if (!isPlainObject(project)) throw new Error("generatePlan: project must be an object");
      const np = cloneProject(project);
      if (!isPlainObject(np.context) || !isPlainObject(np.context.footprint)) {
        throw new Error("generatePlan: project.context.footprint missing");
      }
      const polygon = Array.isArray(np.context.footprint.polygon)
        ? np.context.footprint.polygon : [];
      if (polygon.length < 3) {
        throw new Error("generatePlan: footprint polygon needs at least 3 vertices");
      }

      // Ensure program substructure exists.
      if (!isPlainObject(np.context.program)) {
        np.context.program = {
          building_type: null, rooms: [], adjacency_graph: {},
          vertical_constraints: {}, program_inputs: {}, resolved_rooms_digest: null
        };
      }
      if (!isPlainObject(np.context.program.program_inputs)) {
        np.context.program.program_inputs = {};
      }

      // Step 04 — seed absent program_inputs from subtypes[0].
      seedProgramInputs(np.context.program.program_inputs, buildingTypeJson);

      // Step 07 — floor_count is now a canonical context.program field. If the
      // project predates Step 07 it might only have program_inputs.floor_count;
      // treat that as the source for the first migration, then keep both in sync.
      let floorCount = Number(np.context.program.floor_count);
      if (!Number.isFinite(floorCount) || floorCount < 1) {
        floorCount = Number.isFinite(Number(np.context.program.program_inputs.floor_count))
          ? Math.max(1, Math.floor(Number(np.context.program.program_inputs.floor_count)))
          : 1;
      }
      floorCount = Math.max(1, Math.floor(floorCount));
      np.context.program.floor_count = floorCount;
      np.context.program.program_inputs.floor_count = floorCount;

      // Step 04 — always re-resolve rooms from the current program_inputs so
      // count_rule edits take effect.
      const resolved = roomsFromBuildingType(buildingTypeJson, np.context.program.program_inputs, floorCount);
      np.context.program.rooms = resolved.instances;
      np.context.program.resolved_rooms_digest = resolved.digest;

      const rooms = np.context.program.rooms;

      // Step 07 — carry locked rooms forward PER floor. The locked room's
      // floor assignment is preserved; the distributor may not re-home it.
      const prevFloors = (isPlainObject(project.current_plan) &&
        Array.isArray(project.current_plan.floors))
          ? project.current_plan.floors : [];
      const lockedByFloor = [];
      for (let fi = 0; fi < floorCount; fi++) lockedByFloor.push([]);
      // Gather locked rooms from existing floors, clamping source indices to
      // the new floor count (a locked room on a floor that no longer exists
      // migrates down to the new top floor rather than disappearing).
      for (let fi = 0; fi < prevFloors.length; fi++) {
        const pf = prevFloors[fi];
        if (!isPlainObject(pf) || !Array.isArray(pf.rooms)) continue;
        const target = Math.min(fi, floorCount - 1);
        for (const r of pf.rooms) {
          if (isPlainObject(r) && r.locked === true &&
              Array.isArray(r.cells) && r.cells.length > 0) {
            lockedByFloor[target].push(JSON.parse(JSON.stringify(r)));
          }
        }
      }

      // Remove one matching fresh instance per carried-over locked room.
      const locksByKey = new Map();
      for (const arr of lockedByFloor) {
        for (const lp of arr) {
          const tpl = lp.template_id || lp.type || "";
          const dep = lp.department_id || "";
          const k = tpl + "|" + dep;
          locksByKey.set(k, (locksByKey.get(k) || 0) + 1);
        }
      }
      const freshPool = [];
      const consumedByKey = new Map();
      for (const inst of rooms) {
        const tpl = inst.template_id || inst.id || "";
        const dep = inst.department_id || inst.department || "";
        const k = tpl + "|" + dep;
        const lockedCap = locksByKey.get(k) || 0;
        const used = consumedByKey.get(k) || 0;
        if (used < lockedCap) {
          consumedByKey.set(k, used + 1);
          continue;  // locked carry-over occupies this slot
        }
        freshPool.push(inst);
      }

      // Grid + sun vector — shared across all floors (spec Section 01:
      // all floors share footprint, true north, and cell grid).
      const cellSize = chooseCellSize(polygon);
      if (!__cellSizeLogged) {
        console.debug("generatePlan: cell size chosen =", cellSize, "ft (footprint area",
                      Math.round(computePolygonAreaSF(polygon)).toLocaleString(), "SF)");
        __cellSizeLogged = true;
      }
      const grid = buildGrid(polygon, cellSize);

      const trueNorthDeg = Number(np.context.footprint.true_north_deg) || 0;
      const lat = np.context.footprint.lat;
      const sun = computeSunVector(trueNorthDeg, lat);
      if (!__sunVectorLogged) {
        console.debug("generatePlan: sun vector", sun, "true_north_deg", trueNorthDeg);
        __sunVectorLogged = true;
      }

      // Step 07 — distribute fresh pool across floors using stacking hints.
      const footprintArea = computePolygonAreaSF(polygon);
      const distribution = distributeInstancesToFloors(
        freshPool, floorCount, footprintArea, lockedByFloor);

      // Per-floor Stage A + Stage B. Stage A input is a synthetic "all rooms
      // on this floor" list (fresh + locked carry-over) so the zoning picks
      // up every department that has a room on that floor; Stage B packs the
      // fresh instances with the locked carry-over pre-reserved.
      const allUnplaced = distribution.unplaced.slice();
      const newFloors = [];
      for (let i = 0; i < floorCount; i++) {
        const floorFresh = distribution.byFloor[i] || [];
        const floorLocks = lockedByFloor[i] || [];
        // Shim each locked carry-over into the department-bucket input. Only
        // fields departmentsFromRooms reads are populated; other fields are
        // irrelevant for zoning.
        const floorAllForDept = floorFresh.concat(floorLocks.map(lp => ({
          department: lp.department_id,
          department_id: lp.department_id,
          department_name: lp.department_name || null,
          daylight_priority: lp.daylight_priority || "medium",
          target_area: Number(lp.target_area_sf) || Number(lp.area_sf) || 0,
          target_area_sf: Number(lp.target_area_sf) || Number(lp.area_sf) || 0,
          count: 1
        })));
        const floorDepts = departmentsFromRooms(floorAllForDept);
        const regions = runStageA(grid, sun, floorDepts);
        const stageB = runStageB(grid, regions, floorFresh, floorLocks);
        newFloors.push({
          level: i + 1,
          grid,           // shared reference; floors never mutate the grid
          sun_vector: sun,
          department_regions: regions,
          rooms: stageB.rooms,
          unplaced_rooms: stageB.unplaced
        });
        for (const u of stageB.unplaced) allUnplaced.push(u);
      }

      // Write floors back. Clamp active_floor_index to the new length.
      if (!isPlainObject(np.current_plan)) {
        np.current_plan = {
          floors: [], active_floor_index: 0, total_score: null,
          program_fit_report: null, unplaced_rooms: [], stale: false
        };
      }
      np.current_plan.floors = newFloors;
      const prevActive = Number.isFinite(Number(np.current_plan.active_floor_index))
        ? Math.floor(Number(np.current_plan.active_floor_index)) : 0;
      np.current_plan.active_floor_index = Math.max(0,
        Math.min(prevActive, floorCount - 1));
      // Top-level unplaced_rooms is the union of distribution-level overflow
      // (no_floor_space) and per-floor packing failures.
      np.current_plan.unplaced_rooms = allUnplaced;

      // Overflow warning — sum target_area_sf across instances (count=1 each).
      const programArea = rooms.reduce((acc, r) => {
        const a = Number.isFinite(Number(r.target_area_sf)) ? Number(r.target_area_sf)
               : (Number.isFinite(Number(r.target_area)) ? Number(r.target_area) : 0);
        return acc + a;
      }, 0);
      // Step 07 — capacity is per-floor × floor_count (we stack programs
      // vertically). The warning text mentions the floor count so users can
      // see why adding a floor cleared the overflow.
      const capacity = (footprintArea / GROSS_TO_NET_DEFAULT) * floorCount;
      np.warnings = upsertOverflowWarning(np.warnings, programArea, capacity, floorCount);
      np.warnings = upsertUnplacedWarning(np.warnings, allUnplaced);

      // v1 — Phase 2. Stage C: per-floor adjacency repair. Cascade depth 1,
      // max 3 iterations, max 5 repairs per iteration.
      for (const fl of newFloors) {
        runStageC(fl);
      }

      // v1 — Phase 3. Stage D: per-room confidence scoring + totals.
      if (!isPlainObject(np.confidence)) {
        np.confidence = {
          weights: {
            program_fit: 0.25, daylight: 0.25, adjacency: 0.15,
            lock_preservation: 0.20, circulation_quality: 0.15
          },
          threshold: 0.55, total_score: null,
          floor_scores: [], room_scores: [], below_threshold: false
        };
      }
      runStageD(np);

      // v1 — Phase 3. Low-confidence chip (auto-clearing — managed by
      // upsertLowConfidenceWarning).
      np.warnings = upsertLowConfidenceWarning(
        np.warnings, np.confidence.total_score, np.confidence.threshold);

      // v1 — Phase 5. Mirror context.program.program_inputs to the root-level
      // project.program_inputs alias on every generate so bundle/export and
      // spec-mandated field stay in sync.
      np.program_inputs = { ...(np.context.program.program_inputs || {}) };

      // Step 04 — clear stale flag; we've just regenerated.
      np.current_plan.stale = false;

      // Inputs-dirty chip clears on every generate/regenerate.
      np.warnings = (np.warnings || []).filter(
        w => !(isPlainObject(w) && w.id === "inputs_dirty"));

      // updated_at is displayed in metadata and used by autosave timestamps.
      np.updated_at = new Date().toISOString();
      // Make sure the engine_version reflects the code path that produced
      // this plan. (Old files loaded from disk keep their field otherwise.)
      np.engine_version = ENGINE_VERSION;

      return np;
    }

    // v1 — Phase 3. Low-confidence chip (warning-level, auto-clears on next
    // generate when score is above threshold).
    function upsertLowConfidenceWarning(warnings, totalScore, threshold) {
      const arr = Array.isArray(warnings) ? warnings.filter(
        w => !(isPlainObject(w) && w.id === "low_confidence")) : [];
      if (totalScore != null && Number.isFinite(totalScore) &&
          threshold != null && totalScore < threshold) {
        arr.push({
          id: "low_confidence",
          severity: "warning",
          message: "Total confidence " + (totalScore * 100).toFixed(0) +
            "% below " + (threshold * 100).toFixed(0) +
            "% threshold — consider regenerating",
          raised_at: new Date().toISOString()
        });
      }
      return arr;
    }

    // ============================================================
    // v1 — Phase 2. STAGE C: adjacency repair
    // Local solver, cascade depth 1, max 3 iterations, 5 repairs/iteration.
    // Mutates the floor's rooms in place (adjacency_violations + repair_reasons).
    // ============================================================

    function cellsCentroidCells(cells) {
      if (!Array.isArray(cells) || cells.length === 0) return [0, 0];
      let su = 0, sv = 0;
      for (const [u, v] of cells) { su += u; sv += v; }
      return [su / cells.length, sv / cells.length];
    }

    function minCellDistance(cellsA, cellsB) {
      let best = Infinity;
      for (const [ua, va] of cellsA) {
        for (const [ub, vb] of cellsB) {
          const d = Math.abs(ua - ub) + Math.abs(va - vb);
          if (d < best) best = d;
          if (best === 0) return 0;
        }
      }
      return best === Infinity ? -1 : best;
    }

    function computeAdjacencyViolations(rooms) {
      // Returns [{A, B, distance}] where A.adjacencies lists B.template_id and
      // min cell distance > 2. Only pairs where both rooms are on this floor.
      const violations = [];
      const byTemplate = new Map();
      for (const r of rooms) {
        if (!isPlainObject(r)) continue;
        const tid = r.template_id || r.type;
        if (!tid) continue;
        if (!byTemplate.has(tid)) byTemplate.set(tid, []);
        byTemplate.get(tid).push(r);
      }
      for (const A of rooms) {
        if (!isPlainObject(A) || !Array.isArray(A.adjacencies)) continue;
        if (!Array.isArray(A.cells) || A.cells.length === 0) continue;
        for (const decl of A.adjacencies) {
          if (!isPlainObject(decl) || !decl.template_id) continue;
          const candidates = byTemplate.get(decl.template_id) || [];
          let bestTarget = null, bestDist = Infinity;
          for (const B of candidates) {
            if (B === A) continue;
            if (!Array.isArray(B.cells) || B.cells.length === 0) continue;
            const d = minCellDistance(A.cells, B.cells);
            if (d >= 0 && d < bestDist) { bestDist = d; bestTarget = B; }
          }
          if (bestTarget && bestDist > 2) {
            violations.push({ A, B: bestTarget, distance: bestDist, decl });
          }
        }
      }
      return violations;
    }

    function runStageC(floor) {
      if (!isPlainObject(floor) || !Array.isArray(floor.rooms) ||
          !isPlainObject(floor.grid)) return;
      const rooms = floor.rooms;
      if (rooms.length === 0) return;

      // Reset per-run fields (leave repair_reasons populated across iters
      // inside this run; cleared only at the start of a generate call).
      for (const r of rooms) {
        if (!isPlainObject(r)) continue;
        r.adjacency_violations = [];
        r.repair_reasons = [];
      }

      const maxIters = 3;
      let repairsTotal = 0;
      for (let iter = 0; iter < maxIters; iter++) {
        const violations = computeAdjacencyViolations(rooms);
        if (violations.length === 0) { repairsTotal; break; }
        violations.sort((a, b) => b.distance - a.distance);
        let repairedThisIter = 0;
        for (const v of violations) {
          if (repairedThisIter >= 5) break;
          const C = findIntermediateRoom(v.A, v.B, rooms);
          if (!C) continue;
          if (C.locked) continue;
          const newPos = findRelocationFor(C, floor, [v.A.cells, v.B.cells]);
          if (!newPos) continue;
          applyRelocation(C, newPos, floor);
          (v.A.repair_reasons = v.A.repair_reasons || []).push({
            iteration: iter,
            action: "intermediate_displaced",
            reason: "moved " + (C.instance_id || C.type) +
                    " to improve " + (v.A.instance_id || v.A.type) +
                    "↔" + (v.B.instance_id || v.B.type)
          });
          repairedThisIter++;
        }
        repairsTotal += repairedThisIter;
        if (repairedThisIter === 0) break;
      }

      // Final violation pass: write to each room's adjacency_violations.
      const finalViolations = computeAdjacencyViolations(rooms);
      for (const v of finalViolations) {
        (v.A.adjacency_violations = v.A.adjacency_violations || []).push({
          other_room_id: v.B.instance_id,
          declared_distance: 2,
          actual_distance: v.distance
        });
      }
      console.debug("Stage C: " + rooms.length + " rooms, " +
        repairsTotal + " repairs applied, " + finalViolations.length +
        " violations remaining");
    }

    // Returns an unlocked room (not A or B) whose centroid falls in the
    // cell-space bbox of A ∪ B. null if none.
    function findIntermediateRoom(A, B, rooms) {
      const all = (A.cells || []).concat(B.cells || []);
      if (all.length === 0) return null;
      let umin = Infinity, umax = -Infinity, vmin = Infinity, vmax = -Infinity;
      for (const [u, v] of all) {
        if (u < umin) umin = u; if (u > umax) umax = u;
        if (v < vmin) vmin = v; if (v > vmax) vmax = v;
      }
      for (const C of rooms) {
        if (!isPlainObject(C) || C === A || C === B) continue;
        if (C.locked) continue;
        if (!Array.isArray(C.cells) || C.cells.length === 0) continue;
        const [cu, cv] = cellsCentroidCells(C.cells);
        if (cu >= umin && cu <= umax && cv >= vmin && cv <= vmax) return C;
      }
      return null;
    }

    // Find a contiguous cell set (same area as room.cells) within radius 5 of
    // the room's centroid, inside its department region, not overlapping
    // locked rooms or any of `avoidCellSets`, preserving aspect ratio ±30%.
    function findRelocationFor(room, floor, avoidCellSets) {
      if (!isPlainObject(room) || !Array.isArray(room.cells)) return null;
      const grid = floor.grid;
      const W = grid.width_cells, H = grid.height_cells;
      const regions = Array.isArray(floor.department_regions)
        ? floor.department_regions : [];
      const region = regions.find(r => r && r.id === room.department_id);
      if (!region || !Array.isArray(region.cells)) return null;

      // Region cell lookup.
      const regionSet = new Set();
      for (const [u, v] of region.cells) regionSet.add(u + "," + v);

      // Occupied cells = every other room's cells (+ locked rooms).
      const occupied = new Set();
      for (const r of (floor.rooms || [])) {
        if (!isPlainObject(r) || r === room) continue;
        if (!Array.isArray(r.cells)) continue;
        for (const [u, v] of r.cells) occupied.add(u + "," + v);
      }
      // Avoid cells from the caller.
      const avoid = new Set();
      if (Array.isArray(avoidCellSets)) {
        for (const set of avoidCellSets) {
          if (!Array.isArray(set)) continue;
          for (const [u, v] of set) avoid.add(u + "," + v);
        }
      }

      const area = room.cells.length;
      const bb = room.bbox_cells || { u_min: 0, u_max: 0, v_min: 0, v_max: 0 };
      const w0 = bb.u_max - bb.u_min + 1;
      const h0 = bb.v_max - bb.v_min + 1;
      const aspect0 = (w0 >= h0) ? (w0 / h0) : (h0 / w0);

      const [ccu, ccv] = cellsCentroidCells(room.cells);
      const radius = 5;

      // Generate candidate (w, h) pairs s.t. w*h ≈ area, aspect within ±30%.
      const candidates = [];
      for (let w = 1; w <= Math.min(W, area); w++) {
        const h = Math.round(area / w);
        if (h < 1 || h > H) continue;
        if (w * h < area * 0.85 || w * h > area * 1.15) continue;
        const ar = (w >= h) ? (w / h) : (h / w);
        if (ar > aspect0 * 1.3 || ar < aspect0 * 0.7) continue;
        candidates.push([w, h]);
      }
      if (candidates.length === 0) candidates.push([w0, h0]);

      // Scan within radius 5 of centroid for a w×h block that satisfies all.
      let best = null;
      for (const [w, h] of candidates) {
        for (let av = Math.max(0, Math.floor(ccv - radius));
             av <= Math.min(H - h, Math.ceil(ccv + radius)); av++) {
          for (let au = Math.max(0, Math.floor(ccu - radius));
               au <= Math.min(W - w, Math.ceil(ccu + radius)); au++) {
            let ok = true;
            for (let dv = 0; dv < h && ok; dv++) {
              for (let du = 0; du < w; du++) {
                const u = au + du, v = av + dv;
                const k = u + "," + v;
                if (!regionSet.has(k)) { ok = false; break; }
                if (occupied.has(k)) { ok = false; break; }
                if (avoid.has(k)) { ok = false; break; }
              }
            }
            if (!ok) continue;
            const dist = Math.abs(au + w / 2 - ccu) +
                         Math.abs(av + h / 2 - ccv);
            if (!best || dist < best.dist) {
              best = { au, av, w, h, dist };
            }
          }
        }
      }
      if (!best) return null;
      const newCells = [];
      for (let dv = 0; dv < best.h; dv++) {
        for (let du = 0; du < best.w; du++) {
          newCells.push([best.au + du, best.av + dv]);
        }
      }
      // Reject no-op moves (result === current cells).
      const curKey = room.cells.map(c => c[0] + "," + c[1]).sort().join(";");
      const newKey = newCells.map(c => c[0] + "," + c[1]).sort().join(";");
      if (curKey === newKey) return null;
      return {
        cells: newCells,
        bbox_cells: {
          u_min: best.au, v_min: best.av,
          u_max: best.au + best.w - 1, v_max: best.av + best.h - 1
        }
      };
    }

    function applyRelocation(room, newPos, floor) {
      room.cells = newPos.cells;
      room.bbox_cells = newPos.bbox_cells;
      const grid = floor.grid;
      if (isPlainObject(grid)) {
        let cx = 0, cy = 0;
        for (const [u, v] of room.cells) {
          const [wx, wy] = cellCenter(grid, u, v);
          cx += wx; cy += wy;
        }
        room.centroid = [cx / room.cells.length, cy / room.cells.length];
        const cellArea = grid.cell_size_ft * grid.cell_size_ft;
        room.area_sf = room.cells.length * cellArea;
        room.actual_area_sf = room.area_sf;
        const bb = room.bbox_cells;
        const w = bb.u_max - bb.u_min + 1;
        const h = bb.v_max - bb.v_min + 1;
        room.aspect_ratio = (h > 0) ? w / h : 1;
      }
    }

    // ============================================================
    // v1 — Phase 3. STAGE D: per-room confidence scoring (5 weights).
    // ============================================================

    // Distance from a cell (u, v) to the nearest boundary cell on the floor.
    // Uses a simple Manhattan to the grid edge or any "outside" cell neighbor.
    function cellDistanceToFacade(u, v, grid) {
      if (!isPlainObject(grid)) return 0;
      const W = grid.width_cells, H = grid.height_cells;
      // Nearest grid edge (approx: distance to the 4 sides)
      const dEdge = Math.min(u, v, W - 1 - u, H - 1 - v);
      // Also: if there's an "outside" cell within the grid within some ring,
      // count that distance.
      const inside = grid.inside;
      if (Array.isArray(inside)) {
        for (let r = 0; r <= dEdge; r++) {
          // Ring scan
          for (let du = -r; du <= r; du++) {
            const nu = u + du;
            if (nu < 0 || nu >= W) continue;
            const ringV = [v - r, v + r];
            for (const nv of ringV) {
              if (nv < 0 || nv >= H) continue;
              if (!inside[nv] || !inside[nv][nu]) return r;
            }
          }
          for (let dv = -r + 1; dv <= r - 1; dv++) {
            const nv = v + dv;
            if (nv < 0 || nv >= H) continue;
            const ringU = [u - r, u + r];
            for (const nu of ringU) {
              if (nu < 0 || nu >= W) continue;
              if (!inside[nv] || !inside[nv][nu]) return r;
            }
          }
        }
      }
      return dEdge;
    }

    function scoreRoom(room, rooms, grid, prevCellsByInstance) {
      const subscores = {
        program_fit: 1,
        daylight: 1,
        adjacency: 1,
        lock_preservation: 1,
        circulation_quality: 1
      };

      if (!isPlainObject(room) || !Array.isArray(room.cells) ||
          !isPlainObject(grid)) return subscores;

      const cellArea = grid.cell_size_ft * grid.cell_size_ft;

      // 1) program_fit: |actual - target| / target
      const target = Number.isFinite(Number(room.target_area_sf)) &&
                     Number(room.target_area_sf) > 0
        ? Number(room.target_area_sf) / cellArea : room.cells.length;
      const actual = room.cells.length;
      subscores.program_fit = (target > 0)
        ? Math.max(0, 1 - Math.min(1, Math.abs(actual - target) / target))
        : 1;

      // 2) daylight: distance to facade vs. priority target distance
      let targetDist = 6;
      switch (String(room.daylight_priority || "").toLowerCase()) {
        case "high": targetDist = 0; break;
        case "medium": targetDist = 2; break;
        case "low": targetDist = 4; break;
        default: targetDist = 6; break;
      }
      let minDist = Infinity;
      for (const [u, v] of room.cells) {
        const d = cellDistanceToFacade(u, v, grid);
        if (d < minDist) minDist = d;
      }
      if (minDist === Infinity) minDist = 0;
      subscores.daylight = Math.max(0, 1 - Math.min(1,
        Math.abs(minDist - targetDist) / 6));

      // 3) adjacency: declared vs. violations
      const declared = Array.isArray(room.adjacencies) ? room.adjacencies.length : 0;
      if (declared === 0) {
        subscores.adjacency = 1.0;
      } else {
        const vios = Array.isArray(room.adjacency_violations)
          ? room.adjacency_violations.length : 0;
        subscores.adjacency = Math.max(0, (declared - vios) / declared);
      }

      // 4) lock_preservation
      if (room.locked === true) {
        // If the locked room moved since last snapshot, that's a violation.
        if (prevCellsByInstance) {
          const prev = prevCellsByInstance.get(room.instance_id);
          if (Array.isArray(prev)) {
            const a = prev.map(c => c[0] + "," + c[1]).sort().join(";");
            const b = room.cells.map(c => c[0] + "," + c[1]).sort().join(";");
            subscores.lock_preservation = (a === b) ? 1.0 : 0.0;
          } else {
            subscores.lock_preservation = 1.0;
          }
        } else {
          subscores.lock_preservation = 1.0;
        }
      } else {
        subscores.lock_preservation = 1.0;
      }

      // 5) circulation_quality
      const isCirc = (typeof room.department_group === "string" &&
                     room.department_group.toLowerCase() === "circulation") ||
                     /corridor|circulation|lobby|stair/i.test(
                       String(room.template_id || room.type || ""));
      if (isCirc) {
        const others = rooms.filter(r => r && r !== room && Array.isArray(r.cells));
        if (others.length === 0) {
          subscores.circulation_quality = 1.0;
        } else {
          let reachable = 0;
          for (const o of others) {
            const d = minCellDistance(room.cells, o.cells);
            if (d >= 0 && d <= 8) reachable++;
          }
          subscores.circulation_quality = reachable / others.length;
        }
      } else {
        const circRooms = rooms.filter(r => {
          if (!isPlainObject(r) || r === room) return false;
          const grp = (r.department_group || "").toLowerCase();
          if (grp === "circulation") return true;
          return /corridor|circulation|lobby|stair/i.test(
            String(r.template_id || r.type || ""));
        });
        if (circRooms.length === 0) {
          subscores.circulation_quality = 0.5;
        } else {
          let hasAccess = false;
          for (const c of circRooms) {
            if (!Array.isArray(c.cells) || c.cells.length === 0) continue;
            const d = minCellDistance(room.cells, c.cells);
            if (d >= 0 && d <= 4) { hasAccess = true; break; }
          }
          subscores.circulation_quality = hasAccess ? 1.0 : 0.5;
        }
      }

      return subscores;
    }

    function weightedRoomScore(subscores, weights) {
      if (!isPlainObject(subscores) || !isPlainObject(weights)) return 0;
      const keys = ["program_fit","daylight","adjacency","lock_preservation","circulation_quality"];
      // Normalize weights to sum 1.
      let total = 0;
      for (const k of keys) total += Number(weights[k]) || 0;
      if (total <= 0) total = 1;
      let s = 0;
      for (const k of keys) {
        const w = (Number(weights[k]) || 0) / total;
        s += w * (Number(subscores[k]) || 0);
      }
      return Math.max(0, Math.min(1, s));
    }

    // Full pass: compute subscores + per-room confidence + floor scores + total.
    // prevProject optional (for lock_preservation diffing).
    function runStageD(project, prevProject) {
      if (!isPlainObject(project) || !isPlainObject(project.current_plan)) return;
      const weights = (isPlainObject(project.confidence) &&
                       isPlainObject(project.confidence.weights))
        ? project.confidence.weights
        : { program_fit: 0.25, daylight: 0.25, adjacency: 0.15,
            lock_preservation: 0.20, circulation_quality: 0.15 };

      // Build previous-cells lookup for lock_preservation.
      const prevCellsByInstance = new Map();
      if (isPlainObject(prevProject) && isPlainObject(prevProject.current_plan) &&
          Array.isArray(prevProject.current_plan.floors)) {
        for (const fl of prevProject.current_plan.floors) {
          if (!isPlainObject(fl) || !Array.isArray(fl.rooms)) continue;
          for (const r of fl.rooms) {
            if (isPlainObject(r) && r.instance_id && Array.isArray(r.cells)) {
              prevCellsByInstance.set(r.instance_id, r.cells.map(c => c.slice()));
            }
          }
        }
      }

      const floorScores = [];
      const roomScores = [];
      const floors = Array.isArray(project.current_plan.floors)
        ? project.current_plan.floors : [];

      for (const fl of floors) {
        if (!isPlainObject(fl) || !Array.isArray(fl.rooms) ||
            !isPlainObject(fl.grid)) continue;
        const rooms = fl.rooms;
        let scoreSum = 0;
        let scored = 0;
        for (const r of rooms) {
          if (!isPlainObject(r) || !Array.isArray(r.cells) ||
              r.cells.length === 0) continue;
          const subs = scoreRoom(r, rooms, fl.grid, prevCellsByInstance);
          const score = weightedRoomScore(subs, weights);
          r.confidence = score;
          r.confidence_subscores = subs;
          scoreSum += score;
          scored++;
          roomScores.push({
            floor_level: fl.level,
            room_id: r.instance_id,
            score,
            subscores: { ...subs },
            reasons: []
          });
        }
        const floorScore = scored > 0 ? scoreSum / scored : 0;
        floorScores.push({ level: fl.level, score: floorScore });
      }

      const totalScore = floorScores.length > 0
        ? floorScores.reduce((a, x) => a + x.score, 0) / floorScores.length
        : null;

      project.confidence.total_score = totalScore;
      project.confidence.floor_scores = floorScores;
      project.confidence.room_scores = roomScores;
      project.confidence.below_threshold =
        (totalScore != null && totalScore < (project.confidence.threshold || 0.55));
    }

    // v1 — Phase 3. Recompute scores with current weights WITHOUT re-running
    // Stage A/B/C. Used by the weight sliders so dragging updates the total
    // score instantly.
    function recomputeScoresOnly(project) {
      if (!isPlainObject(project)) return project;
      const np = cloneProject(project);
      runStageD(np);
      np.warnings = upsertLowConfidenceWarning(
        np.warnings, np.confidence.total_score, np.confidence.threshold);
      return np;
    }

    // ---------- Step 05 — localReflow ----------

    // Lock reason enum, shared by the lock chip UI and any future validator.
    const LOCK_REASONS = [
      "client_request",
      "code_required",
      "site_constraint",
      "daylight",
      "adjacency",
      "other"
    ];

    // Move `roomId` to cover `newCells`, absorbing any single displaced room
    // into the vacated cells. Returns { ok: true, project } on success or
    // { ok: false, reason } on any rejection. Does NOT mutate `project`.
    //
    // Step 05 rules (v3 spec, Section 04):
    //   1. Cascade depth 1 — at most one other room may be displaced.
    //   2. Locked rooms cannot be displaced.
    //   3. Drop centroid must be within `options.radius` Manhattan cells of
    //      the original room's centroid (default 4).
    //   4. All cells in `newCells` must be in the same department as the
    //      dragged room's home department. (Stepping across depts comes later.)
    //   5. The displaced room's new shape is the best rectangle inside
    //      (its remaining cells ∪ the dragged room's vacated cells) that
    //      respects its min dimensions, max aspect, and lands within
    //      [0.75×, 1.25×] of its target area.
    function localReflow(project, roomId, newCells, options) {
      const opts = isPlainObject(options) ? options : {};
      const radius = Number.isFinite(Number(opts.radius)) ? Number(opts.radius) : 4;
      const cascadeDepth = Number.isFinite(Number(opts.cascadeDepth))
        ? Number(opts.cascadeDepth) : 1;

      if (!isPlainObject(project) || !isPlainObject(project.current_plan)) {
        return { ok: false, reason: "no_plan" };
      }
      const floors = Array.isArray(project.current_plan.floors)
        ? project.current_plan.floors : [];
      // Step 07 — operate on the active floor (Step 06 hardcoded floors[0]).
      // opts.floorIndex overrides if the caller wants to target a specific one.
      const fIdx = Number.isInteger(opts.floorIndex)
        ? opts.floorIndex
        : (Number.isFinite(Number(project.current_plan.active_floor_index))
            ? Math.floor(Number(project.current_plan.active_floor_index)) : 0);
      const floor = (fIdx >= 0 && fIdx < floors.length && isPlainObject(floors[fIdx]))
        ? floors[fIdx] : null;
      if (!floor || !isPlainObject(floor.grid)) {
        return { ok: false, reason: "no_plan" };
      }
      const grid = floor.grid;
      const W = grid.width_cells, H = grid.height_cells;
      const regions = Array.isArray(floor.department_regions)
        ? floor.department_regions : [];
      const placedRooms = Array.isArray(floor.rooms) ? floor.rooms : [];

      const roomIdx = placedRooms.findIndex(r =>
        isPlainObject(r) && r.instance_id === roomId);
      if (roomIdx < 0) return { ok: false, reason: "no_room" };
      const room = placedRooms[roomIdx];
      if (room.locked) return { ok: false, reason: "locked_self" };

      const oldCells = (Array.isArray(room.cells) ? room.cells : []).map(c => c.slice());
      if (oldCells.length === 0) return { ok: false, reason: "no_old_cells" };

      // Normalize + de-dup newCells (arrays of [u, v]).
      const seen = new Set();
      const newCellsArr = [];
      for (const c of (Array.isArray(newCells) ? newCells : [])) {
        if (!Array.isArray(c) || c.length < 2) continue;
        const u = Math.round(Number(c[0])), v = Math.round(Number(c[1]));
        if (!Number.isFinite(u) || !Number.isFinite(v)) continue;
        const k = u + "," + v;
        if (seen.has(k)) continue;
        seen.add(k);
        newCellsArr.push([u, v]);
      }
      if (newCellsArr.length === 0) return { ok: false, reason: "no_new_cells" };

      // Rule 3 — radius check. Manhattan distance between (u,v) centroids.
      const oldCentroidUV = cellsCentroidUV(oldCells);
      const newCentroidUV = cellsCentroidUV(newCellsArr);
      const manhattan = Math.abs(newCentroidUV[0] - oldCentroidUV[0]) +
                       Math.abs(newCentroidUV[1] - oldCentroidUV[1]);
      if (manhattan > radius) return { ok: false, reason: "out_of_radius" };

      // Rule 4 — all newCells in grid, inside polygon, in home department.
      const regionOwner = new Map();
      for (const rr of regions) {
        if (!isPlainObject(rr) || !Array.isArray(rr.cells)) continue;
        for (const [u, v] of rr.cells) {
          regionOwner.set(u + "," + v, rr.id);
        }
      }
      const homeDept = room.department_id;
      for (const [u, v] of newCellsArr) {
        if (u < 0 || u >= W || v < 0 || v >= H) {
          return { ok: false, reason: "outside_department" };
        }
        if (!grid.inside[v] || !grid.inside[v][u]) {
          return { ok: false, reason: "outside_department" };
        }
        if (regionOwner.get(u + "," + v) !== homeDept) {
          return { ok: false, reason: "outside_department" };
        }
      }

      // Compute vacated + claimed sets relative to the dragged room.
      const oldSet = new Set(oldCells.map(c => c[0] + "," + c[1]));
      const newSet = new Set(newCellsArr.map(c => c[0] + "," + c[1]));
      const vacatedCells = oldCells.filter(c => !newSet.has(c[0] + "," + c[1]));
      const claimedCells = newCellsArr.filter(c => !oldSet.has(c[0] + "," + c[1]));
      const claimedSet = new Set(claimedCells.map(c => c[0] + "," + c[1]));

      // Find rooms (other than dragged) whose cells overlap claimedCells.
      const displacedIds = new Set();
      for (const r of placedRooms) {
        if (!isPlainObject(r) || r.instance_id === roomId) continue;
        if (!Array.isArray(r.cells)) continue;
        for (const [u, v] of r.cells) {
          if (claimedSet.has(u + "," + v)) {
            displacedIds.add(r.instance_id);
            break;
          }
        }
      }

      // Rule 1 — cascade depth cap.
      if (displacedIds.size > cascadeDepth) {
        return { ok: false, reason: "cascade_overflow" };
      }
      // Rule 2 — no displacing locked rooms.
      for (const id of displacedIds) {
        const r = placedRooms.find(r => r.instance_id === id);
        if (r && r.locked) return { ok: false, reason: "locked_collision" };
      }

      // If there is a displaced room, compute its new cells from the pool
      // (its old cells minus claimed) ∪ (dragged room's vacated cells).
      let newDisplacedRoom = null;
      let displacedOriginalIdx = -1;
      if (displacedIds.size === 1) {
        const dId = [...displacedIds][0];
        displacedOriginalIdx = placedRooms.findIndex(r => r.instance_id === dId);
        const disp = placedRooms[displacedOriginalIdx];
        const dOldCells = (Array.isArray(disp.cells) ? disp.cells : [])
          .map(c => c.slice());
        const dRemaining = dOldCells
          .filter(c => !claimedSet.has(c[0] + "," + c[1]));

        // Pool = remaining ∪ vacated (deduped).
        const poolSet = new Set();
        for (const [u, v] of dRemaining) poolSet.add(u + "," + v);
        for (const [u, v] of vacatedCells) poolSet.add(u + "," + v);

        const mask = new Array(H);
        for (let v = 0; v < H; v++) mask[v] = new Array(W).fill(false);
        for (const key of poolSet) {
          const parts = key.split(",");
          const u = Number(parts[0]), v = Number(parts[1]);
          if (u >= 0 && u < W && v >= 0 && v < H) mask[v][u] = true;
        }

        const minW = Math.max(1, Math.floor(Number(disp.min_width_cells)) || 1);
        const minD = Math.max(1, Math.floor(Number(disp.min_depth_cells)) || 1);
        const maxAspect = (Number.isFinite(Number(disp.max_aspect_ratio)) &&
                           Number(disp.max_aspect_ratio) > 0)
          ? Number(disp.max_aspect_ratio) : 2.5;
        const cellArea = grid.cell_size_ft * grid.cell_size_ft;
        const targetArea = (Number.isFinite(Number(disp.target_area_sf)) &&
                            Number(disp.target_area_sf) > 0)
          ? Number(disp.target_area_sf)
          : dOldCells.length * cellArea;
        const targetCells = Math.max(1, Math.round(targetArea / cellArea));
        const minCells = Math.floor(targetCells * 0.75);
        const maxCells = Math.ceil(targetCells * 1.25);

        // Anchor (in cell-space u,v) — remaining centroid, else old centroid.
        const anchor = dRemaining.length > 0
          ? cellsCentroidUV(dRemaining)
          : cellsCentroidUV(dOldCells);

        // Column-wise downward runs in mask.
        const down = new Array(H);
        for (let v = H - 1; v >= 0; v--) {
          const row = new Array(W);
          for (let u = 0; u < W; u++) {
            row[u] = mask[v][u] ? (1 + (v + 1 < H ? down[v + 1][u] : 0)) : 0;
          }
          down[v] = row;
        }

        // Scan every rectangle in `mask`; keep the one that best:
        //   1. covers the most of dRemaining,
        //   2. centers closest to the remaining centroid,
        //   3. matches targetCells most closely.
        let best = null;
        for (let av = 0; av < H; av++) {
          for (let au = 0; au < W; au++) {
            if (!mask[av][au]) continue;
            let maxW = 0;
            while (au + maxW < W && mask[av][au + maxW]) maxW++;
            let minDown = Infinity;
            for (let w = 1; w <= maxW; w++) {
              const d = down[av][au + w - 1];
              if (d < minDown) minDown = d;
              if (minDown < 1) break;
              for (let h = 1; h <= minDown; h++) {
                const area = w * h;
                if (area < minCells) continue;
                if (area > maxCells) continue;
                const ar = (w >= h) ? (w / h) : (h / w);
                if (ar > maxAspect + 1e-9) continue;
                const fitsW = (w >= minW && h >= minD);
                const fitsR = (h >= minW && w >= minD);
                if (!fitsW && !fitsR) continue;

                let coverage = 0;
                for (const [ru, rv] of dRemaining) {
                  if (ru >= au && ru < au + w && rv >= av && rv < av + h) {
                    coverage++;
                  }
                }
                const ccu = au + w / 2, ccv = av + h / 2;
                const dc = Math.hypot(ccu - anchor[0], ccv - anchor[1]);
                const areaDiff = Math.abs(area - targetCells);

                if (!best ||
                    coverage > best.coverage ||
                    (coverage === best.coverage && dc < best.dc) ||
                    (coverage === best.coverage && dc === best.dc &&
                     areaDiff < best.areaDiff)) {
                  best = { au, av, w, h, area, coverage, dc, areaDiff };
                }
              }
            }
          }
        }

        if (!best) return { ok: false, reason: "displaced_cannot_fit" };

        const dNewCells = [];
        for (let dv = 0; dv < best.h; dv++) {
          for (let du = 0; du < best.w; du++) {
            dNewCells.push([best.au + du, best.av + dv]);
          }
        }
        newDisplacedRoom = rebuildRoomGeometry(disp, dNewCells, grid);
      }

      // Build the new project. Deep-clone so callers can still hold the old.
      const newProject = cloneProject(project);
      const newRooms = newProject.current_plan.floors[fIdx].rooms;
      newRooms[roomIdx] = rebuildRoomGeometry(room, newCellsArr, grid);
      if (newDisplacedRoom && displacedOriginalIdx >= 0) {
        newRooms[displacedOriginalIdx] = newDisplacedRoom;
      }
      newProject.updated_at = new Date().toISOString();
      return { ok: true, project: newProject };
    }

    // Step 05 — centroid of a cell list in (u, v) cell-space coords. Used by
    // localReflow for the radius check and for anchoring the displaced rect.
    function cellsCentroidUV(cells) {
      if (!Array.isArray(cells) || cells.length === 0) return [0, 0];
      let cu = 0, cv = 0;
      for (const [u, v] of cells) { cu += u; cv += v; }
      return [cu / cells.length, cv / cells.length];
    }

    // Step 05 — produce a new room object with cells/bbox/centroid/area/aspect
    // recomputed from `newCells`. Every other field (instance_id, locked,
    // display_name, department_id, ...) is preserved. Never mutates input.
    function rebuildRoomGeometry(room, newCells, grid) {
      const cellArea = grid.cell_size_ft * grid.cell_size_ft;
      let uMin = Infinity, uMax = -Infinity, vMin = Infinity, vMax = -Infinity;
      let cx = 0, cy = 0;
      for (const [u, v] of newCells) {
        if (u < uMin) uMin = u;
        if (u > uMax) uMax = u;
        if (v < vMin) vMin = v;
        if (v > vMax) vMax = v;
        const [wx, wy] = cellCenter(grid, u, v);
        cx += wx; cy += wy;
      }
      cx /= newCells.length; cy /= newCells.length;
      const w = uMax - uMin + 1, h = vMax - vMin + 1;
      const actualArea = newCells.length * cellArea;
      return {
        ...room,
        cells: newCells.map(c => c.slice()),
        bbox_cells: { u_min: uMin, v_min: vMin, u_max: uMax, v_max: vMax },
        centroid: [cx, cy],
        area_sf: actualArea,
        actual_area_sf: actualArea,
        aspect_ratio: (h > 0) ? w / h : 1
      };
    }

    // ---------- Step 07 — crossFloorMove ----------

    // Pure rectangle-search helper used by both Stage B and crossFloorMove.
    // Scans every (au, av, w, h) rectangle inside `mask` looking for the best
    // match to (cellsNeeded, minW, minD, maxAspect). Returns the placement or
    // null. `targetAspect` controls the tie-break preference; defaults to 1.
    function findBestRectInMask(mask, H, W, cellsNeeded, minW, minD, maxAspect, targetAspect) {
      const ta = Number.isFinite(targetAspect) && targetAspect > 0 ? targetAspect : 1;
      // Column-wise downward runs.
      const down = new Array(H);
      for (let v = H - 1; v >= 0; v--) {
        const row = new Array(W);
        for (let u = 0; u < W; u++) {
          row[u] = mask[v][u] ? (1 + (v + 1 < H ? down[v + 1][u] : 0)) : 0;
        }
        down[v] = row;
      }
      let best = null;
      for (let av = 0; av < H; av++) {
        for (let au = 0; au < W; au++) {
          if (!mask[av][au]) continue;
          let maxRun = 0;
          while (au + maxRun < W && mask[av][au + maxRun]) maxRun++;
          let minDown = Infinity;
          for (let w = 1; w <= maxRun; w++) {
            const d = down[av][au + w - 1];
            if (d < minDown) minDown = d;
            if (minDown < 1) break;
            const hNeed = Math.max(1, Math.ceil(cellsNeeded / w));
            if (hNeed > minDown) continue;
            const h = hNeed;
            const ar = (w >= h) ? (w / h) : (h / w);
            if (ar > maxAspect + 1e-9) continue;
            const fitsA = (w >= minW && h >= minD);
            const fitsB = (h >= minW && w >= minD);
            if (!fitsA && !fitsB) continue;
            const aspectDiff = Math.abs(ar - ta);
            const area = w * h;
            const fit = Math.abs(area - cellsNeeded);
            if (!best ||
                aspectDiff < best.aspectDiff ||
                (aspectDiff === best.aspectDiff && fit < best.fit) ||
                (aspectDiff === best.aspectDiff && fit === best.fit && area < best.area)) {
              best = { au, av, w, h, area, aspectDiff, fit };
            }
          }
        }
      }
      return best;
    }

    // Move `roomId` from its source floor to floor `targetIdx`. Mirrors
    // localReflow's contract: returns { ok: true, project } on success or
    // { ok: false, reason } on rejection. Never mutates input.
    //
    // Step 07 cross-floor rules (spec Section 05):
    //   * Locked rooms cannot be moved.
    //   * Target floor must contain a region for the room's department, else
    //     reject with "no_matching_department".
    //   * Cascade depth 1: at most ONE room on the target floor may be
    //     displaced; locked rooms can never be displaced. The displaced room
    //     must be re-packable into the remaining free cells of its OWN home
    //     department on the target floor, otherwise reject.
    //   * Same-floor drops fall through (handled by localReflow).
    function crossFloorMove(project, roomId, targetIdx) {
      if (!isPlainObject(project) || !isPlainObject(project.current_plan)) {
        return { ok: false, reason: "no_plan" };
      }
      const floors = Array.isArray(project.current_plan.floors)
        ? project.current_plan.floors : [];
      if (!Number.isInteger(targetIdx) || targetIdx < 0 || targetIdx >= floors.length) {
        return { ok: false, reason: "invalid_floor" };
      }

      // Locate the room across floors.
      let sourceIdx = -1, sourceRoomIdx = -1, room = null;
      for (let fi = 0; fi < floors.length; fi++) {
        const f = floors[fi];
        if (!isPlainObject(f) || !Array.isArray(f.rooms)) continue;
        const ri = f.rooms.findIndex(r => isPlainObject(r) && r.instance_id === roomId);
        if (ri >= 0) {
          sourceIdx = fi;
          sourceRoomIdx = ri;
          room = f.rooms[ri];
          break;
        }
      }
      if (!room) return { ok: false, reason: "no_room" };
      if (sourceIdx === targetIdx) return { ok: false, reason: "same_floor" };
      if (room.locked) return { ok: false, reason: "locked_self" };

      const targetFloor = floors[targetIdx];
      if (!isPlainObject(targetFloor) || !isPlainObject(targetFloor.grid)) {
        return { ok: false, reason: "no_target_grid" };
      }
      const grid = targetFloor.grid;
      const W = grid.width_cells, H = grid.height_cells;
      const targetRegions = Array.isArray(targetFloor.department_regions)
        ? targetFloor.department_regions : [];
      const targetRooms = Array.isArray(targetFloor.rooms) ? targetFloor.rooms : [];

      const matchingRegion = targetRegions.find(r =>
        isPlainObject(r) && r.id === room.department_id);
      if (!matchingRegion || !Array.isArray(matchingRegion.cells) ||
          matchingRegion.cells.length === 0) {
        return { ok: false, reason: "no_matching_department" };
      }

      // Cell ownership maps for the target floor.
      const ownerByCell = new Map();   // "u,v" → instance_id
      const lockedKeys = new Set();
      for (const r of targetRooms) {
        if (!isPlainObject(r) || !Array.isArray(r.cells)) continue;
        for (const [u, v] of r.cells) {
          ownerByCell.set(u + "," + v, r.instance_id);
          if (r.locked) lockedKeys.add(u + "," + v);
        }
      }

      const cellArea = grid.cell_size_ft * grid.cell_size_ft;
      const cellsNeeded = Array.isArray(room.cells) && room.cells.length > 0
        ? room.cells.length
        : (Number.isFinite(Number(room.parti_area_cells)) && Number(room.parti_area_cells) > 0
            ? Math.floor(Number(room.parti_area_cells))
            : Math.max(1, Math.round(Number(room.target_area_sf || 0) / cellArea)));
      const minW = Math.max(1, Math.floor(Number(room.min_width_cells)) || 1);
      const minD = Math.max(1, Math.floor(Number(room.min_depth_cells)) || 1);
      const maxAspect = Number.isFinite(Number(room.max_aspect_ratio)) &&
                        Number(room.max_aspect_ratio) > 0
        ? Number(room.max_aspect_ratio) : 2.5;
      const targetAspect = (minW >= 1 && minD >= 1)
        ? (Math.max(minW, minD) / Math.min(minW, minD)) : 1;
