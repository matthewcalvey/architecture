<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>CALVEY PARTY 2 — Sandbox</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap');

    :root {
      --calvey-accent: #6A9CC4;
      --calvey-text: #1A1A1A;
      --calvey-muted: #888888;
      --calvey-surface: #F5F5F5;
      --calvey-rule: #E0E0E0;
      --calvey-error: #B33A3A;
      --calvey-warn: #C68A2E;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Cormorant Garamond', Georgia, serif;
      color: var(--calvey-text);
      background: white;
      margin: 0;
      padding: 0;
      font-size: 16px;
      line-height: 1.5;
    }

    .app {
      max-width: 960px;
      margin: 0 auto;
      padding: 48px 32px 96px;
    }

    h1, h2, h3 {
      font-weight: 500;
      margin: 0 0 16px;
    }

    h1 { font-size: 32px; letter-spacing: -0.01em; }
    h2 { font-size: 20px; }
    h3 { font-size: 14px; font-family: 'Space Mono', monospace; text-transform: uppercase; letter-spacing: 0.08em; color: var(--calvey-muted); }

    .label, .meta, button, .chip, .mono {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .hairline { border-top: 1px solid var(--calvey-rule); margin: 32px 0; }

    .section { margin-bottom: 32px; }

    table.kv { width: 100%; border-collapse: collapse; }
    table.kv td {
      border-bottom: 1px solid var(--calvey-rule);
      padding: 10px 14px;
      vertical-align: top;
    }
    table.kv td.label { width: 35%; color: var(--calvey-muted); font-family: 'Space Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
    table.kv td.value { background: var(--calvey-surface); font-family: 'Space Mono', monospace; font-size: 12px; word-break: break-all; }

    button {
      background: white;
      border: 1px solid var(--calvey-text);
      padding: 10px 16px;
      cursor: pointer;
      margin-right: 8px;
      color: var(--calvey-text);
    }
    button:hover { background: var(--calvey-text); color: white; }

    input[type="file"] { display: none; }

    label.upload {
      display: inline-block;
      background: white;
      border: 1px solid var(--calvey-text);
      padding: 10px 16px;
      cursor: pointer;
      margin-right: 8px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    label.upload:hover { background: var(--calvey-text); color: white; }

    textarea.json-viewer {
      width: 100%;
      min-height: 480px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      line-height: 1.6;
      padding: 16px;
      border: 1px solid var(--calvey-rule);
      background: var(--calvey-surface);
      color: var(--calvey-text);
      resize: vertical;
    }

    .chip {
      display: inline-block;
      padding: 4px 10px;
      border: 1px solid currentColor;
      margin-right: 6px;
      margin-bottom: 6px;
    }
    .chip-ok    { color: var(--calvey-accent); }
    .chip-warn  { color: var(--calvey-warn); }
    .chip-error { color: var(--calvey-error); }

    .block-note {
      border-left: 3px solid var(--calvey-accent);
      padding: 8px 16px;
      background: var(--calvey-surface);
      font-size: 14px;
      margin: 16px 0;
    }

    .onboard-card {
      border: 1px solid var(--calvey-rule);
      padding: 32px;
      margin-top: 24px;
      background: white;
    }

    .onboard-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    @media (min-width: 640px) {
      .onboard-grid.two { grid-template-columns: 1fr 1fr; }
    }

    .field { display: flex; flex-direction: column; }
    .field label {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--calvey-muted);
      margin-bottom: 6px;
    }
    .field select,
    .field input[type="number"],
    .field input[type="text"] {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      padding: 10px 12px;
      border: 1px solid var(--calvey-text);
      background: white;
      color: var(--calvey-text);
      width: 100%;
    }
    .field .hint {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--calvey-muted);
      margin-top: 6px;
    }

    .preset-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .preset-row button {
      padding: 6px 10px;
      margin: 0;
      font-size: 10px;
    }

    .primary {
      background: var(--calvey-text);
      color: white;
    }
    .primary:hover { background: var(--calvey-accent); border-color: var(--calvey-accent); }

    .linkish {
      background: transparent;
      border: none;
      color: var(--calvey-muted);
      padding: 6px 0;
      text-decoration: underline;
      cursor: pointer;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .linkish:hover { background: transparent; color: var(--calvey-text); }

    .soft-rule {
      text-align: center;
      color: var(--calvey-muted);
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin: 24px 0 16px;
    }

    footer {
      margin-top: 64px;
      padding-top: 16px;
      border-top: 1px solid var(--calvey-rule);
      color: var(--calvey-muted);
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .canvas-container {
      width: 100%;
      height: 520px;
      border: 1px solid var(--calvey-rule);
      margin: 32px 0;
      position: relative;
      overflow: hidden;
      background: var(--calvey-surface);
    }

    .canvas-container svg {
      width: 100%;
      height: 100%;
      display: block;
      cursor: grab;
      user-select: none;
    }

    .canvas-container svg.panning {
      cursor: grabbing;
    }

    .canvas-overlay {
      position: absolute;
      pointer-events: none;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--calvey-text);
    }

    .canvas-overlay.top-right {
      top: 20px;
      right: 20px;
      background: rgba(255, 255, 255, 0.9);
      padding: 8px 12px;
      border: 1px solid var(--calvey-rule);
      line-height: 1.6;
    }

    .canvas-overlay.top-right .label {
      color: var(--calvey-muted);
    }

    .canvas-overlay.top-right button {
      pointer-events: auto;
      margin-top: 8px;
      margin-right: 6px;
      padding: 6px 12px;
      font-size: 10px;
    }

    .canvas-overlay.bottom-right {
      bottom: 20px;
      right: 20px;
      background: rgba(255, 255, 255, 0.9);
      padding: 8px 12px;
      border: 1px solid var(--calvey-rule);
      line-height: 1.6;
      max-height: 200px;
      overflow-y: auto;
      pointer-events: auto;
    }

    .canvas-overlay.bottom-right .dept-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      white-space: nowrap;
    }

    .canvas-overlay.bottom-right .dept-row .dept-name {
      color: var(--calvey-text);
    }

    .canvas-overlay.bottom-right .dept-row .dept-meta {
      color: var(--calvey-muted);
    }

    .canvas-overlay.bottom-right .dept-row.unplaced .dept-name,
    .canvas-overlay.bottom-right .dept-row.unplaced .dept-meta {
      color: var(--calvey-warn);
    }

    button:disabled {
      background: var(--calvey-surface);
      color: var(--calvey-muted);
      border-color: var(--calvey-rule);
      cursor: not-allowed;
    }
    button:disabled:hover {
      background: var(--calvey-surface);
      color: var(--calvey-muted);
    }

    .room-label {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      fill: var(--calvey-text);
      text-anchor: middle;
      dominant-baseline: middle;
      pointer-events: none;
      user-select: none;
    }

    /* Step 04 — click-to-pulse on unplaced rows. 0.8s × 3 cycles = 2.4s total. */
    @keyframes soft-pulse {
      0%, 100% { stroke-opacity: 0.25; }
      50%      { stroke-opacity: 1.0; }
    }
    .pulse-cell {
      animation: soft-pulse 0.8s ease-in-out 3;
      fill: none;
      stroke: #E0B84D;
      stroke-width: 2;
      pointer-events: none;
    }

    /* Step 04 — clickable unplaced rows in the bottom-right summary. */
    .canvas-overlay.bottom-right .dept-row.unplaced-row {
      cursor: pointer;
      padding: 2px 4px;
      margin: 0 -4px;
      border-radius: 2px;
    }
    .canvas-overlay.bottom-right .dept-row.unplaced-row:hover {
      background: rgba(224, 184, 77, 0.15);
    }
    .canvas-overlay.bottom-right .dept-row.unplaced-row.is-pulsing {
      background: rgba(224, 184, 77, 0.25);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="env,react">
    // ============================================================
    // SECTION 01 — SCHEMA
    // v2.1-party schema, validators, migrateFromV13 stub
    // ============================================================

    const SCHEMA_VERSION = "2.1-party";
    const ENGINE_VERSION = "0.3.0-step04";

    function emptyProject() {
      const now = new Date().toISOString();
      const id =
        (typeof crypto !== "undefined" && typeof crypto.randomUUID === "function")
          ? crypto.randomUUID()
          : ("p-" + Math.random().toString(36).slice(2, 10) + "-" + Date.now().toString(36));
      return {
        schema_version: SCHEMA_VERSION,
        project_id: id,
        engine_version: ENGINE_VERSION,
        created_at: now,
        updated_at: now,
        context: {
          footprint: {
            polygon: [],
            polygon_units: "feet",
            source: null,
            true_north_deg: 0,
            lat: null,
            lon: null
          },
          site: {
            climate_zone: null,
            setbacks: [],
            adjacent_buildings: [],
            obstructions: []
          },
          program: {
            building_type: null,
            rooms: [],
            adjacency_graph: {},
            vertical_constraints: {},
            // Step 04 — program drivers seeded from subtypes[0] (lazy, first
            // generate only). Empty by default. User edits preserved across
            // generates.
            program_inputs: {},
            // Step 04 — post-resolution digest: template/instance counts,
            // count_rule breakdown, driver values used, gross/net ratio.
            resolved_rooms_digest: null
          },
          vertical_anchors: {
            cores: [],
            structural_lines: [],
            shafts: []
          }
        },
        weights: {
          daylight: 0.25,
          adjacency: 0.25,
          compactness: 0.15,
          circulation: 0.20,
          facade: 0.15
        },
        code_limits: {
          max_stories: null,
          max_height_ft: null,
          jurisdiction: null
        },
        current_plan: {
          floors: [
            {
              level: 1,
              grid: null,
              department_regions: [],
              sun_vector: null,
              rooms: [],
              unplaced_rooms: []
            }
          ],
          total_score: null,
          program_fit_report: null,
          unplaced_rooms: [],
          // Step 04 — set true when user edits footprint/program_inputs/
          // building_type out from under a plan. Cleared on next successful
          // generate. Non-blocking warning chip.
          stale: false
        },
        warnings: [],
        sessions: []
      };
    }

    function isPlainObject(x) {
      return x !== null && typeof x === "object" && !Array.isArray(x);
    }

    function validateProject(p) {
      const errors = [];
      const warnings = [];

      if (!isPlainObject(p)) {
        return { ok: false, errors: ["project must be an object"], warnings: [] };
      }

      if (p.schema_version !== "2.1-party") {
        errors.push("schema_version must be 2.1-party");
      }
      if (typeof p.project_id !== "string" || p.project_id.length === 0) {
        errors.push("project_id must be a non-empty string");
      }

      if (!isPlainObject(p.context)) {
        errors.push("context must be an object");
      }
      if (!isPlainObject(p.weights)) {
        errors.push("weights must be an object");
      }
      if (!isPlainObject(p.code_limits)) {
        errors.push("code_limits must be an object");
      }
      if (!isPlainObject(p.current_plan)) {
        errors.push("current_plan must be an object");
      }
      if (!Array.isArray(p.warnings)) {
        errors.push("warnings must be an array");
      }
      if (!Array.isArray(p.sessions)) {
        errors.push("sessions must be an array");
      }

      const weightKeys = ["daylight", "adjacency", "compactness", "circulation", "facade"];
      if (isPlainObject(p.weights)) {
        for (const k of weightKeys) {
          if (!(k in p.weights)) {
            errors.push("weights missing key: " + k);
          }
        }
        const allPresent = weightKeys.every(k => typeof p.weights[k] === "number");
        if (allPresent) {
          const sum = weightKeys.reduce((acc, k) => acc + p.weights[k], 0);
          if (Math.abs(sum - 1.0) > 0.01) {
            warnings.push("weights do not sum to 1.0 ± 0.01 (got " + sum.toFixed(3) + ")");
          }
        }
      }

      if (
        isPlainObject(p.context) &&
        isPlainObject(p.context.footprint) &&
        Array.isArray(p.context.footprint.polygon) &&
        p.context.footprint.polygon.length === 0
      ) {
        warnings.push("footprint polygon is empty");
      }

      if (
        isPlainObject(p.context) &&
        isPlainObject(p.context.program) &&
        p.context.program.building_type === null
      ) {
        warnings.push("building_type not set");
      }

      // Step 03: validate floors[0].grid and floors[0].department_regions when populated.
      // These are warning-level — a null/empty state is legitimate (pre-generate).
      if (isPlainObject(p.current_plan) && Array.isArray(p.current_plan.floors)) {
        const f0 = p.current_plan.floors[0];
        if (isPlainObject(f0)) {
          if (isPlainObject(f0.grid)) {
            const g = f0.grid;
            if (!(typeof g.cell_size_ft === "number" && g.cell_size_ft > 0)) {
              warnings.push("floors[0].grid.cell_size_ft must be > 0");
            }
            if (!(typeof g.origin_x === "number")) {
              warnings.push("floors[0].grid.origin_x missing");
            }
            if (!(typeof g.origin_y === "number")) {
              warnings.push("floors[0].grid.origin_y missing");
            }
            if (!(typeof g.width_cells === "number" && g.width_cells >= 1)) {
              warnings.push("floors[0].grid.width_cells must be >= 1");
            }
            if (!(typeof g.height_cells === "number" && g.height_cells >= 1)) {
              warnings.push("floors[0].grid.height_cells must be >= 1");
            }
            if (!Array.isArray(g.inside) ||
                g.inside.length !== (g.height_cells | 0) ||
                (g.inside[0] && g.inside[0].length !== (g.width_cells | 0))) {
              warnings.push("floors[0].grid.inside must be a [height_cells][width_cells] 2D array");
            }
          }
          if (Array.isArray(f0.department_regions)) {
            const allowed = new Set(["high", "medium", "low"]);
            f0.department_regions.forEach((r, i) => {
              if (!isPlainObject(r)) {
                warnings.push("floors[0].department_regions[" + i + "] must be an object");
                return;
              }
              if (typeof r.id !== "string" || r.id.length === 0) {
                warnings.push("floors[0].department_regions[" + i + "].id must be a non-empty string");
              }
              if (typeof r.name !== "string" || r.name.length === 0) {
                warnings.push("floors[0].department_regions[" + i + "].name must be a non-empty string");
              }
              if (!allowed.has(r.daylight_priority)) {
                warnings.push("floors[0].department_regions[" + i + "].daylight_priority must be high|medium|low");
              }
              if (!Array.isArray(r.cells)) {
                warnings.push("floors[0].department_regions[" + i + "].cells must be an array");
              }
            });
          }
          // Step 03: validate floors[0].rooms when populated.
          if (Array.isArray(f0.rooms) && f0.rooms.length > 0) {
            f0.rooms.forEach((r, i) => {
              if (!isPlainObject(r)) {
                warnings.push("floors[0].rooms[" + i + "] must be an object");
                return;
              }
              if (typeof r.instance_id !== "string" || r.instance_id.length === 0) {
                warnings.push("floors[0].rooms[" + i + "].instance_id must be a non-empty string");
              }
              if (typeof r.type !== "string" || r.type.length === 0) {
                warnings.push("floors[0].rooms[" + i + "].type must be a non-empty string");
              }
              if (typeof r.department_id !== "string" || r.department_id.length === 0) {
                warnings.push("floors[0].rooms[" + i + "].department_id must be a non-empty string");
              }
              if (!Array.isArray(r.cells)) {
                warnings.push("floors[0].rooms[" + i + "].cells must be an array");
              }
              if (!Number.isFinite(Number(r.area_sf))) {
                warnings.push("floors[0].rooms[" + i + "].area_sf must be a number");
              }
              // Step 04: hard-ceiling check — actual aspect ratio should not
              // exceed max_aspect_ratio. If it does, the packer let a bad
              // rectangle through.
              if (Number.isFinite(Number(r.max_aspect_ratio)) &&
                  Number(r.max_aspect_ratio) > 0 &&
                  r.bbox_cells && typeof r.bbox_cells === "object") {
                const w = (Number(r.bbox_cells.u_max) - Number(r.bbox_cells.u_min) + 1);
                const h = (Number(r.bbox_cells.v_max) - Number(r.bbox_cells.v_min) + 1);
                if (w >= 1 && h >= 1) {
                  const ar = Math.max(w, h) / Math.min(w, h);
                  // allow a tiny epsilon for floating-point noise
                  if (ar > Number(r.max_aspect_ratio) + 0.001) {
                    warnings.push("floors[0].rooms[" + i + "] aspect " +
                      ar.toFixed(2) + " exceeds max_aspect_ratio " +
                      Number(r.max_aspect_ratio).toFixed(2));
                  }
                }
              }
            });
          }
        }
      }

      // Step 04: program_inputs must be numeric where present.
      if (isPlainObject(p.context) && isPlainObject(p.context.program) &&
          isPlainObject(p.context.program.program_inputs)) {
        for (const [k, v] of Object.entries(p.context.program.program_inputs)) {
          if (v !== null && v !== undefined && !Number.isFinite(Number(v))) {
            warnings.push("program_inputs." + k + " must be numeric (got " +
              (typeof v) + ")");
          }
        }
      }

      // Mirror structured project.warnings into the chip row so engine-raised
      // warnings (e.g., overflow) show up alongside validator warnings.
      if (Array.isArray(p.warnings)) {
        for (const w of p.warnings) {
          if (typeof w === "string" && w.length > 0) {
            warnings.push(w);
          } else if (isPlainObject(w) && typeof w.message === "string") {
            warnings.push(w.message);
          }
        }
      }

      return { ok: errors.length === 0, errors, warnings };
    }

    function migrateFromV13(legacy) {
      // TODO Step 01.5 — real v13 migration once we decide whether v13 files
      // need to round-trip into this sandbox at all. For now: log and return null.
      console.warn("migrateFromV13: not implemented in Step 01");
      return null;
    }

    // ============================================================
    // SECTION 02 — PERSISTENCE
    // localStorage autosave + .calvey-party.json import/export
    // ============================================================

    const LS_KEY = "calvey_party_2_project";

    function loadFromLocalStorage() {
      try {
        const raw = localStorage.getItem(LS_KEY);
        if (!raw) return null;
        return JSON.parse(raw);
      } catch (e) {
        console.debug("loadFromLocalStorage: parse error", e);
        return null;
      }
    }

    function saveToLocalStorage(project) {
      try {
        project.updated_at = new Date().toISOString();
        localStorage.setItem(LS_KEY, JSON.stringify(project));
      } catch (e) {
        console.debug("saveToLocalStorage: write error (likely quota)", e);
      }
    }

    function downloadProjectFile(project) {
      const blob = new Blob([JSON.stringify(project, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = project.project_id + ".calvey-party.json";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function uploadProjectFile(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onerror = () => reject(new Error("Could not read file"));
        reader.onload = () => {
          let parsed;
          try {
            parsed = JSON.parse(reader.result);
          } catch (e) {
            reject(new Error("Could not parse JSON: " + e.message));
            return;
          }
          const v = validateProject(parsed);
          if (!v.ok) {
            reject(new Error("Invalid project file: " + v.errors.join("; ")));
            return;
          }
          resolve(parsed);
        };
        reader.readAsText(file);
      });
    }

    // ============================================================
    // SECTION 03 — SESSIONS  [Step 08 — TODO]
    // ============================================================

    // (empty — will be filled in Step 08)

    // ============================================================
    // SECTION 04 — ENGINE
    // Step 03: grid substrate, sun vector, Stage A department zoning.
    // Step 06 will add Stage C/D (adjacency repair, confidence).
    // ============================================================

    // ---------- Grid substrate ----------

    // Ray-cast point-in-polygon. Odd crossing count → inside.
    function pointInPolygon(polygon, x, y) {
      if (!Array.isArray(polygon) || polygon.length < 3) return false;
      let inside = false;
      for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
        const pi = polygon[i], pj = polygon[j];
        if (!Array.isArray(pi) || !Array.isArray(pj)) continue;
        const xi = Number(pi[0]), yi = Number(pi[1]);
        const xj = Number(pj[0]), yj = Number(pj[1]);
        if (!Number.isFinite(xi) || !Number.isFinite(yi)) continue;
        if (!Number.isFinite(xj) || !Number.isFinite(yj)) continue;
        const intersects =
          (yi > y) !== (yj > y) &&
          x < ((xj - xi) * (y - yi)) / (yj - yi) + xi;
        if (intersects) inside = !inside;
      }
      return inside;
    }

    // Default cell size is 5 ft; bumps to 10 ft on large footprints to keep the
    // cell count tractable. Step 08 will expose this as a slider.
    function chooseCellSize(polygon) {
      const area = computePolygonAreaSF(polygon);
      return area > 50000 ? 10 : 5;
    }

    function buildGrid(polygon, cellSizeFt) {
      const cs = cellSizeFt > 0 ? cellSizeFt : 5;
      const { minX, minY, maxX, maxY } = computePolygonBounds(polygon);
      const width_cells = Math.max(1, Math.ceil((maxX - minX) / cs));
      const height_cells = Math.max(1, Math.ceil((maxY - minY) / cs));
      const inside = new Array(height_cells);
      for (let v = 0; v < height_cells; v++) {
        const row = new Array(width_cells);
        const cy = minY + (v + 0.5) * cs;
        for (let u = 0; u < width_cells; u++) {
          const cx = minX + (u + 0.5) * cs;
          row[u] = pointInPolygon(polygon, cx, cy);
        }
        inside[v] = row;
      }
      return {
        cell_size_ft: cs,
        origin_x: minX,
        origin_y: minY,
        width_cells,
        height_cells,
        inside
      };
    }

    function cellCenter(grid, u, v) {
      return [
        grid.origin_x + (u + 0.5) * grid.cell_size_ft,
        grid.origin_y + (v + 0.5) * grid.cell_size_ft
      ];
    }

    // ---------- Sun vector ----------

    // Returns the direction of true south and true north in the project's LOCAL
    // coordinate frame. Local +Y points north when true_north_deg === 0; nonzero
    // values rotate the polygon clockwise relative to true north.
    //   north_x = sin(true_north_deg), north_y = cos(true_north_deg).
    // lat is captured for forward compatibility; Step 03 does not use it.
    function computeSunVector(trueNorthDeg, _lat) {
      const rad = (Number(trueNorthDeg) || 0) * Math.PI / 180;
      const north_x = Math.sin(rad);
      const north_y = Math.cos(rad);
      return {
        north_x,
        north_y,
        south_x: -north_x,
        south_y: -north_y
      };
    }

    // ---------- Daylight priority normalization ----------

    const DAYLIGHT_RANK = { high: 3, medium: 2, low: 1 };

    // Input data uses "High"|"Medium"|"Low"|"None"; normalize to lowercase and
    // collapse "none" → "low" since Stage A has no weaker tier.
    function normalizeDaylightPriority(raw) {
      if (raw == null) return "medium";
      const s = String(raw).toLowerCase().trim();
      if (s === "high") return "high";
      if (s === "medium") return "medium";
      if (s === "low") return "low";
      if (s === "none") return "low";
      return "medium";
    }

    function maxDaylight(a, b) {
      return (DAYLIGHT_RANK[a] || 0) >= (DAYLIGHT_RANK[b] || 0) ? a : b;
    }

    function toTitleCase(s) {
      if (!s) return "";
      return String(s)
        .replace(/[_\/]+/g, " ")
        .split(/\s+/)
        .filter(Boolean)
        .map(w => w[0].toUpperCase() + w.slice(1).toLowerCase())
        .join(" ");
    }

    function slugify(s) {
      return String(s || "").toLowerCase().replace(/[^a-z0-9]+/g, "_").replace(/^_+|_+$/g, "");
    }

    // ---------- Room / department extraction ----------

    // Shape B adapter: the CALVEY_PROGRAM databases have no top-level
    // `departments` array — each space_library entry carries
    // `parti.department_group` (preferred) or `category` (fallback).
    function deptKeyForSpace(space) {
      if (isPlainObject(space) && isPlainObject(space.parti) &&
          typeof space.parti.department_group === "string" &&
          space.parti.department_group.length > 0) {
        return space.parti.department_group;
      }
      if (isPlainObject(space) && typeof space.category === "string" && space.category.length > 0) {
        return space.category.split("/")[0];
      }
      return "Unassigned";
    }

    // ---------- Step 04 — program_inputs seeding ----------

    // Accept either a number or [min, max] range; return midpoint when a range.
    function midpoint(v) {
      if (Array.isArray(v) && v.length === 2 &&
          Number.isFinite(Number(v[0])) && Number.isFinite(Number(v[1]))) {
        return (Number(v[0]) + Number(v[1])) / 2;
      }
      if (Number.isFinite(Number(v))) return Number(v);
      return null;
    }

    // Seed program_inputs (in place) from buildingTypeJson.subtypes[0].
    // Only fills *absent* keys — user edits survive subsequent generates.
    // Also scans the space_library to discover driver_keys so program_inputs
    // has a slot for every field the packer might read.
    function seedProgramInputs(programInputs, buildingTypeJson) {
      if (!isPlainObject(programInputs)) programInputs = {};
      const bt = isPlainObject(buildingTypeJson) ? buildingTypeJson : {};
      const subtypes = Array.isArray(bt.subtypes) ? bt.subtypes : [];
      const s0 = subtypes.length > 0 && isPlainObject(subtypes[0]) ? subtypes[0] : null;

      if (!s0) {
        console.debug("seedProgramInputs: no subtypes[0] found, seeding 0s");
      }

      // Core demographic keys. student_count / staff_count come straight from
      // subtypes; occupant_count falls out of student+staff unless explicit.
      const student = s0 ? midpoint(s0.student_count_typical) : null;
      const staff = s0 ? midpoint(s0.staff_count_typical) : null;
      if (!("student_count" in programInputs)) {
        programInputs.student_count = (student != null) ? Math.round(student) : 0;
      }
      if (!("staff_count" in programInputs)) {
        programInputs.staff_count = (staff != null) ? Math.round(staff) : 0;
      }
      if (!("students" in programInputs)) {
        // The DB uses "students" as the driver_key verbatim; mirror that.
        programInputs.students = Number(programInputs.student_count) || 0;
      }
      if (!("occupant_count" in programInputs)) {
        const s = Number(programInputs.student_count) || 0;
        const st = Number(programInputs.staff_count) || 0;
        programInputs.occupant_count = s + st;
      }
      if (!("floor_count" in programInputs)) {
        programInputs.floor_count = 1;  // Step 04 is single-floor; Step 07 owns multi.
      }
      if (!("unit_count" in programInputs)) {
        // residential-style; 0 signals "not applicable" for non-residential.
        programInputs.unit_count = 0;
      }

      // Discover other driver_keys referenced in space_library.scaling so the
      // user sees them in program_inputs and can edit them in the JSON viewer.
      if (Array.isArray(bt.space_library)) {
        for (const sp of bt.space_library) {
          if (!isPlainObject(sp)) continue;
          const sc = isPlainObject(sp.scaling) ? sp.scaling : {};
          const dk = sc.driver_key;
          if (typeof dk === "string" && dk.length > 0 && !(dk in programInputs)) {
            programInputs[dk] = 0;
          }
        }
      }

      return programInputs;
    }

    // ---------- Step 04 — count_rule resolution ----------

    // Pick the numeric value of the driver for a given template. Falls back
    // across common aliases so a template with driver_key="students" still
    // resolves when user entered "student_count" in program_inputs, and v.v.
    function readDriverValue(programInputs, driverKey, fallbackDefaultKey) {
      if (!isPlainObject(programInputs)) return 0;
      const tryKey = (k) => (k && Number.isFinite(Number(programInputs[k])))
        ? Number(programInputs[k]) : null;
      let v = tryKey(driverKey);
      if (v != null) return v;
      // Common aliases.
      if (driverKey === "students") {
        v = tryKey("student_count"); if (v != null) return v;
      }
      if (driverKey === "student_count") {
        v = tryKey("students"); if (v != null) return v;
      }
      if (driverKey === "occupants") {
        v = tryKey("occupant_count"); if (v != null) return v;
      }
      if (fallbackDefaultKey) {
        v = tryKey(fallbackDefaultKey); if (v != null) return v;
      }
      return 0;
    }

    // Look up a count from step_thresholds given a driver value.
    // Supports both {driver_min, driver_max, count} (actual K-12 format) and
    // {threshold, count} (spec's simpler format).
    function countFromStepThresholds(thresholds, driverValue) {
      if (!Array.isArray(thresholds) || thresholds.length === 0) return null;
      const dv = Number(driverValue) || 0;
      // Range format: find the bucket whose [driver_min, driver_max] contains dv.
      if (thresholds.every(t => isPlainObject(t) &&
          Number.isFinite(Number(t.driver_min)) &&
          Number.isFinite(Number(t.driver_max)))) {
        for (const t of thresholds) {
          if (dv >= Number(t.driver_min) && dv <= Number(t.driver_max)) {
            return Math.max(0, Math.round(Number(t.count) || 0));
          }
        }
        // dv past the last bucket → use the largest bucket's count.
        const last = thresholds[thresholds.length - 1];
        return Math.max(0, Math.round(Number(last.count) || 0));
      }
      // Simple threshold format: largest threshold <= dv wins.
      let chosen = null;
      for (const t of thresholds) {
        if (!isPlainObject(t)) continue;
        const th = Number(t.threshold);
        if (Number.isFinite(th) && th <= dv) {
          if (!chosen || Number(chosen.threshold) < th) chosen = t;
        }
      }
      if (chosen) return Math.max(0, Math.round(Number(chosen.count) || 0));
      return null;
    }

    // Resolve a template's count_rule into a concrete instance count.
    // Clamps to [0, 500] to guard against typo'd coefficients. Returns the
    // integer count plus a `ruleApplied` string for digest bookkeeping.
    function resolveCountForTemplate(space, programInputs, floorCount) {
      const cr = typeof space.count_rule === "string" ? space.count_rule : null;
      const scaling = isPlainObject(space.scaling) ? space.scaling : {};
      const fc = Math.max(1, Math.floor(Number(floorCount) || 1));

      let count = 1;
      let rule = cr || "unknown";

      switch (cr) {
        case "one_per_building":
          count = 1;
          break;

        case "one_per_floor":
          count = fc;
          break;

        case "per_driver": {
          const dv = readDriverValue(programInputs, scaling.driver_key, null);
          const st = countFromStepThresholds(scaling.step_thresholds, dv);
          if (st != null) {
            count = st;
          } else if (Number.isFinite(Number(scaling.coefficient)) &&
                     Number(scaling.coefficient) > 0 &&
                     Number(scaling.coefficient) < 1) {
            // count-ish coefficient (e.g. "rooms per student" = 0.03)
            count = Math.max(1, Math.ceil(dv * Number(scaling.coefficient)));
          } else if (!scaling.driver_key) {
            count = 1;
            rule = "per_driver_no_key";
          } else if (!Number.isFinite(Number(programInputs[scaling.driver_key]))) {
            count = 1;
            rule = "unknown_driver";
          } else {
            // No step_thresholds, no count-like coefficient → fall back to
            // one-per-25 driver units as a rough sizing. Clamp at 1.
            count = Math.max(1, Math.ceil(dv / 25));
          }
          break;
        }

        case "per_occupant": {
          const dv = readDriverValue(programInputs,
            scaling.driver_key || "occupant_count", "occupant_count");
          const st = countFromStepThresholds(scaling.step_thresholds, dv);
          if (st != null) {
            count = st;
          } else if (Number.isFinite(Number(scaling.coefficient)) &&
                     Number(scaling.coefficient) > 0 &&
                     Number(scaling.coefficient) < 1) {
            count = Math.max(1, Math.ceil(dv * Number(scaling.coefficient)));
          } else {
            // K-12 toilets has coef=37.4 (SF/occupant, not count multiplier).
            // Rather than spam the plan with 500 toilets, treat as 1 cluster.
            count = 1;
            rule = "per_occupant_area_scale";
          }
          break;
        }

        case "unit_count": {
          const uc = Number(programInputs && programInputs.unit_count);
          count = Number.isFinite(uc) && uc > 0 ? Math.floor(uc) : 1;
          break;
        }

        case "fixed": {
          const fx = Number(scaling.fixed_count);
          count = Number.isFinite(fx) && fx > 0 ? Math.floor(fx) : 1;
          break;
        }

        case "step_thresholds": {
          const dv = readDriverValue(programInputs, scaling.driver_key, "students");
          const st = countFromStepThresholds(scaling.step_thresholds, dv);
          count = (st != null) ? st : 1;
          break;
        }

        default: {
          // Unknown or missing count_rule — default to 1, let the user notice.
          count = 1;
          rule = cr ? ("unknown:" + cr) : "unknown";
          console.debug("resolveRoomCounts: unknown count_rule for",
            space.id || "(unnamed)", "→", cr);
        }
      }

      // Clamp: a typo'd coefficient shouldn't be able to crash the packer.
      if (!Number.isFinite(count) || count < 0) count = 0;
      if (count > 500) count = 500;
      return { count: Math.floor(count), ruleApplied: rule };
    }

    // Build a flat array of room instances from a space_library, applying
    // count_rule to each template. Returns { instances, digest }.
    function resolveRoomCounts(spaceLibrary, programInputs, _subtypes, floorCount) {
      const digest = {
        total_templates: 0,
        total_instances: 0,
        rules_applied: {
          one_per_building: 0, one_per_floor: 0,
          per_driver: 0, per_occupant: 0,
          unit_count: 0, fixed: 0, step_thresholds: 0,
          unknown_driver: 0, unknown: 0
        },
        program_inputs_used: isPlainObject(programInputs) ? { ...programInputs } : {},
        gross_over_net_used: GROSS_TO_NET_DEFAULT
      };
      const instances = [];
      if (!Array.isArray(spaceLibrary)) return { instances, digest };

      let partiPathCount = 0;
      let areaPathCount = 0;

      for (const space of spaceLibrary) {
        if (!isPlainObject(space)) continue;
        digest.total_templates += 1;
        const resolved = resolveCountForTemplate(space, programInputs, floorCount);
        const n = resolved.count;

        // Digest bookkeeping: bucketize into the known cells; stash unknowns.
        if (digest.rules_applied[resolved.ruleApplied] !== undefined) {
          digest.rules_applied[resolved.ruleApplied] += 1;
        } else if (resolved.ruleApplied &&
                   resolved.ruleApplied.startsWith("unknown")) {
          digest.rules_applied.unknown += 1;
        } else {
          // rule-variant buckets (e.g. per_occupant_area_scale) fold into
          // their base count_rule bucket for the digest.
          const base = resolved.ruleApplied.split("_")[0] + "_" +
                       resolved.ruleApplied.split("_")[1];
          if (digest.rules_applied[base] !== undefined) {
            digest.rules_applied[base] += 1;
          }
        }

        // Build N identical instances for this template.
        const deptKey = deptKeyForSpace(space);
        const dims = isPlainObject(space.dimensions_ft) ? space.dimensions_ft : {};
        const parti = isPlainObject(space.parti) ? space.parti : {};

        const targetArea = Number.isFinite(Number(dims.typical_area_sf))
          ? Number(dims.typical_area_sf)
          : (Array.isArray(space.nsf_range) && space.nsf_range.length === 2
              ? (Number(space.nsf_range[0]) + Number(space.nsf_range[1])) / 2
              : 0);

        // Refinement 4 — prefer parti.parti_area_cells when present/positive.
        const partiCells = Number.isFinite(Number(parti.parti_area_cells)) &&
                           Number(parti.parti_area_cells) > 0
          ? Math.floor(Number(parti.parti_area_cells)) : null;
        if (partiCells !== null) partiPathCount++; else areaPathCount++;

        // Refinement 2 — prefer parti.min_*_cells when present; else convert
        // ft to cells at runtime (Stage B knows cell_size).
        const minWidthCells = Number.isFinite(Number(parti.min_width_cells))
          ? Math.max(1, Math.floor(Number(parti.min_width_cells)))
          : null;
        const minDepthCells = Number.isFinite(Number(parti.min_depth_cells))
          ? Math.max(1, Math.floor(Number(parti.min_depth_cells)))
          : null;

        // Legacy ft-based min_width/length, still plumbed for Stage B fallback.
        const minWidthFt = Number.isFinite(Number(space.min_width_ft))
          ? Number(space.min_width_ft)
          : (Number.isFinite(Number(dims.min_width)) ? Number(dims.min_width) : null);
        const minLengthFt = Number.isFinite(Number(space.min_depth_ft))
          ? Number(space.min_depth_ft)
          : (Number.isFinite(Number(dims.min_depth)) ? Number(dims.min_depth) : null);

        // Refinement 3 — max_aspect_ratio as hard ceiling. Take from parti
        // first, then the top-level field, then a conservative default. Core
        // and corridor-named templates get a loose default (they are linear).
        let maxAspect = null;
        if (Number.isFinite(Number(parti.max_aspect_ratio)) &&
            Number(parti.max_aspect_ratio) > 0) {
          maxAspect = Number(parti.max_aspect_ratio);
        } else if (Number.isFinite(Number(space.max_aspect_ratio)) &&
                   Number(space.max_aspect_ratio) > 0) {
          maxAspect = Number(space.max_aspect_ratio);
        } else {
          const isCore = (typeof parti.department_group === "string" &&
                          parti.department_group.toLowerCase() === "core") ||
                         /corridor/i.test(String(space.name || space.id || ""));
          maxAspect = isCore ? 8.0 : 2.5;
        }

        // Refinement 5 — placement_zone: foh | boh | primary | support | core
        const placementZone =
          (typeof parti.placement_zone === "string" && parti.placement_zone.length > 0)
            ? parti.placement_zone.toLowerCase() : null;

        const templateId = typeof space.id === "string"
          ? space.id : slugify(space.name || "room");
        const nameStr = typeof space.name === "string"
          ? space.name : (space.id || "Room");
        const deptSlug = slugify(deptKey);
        const deptName = toTitleCase(deptKey);
        const daylight = normalizeDaylightPriority(space.daylight_priority);

        for (let k = 0; k < n; k++) {
          instances.push({
            // New (Step 04) canonical fields:
            template_id: templateId,
            instance_id: "r_" + deptSlug + "_" + templateId + "_" +
                         String(instances.length).padStart(4, "0"),
            department_id: deptSlug,
            department_name: deptName,
            placement_zone: placementZone,
            daylight_priority: daylight,
            target_area_sf: targetArea,
            parti_area_cells: partiCells,
            min_width_cells: minWidthCells,
            min_depth_cells: minDepthCells,
            max_aspect_ratio: maxAspect,

            // Legacy (pre-Step 04) field mirrors — keep populated so
            // downstream Step 02/03 code (summary panel, departmentsFromRooms,
            // overflow warning, JSON viewer readers) continues working.
            id: templateId,
            name: nameStr,
            department: deptSlug,
            target_area: targetArea,
            min_width: minWidthFt,
            min_length: minLengthFt,
            count: 1,

            // Reserved for Stage B to populate during packing:
            cells: [],
            actual_area_sf: 0,
            bounds: null,
            locked: false,
            lock_reason: null
          });
        }
        digest.total_instances += n;
      }
      console.debug("resolveRoomCounts: partiCells path used for",
        partiPathCount, "templates;", areaPathCount, "fell back to target_area");
      return { instances, digest };
    }

    // Seed context.program.rooms from a building-type JSON's space_library.
    // Step 04 — wraps resolveRoomCounts so multi-instance templates expand
    // into one element per instance.
    function roomsFromBuildingType(buildingTypeJson, programInputs, floorCount) {
      if (!isPlainObject(buildingTypeJson) || !Array.isArray(buildingTypeJson.space_library)) {
        return { instances: [], digest: null };
      }
      return resolveRoomCounts(
        buildingTypeJson.space_library,
        programInputs || {},
        buildingTypeJson.subtypes,
        floorCount || 1
      );
    }

    // Aggregate rooms into departments with area_fraction and daylight_priority.
    function departmentsFromRooms(rooms) {
      if (!Array.isArray(rooms) || rooms.length === 0) return [];
      const groups = new Map();
      for (const r of rooms) {
        if (!isPlainObject(r)) continue;
        const key = typeof r.department === "string" && r.department.length > 0
          ? r.department
          : "unassigned";
        const name = typeof r.department_name === "string" && r.department_name.length > 0
          ? r.department_name
          : toTitleCase(key);
        const dp = normalizeDaylightPriority(r.daylight_priority);
        const area = Number.isFinite(Number(r.target_area)) ? Number(r.target_area) : 0;
        const count = Number.isFinite(Number(r.count)) && Number(r.count) > 0 ? Number(r.count) : 1;
        if (!groups.has(key)) {
          groups.set(key, { id: key, name, daylight_priority: dp, _area: 0 });
        }
        const g = groups.get(key);
        g.daylight_priority = maxDaylight(g.daylight_priority, dp);
        g._area += area * count;
      }
      const list = Array.from(groups.values());
      const total = list.reduce((s, g) => s + g._area, 0);
      if (total <= 0) {
        const equal = 1 / list.length;
        return list.map(g => ({
          id: g.id, name: g.name, daylight_priority: g.daylight_priority, area_fraction: equal
        }));
      }
      return list.map(g => ({
        id: g.id,
        name: g.name,
        daylight_priority: g.daylight_priority,
        area_fraction: g._area / total
      }));
    }

    // ---------- Stage A — seeded region growing ----------

    function runStageA(grid, sun, departments) {
      const W = grid.width_cells, H = grid.height_cells, inside = grid.inside;

      // Collect interior cells.
      const interior = [];
      for (let v = 0; v < H; v++) {
        for (let u = 0; u < W; u++) {
          if (inside[v][u]) interior.push([u, v]);
        }
      }
      const N = interior.length;

      const depts = Array.isArray(departments) ? departments : [];
      if (depts.length === 0 || N === 0) {
        return depts.map(d => ({
          id: d.id, name: d.name,
          daylight_priority: d.daylight_priority,
          cell_count: 0, area_sf: 0, cells: [], centroid: null
        }));
      }

      // Per-department target cell counts. Sum must equal N; adjust the
      // largest target to absorb rounding error.
      const targets = depts.map(d => Math.round(N * (d.area_fraction || 0)));
      let sumT = targets.reduce((a, b) => a + b, 0);
      if (sumT !== N) {
        let maxIdx = 0;
        for (let i = 1; i < targets.length; i++) {
          if (targets[i] > targets[maxIdx]) maxIdx = i;
        }
        targets[maxIdx] = Math.max(0, targets[maxIdx] + (N - sumT));
      }

      // Grid centroid (over interior cells).
      let gcx = 0, gcy = 0;
      for (const [u, v] of interior) {
        const [cx, cy] = cellCenter(grid, u, v);
        gcx += cx; gcy += cy;
      }
      gcx /= N; gcy /= N;

      // Score a cell for a given daylight priority.
      //   high   → max (projection on sun.south)    = south-most
      //   low    → max (projection on sun.north)    = north-most
      //   medium → min (distance to grid centroid)  = center
      function scoreCell(u, v, priority) {
        const [cx, cy] = cellCenter(grid, u, v);
        const dx = cx - gcx, dy = cy - gcy;
        if (priority === "high") return dx * sun.south_x + dy * sun.south_y;
        if (priority === "low")  return dx * sun.north_x + dy * sun.north_y;
        return -(dx * dx + dy * dy);
      }

      // Seed placement: higher-daylight-priority departments pick first, then
      // alphabetical by id to break ties deterministically.
      const seedOrder = depts.map((_, i) => i).sort((a, b) => {
        const ra = DAYLIGHT_RANK[depts[a].daylight_priority] || 0;
        const rb = DAYLIGHT_RANK[depts[b].daylight_priority] || 0;
        if (rb !== ra) return rb - ra;
        return String(depts[a].id).localeCompare(String(depts[b].id));
      });

      const claimed = new Map();  // "u,v" -> deptIndex
      const usedSeeds = new Set();
      const seeds = new Array(depts.length).fill(null);

      for (const di of seedOrder) {
        const priority = depts[di].daylight_priority;
        let bestIdx = -1, bestScore = -Infinity;
        for (let i = 0; i < interior.length; i++) {
          const [u, v] = interior[i];
          const key = u + "," + v;
          if (usedSeeds.has(key)) continue;
          const s = scoreCell(u, v, priority);
          if (s > bestScore) { bestScore = s; bestIdx = i; }
        }
        if (bestIdx < 0) continue;
        const [u, v] = interior[bestIdx];
        const key = u + "," + v;
        usedSeeds.add(key);
        claimed.set(key, di);
        seeds[di] = [u, v];
      }

      // BFS frontiers per department (arrays used as FIFO queues).
      const frontiers = depts.map(() => []);
      const cellCounts = depts.map(() => 0);
      for (let di = 0; di < depts.length; di++) {
        if (seeds[di]) { frontiers[di].push(seeds[di]); cellCounts[di] = 1; }
      }

      const inBounds = (u, v) => u >= 0 && u < W && v >= 0 && v < H;
      const isClaimable = (u, v) =>
        inBounds(u, v) && inside[v][u] && !claimed.has(u + "," + v);

      // Simultaneous BFS with rotating department order each round so smaller
      // departments aren't starved.
      let round = 0;
      const MAX_ROUNDS = N * depts.length + 10;  // safety cap
      while (round < MAX_ROUNDS) {
        let claimedThisRound = false;
        for (let k = 0; k < depts.length; k++) {
          const di = (k + round) % depts.length;
          if (cellCounts[di] >= targets[di]) continue;
          const q = frontiers[di];
          // Pop stale frontier cells (no claimable neighbors) until we find one
          // that can claim a neighbor this tick, or the queue is empty.
          while (q.length > 0) {
            const [u, v] = q[0];
            const neighbors = [[u + 1, v], [u - 1, v], [u, v + 1], [u, v - 1]];
            let picked = null;
            for (const n of neighbors) {
              if (isClaimable(n[0], n[1])) { picked = n; break; }
            }
            if (picked) {
              claimed.set(picked[0] + "," + picked[1], di);
              q.push(picked);
              cellCounts[di] += 1;
              claimedThisRound = true;
              break;
            } else {
              q.shift();
            }
          }
        }
        if (!claimedThisRound) break;
        round++;
      }

      // Any unclaimed interior cells (pockets isolated by concave geometry or
      // under-target departments) fall to the nearest claimed cell's department
      // by Manhattan distance; ties broken by dept id alphabetical order.
      const unclaimed = [];
      for (const [u, v] of interior) {
        if (!claimed.has(u + "," + v)) unclaimed.push([u, v]);
      }
      if (unclaimed.length > 0 && claimed.size > 0) {
        const claimedList = [];
        for (const [key, di] of claimed.entries()) {
          const parts = key.split(",");
          claimedList.push([Number(parts[0]), Number(parts[1]), di]);
        }
        for (const [u, v] of unclaimed) {
          let bestDist = Infinity, bestDi = null, bestId = null;
          for (const [cu, cv, di] of claimedList) {
            const d = Math.abs(cu - u) + Math.abs(cv - v);
            const id = depts[di].id;
            if (d < bestDist || (d === bestDist && bestId !== null && id < bestId)) {
              bestDist = d; bestDi = di; bestId = id;
            }
          }
          if (bestDi !== null) claimed.set(u + "," + v, bestDi);
        }
      }

      // Build region objects.
      const cellsByDept = depts.map(() => []);
      for (const [key, di] of claimed.entries()) {
        const parts = key.split(",");
        cellsByDept[di].push([Number(parts[0]), Number(parts[1])]);
      }
      return depts.map((d, di) => {
        const cells = cellsByDept[di];
        let cx = 0, cy = 0;
        for (const [u, v] of cells) {
          const [wx, wy] = cellCenter(grid, u, v);
          cx += wx; cy += wy;
        }
        const centroid = cells.length > 0 ? [cx / cells.length, cy / cells.length] : null;
        return {
          id: d.id,
          name: d.name,
          daylight_priority: d.daylight_priority,
          cell_count: cells.length,
          area_sf: cells.length * grid.cell_size_ft * grid.cell_size_ft,
          cells,
          centroid
        };
      });
    }

    // ---------- Stage B — greedy rectangular room packing ----------

    // For each department region, build an availability mask, then for each
    // room instance (sorted big-to-small) scan all anchors for the rectangle
    // that best matches the room's target aspect ratio while still containing
    // at least cells_needed cells. Claim the rectangle and continue.
    //
    // Step 04 refinements:
    //   (2) use parti.min_{width,depth}_cells directly when present
    //   (3) reject candidates whose aspect > room.max_aspect_ratio (HARD)
    //   (4) use parti.parti_area_cells as the primary target when present
    //   (5) placement_zone tiebreaks candidate rectangles by world position
    //
    // Output: {
    //   rooms:    [ <placed-room per floors[0].rooms schema> ],
    //   unplaced: [ { type, template_id, department_id, target_area_sf, reason } ]
    // }
    function runStageB(grid, regions, rooms) {
      const W = grid.width_cells, H = grid.height_cells;
      const cellArea = grid.cell_size_ft * grid.cell_size_ft;
      const placed = [];
      const unplaced = [];

      const roomList = Array.isArray(rooms) ? rooms.filter(isPlainObject) : [];
      const regionList = Array.isArray(regions) ? regions.filter(isPlainObject) : [];

      // Footprint centroid in world coords — used by foh/boh zone scoring.
      // We average over all interior cells, not the polygon vertices (the
      // grid already approximates the inside).
      let fpCx = 0, fpCy = 0, fpN = 0;
      for (let v = 0; v < H; v++) {
        for (let u = 0; u < W; u++) {
          if (grid.inside[v][u]) {
            const [wx, wy] = cellCenter(grid, u, v);
            fpCx += wx; fpCy += wy; fpN++;
          }
        }
      }
      const footprintCentroid = fpN > 0 ? [fpCx / fpN, fpCy / fpN] : null;

      // Group rooms by department id. Step 04 — read either legacy `department`
      // field or the new `department_id` field (resolveRoomCounts writes both).
      const byDept = new Map();
      for (const r of roomList) {
        const key =
          (typeof r.department_id === "string" && r.department_id.length > 0)
            ? r.department_id
          : (typeof r.department === "string" && r.department.length > 0)
            ? r.department
            : "unassigned";
        if (!byDept.has(key)) byDept.set(key, []);
        byDept.get(key).push(r);
      }

      // Per-template instance counter so instance_ids on the OUTPUT are
      // unique within a floor. Keyed by template_id so multiple instances
      // of the same template (Step 04 refinement 1) get distinct ids.
      const counters = new Map();
      function nextInstanceId(type) {
        const n = (counters.get(type) || 0) + 1;
        counters.set(type, n);
        return type + "_" + String(n).padStart(2, "0");
      }

      for (const region of regionList) {
        const deptRooms = byDept.get(region.id) || [];
        if (deptRooms.length === 0) continue;

        // Region centroid in world coords — used by primary/support zone scoring.
        const regionCentroid = Array.isArray(region.centroid) ? region.centroid : null;

        // Build availability mask + interior cell count for this department.
        const mask = new Array(H);
        for (let v = 0; v < H; v++) mask[v] = new Array(W).fill(false);
        let availableCells = 0;
        if (Array.isArray(region.cells)) {
          for (const [u, v] of region.cells) {
            if (u >= 0 && u < W && v >= 0 && v < H) {
              mask[v][u] = true;
              availableCells++;
            }
          }
        }

        // Grid centroid for `core` zone preference (independent of department).
        const gridCentroid = footprintCentroid;

        // Build instances for this department. Each `r` is already a single
        // room instance (count=1); no expansion needed here — resolveRoomCounts
        // did that.
        //
        // For each instance we derive:
        //   cellsNeeded     — parti.parti_area_cells when present (refinement 4),
        //                     else round(target_area / cell²).
        //   minWCells/minDCells — parti.min_{width,depth}_cells when present
        //                         (refinement 2), else ceil(ft / cell_size).
        //   maxAspect       — room.max_aspect_ratio (refinement 3). HARD ceiling.
        //   zonePrefPoint   — anchor target for placement_zone tiebreaker (5).
        //   zoneSignedDir   — +1 pulls TOWARD, -1 pushes AWAY.
        const instances = [];
        for (const r of deptRooms) {
          const targetArea = Number.isFinite(Number(r.target_area_sf))
            ? Number(r.target_area_sf)
            : (Number.isFinite(Number(r.target_area)) ? Number(r.target_area) : 0);

          // (4) parti cells take precedence over area-derived count.
          let cellsNeeded;
          if (Number.isFinite(Number(r.parti_area_cells)) &&
              Number(r.parti_area_cells) > 0) {
            cellsNeeded = Math.max(1, Math.floor(Number(r.parti_area_cells)));
          } else {
            cellsNeeded = Math.max(1, Math.round(targetArea / cellArea));
          }

          // (2) min width/depth in cells: parti first, then ft→cells.
          let minWCells, minDCells;
          if (Number.isFinite(Number(r.min_width_cells)) &&
              Number(r.min_width_cells) > 0) {
            minWCells = Math.max(1, Math.floor(Number(r.min_width_cells)));
          } else if (Number.isFinite(Number(r.min_width)) && Number(r.min_width) > 0) {
            minWCells = Math.max(1, Math.ceil(Number(r.min_width) / grid.cell_size_ft));
          } else {
            minWCells = 1;
          }
          if (Number.isFinite(Number(r.min_depth_cells)) &&
              Number(r.min_depth_cells) > 0) {
            minDCells = Math.max(1, Math.floor(Number(r.min_depth_cells)));
          } else if (Number.isFinite(Number(r.min_length)) && Number(r.min_length) > 0) {
            minDCells = Math.max(1, Math.ceil(Number(r.min_length) / grid.cell_size_ft));
          } else {
            minDCells = 1;
          }

          // Legacy target aspect (min_length / min_width ratio) — used as a
          // *preference*, not a ceiling. Ceiling is max_aspect_ratio.
          const targetAspect = (minWCells >= 1 && minDCells >= 1)
            ? (Math.max(minWCells, minDCells) / Math.min(minWCells, minDCells))
            : 1.0;

          // (3) Hard ceiling. resolveRoomCounts always writes a value; guard
          // for direct-JSON-edit cases where the user might strip it.
          const maxAspect = (Number.isFinite(Number(r.max_aspect_ratio)) &&
                             Number(r.max_aspect_ratio) > 0)
            ? Number(r.max_aspect_ratio) : 2.5;

          // (5) placement_zone tiebreaker anchor and direction.
          const zone = (typeof r.placement_zone === "string")
            ? r.placement_zone.toLowerCase() : null;
          let zonePrefPoint = null, zoneSignedDir = 0;
          if (zone === "foh" && footprintCentroid) {
            zonePrefPoint = footprintCentroid; zoneSignedDir = +1;
          } else if (zone === "boh" && footprintCentroid) {
            zonePrefPoint = footprintCentroid; zoneSignedDir = -1;
          } else if (zone === "primary" && regionCentroid) {
            zonePrefPoint = regionCentroid; zoneSignedDir = +1;
          } else if (zone === "support" && regionCentroid) {
            zonePrefPoint = regionCentroid; zoneSignedDir = -1;
          } else if (zone === "core" && gridCentroid) {
            zonePrefPoint = gridCentroid; zoneSignedDir = +1;
          }

          instances.push({
            room: r,
            cellsNeeded,
            minWCells,
            minDCells,
            targetAspect,
            maxAspect,
            zonePrefPoint,
            zoneSignedDir
          });
        }

        if (availableCells === 0) {
          for (const inst of instances) {
            unplaced.push(makeUnplacedEntry(inst.room, "department_empty"));
          }
          continue;
        }

        // Sort instances big-first so larger rooms grab space before
        // small rooms scatter the mask.
        instances.sort((a, b) => b.cellsNeeded - a.cellsNeeded);

        for (const inst of instances) {
          if (inst.cellsNeeded > availableCells) {
            unplaced.push(makeUnplacedEntry(inst.room, "target_too_large"));
            continue;
          }

          // Precompute down_runs[v][u] = consecutive trues going from (u,v)
          // toward larger v. Lets us find max_h for any (anchor, w) in O(w).
          const down = new Array(H);
          for (let v = H - 1; v >= 0; v--) {
            const row = new Array(W);
            for (let u = 0; u < W; u++) {
              row[u] = mask[v][u] ? (1 + (v + 1 < H ? down[v + 1][u] : 0)) : 0;
            }
            down[v] = row;
          }

          // Scan all anchors row-major; track best placement by:
          //   1) aspect-distance from targetAspect (smaller is better)
          //   2) zone-preference score (smaller is better)
          //   3) area (smaller = less waste)
          // Rectangles that violate max_aspect_ratio (refinement 3) are rejected.
          // Rectangles smaller than (minWCells × minDCells) are rejected.
          let best = null;
          for (let av = 0; av < H; av++) {
            for (let au = 0; au < W; au++) {
              if (!mask[av][au]) continue;
              // max width of trues to the right on this row, starting at (au, av).
              let maxW = 0;
              while (au + maxW < W && mask[av][au + maxW]) maxW++;
              let minDown = Infinity;
              for (let w = 1; w <= maxW; w++) {
                const d = down[av][au + w - 1];
                if (d < minDown) minDown = d;
                if (minDown < 1) break;
                const hNeeded = Math.max(1, Math.ceil(inst.cellsNeeded / w));
                if (hNeeded > minDown) continue;
                const h = hNeeded;

                // (3) HARD max-aspect check. Reject and keep scanning.
                const ar = (w >= h) ? (w / h) : (h / w);
                if (ar > inst.maxAspect + 1e-9) continue;

                // Min-dimension check (either orientation).
                const fitsW = (w >= inst.minWCells && h >= inst.minDCells);
                const fitsR = (h >= inst.minWCells && w >= inst.minDCells);
                if (!fitsW && !fitsR) continue;

                const area = w * h;
                const aspectDiff = Math.abs(ar - inst.targetAspect);

                // (5) Zone preference — signed distance from zone target point.
                // Centroid of this candidate rectangle in world coords:
                let zoneScore = 0;
                if (inst.zonePrefPoint) {
                  const [px, py] = inst.zonePrefPoint;
                  const [rx0, ry0] = cellCenter(grid, au, av);
                  const [rx1, ry1] = cellCenter(grid, au + w - 1, av + h - 1);
                  const cxCand = (rx0 + rx1) / 2;
                  const cyCand = (ry0 + ry1) / 2;
                  const dist = Math.hypot(cxCand - px, cyCand - py);
                  // signedDir +1 → closer is better → score = +dist
                  // signedDir -1 → farther is better → score = -dist
                  zoneScore = -inst.zoneSignedDir * dist;
                }

                if (!best ||
                    aspectDiff < best.aspectDiff ||
                    (aspectDiff === best.aspectDiff && zoneScore < best.zoneScore) ||
                    (aspectDiff === best.aspectDiff && zoneScore === best.zoneScore && area < best.area)) {
                  best = { au, av, w, h, area, aspectDiff, zoneScore };
                }
              }
            }
          }

          if (!best) {
            unplaced.push(makeUnplacedEntry(inst.room, "no_rectangle_fits"));
            continue;
          }

          // Claim cells, update mask + bookkeeping.
          const cells = [];
          let cx = 0, cy = 0;
          for (let dv = 0; dv < best.h; dv++) {
            for (let du = 0; du < best.w; du++) {
              const u = best.au + du, v = best.av + dv;
              cells.push([u, v]);
              mask[v][u] = false;
              const [wx, wy] = cellCenter(grid, u, v);
              cx += wx; cy += wy;
            }
          }
          availableCells -= cells.length;
          cx /= cells.length; cy /= cells.length;

          const type = (typeof inst.room.template_id === "string" && inst.room.template_id.length > 0)
            ? inst.room.template_id
            : (typeof inst.room.id === "string" && inst.room.id.length > 0
                ? inst.room.id : "room");
          const displayName = (typeof inst.room.name === "string" && inst.room.name.length > 0)
            ? inst.room.name : toTitleCase(type);
          const actualArea = cells.length * cellArea;
          const targetArea = Number.isFinite(Number(inst.room.target_area_sf))
            ? Number(inst.room.target_area_sf)
            : (Number.isFinite(Number(inst.room.target_area)) ? Number(inst.room.target_area) : 0);
          placed.push({
            instance_id: nextInstanceId(type),
            type,
            template_id: type,
            display_name: displayName,
            department_id: region.id,
            // Step 04 — propagate template metadata into placed rooms so
            // the validator, JSON viewer, and future Stage C/D can read them.
            placement_zone: (typeof inst.room.placement_zone === "string")
              ? inst.room.placement_zone : null,
            daylight_priority: inst.room.daylight_priority || null,
            max_aspect_ratio: inst.maxAspect,
            parti_area_cells: Number.isFinite(Number(inst.room.parti_area_cells))
              ? Number(inst.room.parti_area_cells) : null,
            min_width_cells: inst.minWCells,
            min_depth_cells: inst.minDCells,
            cells,
            bbox_cells: {
              u_min: best.au, v_min: best.av,
              u_max: best.au + best.w - 1, v_max: best.av + best.h - 1
            },
            area_sf: actualArea,
            actual_area_sf: actualArea,
            target_area_sf: targetArea,
            centroid: [cx, cy],
            aspect_ratio: best.w / best.h,
            locked: false,
            lock_reason: null
          });
        }
      }

      return { rooms: placed, unplaced };
    }

    // Step 04 — shared helper so all three unplaced code paths emit the
    // same shape (spec Section 03 and the click-to-pulse panel read this).
    function makeUnplacedEntry(room, reason) {
      if (!isPlainObject(room)) return { reason };
      const tpl = (typeof room.template_id === "string" && room.template_id.length > 0)
        ? room.template_id
        : (typeof room.id === "string" ? room.id : "room");
      const dep = (typeof room.department_id === "string" && room.department_id.length > 0)
        ? room.department_id
        : (typeof room.department === "string" ? room.department : "unassigned");
      const area = Number.isFinite(Number(room.target_area_sf))
        ? Number(room.target_area_sf)
        : (Number.isFinite(Number(room.target_area)) ? Number(room.target_area) : 0);
      return {
        type: tpl,
        template_id: tpl,
        department_id: dep,
        name: (typeof room.name === "string") ? room.name : tpl,
        target_area_sf: area,
        reason
      };
    }

    // ---------- Overflow warning ----------

    const OVERFLOW_WARNING_ID = "overflow";
    const GROSS_TO_NET_DEFAULT = 1.4;  // hardcoded for Step 03; Step 08 slider.

    // Replace-or-remove semantics: at most one overflow warning at a time.
    function upsertOverflowWarning(warnings, programArea, capacity) {
      const list = Array.isArray(warnings)
        ? warnings.filter(w => !(isPlainObject(w) && w.id === OVERFLOW_WARNING_ID))
        : [];
      if (programArea > capacity) {
        list.push({
          id: OVERFLOW_WARNING_ID,
          severity: "warning",
          message: "Program (" + Math.round(programArea).toLocaleString() +
                   " SF) exceeds capacity (" + Math.round(capacity).toLocaleString() +
                   " SF) at gross/net " + GROSS_TO_NET_DEFAULT.toFixed(1),
          raised_at: new Date().toISOString(),
          auto_clear_when: "programArea <= capacity"
        });
      }
      return list;
    }

    // ---------- Unplaced-rooms warning ----------

    const UNPLACED_WARNING_ID = "unplaced";

    // Replace-or-remove semantics: at most one unplaced warning at a time.
    function upsertUnplacedWarning(warnings, unplacedList) {
      const list = Array.isArray(warnings)
        ? warnings.filter(w => !(isPlainObject(w) && w.id === UNPLACED_WARNING_ID))
        : [];
      if (Array.isArray(unplacedList) && unplacedList.length > 0) {
        const types = [];
        for (const u of unplacedList) {
          const t = (isPlainObject(u) && typeof u.type === "string") ? u.type : "?";
          if (!types.includes(t)) types.push(t);
        }
        const head = types.slice(0, 3).join(", ");
        const tail = types.length > 3 ? ", ..." : "";
        list.push({
          id: UNPLACED_WARNING_ID,
          severity: "warning",
          message: unplacedList.length + " room(s) could not be placed: " + head + tail,
          raised_at: new Date().toISOString(),
          auto_clear_when: "all rooms placed"
        });
      }
      return list;
    }

    // ---------- generatePlan — orchestrator ----------

    // Deep clone via JSON round-trip. All our schema is JSON-safe.
    function cloneProject(p) {
      return JSON.parse(JSON.stringify(p));
    }

    // Runs the full Step 03 pipeline. Returns a NEW project object with
    // current_plan.floors[0] populated. Does NOT mutate input.
    // sunVectorLogged is a module-level flag so we log the first-run sun vector
    // once per page load.
    let __sunVectorLogged = false;
    let __cellSizeLogged = false;
    function generatePlan(project, buildingTypeJson) {
      if (!isPlainObject(project)) throw new Error("generatePlan: project must be an object");
      const np = cloneProject(project);
      if (!isPlainObject(np.context) || !isPlainObject(np.context.footprint)) {
        throw new Error("generatePlan: project.context.footprint missing");
      }
      const polygon = Array.isArray(np.context.footprint.polygon)
        ? np.context.footprint.polygon : [];
      if (polygon.length < 3) {
        throw new Error("generatePlan: footprint polygon needs at least 3 vertices");
      }

      // Ensure program substructure exists.
      if (!isPlainObject(np.context.program)) {
        np.context.program = {
          building_type: null, rooms: [], adjacency_graph: {},
          vertical_constraints: {}, program_inputs: {}, resolved_rooms_digest: null
        };
      }
      if (!isPlainObject(np.context.program.program_inputs)) {
        np.context.program.program_inputs = {};
      }

      // Step 04 — seed absent program_inputs from subtypes[0].
      seedProgramInputs(np.context.program.program_inputs, buildingTypeJson);

      // Step 04 — always re-resolve rooms from the current program_inputs so
      // count_rule edits take effect. This replaces Step 03's "seed once if
      // empty" behavior; the digest makes it obvious where counts came from.
      const floorCount = Number.isFinite(Number(np.context.program.program_inputs.floor_count))
        ? Math.max(1, Math.floor(Number(np.context.program.program_inputs.floor_count)))
        : 1;
      const resolved = roomsFromBuildingType(buildingTypeJson, np.context.program.program_inputs, floorCount);
      np.context.program.rooms = resolved.instances;
      np.context.program.resolved_rooms_digest = resolved.digest;

      const rooms = np.context.program.rooms;
      const departments = departmentsFromRooms(rooms);

      // Grid
      const cellSize = chooseCellSize(polygon);
      if (!__cellSizeLogged) {
        console.debug("generatePlan: cell size chosen =", cellSize, "ft (footprint area",
                      Math.round(computePolygonAreaSF(polygon)).toLocaleString(), "SF)");
        __cellSizeLogged = true;
      }
      const grid = buildGrid(polygon, cellSize);

      // Sun vector
      const trueNorthDeg = Number(np.context.footprint.true_north_deg) || 0;
      const lat = np.context.footprint.lat;
      const sun = computeSunVector(trueNorthDeg, lat);
      if (!__sunVectorLogged) {
        console.debug("generatePlan: sun vector", sun, "true_north_deg", trueNorthDeg);
        __sunVectorLogged = true;
      }

      // Stage A
      const regions = runStageA(grid, sun, departments);

      // Stage B
      const stageB = runStageB(grid, regions, rooms);

      // Write to floors[0].
      if (!isPlainObject(np.current_plan)) {
        np.current_plan = {
          floors: [], total_score: null, program_fit_report: null,
          unplaced_rooms: [], stale: false
        };
      }
      if (!Array.isArray(np.current_plan.floors) || np.current_plan.floors.length === 0) {
        np.current_plan.floors = [{
          level: 1, grid: null, department_regions: [], sun_vector: null,
          rooms: [], unplaced_rooms: []
        }];
      }
      const f0 = np.current_plan.floors[0];
      f0.grid = grid;
      f0.department_regions = regions;
      f0.sun_vector = sun;
      f0.rooms = stageB.rooms;
      f0.unplaced_rooms = stageB.unplaced;

      // Overflow warning — sum target_area_sf across instances (count=1 each).
      const footprintArea = computePolygonAreaSF(polygon);
      const programArea = rooms.reduce((acc, r) => {
        const a = Number.isFinite(Number(r.target_area_sf)) ? Number(r.target_area_sf)
               : (Number.isFinite(Number(r.target_area)) ? Number(r.target_area) : 0);
        return acc + a;
      }, 0);
      const capacity = footprintArea / GROSS_TO_NET_DEFAULT;
      np.warnings = upsertOverflowWarning(np.warnings, programArea, capacity);
      np.warnings = upsertUnplacedWarning(np.warnings, stageB.unplaced);

      // Step 04 — clear stale flag; we've just regenerated.
      np.current_plan.stale = false;

      // updated_at is displayed in metadata and used by autosave timestamps.
      np.updated_at = new Date().toISOString();
      // Make sure the engine_version reflects the code path that produced
      // this plan. (Old files loaded from disk keep their field otherwise.)
      np.engine_version = ENGINE_VERSION;

      return np;
    }

    // ============================================================
    // SECTION 05 — EDITOR
    // Step 02: read-only footprint canvas with pan/zoom/fit
    // ============================================================

    // World coords: feet, +X east, +Y north (Y is up).
    // Screen coords: SVG pixels, +X right, +Y down.
    // view = { panX, panY, zoom } — pan is the world coord at the viewport
    // center; zoom is pixels-per-foot.

    function computePolygonBounds(polygon) {
      if (!Array.isArray(polygon) || polygon.length === 0) {
        return { minX: 0, maxX: 0, minY: 0, maxY: 0 };
      }
      let minX = Infinity, maxX = -Infinity;
      let minY = Infinity, maxY = -Infinity;
      for (const pt of polygon) {
        if (!Array.isArray(pt) || pt.length < 2) continue;
        const x = Number(pt[0]);
        const y = Number(pt[1]);
        if (!Number.isFinite(x) || !Number.isFinite(y)) continue;
        if (x < minX) minX = x;
        if (x > maxX) maxX = x;
        if (y < minY) minY = y;
        if (y > maxY) maxY = y;
      }
      if (!Number.isFinite(minX)) {
        return { minX: 0, maxX: 0, minY: 0, maxY: 0 };
      }
      return { minX, maxX, minY, maxY };
    }

    function computePolygonAreaSF(polygon) {
      if (!Array.isArray(polygon) || polygon.length < 3) return 0;
      let sum = 0;
      for (let i = 0; i < polygon.length; i++) {
        const a = polygon[i];
        const b = polygon[(i + 1) % polygon.length];
        if (!Array.isArray(a) || !Array.isArray(b)) continue;
        const ax = Number(a[0]), ay = Number(a[1]);
        const bx = Number(b[0]), by = Number(b[1]);
        if (!Number.isFinite(ax) || !Number.isFinite(ay)) continue;
        if (!Number.isFinite(bx) || !Number.isFinite(by)) continue;
        sum += ax * by - bx * ay;
      }
      return Math.abs(sum) / 2;
    }

    function computeInitialView(polygon, viewportWidth, viewportHeight) {
      if (!Array.isArray(polygon) || polygon.length < 3) {
        return { panX: 0, panY: 0, zoom: 1 };
      }
      const { minX, maxX, minY, maxY } = computePolygonBounds(polygon);
      const worldWidth = maxX - minX;
      const worldHeight = maxY - minY;
      if (worldWidth <= 0 || worldHeight <= 0 || viewportWidth <= 0 || viewportHeight <= 0) {
        return { panX: (minX + maxX) / 2, panY: (minY + maxY) / 2, zoom: 1 };
      }
      const margin = 0.15;
      const zoomX = viewportWidth / (worldWidth * (1 + 2 * margin));
      const zoomY = viewportHeight / (worldHeight * (1 + 2 * margin));
      const zoom = Math.min(zoomX, zoomY);
      const panX = (minX + maxX) / 2;
      const panY = (minY + maxY) / 2;
      return { panX, panY, zoom };
    }

    function worldToScreen(wx, wy, view, viewport) {
      const sx = (wx - view.panX) * view.zoom + viewport.width / 2;
      const sy = -(wy - view.panY) * view.zoom + viewport.height / 2;
      return [sx, sy];
    }

    function screenToWorld(sx, sy, view, viewport) {
      const wx = (sx - viewport.width / 2) / view.zoom + view.panX;
      const wy = -(sy - viewport.height / 2) / view.zoom + view.panY;
      return [wx, wy];
    }

    function niceScaleBarLength(zoomPixelsPerFoot) {
      const ladder = [1, 2, 5, 10, 20, 50, 100, 200, 500, 1000, 2000];
      const maxPixels = 150;
      let best = ladder[0];
      for (const L of ladder) {
        if (L * zoomPixelsPerFoot <= maxPixels) {
          best = L;
        } else {
          break;
        }
      }
      return best;
    }

    // Stable 12-entry palette for department cell fills. Picked by
    // sum-of-char-codes hash so a given dept id always maps to the same color.
    const DEPT_PALETTE = [
      "#B8D4E3",  // academic blue
      "#E5C6A0",  // admin tan
      "#C8D5B9",  // circulation green
      "#E8B5C7",  // public pink
